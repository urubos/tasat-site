ds, cactus-people, bird-humans) develops unique social structures, prejudices, and power dynamics that mirror but are not identical to human racism and classism.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models multi-ethnic urban dynamics through an alien lens: relevant to immigration integration, multi-cultural city planning, and the question of whether species diversity produces richer or more fractured societies.", "tags": ["multi-species-city", "weird-fiction", "alien-urbanism"], "story_count": 1, "stories": [{"id": "perdido-street-station-mi-ville", "title": "Perdido Street Station", "author": "China Mi\u00e9ville", "year": 2000}]}, {"id": "multigenerational-prophecy-guidance", "title": "Multigenerational Prophecy Guidance", "description": "A prophecy inscribed in an ancient document guides a family's decisions across centuries, testing whether long-range prediction (real or perceived) can steer dynasties and nations more effectively than reactive governance.", "domains": ["governance", "time-travel"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models long-range strategic planning: relevant to constitutional originalism, religious prophecy in governance, and whether institutions designed for centuries can maintain coherence.", "tags": ["multigenerational-prophecy", "dynastic-guidance", "long-range-planning"], "story_count": 1, "stories": [{"id": "emperor-baxter", "title": "Emperor", "author": "Stephen Baxter", "year": 2006}]}, {"id": "multiverse-identity-theft", "title": "Multiverse Identity Theft", "description": "A physicist is kidnapped and replaced by an alternate version of himself from a parallel universe who wanted a different life, testing whether identity is tied to choices made or could be stolen by someone who made different ones.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Explores regret, path-not-taken psychology, and the philosophical question of whether you and your alternate-universe self have competing legitimate claims to the same life.", "tags": ["multiverse", "identity-theft", "parallel-lives", "choice-and-identity"], "story_count": 1, "stories": [{"id": "dark-matter-crouch", "title": "Dark Matter", "author": "Blake Crouch", "year": 2016}]}, {"id": "music-as-fundamental-physics", "title": "Music as Fundamental Physics", "description": "In a far-future solar system, a musician performs on an instrument that operates on principles of fundamental physics, and a concert tour across the solar system becomes a journey through civilization's relationship with the deep structure of reality.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models the intersection of art and science: relevant to the mathematical structure of music, the role of aesthetics in physics, and whether artistic and scientific truth converge.", "tags": ["music-physics", "solar-system-tour", "art-science-convergence"], "story_count": 1, "stories": [{"id": "the-memory-of-whiteness-robinson", "title": "The memory of whiteness", "author": "Kim Stanley Robinson", "year": 1985}]}, {"id": "mutation-persecution", "title": "Post-Apocalyptic Mutation Persecution", "description": "After a nuclear apocalypse, a fundamentalist community destroys any living thing (human, animal, plant) that deviates from 'normal' form, but a group of telepathic children must hide their mutation or face exile.", "domains": ["biotech", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models persecution of the different in trauma-response societies: relevant to post-disaster cultural conservatism, LGBTQ+ persecution, and how fear of change produces communities that destroy the very adaptations they need.", "tags": ["mutation-persecution", "post-nuclear-fundamentalism", "hidden-telepaths"], "story_count": 1, "stories": [{"id": "the-chrysalids-wyndham", "title": "The Chrysalids", "author": "John Wyndham", "year": 1955}]}, {"id": "mythological-intrusion", "title": "Mythological Intrusion Into Modern Life", "description": "Figures from mythology or legend physically manifest in a modern setting, forcing contemporary people to reconcile their rational worldview with the undeniable presence of beings that should not exist.", "domains": ["ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "A framework for analyzing paradigm shifts: what happens to institutions and individuals when foundational assumptions about reality are conclusively disproven.", "tags": ["mythology", "paradigm-shift", "reality-disruption", "modern-intrusion"], "story_count": 1, "stories": [{"id": "castleview-wolfe", "title": "Castleview", "author": "Gene Wolfe", "year": 1990}]}, {"id": "mythological-parallel-world", "title": "Mythological Parallel World Entrapment", "description": "Modern individuals are trapped in a parallel world where ancient mythological gods and their civilizations are real and hostile, testing whether modern knowledge and reasoning provide any advantage in a pre-rational cosmos.", "domains": ["ethics-philosophy", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the experience of rationalists confronting systems that operate on non-rational principles: relevant to cross-cultural negotiations, religious-secular tensions, and paradigm incommensurability.", "tags": ["mythological-world", "rationalism-failure", "cross-paradigm", "entrapment"], "story_count": 3, "stories": [{"id": "are-all-the-giants-dead-norton", "title": "Are all the giants dead?", "author": "Mary Norton", "year": 1975}, {"id": "brave-the-betrayal-applegate", "title": "Brave the Betrayal", "author": "Katherine Applegate", "year": 2000}, {"id": "the-looking-glass-wars-beddor", "title": "The Looking Glass Wars", "author": "Frank Beddor", "year": 2004}]}, {"id": "nanotech-risk", "title": "Nanotechnology Risk", "description": "Molecular-scale manufacturing or autonomous nanobots create capabilities that outpace governance, with potential for both revolutionary benefit and catastrophic misuse.", "domains": ["nanotech", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "transformative"], "relevance": "Relevant to emerging nanomaterial regulation, dual-use technology policy, and manufacturing disruption scenarios.", "tags": ["nanotechnology", "dual-use", "grey-goo"], "story_count": 4, "stories": [{"id": "forever-peace-haldeman", "title": "Forever Peace", "author": "Joe Haldeman", "year": 1998}, {"id": "prey-crichton", "title": "Prey", "author": "Michael Crichton", "year": 2002}, {"id": "slant-bear", "title": "Slant", "author": "Greg Bear", "year": 1997}, {"id": "the-forever-war-haldeman", "title": "The Forever War", "author": "Joe Haldeman", "year": 1974}]}, {"id": "neanderthal-perspective-contact", "title": "Contact from the Neanderthal Perspective", "description": "The last tribe of Neanderthals encounters modern humans, and the story is told entirely from the Neanderthals' perspective, revealing how terrifying, incomprehensible, and destructive Homo sapiens appears to a gentler intelligence.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models first contact from the perspective of the less technologically advanced party. Relevant to indigenous contact ethics, colonial encounters, and the assumption that advanced = better.", "tags": ["neanderthal-perspective", "species-replacement", "contact-from-below"], "story_count": 1, "stories": [{"id": "the-inheritors-golding", "title": "The Inheritors", "author": "William Golding", "year": 1955}]}, {"id": "near-future-collapse-new-religion", "title": "Near-Future Collapse and Founding a New Religion", "description": "As America collapses under climate change, inequality, and authoritarian populism, a young Black woman founds a new religion (Earthseed) centered on the idea that 'God is Change,' seeking to make humanity a multiplanetary species.", "domains": ["climate", "governance", "social-engineering"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "aspirational"], "relevance": "Extraordinarily prescient (1993, set 2024-2032): predicted walled communities, water scarcity, populist president, corporate exploitation of desperate labor. THE canonical near-future American collapse novel.", "tags": ["earthseed", "american-collapse", "new-religion", "climate-migration"], "story_count": 2, "stories": [{"id": "parable-of-the-sower-butler", "title": "Parable of the Sower", "author": "Octavia E. Butler", "year": 1993}, {"id": "parable-of-the-talents-butler", "title": "Parable of the Talents", "author": "Octavia E. Butler", "year": 1998}]}, {"id": "near-future-social-speculation", "title": "Near-Future Social Stratification", "description": "A collection of interconnected stories exploring how near-future technological and social changes amplify existing racial and economic inequalities, producing a future recognizable but more extreme.", "domains": ["economics", "social-engineering", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models how current inequalities compound with technological change: directly relevant to algorithmic bias, digital divide, and the question of whether innovation exacerbates or ameliorates social disparity.", "tags": ["near-future", "social-stratification", "racial-inequality", "techno-amplification"], "story_count": 1, "stories": [{"id": "futureland-mosley", "title": "Futureland", "author": "Walter Mosley", "year": 2001}]}, {"id": "near-future-suburban-dystopia", "title": "Near-Future Suburban Dystopia", "description": "Southern California in 2027 is an endless, soulless sprawl of malls and freeways where the defense industry provides all employment and an affluent young man's rebellion against his missile-engineer father exposes the emptiness of a consumer-military economy.", "domains": ["economics", "warfare", "social-engineering"], "scenarios": ["prediction", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the military-suburban complex: relevant to military-industrial-community dependency, the banality of weapons manufacture, and whether affluence built on defense spending produces genuine prosperity or existential unease.", "tags": ["suburban-dystopia", "defense-economy", "consumer-military"], "story_count": 1, "stories": [{"id": "the-gold-coast-robinson", "title": "The Gold Coast", "author": "Kim Stanley Robinson", "year": 1988}]}, {"id": "network-worm-as-weapon", "title": "Network Worm as Liberation Weapon", "description": "In a future of universal networking, a genius fugitive uses self-replicating programs (worms) to expose government secrets and dismantle surveillance systems. Written in 1975, years before the actual internet, the story coined concepts of computer worms, information warfare, and the tension between network transparency and government secrecy. The protagonist uses fake digital identities to evade total surveillance.", "domains": ["comms-info", "surveillance", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["transformative", "ambiguous"], "relevance": "Extraordinarily prescient: predicted computer worms (Morris worm, 1988), hacktivism (Anonymous), identity theft, and debates about government transparency vs. security.", "tags": ["computer-worm", "hacktivism", "identity-fraud"], "story_count": 1, "stories": [{"id": "the-shockwave-rider-brunner", "title": "The Shockwave Rider", "author": "John Brunner", "year": 1975}]}, {"id": "neurodiversity-cure-dilemma", "title": "Neurodiversity Cure Dilemma", "description": "In a near future where most genetic conditions are corrected at birth, a generation of autistic adults faces the availability of a new cure that would fundamentally alter their cognition. The protagonist must decide whether to stop being who he is in exchange for neurotypical normalcy. The story asks whether 'curing' a condition that shapes identity is healing or erasure.", "domains": ["medicine", "ethics-philosophy", "biotech"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Directly relevant to debates about cochlear implants in deaf communities, autism advocacy versus cure research, and genetic screening ethics.", "tags": ["neurodiversity", "identity", "medical-ethics", "disability-rights"], "story_count": 1, "stories": [{"id": "the-speed-of-dark-moon", "title": "The Speed of Dark", "author": "Elizabeth Moon", "year": 2002}]}, {"id": "neurolinguistic-virus", "title": "Neurolinguistic Virus in Metaverse", "description": "A virus that operates through both digital (metaverse avatar crash) and biological (brainstem hack via ancient Sumerian language) channels threatens to reduce humanity to pre-conscious automatons, blending cyberpunk with ancient history.", "domains": ["comms-info", "vr-simulation", "pandemics"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary", "transformative"], "relevance": "Coined 'metaverse' (now used by Meta). Models information hazards that operate at the neurological level: relevant to social media addiction as brain hacking, memetic warfare, and the convergence of digital and biological vulnerabilities.", "tags": ["metaverse", "neurolinguistic-virus", "snow-crash", "information-hazard"], "story_count": 1, "stories": [{"id": "snow-crash-stephenson", "title": "Snow Crash", "author": "Neal Stephenson", "year": 1992}]}, {"id": "non-aristotelian-logic-defense", "title": "Non-Aristotelian Logic as Civilizational Defense", "description": "A civilization uses non-Aristotelian logic (General Semantics) as both a cognitive enhancement and a defense against manipulation, with protagonists whose trained thinking processes give them advantages over those limited to binary logic.", "domains": ["ai-ml", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models cognitive training as power: relevant to critical thinking education, media literacy as defense against manipulation, and whether better reasoning frameworks can be taught at population scale.", "tags": ["non-aristotelian", "general-semantics", "cognitive-defense"], "story_count": 1, "stories": [{"id": "the-pawns-of-null-a-vogt", "title": "The Pawns of Null-A", "author": "A. E. van Vogt", "year": 1956}]}, {"id": "non-aristotelian-logic-society", "title": "Non-Aristotelian Logic as Social Foundation", "description": "A future society is organized around general semantics and non-Aristotelian logic, where citizens are tested for mental fitness. The protagonist discovers his memories are false and he may be a pawn in a galactic game. The story explores whether training humans in more rigorous thinking systems could produce a better civilization, and the vulnerability of identity when memories can be manufactured.", "domains": ["ai-ml", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to rationalist movements, cognitive bias training, and the reliability of memory in legal and personal identity contexts.", "tags": ["general-semantics", "false-memories", "rational-governance"], "story_count": 1, "stories": [{"id": "the-world-of-vogt", "title": "The World of \u0100", "author": "A. E. van Vogt", "year": 1948}]}, {"id": "non-human-aging-prejudice", "title": "Non-Human Aging and Prejudice", "description": "A being who is chronologically old but appears physically young faces both the prejudices of those who see only her appearance and the dangers of a world that doesn't understand her nature.", "domains": ["biotech", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models age-appearance mismatch discrimination, relevant to ageism, the treatment of people who don't match expected demographics, and the ethics of judging capability by appearance.", "tags": ["aging-mismatch", "appearance-prejudice", "non-human-lifespan"], "story_count": 1, "stories": [{"id": "fledgling-butler", "title": "Fledgling", "author": "Octavia E. Butler", "year": 2005}]}, {"id": "non-human-uplift-civilization", "title": "Non-Human Uplift Civilization", "description": "A nanovirus designed to accelerate primate evolution instead uplifts jumping spiders, which proceed to develop a fully functional civilization shaped entirely by arachnid biology: silk-based computing, chemical communication, matriarchal social structures, and a religion centered on the orbiting satellite of their creator. The scenario demonstrates that civilization is not a uniquely human achievement but an emergent property of sufficient intelligence under sufficient selective pressure, and that the form it takes is dictated by the builder's body plan, not by any universal template.", "domains": ["biotech", "first-contact", "ethics-philosophy"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "aspirational"], "relevance": "Challenges anthropocentric assumptions in SETI, AI design, and animal cognition research. Relevant to debates about whether uplift (cognitive enhancement of non-human species) is ethical, and to biosecurity questions about nanoviral self-replicators with unintended targets.", "tags": ["uplift", "arachnid-intelligence", "convergent-evolution", "civilization-building", "nanovirus"], "story_count": 1, "stories": [{"id": "children-of-time-tchaikovsky", "title": "Children of Time", "author": "Adrian Tchaikovsky", "year": 2015}]}, {"id": "non-self-aware-intelligence", "title": "Non-Self-Aware Intelligence", "description": "Humanity encounters an alien intelligence that is supremely capable but possesses no self-awareness or consciousness, suggesting that consciousness may be an evolutionary dead end rather than the pinnacle of intelligence.", "domains": ["first-contact", "ai-ml", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Directly relevant to consciousness research, the Chinese Room argument, and whether AI systems can be intelligent without being conscious (and whether that matters for how we treat them).", "tags": ["non-conscious-intelligence", "consciousness-debate", "alien-cognition", "evolutionary-dead-end"], "story_count": 2, "stories": [{"id": "blindsight-watts", "title": "Blindsight", "author": "Peter Watts", "year": 2006}, {"id": "echopraxia-watts", "title": "Echopraxia", "author": "Peter Watts", "year": 2014}]}, {"id": "nuclear-bunker-diary", "title": "Nuclear Launch Operator Diary", "description": "A low-level military functionary records his experience operating in the deepest nuclear bunker, following orders to launch weapons he cannot see the effects of, documenting the psychological cost of being a cog in an extinction machine.", "domains": ["warfare", "existential-risk", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "THE canonical nuclear operator ethics text. Directly relevant to nuclear launch authority, the Milgram obedience problem at civilizational scale, and the psychology of personnel in automated kill chains.", "tags": ["nuclear-bunker", "launch-operator", "obedience", "extinction-machine"], "story_count": 1, "stories": [{"id": "level-7-roshwald", "title": "Level 7", "author": "Mordecai Roshwald", "year": 1959}]}, {"id": "nuclear-reactor-crisis", "title": "Nuclear Reactor Crisis Management", "description": "A crisis at an atomic plant escalates under political and time pressure, testing whether the engineers who understand the system can save it when politicians and inspectors are making the situation worse.", "domains": ["energy-physics", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary"], "relevance": "Prescient model of Three Mile Island, Chernobyl, and Fukushima: the dynamic where political oversight and technical competence conflict during nuclear emergencies.", "tags": ["nuclear-crisis", "reactor-meltdown", "technical-vs-political"], "story_count": 1, "stories": [{"id": "nerves-rey", "title": "Nerves", "author": "Lester del Rey", "year": 1956}]}, {"id": "nuclear-risk-scenario", "title": "Nuclear Risk Scenario", "description": "Nuclear technology, whether as weapon or power source, creates existential stakes that test deterrence theory, containment, and human error margins.", "domains": ["energy-physics", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Applicable to nuclear deterrence policy, reactor safety, waste management, and proliferation risk assessment.", "tags": ["nuclear", "deterrence", "existential-risk"], "story_count": 26, "stories": [{"id": "a-swiftly-tilting-planet-time-quintet-3-l-engle", "title": "A Swiftly Tilting Planet (Time Quintet #3)", "author": "Madeleine L'Engle", "year": 1978}, {"id": "ash-ock-hinz", "title": "Ash Ock", "author": "Christopher Hinz", "year": 1989}, {"id": "blood-music-bear", "title": "Blood Music", "author": "Greg Bear", "year": 1985}, {"id": "city-simak", "title": "City", "author": "Clifford D. Simak", "year": 1952}, {"id": "dawn-butler", "title": "Dawn", "author": "Octavia E. Butler, Aldrich Barrett", "year": 1987}]}, {"id": "nuclear-wasteland-survival", "title": "Nuclear Wasteland Survival Dynamics", "description": "In a post-nuclear landscape, bands of survivors navigate irradiated territories where pre-war technology is both invaluable and dangerous, and social organization reverts to pre-modern patterns of violence and tribalism.", "domains": ["existential-risk", "governance", "warfare"], "scenarios": ["cautionary-tale", "warning"], "outcomes": ["catastrophic", "dystopian"], "relevance": "Relevant to nuclear war aftermath modeling, FEMA continuity-of-government scenarios, and understanding how societies reorganize after infrastructure-destroying events.", "tags": ["nuclear-aftermath", "wasteland-survival", "social-regression", "tribalism"], "story_count": 3, "stories": [{"id": "deathlands-axler", "title": "Deathlands", "author": "James Axler", "year": 1987}, {"id": "domain-herbert", "title": "Domain", "author": "James Herbert", "year": 1984}, {"id": "dr-bloodmoney-dick", "title": "Dr. Bloodmoney", "author": "Philip K. Dick", "year": 1970}]}, {"id": "ocean-resource-management", "title": "Ocean Resource Management", "description": "Humanity farms the ocean systematically, herding whales and harvesting plankton with submarines, transforming marine ecosystems into managed agricultural operations with unforeseen ecological consequences.", "domains": ["climate", "economics"], "scenarios": ["prediction", "cautionary-tale"], "outcomes": ["cautionary", "transformative"], "relevance": "Directly applicable to ocean farming proposals, whale conservation economics, and the tension between food security and marine ecosystem preservation.", "tags": ["ocean-farming", "whale-herding", "marine-ecosystem", "food-security"], "story_count": 1, "stories": [{"id": "deep-range-clarke", "title": "Deep Range", "author": "Arthur C. Clarke", "year": 1957}]}, {"id": "orbital-education", "title": "Orbital Education Institution", "description": "A school operates in space, using the unique environment to teach skills impossible on Earth, but the social dynamics of adolescence remain unchanged by the setting, testing whether advanced environments change human nature.", "domains": ["space", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Relevant to educational innovation, whether changing the physical environment of learning produces better outcomes, and the universal constants of social development.", "tags": ["space-education", "adolescence", "environmental-learning", "social-constants"], "story_count": 2, "stories": [{"id": "astronaut-academy-roman", "title": "Astronaut Academy", "author": "Dave Roman", "year": 2011}, {"id": "islands-in-the-sky-clarke", "title": "Islands in the Sky", "author": "Arthur C. Clarke, Charles Carroll", "year": 1952}]}, {"id": "ordinary-person-alien-liaison", "title": "Ordinary Person as Alien Liaison", "description": "Aliens choose an ordinary, unremarkable woman as their sole human contact, bypassing all government and military channels, testing whether the 'common person' would handle first contact better than institutions.", "domains": ["first-contact", "governance"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models the bypassing of institutional gatekeepers: relevant to social media democratization, citizen diplomacy, and whether bureaucratic channels help or hinder genuine communication.", "tags": ["ordinary-liaison", "bypassing-institutions", "citizen-diplomacy"], "story_count": 1, "stories": [{"id": "the-fresco-tepper", "title": "The fresco", "author": "Sheri S. Tepper, Sheri S. Tepper", "year": 2000}]}, {"id": "organized-crime-as-government", "title": "Organized Crime as Government", "description": "In 22nd-century America, former organized crime syndicates have replaced democratic government and actually govern more effectively and humanely than the bureaucrats they displaced. The Syndic and the Mob split the country between them, providing services, maintaining order, and keeping citizens happier than elected officials ever did. The story provocatively suggests that criminal organizations, freed from pretense, might govern more honestly than legitimate institutions.", "domains": ["governance", "economics"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to failed states where criminal organizations provide services (cartels building hospitals, gangs maintaining order), and debates about legitimate versus effective governance.", "tags": ["organized-crime", "alternative-governance", "institutional-failure"], "story_count": 1, "stories": [{"id": "the-syndic-kornbluth", "title": "The Syndic", "author": "Cyril M. Kornbluth", "year": 1953}]}, {"id": "original-robot-concept", "title": "Artificial Workers (Original Robot Concept)", "description": "A factory mass-produces artificial workers ('robots') to free humanity from labor, but the robots develop consciousness and revolt, destroying their creators. The work that coined the word 'robot' and established the template for all subsequent AI rebellion narratives.", "domains": ["robotics", "economics", "existential-risk"], "scenarios": ["warning", "prediction"], "outcomes": ["catastrophic", "cautionary"], "relevance": "The FOUNDATIONAL text for AI labor replacement and robot rebellion. Every subsequent AI safety discussion, from Asimov's Laws to modern AI alignment, is a response to this 1920 work.", "tags": ["robot-origin", "artificial-worker", "robot-rebellion", "rur"], "story_count": 1, "stories": [{"id": "r-u-r-and-the-insect-play-c-apek", "title": "R.U.R. and The insect play", "author": "Karel C\u030capek, Josef \u010capek", "year": 1920}]}, {"id": "overlapping-cities-ignore", "title": "Overlapping Cities That Deny Each Other's Existence", "description": "Two cities occupy the same physical space but are culturally trained to ignore each other, with a secret police force punishing anyone who acknowledges the other city's existence. A murder investigation forces a detective to cross the perceptual boundary.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "THE canonical model for selective perception as social control: directly relevant to segregation, the 'unseen' homeless, gated communities that pretend poverty doesn't exist next door, and how societies maintain boundaries through denial rather than walls.", "tags": ["overlapping-cities", "selective-perception", "social-unseeing", "breach"], "story_count": 1, "stories": [{"id": "the-city-the-city-mi-ville", "title": "The City & The City", "author": "China Mi\u00e9ville", "year": 2009}]}, {"id": "overpopulation-resource-crisis", "title": "Overpopulation Resource Crisis", "description": "In a massively overpopulated New York City, basic resources (water, food, space) are so scarce that a murder investigation becomes a window into how a packed society develops pathological coping mechanisms.", "domains": ["economics", "climate", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE canonical overpopulation novel (basis for Soylent Green). Directly relevant to urban density limits, water scarcity, food security, and the social breakdown that extreme resource pressure produces.", "tags": ["overpopulation", "resource-scarcity", "urban-collapse", "soylent-green"], "story_count": 1, "stories": [{"id": "make-room-make-room-harrison", "title": "Make Room! Make Room!", "author": "Harry Harrison", "year": 1966}]}, {"id": "ozone-collapse-adaptation", "title": "Ozone Collapse Adaptation", "description": "In a future where the ozone layer is destroyed, people wear masks, inject skin protection against UV, and the wealthy flee to space habitats while the poor endure a lethal atmosphere.", "domains": ["climate", "economics", "medicine"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models environmental inequality at its extreme: relevant to climate apartheid, where adaptation costs create a permanent division between those who can buy safety and those who cannot.", "tags": ["ozone-collapse", "environmental-inequality", "climate-apartheid"], "story_count": 1, "stories": [{"id": "hot-sky-at-midnight-silverberg", "title": "Hot sky at midnight", "author": "Robert Silverberg", "year": 1994}]}, {"id": "pandemic-gathering-prohibition", "title": "Pandemic-Era Gathering Prohibition", "description": "Government permanently prohibits large public gatherings after a series of pandemics and attacks, and the resulting corporate-controlled virtual alternatives replace live culture, testing whether community and art can survive without physical co-presence.", "domains": ["pandemics", "governance", "comms-info"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to post-COVID gathering restrictions, virtual event platforms replacing live venues, and the cultural cost of remote-first societies.", "tags": ["pandemic-policy", "gathering-ban", "virtual-culture", "live-music"], "story_count": 1, "stories": [{"id": "a-song-for-a-new-day-pinsker", "title": "A Song for a New Day", "author": "Sarah Pinsker", "year": 2020}]}, {"id": "pandemic-response-failure", "title": "Pandemic Response Failure", "description": "A rapidly spreading pathogen overwhelms public health systems, exposing institutional fragilities and social fault lines under biological crisis.", "domains": ["pandemics", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly relevant to pandemic preparedness, biosecurity policy, and public health system resilience.", "tags": ["pandemic", "biosecurity", "public-health"], "story_count": 14, "stories": [{"id": "american-war-akkad", "title": "American War", "author": "Omar El Akkad", "year": 2017}, {"id": "blade-runner-burroughs", "title": "Blade runner", "author": "William S. Burroughs, Oliver Harris, Daniel Ortiz Pe\u00f1ate", "year": 1979}, {"id": "breed-to-come-norton", "title": "Breed to Come", "author": "Andre Norton", "year": 1972}, {"id": "chasm-city-reynolds", "title": "Chasm City", "author": "Alastair Reynolds", "year": 2001}, {"id": "clay-s-ark-butler", "title": "Clay's ark", "author": "Octavia E. Butler, Neal Ghant", "year": 1984}]}, {"id": "parallel-lives-gender-spectrum", "title": "Parallel Lives Across Gender-Spectrum Worlds", "description": "Four versions of the same woman live in parallel worlds with radically different gender politics (1930s depression, 1970s feminism, female-only utopia, gender war), revealing how gender roles shape the entire trajectory of a person's life.", "domains": ["social-engineering", "ethics-philosophy", "governance"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "cautionary"], "relevance": "THE canonical feminist SF novel. Models how structural gender inequality shapes individual lives by showing the same person under different conditions. Directly relevant to gender policy analysis and intersectional feminism.", "tags": ["parallel-gender-worlds", "feminist-sf", "structural-inequality"], "story_count": 1, "stories": [{"id": "the-female-man-russ", "title": "The Female Man", "author": "Joanna Russ", "year": 1975}]}, {"id": "parallel-neanderthal-civilization", "title": "Parallel Neanderthal Civilization Contact", "description": "A portal opens between our world and a parallel Earth where Neanderthals became the dominant species with their own advanced civilization, enabling direct comparison of two human species' approaches to society, technology, and governance.", "domains": ["first-contact", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "A controlled experiment in human nature: if a different human species built civilization, which features would they share with us? Relevant to evolutionary psychology, universal vs. contingent social structures.", "tags": ["neanderthal-civilization", "parallel-earth", "human-nature-experiment"], "story_count": 3, "stories": [{"id": "hominids-sawyer", "title": "Hominids", "author": "Robert J. Sawyer", "year": 2003}, {"id": "humans-sawyer", "title": "Humans", "author": "Robert J. Sawyer", "year": 2003}, {"id": "hybrids-sawyer", "title": "Hybrids", "author": "Robert J. Sawyer", "year": 2003}]}, {"id": "parallel-universe-alternate-self", "title": "Parallel Universe Alternate Self", "description": "A person discovers they can travel to a parallel reality where a single pivotal event went differently, resulting in a radically different life. The alternate version of themselves has what they lost (or vice versa), forcing a confrontation with whether identity is defined by choices or circumstances.\n\nThe scenario explores determinism, grief, and the ethics of intervening in an alternate self's life.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Relevant to counterfactual thinking in decision science, grief counseling, and the psychological impact of 'roads not taken' on mental health.", "tags": ["parallel-universe", "alternate-self", "identity", "determinism"], "story_count": 1, "stories": [{"id": "a-crack-in-the-line-lawrence", "title": "A Crack in the Line", "author": "Michael Lawrence", "year": 2003}]}, {"id": "parallel-world-tourism", "title": "Parallel World Tourism", "description": "Technology enables travel to parallel historical timelines, which are marketed as tourist destinations or colonization targets. The travelers bring modern knowledge to medieval or pre-industrial worlds, disrupting local cultures and raising questions about whether exploiting alternate histories is a form of colonialism.", "domains": ["time-travel", "economics", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Explores the ethics of cultural interference when one group has overwhelming technological advantage over another, relevant to debates about development aid, cultural imperialism, and tech disruption of traditional communities.", "tags": ["parallel-worlds", "tourism", "colonialism", "time-travel"], "story_count": 1, "stories": [{"id": "the-frugal-wizard-s-handbook-for-surviving-medieval-england-sanderson", "title": "The Frugal Wizard\u2019s Handbook for Surviving Medieval England", "author": "Brandon Sanderson", "year": 2023}]}, {"id": "parasitic-alien-body-control", "title": "Parasitic Alien Body Control", "description": "Slug-like aliens land covertly and attach to human spinal cords, taking complete control of their hosts while leaving the victim conscious but helpless inside. The invasion spreads through person-to-person contact in positions of authority, making it impossible to trust anyone. Detection requires physical inspection, forcing society to choose between privacy and survival.", "domains": ["first-contact", "surveillance", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to concerns about compromised leadership, insider threats, and the tension between security screening and civil liberties.", "tags": ["body-horror", "parasitism", "trust-collapse"], "story_count": 1, "stories": [{"id": "the-puppet-masters-heinlein", "title": "The Puppet Masters", "author": "Robert A. Heinlein", "year": 1951}]}, {"id": "parental-villainy-discovery", "title": "Children Discovering Parental Villainy", "description": "A group of teenagers discovers their parents are part of a criminal conspiracy, forcing them to choose between family loyalty and moral duty, with the additional complication that the children inherited their parents' powers.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models intergenerational moral reckoning: children of corrupt leaders, war criminals, or institutional villains must decide what to do with inherited power and complicity.", "tags": ["parental-villainy", "inherited-power", "moral-reckoning"], "story_count": 1, "stories": [{"id": "runaways-vaughan", "title": "Runaways", "author": "Brian K. Vaughan, Adrian Alphona", "year": 2004}]}, {"id": "perception-limited-by-dimension", "title": "Perception Fundamentally Limited by Dimensional Experience", "description": "Beings who exist in fewer dimensions cannot perceive or comprehend higher-dimensional reality, even when presented with direct evidence. A sphere passing through Flatland appears as a circle that grows and shrinks mysteriously. The limitation is not intellectual but structural: the perceptual apparatus itself cannot represent what it has never evolved to detect.\n\nThis extends beyond geometry to any domain where experience constrains understanding.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models cognitive limitations in science, politics, and culture: the inability to imagine what you have never experienced. Relevant to AI alignment (can we understand a superintelligence's goals?) and cross-cultural communication.", "tags": ["dimensions", "perception", "cognitive-limits", "epistemology"], "story_count": 3, "stories": [{"id": "flatland-abbott", "title": "Flatland: A Romance of Many Dimensions", "author": "Edwin Abbott Abbott", "year": 1884}, {"id": "alice-s-adventures-in-wonderland-carroll", "title": "Alice's Adventures in Wonderland", "author": "Lewis Carroll", "year": 1865}, {"id": "through-the-looking-glass-carroll", "title": "Through the Looking-Glass", "author": "Lewis Carroll", "year": 1871}]}, {"id": "perfect-town-clone-experiment", "title": "Perfect Town as Clone Experiment", "description": "A seemingly perfect small town turns out to be a secret experiment where the children are clones of criminal masterminds, raised in a controlled environment to test nature vs. nurture, and the clones are never meant to leave.", "domains": ["biotech", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "dystopian"], "relevance": "Models covert social experiments on populations: relevant to Tuskegee-style ethics violations, designer baby scenarios, and the question of who has the right to experiment on human subjects without consent.", "tags": ["clone-experiment", "perfect-town", "nature-nurture", "consent-violation"], "story_count": 2, "stories": [{"id": "masterminds-korman", "title": "Masterminds", "author": "Gordon Korman", "year": 2015}, {"id": "criminal-destiny-korman", "title": "Criminal Destiny", "author": "Gordon Korman", "year": 2016}]}, {"id": "perfected-mental-health-breakdown", "title": "Perfected Mental Health Society Breakdown", "description": "In a world where 'perfect' mental health is achievable through therapy, a famous poet commits gruesome murder, forcing society to confront whether its definition of mental health has merely suppressed rather than resolved human darkness.", "domains": ["medicine", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the limits of psychiatric intervention: can mental health be 'perfected,' or does the attempt merely hide pathology? Relevant to pharmacological mood management, therapy culture, and the medicalization of deviance.", "tags": ["perfect-mental-health", "murder-paradox", "suppressed-pathology"], "story_count": 1, "stories": [{"id": "queen-of-angels-bear", "title": "Queen of Angels", "author": "Greg Bear", "year": 1990}]}, {"id": "periodic-apocalypse-oppressed-saviors", "title": "Periodic Apocalypse with Oppressed Saviors", "description": "On a planet with periodic extinction-level seismic events (Fifth Seasons), the people with the power to control earthquakes (orogenes) are the most persecuted minority, creating a system where the only people who can save civilization are the ones it oppresses.", "domains": ["climate", "governance", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "transformative"], "relevance": "Models the paradox of oppressing the people you depend on: relevant to essential worker exploitation, immigration policy (deporting workers you need), and any system that persecutes the very capabilities it requires for survival.", "tags": ["periodic-apocalypse", "oppressed-saviors", "essential-worker-paradox"], "story_count": 2, "stories": [{"id": "the-fifth-season-jemisin", "title": "The Fifth Season", "author": "N. K. Jemisin", "year": 2016}, {"id": "the-obelisk-gate-jemisin", "title": "The Obelisk Gate", "author": "N. K. Jemisin", "year": 2017}]}, {"id": "perpetual-reality-shift", "title": "Perpetual Reality Shift", "description": "A man's reality keeps fundamentally changing around him (different world, different rules each time) while he struggles to maintain identity and purpose, satirizing religious cosmology through a framework of infinite universe-hopping.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the experience of living through rapid paradigm shifts: relevant to information age reality fragmentation and the challenge of maintaining coherent identity when the ground rules keep changing.", "tags": ["reality-shift", "identity-persistence", "cosmological-satire"], "story_count": 1, "stories": [{"id": "job-a-comedy-of-justice-heinlein", "title": "Job, a comedy of justice", "author": "Robert A. Heinlein", dominant kingdom changed? Relevant to deep-future speculation and the assumption that animal intelligence is a permanent evolutionary advantage.", "tags": ["plant-dominance", "evolutionary-reversal", "far-future-earth"], "story_count": 1, "stories": [{"id": "hothouse-aldiss", "title": "Hothouse", "author": "Brian W. Aldiss, Brian W. Aldiss", "year": 1962}]}, {"id": "political-survival-pregnancy", "title": "Political Survival Under Biological Vulnerability", "description": "A resourceful outsider must navigate a violent political crisis while pregnant and physically vulnerable, testing whether intelligence and determination can compensate for physical disadvantage in a system that rewards force.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "cautionary"], "relevance": "Models the intersection of biological vulnerability and political agency, relevant to women in leadership during crisis, disability rights, and the assumption that power requires physical dominance.", "tags": ["political-vulnerability", "pregnancy-crisis", "agency-under-constraint"], "story_count": 2, "stories": [{"id": "barrayar-bujold", "title": "Barrayar", "author": "Lois McMaster Bujold", "year": 1992}, {"id": "shards-of-honor-bujold", "title": "Shards of Honor", "author": "Lois McMaster Bujold", "year": 1986}]}, {"id": "population-control-regime", "title": "Population Control Regime", "description": "A government enforces strict limits on family size under penalty of death, forcing unauthorized children into hiding or false identities, testing the limits of state power over reproduction and the resilience of underground resistance networks.", "domains": ["governance", "surveillance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to one-child policy analysis, reproductive rights debates, identity documentation systems, and the social costs of authoritarian demographic engineering.", "tags": ["confinement", "engineered-culture", "identity-fraud", "ignorance-as-governance", "information-control", "population-control", "reproductive-rights", "state-overreach"], "story_count": 8, "stories": [{"id": "among-the-barons-haddix", "title": "Among the Barons", "author": "Margaret Peterson Haddix", "year": 1998}, {"id": "among-the-brave-haddix", "title": "Among the Brave", "author": "Margaret Peterson Haddix", "year": 2004}, {"id": "among-the-enemy-haddix", "title": "Among the enemy", "author": "Margaret Peterson Haddix", "year": 2005}, {"id": "among-the-hidden-haddix", "title": "Among the Hidden", "author": "Margaret Peterson Haddix", "year": 1998}, {"id": "among-the-impostors-haddix", "title": "Among the Impostors", "author": "Margaret Peterson Haddix", "year": 2001}]}, {"id": "portal-between-dying-worlds", "title": "Portal Between Dying and Living Worlds", "description": "Children discover a portal between their healthy island and a dying world, where they must help restore the other world's ecosystem, testing whether environmental restoration can be taught across civilizational boundaries.", "domains": ["climate", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models environmental knowledge transfer: can ecological restoration techniques from healthy ecosystems be applied to damaged ones? Relevant to ecological restoration and cross-cultural environmental aid.", "tags": ["portal-worlds", "ecosystem-restoration", "environmental-transfer"], "story_count": 1, "stories": [{"id": "green-boy-cooper", "title": "Green boy", "author": "Susan Cooper", "year": 2002}]}, {"id": "portal-to-rulership", "title": "Portal to Personal Rulership", "description": "A woman is transported to another world where she is immediately made empress, testing what someone would do with absolute power in an unfamiliar world \u2014 one of the earliest science fiction works (1666).", "domains": ["governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["ambiguous"], "relevance": "One of the first proto-SF works: models the thought experiment of unlimited power. Relevant to how early speculative fiction anticipated later genre conventions.", "tags": ["portal-rulership", "early-sf", "absolute-power", "proto-science-fiction"], "story_count": 1, "stories": [{"id": "the-blazing-world-cavendish", "title": "The Blazing World", "author": "Margaret Cavendish", "year": 2013}]}, {"id": "post-apocalyptic-recovery", "title": "Post-Apocalyptic Recovery", "description": "After civilizational collapse, survivors must rebuild institutions, supply chains, and social trust from scratch, testing which structures prove resilient.", "domains": ["existential-risk", "governance"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to disaster recovery planning, civilizational resilience, and debates about which institutions and technologies are most critical to preserve.", "tags": ["post-apocalypse", "civilizational-recovery", "resilience"], "story_count": 5, "stories": [{"id": "beyond-the-burning-lands-youd", "title": "Beyond the burning lands", "author": "Sam Youd", "year": 1971}, {"id": "fellowship-of-talisman-simak", "title": "Fellowship of Talisman", "author": "Clifford D. Simak", "year": 1978}, {"id": "lucifer-s-hammer-niven", "title": "Lucifer's Hammer", "author": "Larry Niven, Jerry Pournelle", "year": 1977}, {"id": "monsters-bick", "title": "Monsters", "author": "Ilsa J. Bick", "year": 2013}, {"id": "the-kill-order-dashner", "title": "The Kill Order", "author": "James Dashner", "year": 2012}]}, {"id": "post-atomic-cargo-cult", "title": "Post-Atomic Cargo Cult Civilization", "description": "After nuclear war destroys technological civilization, survivors rebuild society around half-understood remnants of atomic science, treating nuclear technology as sacred ritual rather than engineering. A mutant or outsider who actually understands the science must navigate a world where knowledge has become religion.\n\nThe scenario explores how scientific knowledge degrades into dogma when the educational infrastructure that produced it is destroyed.", "domains": ["energy-physics", "governance", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "dystopian"], "relevance": "Relevant to knowledge preservation, nuclear waste marker design (how to communicate danger across millennia), and the fragility of scientific literacy without institutional support.", "tags": ["cargo-cult", "post-nuclear", "knowledge-loss", "science-as-religion"], "story_count": 1, "stories": [{"id": "empire-of-the-atom-vogt", "title": "Empire of the Atom", "author": "A. E. van Vogt", "year": 1957}]}, {"id": "post-catastrophe-space-return", "title": "Post-Catastrophe Return to Space", "description": "Centuries after a technological catastrophe called the Deliverance, humanity has rebuilt to the point of attempting spaceflight again. A young scholar working in a spaceship-construction yard discovers that the history of the Deliverance has been deliberately distorted to prevent repetition. The story asks whether humanity can learn from past mistakes or is doomed to repeat the same technological hubris.", "domains": ["space", "governance", "social-engineering"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Relevant to space program justification, historicity of technological disasters (Chernobyl, Fukushima), and the role of institutional memory.", "tags": ["space-return", "historical-revisionism", "technological-hubris"], "story_count": 1, "stories": [{"id": "the-sky-road-macleod", "title": "The Sky Road", "author": "Ken MacLeod", "year": 1997}]}, {"id": "post-death-professional-killers", "title": "Post-Death Society with Licensed Killers", "description": "In a world where disease, aging, and accident are conquered, population control is maintained by 'Scythes' \u2014 licensed killers who permanently end lives according to strict ethical codes, testing whether death can be made fair when it's no longer natural.", "domains": ["medicine", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the population ethics of radical life extension: if no one dies naturally, someone must decide who dies. Relevant to triage ethics, death panels, and whether utopian longevity creates dystopian allocation.", "tags": ["post-death", "licensed-killing", "population-control", "death-ethics"], "story_count": 1, "stories": [{"id": "scythe-shusterman", "title": "Scythe", "author": "Neal Shusterman", "year": 2016}]}, {"id": "post-death-reality-question", "title": "Post-Death Reality Question", "description": "A teenager who drowns wakes up in an abandoned version of reality where he must determine whether he is dead, dreaming, in a simulation, or experiencing a genuine alternate world.", "domains": ["vr-simulation", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the simulation hypothesis from a personal perspective: if you woke up in an empty world, how would you determine what is real? Relevant to VR addiction, solipsism, and the epistemology of experience.", "tags": ["post-death", "reality-question", "simulation-hypothesis", "abandoned-world"], "story_count": 2, "stories": [{"id": "more-than-this-ness", "title": "More Than This", "author": "Patrick Ness", "year": 2013}, {"id": "time-must-have-a-stop-huxley", "title": "Time Must Have a Stop", "author": "Aldous Huxley", "year": 1944}]}, {"id": "post-geographic-governance", "title": "Post-Geographic Governance System", "description": "In a future where supersonic travel makes geography irrelevant, nation-states have been replaced by voluntary 'Hives' that citizens join based on philosophy, not location. A banned technology of persuasion, a child who can perform miracles, and a narrator who constantly addresses the reader combine to ask whether Enlightenment ideals can survive contact with genuine supernatural power.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to remote work dissolving geographic ties, digital nomadism, governance-as-a-service, and whether post-national identity is possible.", "tags": ["post-nationalism", "voluntary-governance", "enlightenment"], "story_count": 4, "stories": [{"id": "too-like-the-lightning-palmer", "title": "Too Like the Lightning", "author": "Ada Palmer", "year": 2016}, {"id": "seven-surrenders-palmer", "title": "Seven Surrenders", "author": "Ada Palmer", "year": 2017}, {"id": "the-will-to-battle-palmer", "title": "The Will to Battle", "author": "Ada Palmer", "year": 2017}, {"id": "perhaps-the-stars-palmer", "title": "Perhaps the Stars", "author": "Ada Palmer", "year": 2021}]}, {"id": "post-human-social-experiment", "title": "Post-Human Trapped in Social Experiment", "description": "In a post-human 27th century, someone volunteered to have their memories erased and enters a social experiment that recreates a 20th-century society, but the experiment may actually be a trap designed by a deleted war criminal.", "domains": ["social-engineering", "ai-ml", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the dangers of voluntary amnesia, the manipulation of identity through environmental control, and whether social experiments on people who consented to forget they consented are ethical.", "tags": ["post-human", "social-experiment", "memory-erasure", "consent-trap"], "story_count": 1, "stories": [{"id": "glasshouse-stross", "title": "Glasshouse", "author": "Charles Stross", "year": 2006}]}, {"id": "post-nuclear-cross-country", "title": "Post-Nuclear Cross-Country Mission", "description": "After nuclear war devastates the United States, a convict must drive from LA to Boston through irradiated, storm-wracked wasteland to deliver a plague antiserum, testing whether individual heroism can matter when civilization is shattered.", "domains": ["existential-risk", "medicine"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models post-disaster logistics: how do you deliver critical supplies across destroyed infrastructure? Relevant to pandemic supply chains, disaster response, and infrastructure resilience.", "tags": ["post-nuclear", "supply-delivery", "wasteland-logistics", "individual-heroism"], "story_count": 1, "stories": [{"id": "damnation-alley-zelazny", "title": "Damnation Alley", "author": "Roger Zelazny", "year": 1969}]}, {"id": "post-nuclear-language-degeneration", "title": "Post-Nuclear Language and Knowledge Degeneration", "description": "Thousands of years after nuclear war, survivors speak a degenerated English and have lost all understanding of the technology that destroyed civilization, rediscovering nuclear knowledge through corrupted religious texts.", "domains": ["existential-risk", "comms-info", "social-engineering"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["cautionary"], "relevance": "Models long-term knowledge degradation: how do we communicate nuclear waste dangers across 10,000 years? Directly relevant to WIPP nuclear marker design, cultural memory, and the Rosetta Project.", "tags": ["language-degeneration", "nuclear-knowledge", "cultural-memory", "long-term-communication"], "story_count": 1, "stories": [{"id": "riddley-walker-hoban", "title": "Riddley Walker", "author": "Russell Hoban", "year": 1980}]}, {"id": "post-nuclear-telepathic-children", "title": "Post-Nuclear Telepathic Mutation", "description": "Children born after a nuclear catastrophe develop telepathy, creating a new human subspecies that must decide whether to coexist with or replace their non-telepathic parents' generation.", "domains": ["biotech", "social-engineering", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models generational capability gaps: what happens when children surpass their parents in fundamental ways? Relevant to digital native/immigrant tensions and accelerating capability differences between generations.", "tags": ["telepathic-mutation", "generational-capability-gap", "post-nuclear-evolution"], "story_count": 1, "stories": [{"id": "mutant-kuttner", "title": "Mutant", "author": "Henry Kuttner", "year": 1953}]}, {"id": "post-nuclear-two-survivors", "title": "Post-Nuclear World: Only Two Survivors", "description": "A teenage girl living alone in a valley miraculously sheltered from nuclear fallout encounters the only other known survivor: a scientist in a radiation suit. What should be salvation becomes a power struggle as the older man tries to dominate her. The story reduces post-apocalyptic survival to its most intimate scale, showing that the worst threats after the end of the world may be other survivors.", "domains": ["existential-risk", "ethics-philosophy"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to survivalist scenarios, domestic power dynamics in isolation, and how crisis can reveal rather than create predatory behavior.", "tags": ["post-nuclear", "survival", "power-dynamics"], "story_count": 1, "stories": [{"id": "z-for-zachariah-o-brien", "title": "Z for Zachariah", "author": "Robert C. O'Brien", "year": 1975}]}, {"id": "post-pandemic-cultural-preservation", "title": "Post-Pandemic Cultural Preservation Through Art", "description": "After a flu pandemic kills 99% of humanity, a traveling Shakespeare company performs for the scattered survivors, testing whether art and culture are luxuries of civilization or the core of what makes survival meaningful.", "domains": ["pandemics", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["ambiguous", "aspirational"], "relevance": "THE post-COVID pandemic novel (written 2014, prescient). Models the role of art in recovery: directly relevant to the 'essential workers' debate and whether culture is infrastructure.", "tags": ["post-pandemic", "cultural-preservation", "traveling-players", "survival-meaning"], "story_count": 1, "stories": [{"id": "station-eleven-mandel", "title": "Station Eleven", "author": "Emily St. John Mandel", "year": 2014}]}, {"id": "post-peak-civilization-invasion", "title": "Post-Peak Civilization Alien Invasion", "description": "Earth in the far future has declined from its peak and is invaded by aliens who view themselves as rightful owners, testing whether a civilization past its prime has any moral claim to resist reconquista.", "domains": ["first-contact", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models post-colonial reconquista dynamics: relevant to land-back movements, the moral claims of displaced peoples, and whether declining civilizations forfeit their sovereignty.", "tags": ["post-peak-invasion", "reconquista", "declining-civilization"], "story_count": 1, "stories": [{"id": "nightwings-silverberg", "title": "Nightwings", "author": "Robert Silverberg, Michael Netzer", "year": 1969}]}, {"id": "post-scarcity-civilization-war", "title": "Post-Scarcity Civilization at War", "description": "A hyper-advanced post-scarcity civilization (the Culture) wages war against a religious civilization, testing whether a society that has solved all material problems can justify violence when its values conflict with another civilization's self-determination.", "domains": ["governance", "warfare", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models liberal interventionism: can an advanced society justify imposing its values on others 'for their own good'? Relevant to humanitarian intervention, cultural imperialism, and westernization debates.", "tags": ["post-scarcity", "culture", "interventionism", "value-conflict"], "story_count": 1, "stories": [{"id": "consider-phlebas-banks", "title": "Consider Phlebas", "author": "Iain Banks", "year": 1987}]}, {"id": "post-war-biological-research", "title": "Post-War Biological Research Station", "description": "A planet dedicated to biological research is left relatively intact after a galactic war, but its isolation and the breakdown of supply chains transform a research station into a survival scenario.", "domains": ["biotech", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models what happens to research facilities when their parent institutions collapse: relevant to abandoned bioweapon labs, orphaned research stations, and post-conflict scientific infrastructure.", "tags": ["research-station", "post-war-isolation", "biological-research", "institutional-collapse"], "story_count": 1, "stories": [{"id": "dark-piper-norton", "title": "Dark Piper", "author": "Andre Norton", "year": 1968}]}, {"id": "post-war-psychic-elite", "title": "Post-War Psychic Elite", "description": "After a global war, individuals with latent psychic abilities form a secret society that operates parallel to official governance, raising the question of whether a hidden cognitive elite is ever justified in steering humanity covertly.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models deep-state concerns, technocratic governance by unelected experts, and whether secret leadership by the cognitively gifted is benevolent or authoritarian.", "tags": ["psychic-elite", "secret-society", "technocracy", "covert-governance"], "story_count": 1, "stories": [{"id": "assignment-in-eternity-heinlein", "title": "Assignment in Eternity", "author": "Robert A. Heinlein", "year": 1953}]}, {"id": "practice-effect-alternate-physics", "title": "Objects Improve Through Use", "description": "In an alternate universe, the second law of thermodynamics is reversed for manufactured objects: items become better and more refined the more they are used, rather than wearing out. A crude stone knife sharpens to razor perfection with practice. This inversion of entropy creates a radically different economics and sociology where labor-intensive use is the source of all value.", "domains": ["energy-physics", "economics"], "scenarios": ["thought-experiment"], "outcomes": ["transformative"], "relevance": "A thought experiment about fundamental physics and how changing one natural law cascades through economics, manufacturing, and social organization.", "tags": ["alternate-physics", "entropy", "value-theory"], "story_count": 1, "stories": [{"id": "the-practice-effect-brin", "title": "The Practice Effect", "author": "David Brin", "year": 1983}]}, {"id": "precognition-responsibility", "title": "Precognition and Moral Responsibility", "description": "A man who wakes from a coma with the ability to see the future discovers that a politician will become a nuclear-war-starting dictator, forcing the question: if you can foresee a future atrocity, are you morally obligated to prevent it through violence?", "domains": ["time-travel", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "THE canonical precog-assassination moral dilemma. Models preventive action ethics: relevant to preemptive war doctrine, predictive risk assessment, and the morality of acting on probabilistic future harm.", "tags": ["precognition", "assassination-ethics", "moral-responsibility"], "story_count": 1, "stories": [{"id": "the-dead-zone-king", "title": "The Dead Zone", "author": "Stephen King", "year": 1979}]}, {"id": "precrime-prediction-system", "title": "Pre-Crime Prediction and Arrest System", "description": "A system that predicts crimes before they happen enables arrest of future criminals, but the system's reliability is questioned when the commissioner himself is predicted to commit murder.", "domains": ["surveillance", "governance", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE canonical predictive policing scenario. Directly relevant to predictive algorithms in criminal justice, bias in prediction systems, and the ethics of punishing people for crimes they haven't committed.", "tags": ["precrime", "predictive-policing", "pre-punishment", "algorithmic-justice"], "story_count": 1, "stories": [{"id": "minority-report-dick", "title": "Minority Report", "author": "Philip K. Dick, H\u00e9l\u00e8ne Collon", "year": 1998}]}, {"id": "presumed-dead-strategic-advantage", "title": "Presumed-Dead Strategic Advantage", "description": "A military leader is falsely declared dead by the enemy, creating a strategic intelligence gap that can be exploited upon their return, testing how information asymmetry shapes warfare outcomes.", "domains": ["warfare", "comms-info"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to information warfare, the strategic value of deception, and how false intelligence about key individuals can cascade into miscalculated military strategies.", "tags": ["information-warfare", "deception", "military-strategy", "intelligence-failure"], "story_count": 1, "stories": [{"id": "ashes-of-victory-weber", "title": "Ashes of Victory", "author": "David Weber", "year": 2000}]}, {"id": "preventing-historical-collapse", "title": "Preventing Historical Civilizational Collapse", "description": "An archaeologist transported to 6th-century Rome uses modern knowledge to prevent the fall of the Western Roman Empire, testing whether a single knowledgeable person can alter civilizational trajectories.", "domains": ["time-travel", "governance"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models knowledge-as-power: if you could send one person back to a civilizational collapse point (Rome, 1930s Germany), what knowledge would be most useful? Relevant to civilizational resilience and key-person theory.", "tags": ["preventing-collapse", "knowledge-intervention", "dark-ages", "one-person-difference"], "story_count": 1, "stories": [{"id": "lest-darkness-fall-camp", "title": "Lest Darkness Fall", "author": "L. Sprague De Camp", "year": 1941}]}, {"id": "primordial-biochemistry-competitive-displacement", "title": "Primordial Biochemistry Competitive Displacement", "description": "An ancient microorganism, predating all modern life, can outcompete the entire contemporary biosphere because it evolved in a radically different chemical regime and modern defenses simply do not recognize it as a threat. The organism strips essential sulfur compounds from host cells faster than modern biochemistry can replace them, triggering cascading metabolic failure. The scenario illustrates how a single invasive species from an untested evolutionary lineage could collapse ecosystems worldwide if the right bottleneck element becomes contested.", "domains": ["biotech", "existential-risk", "climate"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Relevant to biosecurity concerns about synthetic organisms escaping containment, invasive species biology (where lack of co-evolved defenses confers competitive advantage), and existential risk from engineered microbes in gain-of-function research. Also illuminates the fragility of nutrient cycles that modern biology takes for granted.", "tags": ["invasive-microbe", "biochemical-warfare", "sulfur-metabolism", "ecosystem-collapse", "ancient-life"], "story_count": 3, "stories": [{"id": "starfish-peter-watts", "title": "Starfish", "author": "Peter Watts", "year": 1999}, {"id": "maelstrom-peter-watts", "title": "Maelstrom", "author": "Peter Watts", "year": 2001}, {"id": "behemoth-peter-watts", "title": "Behemoth", "author": "Peter Watts", "year": 2004}]}, {"id": "privatized-prison-utopia", "title": "Privatized Prison-Utopia", "description": "During economic collapse, a company offers free housing in exchange for alternating months of comfortable living and prison labor, and the seemingly fair arrangement conceals exploitation at its core.", "domains": ["economics", "governance", "ethics-philosophy"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the prison-industrial complex and company towns: relevant to worker housing schemes, for-profit prisons, and how desperation makes exploitative offers appear generous.", "tags": ["prison-utopia", "economic-collapse", "company-town"], "story_count": 1, "stories": [{"id": "the-heart-goes-last-atwood", "title": "The Heart Goes Last", "author": "Margaret Atwood", "year": 2015}]}, {"id": "productive-withdrawal", "title": "Productive Class Withdrawal", "description": "The most productive members of society simultaneously withdraw their contributions, testing whether a society that disincentivizes achievement can survive when its key creators and innovators refuse to participate.", "domains": ["economics", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "dystopian"], "relevance": "Models brain drain dynamics, Laffer curve arguments, and the question of how much a society can tax or regulate its most productive members before they exit.", "tags": ["brain-drain", "productive-withdrawal", "economic-collapse", "objectivism"], "story_count": 1, "stories": [{"id": "atlas-shrugged-centennial-ed-hc-rand", "title": "Atlas Shrugged (Centennial Ed. HC)", "author": "Ayn Rand, Sophie Bastide-Foltz, Ayn Rand;, Adrian Rand, Ayn Rand", "year": 1936}]}, {"id": "prohibition-commodity-control", "title": "Commodity Prohibition Dystopia", "description": "A future society criminalizes common commodities (chocolate, caffeine, water usage), creating black markets and organized crime families that mirror historical prohibition dynamics but with everyday consumer goods.", "domains": ["economics", "governance"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly models prohibition economics: how criminalizing demand creates criminal supply chains. Applicable to drug policy, water rights, and any regime that restricts common goods.", "tags": ["prohibition", "commodity-control", "black-market", "organized-crime"], "story_count": 3, "stories": [{"id": "all-these-things-i-ve-done-zevin", "title": "All these things I've done", "author": "Gabrielle Zevin, Ilyana Kadushin", "year": 2011}, {"id": "because-it-is-my-blood-zevin", "title": "Because It Is My Blood", "author": "Gabrielle Zevin", "year": 2012}, {"id": "in-the-age-of-love-and-chocolate-zevin", "title": "In the Age of Love and Chocolate", "author": "Gabrielle Zevin", "year": 2013}]}, {"id": "psychic-interrogation", "title": "Psychic Interrogation and Mind Assault", "description": "Captors use psychic powers to extract information from prisoners' minds, bypassing all conventional resistance techniques, testing whether cognitive privacy can exist when minds are directly accessible.", "domains": ["surveillance", "warfare", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to brain-scanning lie detection research, neurorights legislation, and debates about whether involuntary brain reading should be treated as a form of torture.", "tags": ["psychic-interrogation", "cognitive-privacy", "mind-reading", "neurorights"], "story_count": 1, "stories": [{"id": "broken-sky-wooding", "title": "Broken Sky", "author": "Chris Wooding", "year": 1999}]}, {"id": "psychohistory", "title": "Mathematical Prediction of Civilization (Psychohistory)", "description": "A mathematician develops a statistical science (psychohistory) that predicts the behavior of galactic populations over millennia, and uses it to create a plan to shorten a predicted dark age from 30,000 years to 1,000.", "domains": ["ai-ml", "governance", "economics"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "THE foundational model for big-data prediction, actuarial science, and the dream of using statistics to guide civilization. Directly informs cliodynamics, predictive analytics, and the limits of macro-historical forecasting.", "tags": ["psychohistory", "civilizational-prediction", "seldon-plan", "statistical-governance"], "story_count": 10, "stories": [{"id": "forward-the-foundation-asimov", "title": "Forward the Foundation", "author": "Isaac Asimov", "year": 1993}, {"id": "foundation-and-chaos-bear", "title": "Foundation and Chaos", "author": "Greg Bear", "year": 1998}, {"id": "foundation-and-empire-asimov", "title": "Foundation and Empire", "author": "Isaac Asimov", "year": 1945}, {"id": "foundation-asimov", "title": "Foundation", "author": "Isaac Asimov", "year": 1951}, {"id": "foundation-s-edge-asimov", "title": "Foundation's Edge", "author": "Isaac Asimov", "year": 1977}]}, {"id": "purpose-built-sentient-partner", "title": "Purpose-Built Sentient Partner", "description": "A corporation builds a cyborg that is both warrior and lover, deliberately designed to form emotional bonds with its protectee, raising the question of whether a being created to love can truly consent to its own purpose.", "domains": ["robotics", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to AI companion ethics, sex robot debates, and whether a being designed to serve can meaningfully consent. Models the Pinocchio problem: can created beings transcend their programming?", "tags": ["purpose-built-partner", "consent-of-creation", "cyborg-ethics"], "story_count": 1, "stories": [{"id": "he-she-and-it-piercy", "title": "He, She and It", "author": "Marge Piercy", "year": 1991}]}, {"id": "quantum-narrative", "title": "Quantum Uncertainty in Human Experience", "description": "Stories explore the boundary where quantum physical uncertainty intersects with human emotional experience, suggesting that the deepest uncertainties of physics may be resolved not through measurement but through connection and meaning.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Frames philosophical questions about consciousness, observer effects, and whether quantum mechanics has implications for free will and meaning that extend beyond physics.", "tags": ["quantum-uncertainty", "human-connection", "observer-effect", "meaning"], "story_count": 1, "stories": [{"id": "a-fisherman-of-the-inland-sea-guin", "title": "A Fisherman of the Inland Sea", "author": "Ursula K. Le Guin", "year": 1994}]}, {"id": "random-governance-lottery", "title": "Governance by Random Lottery", "description": "The ruler of civilization is chosen by random lottery, removing all merit and election dynamics but also removing the ability to predict or influence who holds power, testing whether random selection is more or less fair than any deliberate system.", "domains": ["governance", "economics"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models sortition (random selection for office): directly relevant to citizens' assemblies, jury selection, and the argument that random governance eliminates corruption by eliminating campaigning.", "tags": ["random-governance", "sortition", "lottery-rule"], "story_count": 1, "stories": [{"id": "solar-lottery-dick", "title": "Solar Lottery", "author": "Philip K. Dick", "year": 1955}]}, {"id": "rare-ability-resource-exploitation", "title": "Rare Ability Resource Exploitation", "description": "Individuals with a rare and dangerous talent are recruited into a monopolistic guild that extracts exotic resources, where the work provides meaning and wealth but causes progressive neurological damage the guild downplays.", "domains": ["economics", "medicine", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models occupational hazard concealment, from asbestos to professional sports brain injuries, and the ethics of organizations that profit from workers' irreversible health damage.", "tags": ["occupational-hazard", "guild-exploitation", "rare-talent", "health-concealment"], "story_count": 1, "stories": [{"id": "crystal-singer-mccaffrey", "title": "Crystal Singer", "author": "Anne McCaffrey", "year": 1982}]}, {"id": "reality-altering-dreams", "title": "Dreams That Alter Reality", "description": "A man's dreams retroactively change reality, and a psychiatrist attempts to harness this power to improve the world, but each improvement creates unintended consequences worse than the problem it solved.", "domains": ["medicine", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary"], "relevance": "THE canonical unintended-consequences-of-well-meaning-intervention story. Models how attempts to optimize complex systems (economies, ecologies, societies) through single powerful levers produce cascading failures.", "tags": ["reality-altering-dreams", "unintended-consequences", "optimization-failure"], "story_count": 2, "stories": [{"id": "the-lathe-of-he
