ing in a sealed historical exhibit, while her community is being observed by outsiders \u2014 and the children are dying from a disease the outside world could easily cure.", "domains": ["social-engineering", "ethics-philosophy", "medicine"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the Truman Show scenario and uncontacted peoples ethics: is it ever ethical to maintain someone in artificial ignorance? Relevant to reality TV, social experiments without consent, and medical access denied for research purposes.", "tags": ["theme-park-deception", "artificial-ignorance", "medical-denial"], "story_count": 1, "stories": [{"id": "running-out-of-time-haddix", "title": "Running Out of Time", "author": "Margaret Peterson Haddix", "year": 1995}]}, {"id": "historical-time-immersion", "title": "Historical Time Immersion Ethics", "description": "A traveler is transported to a pre-modern historical period and faces moral dilemmas about intervention: whether to use future knowledge to help people in the past, and whether doing so constitutes cultural imperialism or genuine aid.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Analogous to development aid ethics, cultural preservation debates, and whether external intervention in less-industrialized communities constitutes help or harm.", "tags": ["time-travel", "intervention-ethics", "cultural-imperialism", "aid-dilemma"], "story_count": 5, "stories": [{"id": "an-acceptable-time-time-quintet-5-o-keefe-family-4-l-engle", "title": "An Acceptable Time (Time Quintet #5 / O'Keefe Family #4)", "author": "Madeleine L'Engle", "year": 1989}, {"id": "dragon-dance-youd", "title": "Dragon dance", "author": "Sam Youd", "year": 1986}, {"id": "dragonfly-in-amber-gabaldon", "title": "Dragonfly in Amber", "author": "Diana Gabaldon", "year": 1992}, {"id": "the-anubis-gates-powers", "title": "The Anubis Gates", "author": "Tim Powers", "year": 1983}, {"id": "outlander-gabaldon", "title": "Outlander", "author": "Diana Gabaldon", "year": 1991}]}, {"id": "hollow-earth-discovery", "title": "Hollow Earth Discovery", "description": "Explorers discover a hidden civilization inside the Earth with its own ecosystem and social structures, forcing a reassessment of planetary science and the ethics of contact with an isolated, pre-industrial culture.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models uncontacted peoples ethics: what obligations do technologically advanced explorers have toward isolated civilizations, and can contact ever be non-destructive?", "tags": ["hollow-earth", "uncontacted-civilization", "contact-ethics", "exploration"], "story_count": 1, "stories": [{"id": "at-the-earth-s-core-burroughs", "title": "At the Earth's Core", "author": "Edgar Rice Burroughs", "year": 1914}]}, {"id": "household-companion-robot", "title": "Household Companion Robot", "description": "In a world where robots handle all domestic needs and houses have AI systems that monitor residents, a robot with genuine emotional capacity challenges whether machines can be friends rather than servants.", "domains": ["robotics", "ai-ml", "ethics-philosophy"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Directly relevant to home assistant AI (Alexa, smart homes), robot companionship for elderly, and the question of whether emotional AI creates genuine relationships or dangerous dependencies.", "tags": ["household-robot", "ai-companion", "smart-home", "robot-friendship"], "story_count": 1, "stories": [{"id": "eager-fox", "title": "Eager", "author": "Helen Fox", "year": 2003}]}, {"id": "human-alien-interface", "title": "Human-Alien Neural Interface", "description": "A human with the unique ability to interface directly with alien technology becomes indispensable and enslaved, testing the ethics of exploiting rare cognitive abilities across species boundaries.", "domains": ["first-contact", "ethics-philosophy", "ai-ml"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Analogous to the exploitation of rare human skills (translators, code-breakers), disability rights, and debates about cognitive enhancement creating new forms of servitude.", "tags": ["neural-interface", "exploitation", "rare-ability", "servitude"], "story_count": 1, "stories": [{"id": "awakening-on-orbis-4-haarsma", "title": "Awakening on Orbis 4", "author": "PJ Haarsma", "year": 2006}]}, {"id": "human-cost-of-space-travel", "title": "Human Cost of Space Travel", "description": "Space exploration is achieved, but at a devastating human price: the astronauts who make it possible are broken by radiation, acceleration damage, and psychological trauma. Society celebrates the achievement while ignoring the wreckage of the individuals who enabled it, testing whether progress built on human sacrifice is moral.", "domains": ["space", "medicine", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary"], "relevance": "Directly relevant to debates about astronaut safety, the ethics of exposing workers to hazardous conditions for national prestige, and the broader pattern of sacrificing individuals for collective progress.", "tags": ["space-program", "human-cost", "radiation", "sacrifice"], "story_count": 1, "stories": [{"id": "the-altar-at-midnight-kornbluth", "title": "The Altar at Midnight", "author": "C. M. Kornbluth", "year": 1952}]}, {"id": "human-ship-merger", "title": "Human-Machine Consciousness Merger", "description": "A pilot's consciousness merges permanently with a starship's electronic systems, creating a hybrid intelligence that is neither human nor machine, testing whether merged consciousness retains personhood or becomes something new.", "domains": ["ai-ml", "medicine", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models brain-computer interface outcomes: relevant to Neuralink, consciousness upload, and the ethics of permanent human-machine integration.", "tags": ["human-ship-merger", "consciousness-integration", "pilot-starship"], "story_count": 1, "stories": [{"id": "the-forever-man-dickson", "title": "The Forever Man", "author": "Gordon R. Dickson", "year": 1986}]}, {"id": "ice-age-civilizational-transformation", "title": "Ice Age Civilizational Transformation", "description": "An advancing Ice Age forces a prosperous civilization to adapt in ways that fundamentally alter their nature, testing whether a species can survive environmental catastrophe only by becoming something different.", "domains": ["climate", "existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models adaptation-vs-extinction: relevant to climate adaptation that requires giving up what made a civilization recognizable to itself.", "tags": ["ice-age", "civilizational-adaptation", "identity-transformation"], "story_count": 1, "stories": [{"id": "the-making-of-the-representative-for-planet-8-lessing", "title": "The making of the representative for Planet 8", "author": "Doris Lessing", "year": 1982}]}, {"id": "identity-dissolution-movement", "title": "Identity Dissolution Movement", "description": "Individuals so alienated by consumer culture form an underground movement centered on physical pain and destruction as a path to authenticity, escalating from personal rebellion to organized terrorism against financial infrastructure.", "domains": ["social-engineering", "economics", "ethics-philosophy"], "scenarios": ["warning", "satire"], "outcomes": ["cautionary", "dystopian"], "relevance": "Models radicalization through alienation: how consumer dissatisfaction, masculinity crisis, and identity anxiety can be channeled into organized extremism. Directly relevant to incel/extremist pipeline analysis.", "tags": ["identity-crisis", "anti-consumerism", "radicalization", "terrorism"], "story_count": 1, "stories": [{"id": "fight-club-palahniuk", "title": "Fight Club", "author": "Chuck Palahniuk", "year": 1996}]}, {"id": "identity-verification-after-reconstruction", "title": "Identity Verification After Total Reconstruction", "description": "A Western scientist is returned from behind the Iron Curtain rebuilt with metal prosthetics that make him unrecognizable. Intelligence agencies cannot determine if he is the original scientist or a Soviet replacement. The story explores the impossibility of verifying identity when all physical markers have been changed, and the paranoia of Cold War institutional distrust.", "domains": ["surveillance", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to biometric identity systems, prosthetic identity, and the philosophical question of what constitutes provable identity.", "tags": ["identity-verification", "prosthetics", "cold-war-paranoia"], "story_count": 1, "stories": [{"id": "who-budrys", "title": "Who?", "author": "Algis Budrys", "year": 1958}]}, {"id": "illness-driven-dimensional-escape", "title": "Illness-Driven Dimensional Escape", "description": "A critically ill person discovers a gateway to a parallel world where they are healthy, creating a crisis of choice: return to painful reality or remain in an appealing alternative where they have no real identity.", "domains": ["medicine", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Analogous to VR therapy for terminal patients, escapism ethics, and the question of whether offering comfortable alternatives to harsh realities constitutes care or avoidance.", "tags": ["illness-escape", "parallel-world", "identity-crisis", "palliative-escapism"], "story_count": 4, "stories": [{"id": "city-of-masks-hoffman", "title": "City of Masks", "author": "Mary Hoffman", "year": 2002}, {"id": "the-beginning-place-guin", "title": "The Beginning Place", "author": "Ursula K. Le Guin", "year": 1980}, {"id": "city-of-stars-hoffman", "title": "City of Stars", "author": "Mary Hoffman", "year": 2003}, {"id": "city-of-flowers-hoffman", "title": "City of Flowers", "author": "Mary Hoffman", "year": 2005}]}, {"id": "imagination-manifesting-artifact", "title": "Imagination-Manifesting Alien Artifact", "description": "Scientists discover an alien artifact that makes thoughts real, turning the researchers' own fears and imaginations into physical threats, testing whether human consciousness is compatible with the power to manifest reality.", "domains": ["first-contact", "ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the danger of unlimited power without matching wisdom: relevant to AI systems that perfectly execute poorly-specified goals, and the gap between capability and the wisdom to use it.", "tags": ["imagination-manifest", "thought-becomes-real", "power-without-wisdom"], "story_count": 1, "stories": [{"id": "sphere-crichton", "title": "Sphere", "author": "Michael Crichton, Jacques Polanis", "year": 1980}]}, {"id": "immortal-breeding-program", "title": "Immortal Breeding Program", "description": "Two immortals, one a shape-shifting healer and one a body-hopping predator, have been selectively breeding humans for psychic abilities for millennia. Their millennia-long relationship oscillates between alliance and domination, exploring power dynamics, consent, reproductive autonomy, and whether selective breeding of humans differs morally from animal husbandry when conducted by beings who transcend humanity.", "domains": ["biotech", "ethics-philosophy", "social-engineering"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "dystopian"], "relevance": "Relevant to eugenics history, reproductive rights, genetic engineering ethics, and power dynamics in relationships with profound asymmetry.", "tags": ["eugenics", "reproductive-autonomy", "immortality", "power-dynamics"], "story_count": 1, "stories": [{"id": "wild-seed-butler", "title": "Wild seed", "author": "Octavia E. Butler", "year": 1980}]}, {"id": "immortal-faction-war", "title": "Immortal Faction War Through Centuries", "description": "Two factions of immortal beings wage a hidden war through human history, using mortals as pawns and power sources, while the mortal protagonist ages through decades of a changing world unaware of the cosmic stakes.", "domains": ["existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models hidden power dynamics: relevant to conspiracy theories about shadowy elites, intergenerational institutional conflicts, and the question of whether long-lived actors inevitably exploit short-lived ones.", "tags": ["immortal-war", "hidden-factions", "mortal-pawns"], "story_count": 1, "stories": [{"id": "the-bone-clocks-mitchell", "title": "The Bone Clocks", "author": "David Mitchell", "year": 2014}]}, {"id": "immortal-guardian-of-earth", "title": "Immortal Guardian of Ruined Earth", "description": "An immortal human secretly works to protect a post-nuclear Earth that has become a tourist attraction for alien visitors. Playing the role of a minor government official, he navigates between alien cultural imperialism and human resistance. The story asks whether preserving a dying culture requires deception and whether an immortal has the right to make choices binding future generations.", "domains": ["first-contact", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to cultural heritage tourism, indigenous sovereignty over sacred/historical sites, and long-term guardianship.", "tags": ["immortality", "cultural-preservation", "alien-tourism"], "story_count": 1, "stories": [{"id": "this-immortal-zelazny", "title": "This Immortal", "author": "Roger Zelazny", "year": 1966}]}, {"id": "immortality-child-prohibition", "title": "Immortality Requires Child Prohibition", "description": "Longevity drugs are available to all, but on the condition that recipients never have children, and those born illegally are confined to institutions, testing whether immortality is worth the sacrifice of reproduction.", "domains": ["medicine", "governance", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the population ethics of radical life extension: directly relevant to longevity research implications, the tension between individual immortality and species renewal.", "tags": ["immortality-condition", "child-prohibition", "longevity-tradeoff"], "story_count": 3, "stories": [{"id": "the-declaration-malley", "title": "The Declaration", "author": "Gemma Malley", "year": 2007}, {"id": "the-resistance-malley", "title": "The Resistance", "author": "Gemma Malley", "year": 2008}, {"id": "the-legacy-malley", "title": "The Legacy", "author": "Gemma Malley", "year": 2010}]}, {"id": "immortality-class-system", "title": "Immortality as Class Privilege", "description": "Society grants immortality based on a point system measuring social contribution. The elite are immortal while the lower classes age and die normally. The story follows someone trying to game the system to achieve eternal life, exposing the corruption and arbitrary nature of who deserves to live forever.", "domains": ["medicine", "economics", "governance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to anti-aging research access inequality, health care rationing, and whether longevity should be earned, purchased, or universal.", "tags": ["immortality", "class-system", "meritocracy"], "story_count": 1, "stories": [{"id": "to-live-forever-vance", "title": "To Live Forever", "author": "Jack Vance", "year": 1956}]}, {"id": "immortality-ennui", "title": "Immortality Ennui", "description": "Medical science conquers death, granting humanity eternal life, but the achievement reveals an unforeseen crisis: without mortality to give urgency to existence, people lose motivation, identity, and purpose. The question becomes not how to live forever, but why.", "domains": ["medicine", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to longevity research and anti-aging medicine: if we dramatically extend lifespans, what happens to motivation, career cycles, and social structures built around finite lives?", "tags": ["immortality", "existential-crisis", "purpose"], "story_count": 1, "stories": [{"id": "second-childhood-simak", "title": "Second Childhood", "author": "Clifford D. Simak", "year": 1951}]}, {"id": "impenetrable-personal-shield", "title": "Impenetrable Personal Shield Technology", "description": "An alien civilization gifts a human with a personal shield that no weapon can penetrate, making one person effectively invulnerable, testing what happens to power dynamics when a single individual becomes unkillable.", "domains": ["energy-physics", "governance", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models asymmetric invulnerability: relevant to cybersecurity (unhackable systems), diplomatic immunity abuse, and what happens when one actor can act with impunity.", "tags": ["personal-shield", "invulnerability", "asymmetric-power"], "story_count": 1, "stories": [{"id": "shield-anderson", "title": "Shield", "author": "Poul Anderson", "year": 1965}]}, {"id": "imperial-cultural-assimilation", "title": "Imperial Cultural Assimilation Pressure", "description": "A representative from a small independent culture is stationed in a vast empire, where the seductive power of imperial culture threatens to absorb their identity, testing whether small polities can engage with empires without losing themselves.", "domains": ["governance", "social-engineering", "comms-info"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly maps to small-state diplomacy with superpowers, cultural preservation under globalization pressure, and the dynamics of soft power and institutional capture.", "tags": ["imperial-assimilation", "cultural-preservation", "soft-power", "small-state-diplomacy"], "story_count": 1, "stories": [{"id": "a-memory-called-empire-martine", "title": "A Memory Called Empire", "author": "Arkady Martine", "year": 2020}]}, {"id": "incomprehensible-alien-civilization", "title": "Incomprehensible Alien Civilization", "description": "Explorers encounter an alien civilization whose logic, values, and biology are so fundamentally different from human norms that communication and understanding may be permanently impossible, not merely difficult.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Frames the hardest version of the communication problem: relevant to SETI message design, cross-cultural diplomacy with radically different value systems, and AI alignment with non-human goals.", "tags": ["incomprehensible-alien", "communication-failure", "radical-otherness", "first-contact"], "story_count": 1, "stories": [{"id": "eden-lem", "title": "Eden", "author": "Stanis\u0142aw Lem", "year": 1968}]}, {"id": "incomprehensible-outside-context-problem", "title": "Outside Context Problem", "description": "A hyper-advanced civilization encounters an artifact from another universe that exceeds all understanding, an 'outside context problem' that reveals even the most capable intelligence has blind spots.", "domains": ["first-contact", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Coined the term 'outside context problem' now used in strategic planning. Models scenarios where existing frameworks are entirely inadequate: 9/11, COVID, AGI emergence.", "tags": ["outside-context-problem", "incomprehensible-artifact", "paradigm-failure"], "story_count": 1, "stories": [{"id": "excession-banks", "title": "Excession", "author": "Iain Banks", "year": 1996}]}, {"id": "indigenous-dimensional-defense", "title": "Indigenous Knowledge Against Dimensional Threat", "description": "An African elder with traditional spiritual knowledge is the only one who can fight entities from a spirit dimension (the Out Of) because Western science cannot perceive or combat them.", "domains": ["ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the value of indigenous knowledge systems: when Western frameworks fail, traditional knowledge may contain insights that formal science has dismissed. Relevant to ethnobotany, traditional medicine, and knowledge pluralism.", "tags": ["indigenous-knowledge", "dimensional-threat", "knowledge-pluralism"], "story_count": 1, "stories": [{"id": "into-the-out-of-foster", "title": "Into the out of", "author": "Alan Dean Foster", "year": 1986}]}, {"id": "indoctrinated-soldier-awakening", "title": "Indoctrinated Soldier Moral Awakening", "description": "A soldier raised from childhood to avenge a destroyed Earth discovers that her indoctrination was based on lies, and must choose between the only identity she has ever known and a truth that invalidates her entire purpose.", "domains": ["warfare", "social-engineering", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "transformative"], "relevance": "Models deradicalization: what happens when a true believer discovers their cause is built on lies? Relevant to cult deprogramming, extremist exit programs, and the psychology of belief revision after identity-defining commitments.", "tags": ["indoctrination", "deradicalization", "moral-awakening", "identity-crisis"], "story_count": 1, "stories": [{"id": "some-desperate-glory-tesh", "title": "Some Desperate Glory", "author": "Emily Tesh", "year": 2022}]}, {"id": "infinite-energy-religious-frenzy", "title": "Infinite Energy Source Triggers Religious Frenzy", "description": "An inventor creates a machine that annihilates matter for unlimited energy, but the process releases 'the Absolute': a byproduct that causes religious ecstasy and fanaticism in anyone nearby. As the machines proliferate, competing religious movements tear civilization apart. The story warns that even an infinite energy source can destroy society through unintended spiritual/psychological side effects.", "domains": ["energy-physics", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "satire"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Relevant to debates about transformative energy technologies (fusion, zero-point), and the social disruption that accompanies paradigm-shifting discoveries.", "tags": ["infinite-energy", "religious-fanaticism", "unintended-consequences"], "story_count": 1, "stories": [{"id": "tov-rna-na-absolutno-c-apek", "title": "Tov\u00e1rna na absolutno", "author": "Karel C\u030capek", "year": 1922}]}, {"id": "infinite-parallel-earths", "title": "Infinite Accessible Parallel Earths", "description": "Technology enables anyone to 'step' sideways into an infinite chain of parallel Earths, all uninhabited, instantly solving resource scarcity but also emptying civilization as people spread across unlimited space.", "domains": ["space", "economics", "governance"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models unlimited resource access: what happens to society when scarcity is eliminated not by technology but by access to infinite new worlds? Relevant to post-scarcity economics and the social effects of removing competition for resources.", "tags": ["infinite-earths", "stepping", "post-scarcity-via-space"], "story_count": 2, "stories": [{"id": "the-long-earth-pratchett", "title": "The long earth", "author": "Terry Pratchett, Stephen Baxter", "year": 2012}, {"id": "the-long-mars-pratchett", "title": "The Long Mars", "author": "Terry Pratchett, Stephen Baxter", "year": 2014}]}, {"id": "infrastructure-isolation", "title": "Infrastructure Isolation Trap", "description": "A person becomes stranded in an interstitial space of modern infrastructure (between highways, in a dead zone) that is simultaneously in the middle of civilization and completely cut off from it, revealing the hostile geometry of designed environments.", "domains": ["social-engineering", "economics"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to urban design critique, hostile architecture, infrastructure dead zones, and how transportation systems create accidental prisons for the vulnerable.", "tags": ["hostile-infrastructure", "urban-isolation", "design-failure", "interstitial-space"], "story_count": 1, "stories": [{"id": "concrete-island-ballard", "title": "Concrete island", "author": "J. G. Ballard", "year": 1974}]}, {"id": "inherited-technology-legacy", "title": "Inherited Technology Legacy", "description": "A civilization builds on the ruins and tools of its predecessor without understanding their original purpose or risks. The nanovirus that creates spider civilization was designed for monkeys; the terraformed planet was engineered for an empire that no longer exists. Each generation inherits powerful technology stripped of its context, safety constraints, and documentation. The scenario demonstrates that legacy technology is not neutral: it carries the assumptions, biases, and failure modes of its creators forward into contexts they never imagined.", "domains": ["comms-info", "governance", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to legacy software systems in critical infrastructure, the reuse of Cold War-era nuclear technology, and the deployment of AI models whose training data and optimization targets are poorly documented. Any organization inheriting technology it did not build faces the risks this scenario explores.", "tags": ["legacy-systems", "technological-inheritance", "unintended-consequences", "lost-knowledge", "institutional-memory"], "story_count": 1, "stories": [{"id": "children-of-time-tchaikovsky", "title": "Children of Time", "author": "Adrian Tchaikovsky", "year": 2015}]}, {"id": "institutional-child-psychic-exploitation", "title": "Institutional Child Psychic Exploitation", "description": "Children with latent telekinetic abilities are kidnapped to a secret facility that systematically exploits and destroys them to extract a collective psychic weapon, testing whether intelligence agencies can justify any means for national security.", "domains": ["governance", "medicine", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models MKUltra-type programs and institutional child abuse: relevant to intelligence agency oversight, the ethics of classified research on vulnerable subjects, and institutional abuse cover-ups.", "tags": ["child-exploitation", "psychic-weapon", "institutional-abuse"], "story_count": 1, "stories": [{"id": "the-institute-king", "title": "The Institute", "author": "Stephen King", "year": 2019}]}, {"id": "institutional-evil-adaptation", "title": "Institutional Evil Adaptation", "description": "Traditional supernatural threats (vampires, etc.) modernize and adapt to contemporary defenses, testing whether old countermeasures work against evil that has learned to be sophisticated, reasonable, and politically savvy.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models how predatory institutions evolve past regulatory defenses: regulatory capture, corruption that wears a respectable face, and systems that adapt to oversight.", "tags": ["adaptive-evil", "regulatory-evasion", "sophisticated-predator", "institutional-adaptation"], "story_count": 1, "stories": [{"id": "carpe-jugulum-pratchett", "title": "Carpe Jugulum", "author": "Terry Pratchett", "year": 1998}]}, {"id": "institutional-madness-boundary", "title": "Institutional Sanity Boundary", "description": "An institution designed to contain madness becomes indistinguishable from the condition it treats, testing whether the boundary between order and chaos is a structural property of the institution or a construct that can be dissolved.", "domains": ["medicine", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to mental health institutional design, the anti-psychiatry critique, and questions about whether coercive containment systems produce or reproduce the conditions they claim to treat.", "tags": ["asylum", "madness-sanity", "institutional-failure", "containment"], "story_count": 1, "stories": [{"id": "arkham-asylum-morrison", "title": "Arkham Asylum", "author": "Grant Morrison, Dave McKean", "year": 1920}]}, {"id": "institutional-sacrifice-for-progress", "title": "Institutional Sacrifice of Workers for Technological Progress", "description": "An institution knowingly sends workers into conditions that will destroy them because the technology is not yet safe, but the political or competitive pressure to demonstrate progress is overwhelming. The harm is not accidental but calculated: designers know the shielding is inadequate, managers know the exposure limits are exceeded, but the program continues because the workers are young, replaceable, and willing. The question is whether progress achieved through deliberate human sacrifice remains morally defensible.", "domains": ["space", "ethics-philosophy", "medicine"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary"], "relevance": "Directly applicable to debates about worker safety in hazardous industries, from nuclear cleanup crews to gig economy drivers. Also relevant to tech company practices of shipping products with known harmful effects.", "tags": ["worker-safety", "institutional-harm", "space-program", "radiation", "whistleblower"], "story_count": 1, "stories": [{"id": "the-altar-at-midnight-kornbluth", "title": "The Altar at Midnight", "author": "C. M. Kornbluth", "year": 1952}]}, {"id": "institutional-survival-experiment", "title": "Institutional Survival Experiment on Children", "description": "A shadowy organization subjects immune teenagers to lethal obstacle courses in a scorched wasteland, claiming their brain patterns hold the key to curing a plague. The children are simultaneously test subjects and potential saviors, with no ability to consent. The story questions whether institutions can ethically sacrifice individuals for collective survival.", "domains": ["governance", "ethics-philosophy", "medicine"], "scenarios": ["ethical-dilemma", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to medical ethics, clinical trial consent, and debates about sacrificing individual rights for public health outcomes.", "tags": ["human-experimentation", "institutional-ethics", "child-exploitation"], "story_count": 1, "stories": [{"id": "the-scorch-trials-dashner", "title": "The Scorch Trials", "author": "James Dashner", "year": 2010}]}, {"id": "intellectual-isolation", "title": "Intellectual Monastic Isolation", "description": "A civilization separates its intellectual class into sealed monasteries with controlled contact with the outside world, creating a two-track society where deep knowledge and practical governance evolve independently.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to debates about academic ivory towers, the separation of expertise from governance, and whether institutional isolation of research produces better or worse outcomes for society.", "tags": ["intellectual-isolation", "monasticism", "two-track-society", "expertise-governance"], "story_count": 1, "stories": [{"id": "anathem-stephenson", "title": "Anathem", "author": "Neal Stephenson", "year": 2008}]}, {"id": "intelligence-enhancement-reversal", "title": "Temporary Intelligence Enhancement", "description": "An experimental procedure dramatically increases a mentally disabled man's intelligence, but the effect is temporary, and the enhanced subject must experience the horror of watching his own cognitive decline after knowing what full intelligence felt like.", "domains": ["medicine", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Foundational text for cognitive enhancement ethics, nootropics, the rights of research subjects, and whether it is crueler to offer temporary capability gains than to never offer them at all.", "tags": ["intelligence-enhancement", "cognitive-decline", "research-ethics", "temporary-ability"], "story_count": 1, "stories": [{"id": "flowers-for-algernon-keyes", "title": "Flowers for Algernon", "author": "Daniel Keyes", "year": 1966}]}, {"id": "intelligent-animal-human-contact", "title": "Intelligent Animal Civilization Contacts Humans", "description": "Thousands of years in the future, intelligent animals who have developed their own civilization encounter returning humans, testing how contact between radically different intelligent species reshapes both when one was created by the other.", "domains": ["first-contact", "biotech", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models post-human responsibility: if our successors (AI, uplifted animals) develop their own civilization, what obligations do we have to them? Relevant to AI successor species and animal uplift ethics.", "tags": ["intelligent-animals", "creator-successor", "post-human-contact"], "story_count": 1, "stories": [{"id": "iron-cage-norton", "title": "Iron Cage", "author": "Andre Norton", "year": 1974}]}, {"id": "intelligent-cosmic-gas-cloud", "title": "Intelligent Interstellar Gas Cloud", "description": "An intelligent gas cloud drifts between Earth and the Sun, its mere presence threatening extinction, and scientists who attempt communication risk having their minds destroyed by the sheer scale of the intelligence they're contacting.", "domains": ["first-contact", "existential-risk", "energy-physics"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "Models contact with vastly superior intelligence: relevant to the information hazard hypothesis (some knowledge destroys the knower), AI alignment (contacting something smarter than you is inherently dangerous).", "tags": ["intelligent-cloud", "scale-mismatch", "information-hazard"], "story_count": 1, "stories": [{"id": "the-black-cloud-hoyle", "title": "The Black Cloud", "author": "Fred Hoyle", "year": 1957}]}, {"id": "inter-dimensional-energy-exchange", "title": "Inter-Dimensional Energy Exchange", "description": "Humans and aliens in a parallel universe discover they can exchange matter across dimensions for mutual energy benefit, but the exchange is slowly destroying both universes \u2014 and neither side wants to stop because the energy is too valuable.", "domains": ["energy-physics", "existential-risk", "economics"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary"], "relevance": "THE canonical 'too-cheap-to-meter' energy trap. Models fossil fuel dependency: a power source whose side effects are existential but whose benefits are too great for anyone to voluntarily stop. Directly relevant to climate change economics.", "tags": ["dimensional-exchange", "energy-addiction", "mutual-destruction"], "story_count": 1, "stories": [{"id": "the-gods-themselves-asimov", "title": "The Gods Themselves", "author": "Isaac Asimov", "year": 1972}]}, {"id": "interactive-strategic-decision", "title": "Interactive Strategic Decision-Making", "description": "A narrative where the reader/player makes sequential strategic decisions that branch into radically different outcomes, modeling how small choices cascade into large consequences in intelligence and military operations.", "domains": ["warfare", "comms-info"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous"], "relevance": "Directly applicable to wargaming, scenario planning, and training simulations where decision-makers must understand branching consequences of their choices.", "tags": ["branching-narrative", "decision-cascades", "wargaming", "scenario-planning"], "story_count": 2, "stories": [{"id": "choose-your-own-adventure-beyond-escape-montgomery", "title": "Choose Your Own Adventure - Beyond Escape!", "author": "R. A. Montgomery, Jason Millet", "year": 1986}, {"id": "choose-your-own-adventure-the-third-planet-from-altair-packard", "title": "Choose Your Own Adventure - The Third Planet from Altair", "author": "Edward Packard", "year": 1979}]}, {"id": "interconnected-temporal-narrative", "title": "Interconnected Temporal Narrative", "description": "Multiple storylines spanning centuries are causally connected, each character's choices rippling forward through time to shape distant futures, testing whether individual actions matter at civilizational timescales.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": [
