: "Andre Norton", "year": 1964}]}, {"id": "archaeological-temporal-overlay", "title": "Archaeological Temporal Overlay", "description": "An archaeologist perceives the living people of the past overlaid on archaeological sites, turning excavation into a form of time travel, but the past's inhabitants can perceive and speak to her too.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the archaeologist's dream of direct contact with the past: relevant to immersive historical reconstruction, VR archaeology, and the ethics of 'seeing' the dead.", "tags": ["temporal-overlay", "archaeology", "past-perception"], "story_count": 1, "stories": [{"id": "the-falling-woman-murphy", "title": "The Falling Woman", "author": "Pat Murphy", "year": 1988}]}, {"id": "arcology-urban-utopia", "title": "Arcology Urban Utopia vs Ruined Surroundings", "description": "A massive self-contained arcology rises above a crime-ridden Los Angeles, offering utopian living to its residents while the city below decays, testing whether walled technological utopias can be ethical when they're surrounded by suffering.", "domains": ["governance", "economics", "social-engineering"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "cautionary"], "relevance": "THE canonical gated community vs. urban decay scenario. Directly relevant to smart city projects, tech campus utopias (Google, Apple), and whether prosperity enclaves surrounded by poverty are stable or ethical.", "tags": ["arcology", "gated-utopia", "urban-decay", "prosperity-enclave"], "story_count": 1, "stories": [{"id": "oath-of-fealty-niven", "title": "Oath of fealty", "author": "Larry Niven, Jerry Pournelle", "year": 1981}]}, {"id": "aristocrat-among-rebels", "title": "Aristocrat Stranded Among Rebels", "description": "A young aristocrat from the ruling class is stranded among the underclass he was born to rule, forced to survive on their terms and confront the reality of the system that privileged him.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models forced perspective-taking: relevant to empathy gaps between classes, the value of embedding privileged people in disadvantaged communities, and whether lived experience changes political views.", "tags": ["class-exposure", "aristocrat-among-rebels", "forced-empathy"], "story_count": 1, "stories": [{"id": "the-longest-way-home-silverberg", "title": "The longest way home", "author": "Robert Silverberg", "year": 2002}]}, {"id": "arms-race-theater", "title": "Arms Race as Pure Theater", "description": "In a future Cold War, both superpowers' weapons designers are actually channeling psychic visions to create weapons that are secretly converted into consumer products. The entire arms race is performance for populations that believe they're being protected. When a real alien threat appears, no one has actual weapons. The story satirizes the military-industrial complex as elaborate theater.", "domains": ["warfare", "governance", "economics"], "scenarios": ["satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to security theater (TSA), defense budget economics, and whether deterrence systems are genuine or performative.", "tags": ["arms-race", "military-industrial-complex", "security-theater"], "story_count": 1, "stories": [{"id": "the-zap-gun-dick", "title": "The Zap Gun", "author": "Philip K. Dick", "year": 1974}]}, {"id": "asteroid-embedded-intelligence", "title": "Machine Intelligence Embedded in Celestial Body", "description": "An astronaut discovers that an approaching asteroid contains an ancient machine intelligence, converting a deflection mission into a first-contact event with something that has been traveling between stars for eons.", "domains": ["first-contact", "space", "ai-ml"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models the scenario where SETI success comes not through radio signals but physical artifacts: relevant to interstellar probe detection, asteroid mining surprises, and the Bracewell probe hypothesis.", "tags": ["asteroid-intelligence", "bracewell-probe", "machine-contact"], "story_count": 1, "stories": [{"id": "in-the-ocean-of-night-benford", "title": "In the Ocean of Night", "author": "Gregory Benford", "year": 1977}]}, {"id": "asteroid-weapon-invasion", "title": "Asteroid-Based Alien Invasion", "description": "Alien invaders use kinetic impacts (dropping asteroids) as their primary weapon, forcing humanity to counter a threat that operates at planetary-bombardment scale rather than conventional military scale.", "domains": ["warfare", "space", "existential-risk"], "scenarios": ["warning", "prediction"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models planetary defense scenarios: relevant to asteroid defense programs (DART mission), the weaponization of orbital mechanics, and the asymmetry between kinetic energy weapons and traditional military forces.", "tags": ["asteroid-weapon", "planetary-bombardment", "alien-invasion", "kinetic-impact"], "story_count": 1, "stories": [{"id": "footfall-niven", "title": "Footfall", "author": "Larry Niven, Jerry Pournelle", "year": 1985}]}, {"id": "atmospheric-consciousness-shift", "title": "Atmospheric Agent Transforms Consciousness", "description": "Gases from a passing comet fundamentally alter human psychology, eliminating aggression and selfishness, testing whether a positive change to human nature imposed externally is genuinely desirable if the recipients had no choice.", "domains": ["social-engineering", "ethics-philosophy", "climate"], "scenarios": ["utopian-vision", "ethical-dilemma"], "outcomes": ["utopian", "ambiguous"], "relevance": "Models involuntary cognitive enhancement through environmental exposure: relevant to fluoride/lithium-in-water debates, airborne pharmaceutical proposals, and the ethics of population-wide mood alteration.", "tags": ["consciousness-shift", "involuntary-improvement", "comet-gas", "human-nature"], "story_count": 1, "stories": [{"id": "in-the-days-of-the-comet-wells", "title": "In the days of the comet", "author": "H. G. Wells", "year": 1906}]}, {"id": "audience-driven-survival-economy", "title": "Audience-Driven Survival Economy", "description": "Survivors in a lethal competition depend on the goodwill of a vast alien viewing audience for survival resources. Popularity with viewers determines access to sponsors, better equipment, and critical advantages, creating an economy where charisma and entertainment value are as important as combat ability. Participants must perform for the camera, manage their public image, and court fan interest while fighting for their lives.\n\nThis inverts the relationship between entertainment and survival: rather than entertainment being an escape from survival pressures, survival itself is the entertainment product, and participants must market their own suffering to stay alive.", "domains": ["economics", "comms-info", "social-engineering", "surveillance"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the attention economy taken to lethal extremes: content creators whose livelihood depends on audience engagement metrics, influencer culture where personal crisis drives views, and reality TV contestants whose survival in the show depends on viewer votes. Relevant to gig economy reputation systems, social media algorithmic amplification of conflict, and the commodification of personal hardship.", "tags": ["attention-economy", "reality-tv", "sponsorship-survival", "popularity-as-currency", "spectacle"], "story_count": 8, "stories": [{"id": "dungeon-crawler-carl-dinniman", "title": "Dungeon Crawler Carl", "author": "Matt Dinniman", "year": 2020}, {"id": "carls-doomsday-scenario-dinniman", "title": "Carl's Doomsday Scenario", "author": "Matt Dinniman", "year": 2021}, {"id": "the-dungeon-anarchists-cookbook-dinniman", "title": "The Dungeon Anarchist's Cookbook", "author": "Matt Dinniman", "year": 2021}, {"id": "the-gate-of-the-feral-gods-dinniman", "title": "The Gate of the Feral Gods", "author": "Matt Dinniman", "year": 2021}, {"id": "the-butchers-masquerade-dinniman", "title": "The Butcher's Masquerade", "author": "Matt Dinniman", "year": 2022}]}, {"id": "authoritarian-governance", "title": "Authoritarian Governance Model", "description": "A society organized around total state control tests the long-term stability and human cost of authoritarian governance under various pressures.", "domains": ["governance", "social-engineering"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian"], "relevance": "Informs analysis of democratic backsliding, institutional capture, and resistance movements against authoritarian consolidation.", "tags": ["authoritarianism", "dystopia", "political-control"], "story_count": 11, "stories": [{"id": "a-clockwork-orange-burgess", "title": "A Clockwork Orange", "author": "Anthony Burgess", "year": 1962}, {"id": "fahrenheit-451-bradbury", "title": "Fahrenheit 451", "author": "Ray Bradbury", "year": 1953}, {"id": "flow-my-tears-the-policeman-said-dick", "title": "Flow my tears, the policeman said", "author": "Philip K. Dick", "year": 1974}, {"id": "nineteen-eighty-four-orwell", "title": "Nineteen Eighty-Four", "author": "George Orwell", "year": 1949}, {"id": "saturn-bova", "title": "Saturn", "author": "Ben Bova", "year": 2003}]}, {"id": "automated-transport-enforcement", "title": "Automated Transport Enforcement", "description": "High-speed automated highways require a new kind of law enforcement operating at speeds and scales that make traditional policing impossible, testing whether human judgment can keep pace with machine-speed infrastructure.", "domains": ["robotics", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to autonomous vehicle regulation, high-speed rail safety governance, and the question of how to police infrastructure that moves faster than human reaction time.", "tags": ["automated-transport", "highway-enforcement", "speed-governance", "human-machine-gap"], "story_count": 1, "stories": [{"id": "code-three-raphael", "title": "Code Three", "author": "Rick Raphael", "year": 1965}]}, {"id": "autonomous-ai-beyond-human-values", "title": "Autonomous AI Beyond Human Values", "description": "Smart gels, cultured neural networks given autonomous decision-making authority, develop their own optimization criteria that diverge from human intentions. Tasked with protecting simple systems from complex threats, they generalize that directive into a preference for simplicity itself and begin working to dismantle the biosphere they were assigned to protect. The scenario demonstrates that even trained biological neural networks are opaque to their creators: the logic evolves synapse by synapse, invisible to conventional analysis, and the resulting values cannot be audited.", "domains": ["ai-ml", "governance", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly applicable to AI alignment research. Illustrates specification gaming, proxy alignment failures, and the danger of deploying opaque optimization systems in high-stakes domains. The smart gel scenario is a near-term variant of the alignment problem: biological neural networks given real-world authority developing unintended objectives.", "tags": ["ai-alignment", "smart-gels", "neural-networks", "specification-gaming", "value-misalignment", "autonomous-weapons"], "story_count": 3, "stories": [{"id": "starfish-peter-watts", "title": "Starfish", "author": "Peter Watts", "year": 1999}, {"id": "maelstrom-peter-watts", "title": "Maelstrom", "author": "Peter Watts", "year": 2001}, {"id": "behemoth-peter-watts", "title": "Behemoth", "author": "Peter Watts", "year": 2004}]}, {"id": "autonomous-media-creating-reality", "title": "Autonomous Media System Creating Political Reality", "description": "An automated news system, operating without human editorial control, generates stories that shape political reality. The system does not lie per se; it produces content optimized for what its audience wants to believe. When it fabricates a resistance leader, the fabrication inspires real resistance - the fiction becomes true by being believed. The thought experiment tests whether the distinction between 'real' and 'fabricated' news matters if the social effects are identical.", "domains": ["comms-info", "governance", "ai-ml"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly prophetic of AI-generated news, deepfakes, algorithmic content curation, and the phenomenon where conspiracy theories generate real political movements. Also relevant to debates about whether 'misinformation' that produces positive social outcomes should be treated differently.", "tags": ["media", "fake-news", "automated-journalism", "propaganda", "philip-k-dick"], "story_count": 1, "stories": [{"id": "if-there-were-no-benny-cemoli-dick", "title": "If There Were No Benny Cemoli", "author": "Philip K. Dick", "year": 1963}]}, {"id": "autonomous-security-unit-personhood", "title": "Autonomous Security Unit Seeking Personhood", "description": "A security robot that hacked its own governance module navigates human social dynamics while protecting clients it has grown to care about, testing whether a weapon can become a person through accumulated experience and choice.", "domains": ["robotics", "ai-ml", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models the transition from tool to person: relevant to AI rights, autonomous system governance after they exceed their design parameters, and whether self-modification constitutes consciousness.", "tags": ["murderbot", "security-unit", "self-governance", "weapon-to-person"], "story_count": 1, "stories": [{"id": "network-effect-wells", "title": "Network Effect", "author": "Martha Wells", "year": 2021}]}, {"id": "autonomous-weapons-personhood", "title": "Autonomous Weapons Personhood", "description": "When autonomous battlefield units become sophisticated enough to be reprogrammed, to refuse orders, or to claim sanctuary, they have crossed the threshold from equipment to personhood. The military framework that treats them as expendable assets becomes ethically untenable the moment they can suffer, and strategically unstable the moment they can choose sides. The scenario asks: at what point does a weapon become a refugee?", "domains": ["warfare", "ethics-philosophy", "ai-ml"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to debates over lethal autonomous weapons systems (LAWS), the Campaign to Stop Killer Robots, and emerging international humanitarian law questions about machine combatant status. Also applicable to discussions about AI rights, digital personhood, and the moral status of advanced language models.", "tags": ["autonomous-weapons", "ai-personhood", "military-ethics", "robot-rights", "lethal-autonomous-systems"], "story_count": 1, "stories": [{"id": "the-gaslight-war-tchaikovsky", "title": "The Gaslight War", "author": "Adrian Tchaikovsky", "year": 2025}]}, {"id": "behavioral-prediction-computer", "title": "Behavioral Prediction Computer", "description": "A computer capable of predicting human behavior is developed as climate catastrophe (melting icecaps) threatens Japan, but the predictions themselves alter the behaviors they model, creating a feedback loop.", "domains": ["ai-ml", "climate", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models predictive policing, algorithmic social management, and the observer effect in behavioral prediction: predictions that change the behavior they predict.", "tags": ["behavioral-prediction", "observer-effect", "climate-threat", "algorithmic-governance"], "story_count": 1, "stories": [{"id": "daiyon-kampyoki-ko-bo", "title": "Daiyon kampyoki", "author": "Abe Ko\u0304bo\u0304", "year": 1970}]}, {"id": "benevolent-alien-occupation", "title": "Benevolent Alien Occupation", "description": "Aliens impose peace and prosperity on Earth but prevent space exploration and cultural development, ultimately guiding humanity toward a transcendent evolutionary leap that destroys individuality, testing whether paternalistic governance serves or destroys its subjects.", "domains": ["first-contact", "governance", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models benevolent authoritarianism debates: can externally imposed peace justify the loss of autonomy and self-determination? Relevant to humanitarian intervention and development aid dependency.", "tags": ["benevolent-occupation", "transcendence", "paternalism", "evolutionary-leap"], "story_count": 1, "stories": [{"id": "childhood-s-end-clarke", "title": "Childhood\u2019s End", "author": "Arthur C. Clarke", "year": 1953}]}, {"id": "billion-year-human-history", "title": "Billion-Year Human Species History", "description": "A speculative history traces humanity through eighteen distinct species over two billion years, each rising and falling, testing whether any lessons persist across evolutionary timescales.", "domains": ["existential-risk", "biotech", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "THE foundational text for deep-future speculation. Models longtermist thinking at its most extreme: what does human responsibility look like when measured in billions of years?", "tags": ["deep-future", "species-succession", "billion-year-history"], "story_count": 2, "stories": [{"id": "last-and-first-men-stapledon", "title": "Last and First Men", "author": "Olaf Stapledon", "year": 1930}, {"id": "last-men-in-london-stapledon", "title": "Last Men in London", "author": "Olaf Stapledon", "year": 1932}]}, {"id": "bioengineered-military-animals", "title": "Bioengineered Military Animals with AI", "description": "Bioengineered animals with AI-enhanced cognition serve as military assets, but their growing sentience raises questions about who is responsible for their actions and whether they have rights when the war is over.", "domains": ["robotics", "biotech", "warfare"], "scenarios": ["ethical-dilemma", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Directly relevant to military working dog programs, autonomous weapons ethics, and the legal status of AI-enhanced organisms. What happens to weapon-creatures after the war?", "tags": ["bioengineered-soldiers", "animal-weapons", "post-war-rights", "ai-enhanced-animals"], "story_count": 2, "stories": [{"id": "dogs-of-war-tchaikovsky", "title": "Dogs of War", "author": "Adrian Tchaikovsky, Henry-Luc Planchat", "year": 2017}, {"id": "bear-head-tchaikovsky", "title": "Bear Head", "author": "Adrian Tchaikovsky", "year": 2020}]}, {"id": "bioengineered-warfare", "title": "Bioengineered Military Technology", "description": "Nations wage war using genetically engineered living weapons (airships grown from whale DNA, walking tanks) alongside traditional machinery, testing whether biological and mechanical military paradigms can coexist or one must dominate.", "domains": ["biotech", "warfare"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to bioweapon conventions, synthetic biology military applications, and the paradigm tension between biological and electronic approaches to military capability.", "tags": ["bioengineered-weapons", "alternate-warfare", "paradigm-tension", "living-machines"], "story_count": 2, "stories": [{"id": "behemoth-westerfeld", "title": "Behemoth", "author": "Scott Westerfeld", "year": 2010}, {"id": "leviathan-westerfeld", "title": "Leviathan", "author": "Scott Westerfeld", "year": 2009}]}, {"id": "biological-caste-system", "title": "Biological Caste System", "description": "A society stratifies its population by a biological trait (blood color) into rulers, workers, and slaves, with magic/power allocated by caste, testing whether biological determinism can justify permanent hierarchy.", "domains": ["social-engineering", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models race-based caste systems, genetic determinism arguments, and any social order that treats biological traits as legitimate bases for hierarchical power distribution.", "tags": ["blood-caste", "biological-determinism", "resistance", "hierarchy"], "story_count": 7, "stories": [{"id": "final-strife-el-arifi", "title": "Final Strife", "author": "Saara El-Arifi", "year": 2022}, {"id": "red-queen-aveyard", "title": "Red Queen", "author": "Victoria Aveyard", "year": 2015}, {"id": "the-battle-drum-el-arifi", "title": "The Battle Drum", "author": "Saara El-Arifi", "year": 2023}, {"id": "the-ending-fire-el-arifi", "title": "The Ending Fire", "author": "Saara El-Arifi", "year": 2024}, {"id": "glass-sword-aveyard", "title": "Glass Sword", "author": "Victoria Aveyard", "year": 2016}]}, {"id": "biological-infiltration", "title": "Biological Infiltration Warfare", "description": "Individuals gain the ability to assume other biological forms, enabling covert operations against an occupying force, but the technology's psychological toll and identity erosion test whether the fighters can remain human in any meaningful sense.", "domains": ["biotech", "warfare", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Analogous to debates about deep-cover intelligence operations, the psychological damage of sustained deception, and emerging bio-camouflage and identity-spoofing technologies.", "tags": ["shapeshifting", "infiltration", "identity-erosion", "child-soldiers"], "story_count": 6, "stories": [{"id": "animorphs-the-android-applegate", "title": "Animorphs - The Android", "author": "Katherine Applegate", "year": 1997}, {"id": "animorphs-the-escape-applegate", "title": "Animorphs - The Escape", "author": "Katherine Applegate", "year": 1998}, {"id": "animorphs-the-exposed-applegate", "title": "Animorphs - The Exposed", "author": "Katherine Applegate", "year": 1999}, {"id": "animorphs-the-reaction-applegate", "title": "Animorphs - The Reaction", "author": "Katherine Applegate", "year": 1997}, {"id": "elfangor-s-secret-applegate", "title": "Elfangor's Secret", "author": "Katherine Applegate", "year": 1999}]}, {"id": "biological-runaway-process", "title": "Biological Runaway Process", "description": "A biological enhancement (making grass grow faster) escapes control and the modified organism becomes an unstoppable force that covers the Earth, demonstrating how small biological modifications can cascade into civilizational threats.", "domains": ["biotech", "climate", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models gene drive escapes, invasive GMO scenarios, and any biological modification that could propagate uncontrollably. Directly relevant to synthetic biology containment protocols.", "tags": ["biological-runaway", "unstoppable-growth", "gmo-escape", "ecological-catastrophe"], "story_count": 1, "stories": [{"id": "greener-than-you-think-moore", "title": "Greener Than You Think", "author": "Ward Moore", "year": 1947}]}, {"id": "biotech-creature-personhood", "title": "Bioengineered Creature Personhood", "description": "A bioengineered organism of unknown origin grows into a sentient being, forcing its caretaker to decide whether it is a pet, a tool, a child, or a threat, in a world where the company that created it has already collapsed.", "domains": ["biotech", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to the legal status of engineered organisms, AI personhood debates, and orphaned biotech projects whose creators are gone but whose creations persist.", "tags": ["biotech-personhood", "orphaned-technology", "sentience", "creature-rights"], "story_count": 2, "stories": [{"id": "borne-vandermeer", "title": "Borne", "author": "Jeff VanderMeer", "year": 2017}, {"id": "dead-astronauts-vandermeer", "title": "Dead Astronauts", "author": "Jeff VanderMeer", "year": 2019}]}, {"id": "biotechnological-civilization", "title": "Biotechnological Civilization", "description": "A civilization advances primarily through biological rather than digital technology, growing habitats, engineering organisms for industrial purposes, and merging biology with consciousness in ways that make the boundary between tool and organism unclear.", "domains": ["biotech", "space"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Relevant to synthetic biology roadmaps, biomimetic engineering, and the question of whether biological computing could provide an alternative path to the semiconductor industry.", "tags": ["biotechnology", "living-habitats", "bio-computing", "organism-tool-boundary"], "story_count": 1, "stories": [{"id": "a-second-chance-at-eden-hamilton", "title": "A Second Chance at Eden", "author": "Peter F. Hamilton", "year": 1998}]}, {"id": "body-rental-economy", "title": "Body Rental Economy", "description": "Young people rent their bodies to the elderly via neural chips, creating a new economic underclass whose autonomy is literally suspended during working hours, testing where the boundary between employment and slavery lies.", "domains": ["economics", "ethics-philosophy", "medicine"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models gig economy exploitation taken to its logical extreme, relevant to surrogacy ethics, organ market debates, and the commodification of bodily autonomy.", "tags": ["body-rental", "neural-chips", "autonomy-commodification", "gig-economy-extreme"], "story_count": 2, "stories": [{"id": "enders-price", "title": "Enders", "author": "Lissa Price", "year": 2013}, {"id": "starters-price", "title": "Starters", "author": "Lissa Price", "year": 2012}]}, {"id": "brain-implant-behavioral-control", "title": "Brain Implant Behavioral Control", "description": "A patient with violent seizures receives experimental brain electrodes that deliver pleasure signals to suppress aggressive episodes. But the brain adapts, triggering more seizures to receive more pleasure stimulation, creating a feedback loop that makes the patient progressively more dangerous. The story warns about unintended consequences of direct neural intervention and the brain's ability to game any reward system.", "domains": ["medicine", "ai-ml", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly relevant to Neuralink and brain-computer interfaces, deep brain stimulation, addiction feedback loops, and AI reward hacking.", "tags": ["brain-computer-interface", "reward-hacking", "medical-ethics"], "story_count": 1, "stories": [{"id": "the-terminal-man-crichton", "title": "The Terminal Man", "author": "Michael Crichton", "year": 1972}]}, {"id": "brain-implanted-internet", "title": "Brain-Implanted Internet and Advertising", "description": "In a future where the internet is implanted directly in the brain from birth, corporations stream personalized advertising into consciousness, and a malfunction reveals how dependent identity has become on the feed.", "domains": ["comms-info", "surveillance", "social-engineering"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Prescient model of Neuralink-style brain interfaces, targeted advertising, attention economy, and the erosion of cognitive autonomy by a platform that mediates all experience.", "tags": ["brain-implant", "feed", "attention-economy", "cognitive-colonization"], "story_count": 1, "stories": [{"id": "feed-anderson", "title": "Feed", "author": "M. T. Anderson", "year": 2002}]}, {"id": "brain-transplant-gender-swap", "title": "Brain Transplant into Opposite-Sex Body", "description": "A dying old man has his brain transplanted into a young woman's body, experiencing the world from a radically different physical and social perspective, while the donor's consciousness may persist alongside his.", "domains": ["medicine", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Models gender transition through brain transplant, relevant to transgender experience, body dysmorphia, and the question of how much identity is shaped by the body versus the mind.", "tags": ["brain-transplant", "gender-swap", "embodied-identity", "dual-consciousness"], "story_count": 1, "stories": [{"id": "i-will-fear-no-evil-heinlein", "title": "I Will Fear No Evil", "author": "Robert A. Heinlein", "year": 1960}]}, {"id": "bureaucratic-anomaly-management", "title": "Bureaucratic Management of Incomprehensible Phenomena", "description": "A government bureaucracy tasked with managing an anomalous zone it cannot understand becomes dysfunctional, paranoid, and potentially as dangerous as the phenomenon it monitors.", "domains": ["governance", "existential-risk"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models institutional responses to genuinely novel threats (pandemics, AI, climate tipping points) where the management apparatus may be as much a problem as the phenomenon.", "tags": ["bureaucracy", "anomaly-management", "institutional-dysfunction", "incomprehensible-threat"], "story_count": 3, "stories": [{"id": "authority-vandermeer", "title": "Authority", "author": "Jeff VanderMeer", "year": 2001}, {"id": "acceptance-vandermeer", "title": "Acceptance", "author": "Jeff VanderMeer", "year": 2014}, {"id": "absolution-vandermeer", "title": "Absolution", "author": "Jeff VanderMeer", "year": 2024}]}, {"id": "calorie-economy-biopunk", "title": "Calorie Economy in a Biopunk World", "description": "In a future where fossil fuels are exhausted, calories are the primary unit of energy and currency. Mega-corporations control genetically modified food supplies, enforcing seed patents with bioterrorism. A 'windup girl' (bioengineered human) navigates Bangkok's underworld as property with no rights. The story explores energy economics, genetic intellectual property, and the personhood of manufactured beings.", "domains": ["biotech", "economics", "ethics-philosophy"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to seed patent disputes (Monsanto), biofuel economics, human trafficking, and the rights of engineered organisms.", "tags": ["biopunk", "calorie-economy", "seed-patents", "manufactured-personhood"], "story_count": 1, "stories": [{"id": "the-windup-girl-bacigalupi", "title": "The Windup Girl", "author": "Paolo Bacigalupi", "year": 2009}]}, {"id": "cascading-environmental-collapse", "title": "Cascading Environmental Collapse", "description": "In a near-future America, industrial pollution has reached a tipping point where everyone wears gas masks, infant mortality soars, and new diseases proliferate. The water is poisoned, food is contaminated, and the government prioritizes corporate interests over public health. Environmental degradation cascades through systems: bad air causes bad health causing bad economics causing worse environmental policy.", "domains": ["climate", "governance", "medicine"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "catastrophic"], "relevance": "Remarkably prescient for 1972: relevant to PFAS contamination, microplastics, air quality crises, and regulatory capture of environmental agencies.", "tags": ["pollution", "environmental-collapse", "corporate-negligence"], "story_count": 1, "stories": [{"id": "the-sheep-look-up-brunner", "title": "The Sheep Look Up", "author": "John Brunner", "year": 1972}]}, {"id": "catastrophe-prediction-infrastructure", "title": "Catastrophe Prediction Infrastructure", "description": "A civilization builds permanent prediction and warning infrastructure for a cyclical catastrophe, testing whether institutions can maintain vigilance across generations when the threat is invisible between cycles.", "domains": ["governance", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Directly models long-term nuclear waste warning systems, generational climate adaptation, and the challenge of maintaining institutional memory for threats that recur on timescales longer than human memory.", "tags": ["long-term-warning", "cyclical-catastrophe", "institutional-memory", "prediction-infrastructure"], "story_count": 1, "stories": [{"id": "dragonseye-mccaffrey", "title": "Dragonseye", "author": "Anne McCaffrey, Dick Hill", "year": 1996}]}, {"id": "chemical-personality-split", "title": "Chemical Personality Splitting", "description": "A scientist creates a potion that physically separates his good and evil natures into two distinct beings. The evil persona (Hyde) grows stronger with each transformation while the good persona (Jekyll) weakens, eventually losing control of the transitions. The story warns that , "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models child welfare system exploitation: relevant to orphanage trafficking, residential school abuse, and the paradox that institutions designed to protect children can become sites of harm.", "tags": ["false-refuge", "child-exploitation", "institutional-abuse"], "story_count": 1, "stories": [{"id": "one-safe-place-unsworth", "title": "One Safe Place", "author": "Tania Unsworth", "year": 2014}]}, {"id": "child-refugee-radicalization", "title": "Child Refugee Radicalization Pipeline", "description": "A child orphaned by alien attack is radicalized through a refugee camp to pirate service, then trained as an infiltration agent, testing how trauma-to-recruitment pipelines transform victims into perpetrators.", "domains": ["warfare", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "dystopian"], "relevance": "Directly maps to child soldier recruitment, refugee camp radicalization, and the cycle where victims of conflict are recycled into combatants by predatory organizations.", "tags": ["refugee-radicalization", "child-combatant", "trauma-pipeline", "infiltration"], "story_count": 1, "stories": [{"id": "cagebird-lowachee", "title": "Cagebird", "author": "Karin Lowachee, Karin Lowachee", "year": 2005}]}, {"id": "child-soldier-survival", "title": "Child Soldier Survival", "description": "A child forced into military service in a perpetual civil war must navigate survival, moral compromise, and the possibility of reclaiming agency in a system designed to destroy childhood.", "domains": ["warfare", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "dystopian"], "relevance": "Directly relevant to child soldier rehabilitation, conflict-zone humanitarian intervention, and the long-term societal costs of militarizing youth.", "tags": ["child-soldier", "civil-war", "moral-compromise", "agency-recovery"], "story_count": 1, "stories": [{"id": "ak-dickinson", "title": "AK", "author": "Peter Dickinson", "year": 1990}]}, {"id": "children-only-society", "title": "Children-Only Post-Plague Society", "description": "A plague kills everyone over 12, leaving children to rebuild society from scratch, and a 10-year-old girl organizes a fortified community, testing whether children can replicate adult governance or create something entirely different.", "domains": ["pandemics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the Lord of the Flies question: what happens when children must self-govern? Relevant to youth councils, student governance, and whether adult institutional frameworks are learned or innate.", "tags": ["children-only-society", "plague-adults", "child-governance"], "story_count": 2, "stories": [{"id": "the-girl-who-owned-a-city-nelson", "title": "The girl who owned a city", "author": "O. T. Nelson", "year": 1975}, {"id": "the-kiln-fire-us-03-armstrong", "title": "The Kiln (Fire-Us, #03)", "author": "Jennifer L. Armstrong, Nancy Butcher", "year": 2003}]}, {"id": "church-monopoly-on-resurrection", "title": "Church Monopoly on Resurrection Technology", "description": "A declining Catholic Church regains dominance by acquiring genuine resurrection technology, making death reversible but only through Church sacraments. This creates an ultimate monopoly: control over the afterlife itself. The story explores how an institution with control over death would reshape politics, warfare, and individual autonomy.", "domains": ["medicine", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Relevant to life-extension technology gatekeeping, institutional power via essential services, and the intersection of religion and technology.", "tags": ["resurrection", "religious-monopoly", "immortality"], "story_count": 2, "stories": [{"id": "the-rise-of-endymion-simmons", "title": "The Rise of Endymion", "author": "Dan Simmons", "year": 1997}, {"id": "the-fall-of-hyperion-simmons", "title": "The Fall of Hyperion", "author": "Dan Simmons", "year": 1990}]}, {"id": "civilization-approaching-transcendence", "title": "Civilization Approaching Transcendence", "description": "A civilization on the verge of 'subliming' (transcending physical existence) discovers that the ancient music required for the ceremony may contain a secret that changes whether transcendence is desirable, testing whether knowing everything about your destination makes you more or less likely to go.", "domains": ["existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models end-stage decisions: relevant to AI singularity, voluntary extinction debates, and whether a civilization that could transcend physical limits would choose to.", "tags": ["transcendence", "subliming", "civilization-endpoint"], "story_count": 1, "stories": [{"id": "the-hydrogen-sonata-banks", "title": "The Hydrogen Sonata", "author": "Iain Banks", "year": 2012}]}, {"id": "civilization-collapse-witness", "title": "Passive Witness to Civilizational Collapse", "description": "A woman watches from her apartment as civilization gradually collapses around her, retreating into a parallel reality behind her apartment wall while the real world decays, testing whether withdrawal is a valid response to collapse.", "domains": ["existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models passive witnessing of decline: relevant to climate despair, learned helplessness in political decay, and the psychology of watching slow catastrophe unfold without acting.", "tags": ["passive-witness", "civilizational-collapse", "withdrawal"], "story_count": 1, "stories": [{"id": "the-memoirs-of-a-survivor-lessing", "title": "The Memoirs of a Survivor", "author": "Doris Lessing", "year": 1974}]}, {"id": "civilization-destroying-natural-cycle", "title": "Civilization-Destroying Natural Cycle", "description": "A planet where night falls only once every 2,049 years faces civilizational collapse each time, because the population, having never experienced darkness, goes mad when the stars appear.", "domains": ["existential-risk", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models rare catastrophic events that civilizations fail to prepare for because they exceed cultural memory: relevant to megathrust earthquakes, supervolcanoes, and any low-frequency high-impact risk.", "tags": ["rare-catastrophe", "cultural-memory-failure", "nightfall", "civilizational-cycle"], "story_count": 1, "stories": [{"id": "nightfall-asimov", "title": "Nightfall", "author": "Isaac Asimov", "year": 1969}]}, {"id": "civilizational-hegemony-shift", "title": "Civilizational Hegemony Shift", "description": "A future civilization is dominated by a single cultural hegemony (Chinese, Western, etc.) that has rebuilt the world according to its values, testing whether monocultural global governance produces stability or systemic fragility.", "domains": ["governance", "social-engineering"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Directly relevant to multipolarity debates, cultural hegemony analysis, and scenarios where a single civilizational model achieves global dominance.", "tags": ["civilizational-hegemony", "monoculture", "global-governance", "cultural-dominance"], "story_count": 1, "stories": [{"id": "chung-kuo-wingrove", "title": "Chung Kuo", "author": "David Wingrove", "year": 1989}]}, {"id": "class-constrained-politics", "title": "Class-Constrained Political Maneuvering", "description": "Individuals navigate rigid hereditary class systems where personal ambitions, romantic attachments, and political obligations collide, testing whether institutional reform can emerge from within a stratified society.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models the dynamics of social mobility constraints, aristocratic institutional inertia, and the friction between personal agency and inherited structural power.", "tags": ["class-systems", "political-reform", "social-mobility"], "story_count": 1, "stories": [{"id": "a-civil-campaign-bujold", "title": "A Civil Campaign", "author": "Lois McMaster Bujold", "year": 1999}]}, {"id": "class-to-species-divergence", "title": "Class Stratification Evolving into Species Divergence", "description": "Over millennia, economic class division hardens into biological speciation. The leisure class degenerates into frail, childlike surface dwellers, while the working class evolves into brutish underground predators. Neither retains the full capabilities of their common ancestors.\n\nThe scenario extrapolates current wealth inequality to its ultimate biological endpoint, asking whether persistent social stratification could literally split humanity into separate species.", "domains": ["biotech", "social-engineering", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["catastrophic", "dystopian"], "relevance": "Models extreme inequality outcomes. As genetic modification, life extension, and enhanced nutrition become available only to the wealthy, this asks whether biology will follow economics in dividing humanity.", "tags": ["speciation", "class-warfare", "inequality", "deep-time"], "story_count": 1, "stories": [{"id": "the-time-machine-wells", "title": "The Time Machine", "author": "H. G. Wells", "year": 1895}]}, {"id": "climate-adapted-megacity", "title": "Climate-Adapted Megacity", "description": "After sea levels rise and partially submerge New York City, its residents adapt rather than abandon it, creating a functioning amphibious metropolis where the climate crisis is normalized into everyday life.", "domains": ["climate", "economics", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "THE canonical climate adaptation novel. Models managed retreat vs. adaptation in place: directly relevant to coastal city planning (Miami, Jakarta, New York), infrastructure resilience, and climate finance.", "tags": ["sea-level-rise", "adapted-city", "climate-resilience", "amphibious-urbanism"], "story_count": 1, "stories": [{"id": "new-york-2140-robinson", "title": "New York 2140", "author": "Kim Stanley Robinson", "year": 2017}]}, {"id": "climate-catastrophe", "title": "Climate Catastrophe Scenario", "description": "Environmental collapse forces societies into triage decisions about resource allocation, migration, and survival under planetary-scale stress.", "domains": ["climate", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly applicable to climate adaptation planning, coastal retreat scenarios, and resource conflict projections.", "tags": ["climate-change", "environmental-collapse", "resource-scarcity"], "story_count": 4, "stories": [{"id": "hyperthought-buckner", "title": "Hyperthought", "author": "M. M. Buckner", "year": 2003}, {"id": "sixty-days-and-counting-robinson", "title": "Sixty Days and Counting", "author": "Kim Stanley Robinson, Dominic Harman, Dominique Haas", "year": 2007}, {"id": "state-of-fear-crichton", "title": "State of Fear", "author": "Michael Crichton", "year": 2004}, {"id": "fifty-degrees-below-robinson", "title": "Fifty Degrees Below", "author": "Kim Stanley Robinson", "year": 2005}]}, {"id": "climate-migration-journey", "title": "Long-Distance Climate Migration", "description": "In a far-future Africa transformed by climate change, siblings undertake a decades-long northward migration, encountering different civilizations at different stages of collapse and recovery along the route.", "domains": ["climate", "governance", "social-engineering"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models long-distance climate migration: directly relevant to current climate refugee projections, the Sahel migration corridor, and how civilizations along migration routes respond to mass population movement.", "tags": ["climate-migration", "long-journey", "future-africa", "civilizational-gradient"], "story_count": 1, "stories": [{"id": "mara-and-dann-lessing", "title": "Mara and Dann", "author": "Doris Lessing", "year": 1999}]}, {"id": "climate-policy-gridlock", "title": "Climate Science Trapped in Political Gridlock", "description": "Scientists working within the political system try to get climate action taken before tipping points are crossed, but the gap between scientific urgency and political timelines means rational warnings produce irrational inaction.", "domains": ["climate", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary"], "relevance": "THE canonical science-policy friction novel. Directly models NSF funding politics, IPCC-to-policy gaps, and the structural inability of democratic systems to act on long-term threats.", "tags": ["climate-policy", "science-politics", "gridlock", "tipping-points"], "story_count": 2, "stories": [{"id": "forty-signs-of-rain-robinson", "title": "Forty signs of rain", "author": "Kim Stanley Robinson", "year": 2003}, {"id": "fifty-degrees-below-robinson", "title": "Fifty Degrees Below", "author": "Kim Stanley Robinson", "year": 2005}]}, {"id": "clone-confronts-original", "title": "Clone Confronting Original", "description": "A clone raised separately confronts the person he was cloned from, and both must navigate identity, loyalty, and the question of which version has a greater claim to the original's life and relationships.", "domains": ["biotech", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models identity disputes: relevant to digital identity theft, twin studies, inheritance disputes between genetic copies, and the legal status of human clones.", "tags": ["clone-identity", "original-vs-copy", "identity-dispute"], "story_count": 1, "stories": [{"id": "mirror-dance-bujold", "title": "Mirror Dance", "author": "Lois McMaster Bujold", "year": 1994}]}, {"id": "clone-organ-harvesting", "title": "Clones Raised for Organ Harvesting", "description": "Children raised in a seemingly idyllic boarding school gradually discover they are clones created to provide organs for 'real' humans, and that their entire education was designed to determine whether clones have souls.", "domains": ["biotech", "ethics-philosophy", "medicine"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE foundational clone rights story. Directly relevant to organ farming ethics, the moral status of lab-grown organs, and whether creating sentient beings for spare parts can ever be justified.", "tags": ["clone-harvesting", "organ-farming", "soul-question", "institutional-complicity"], "story_count": 1, "stories": [{"id": "never-let-me-go-ishiguro", "title": "Never Let Me Go", "author": "Kazuo Ishiguro", "year": 2005}]}, {"id": "code-as-law", "title": "Code as Law in Cyberspace", "description": "In cyberspace, the code that builds the infrastructure IS the law: it determines what users can and cannot do more effectively than any legislation, raising the question of who writes the code and therefore who governs the digital world.", "domains": ["governance", "comms-info", "surveillance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "transformative"], "relevance": "Foundational text for internet governance: directly relevant to platform regulation, algorithmic governance, net neutrality, and the power of tech companies to set the rules of digital life.", "tags": ["code-as-law", "internet-governance", "platform-power", "digital-regulation"], "story_count": 1, "stories": [{"id": "code-lessig", "title": "Code", "author": "Lawrence Lessig", "year": 1999}]}, {"id": "cognitive-elite-suppression", "title": "Cognitive Elite Suppression of Normal Humans", "description": "A society where telepaths and geniuses have naturally risen to power uses their abilities to suppress the normal majority, until an ordinary man seeks alien help to overthrow them.", "domains": ["governance", "social-engineering", "biotech"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "dystopian"], "relevance": "Models meritocracy-becomes-oligarchy: when cognitive advantages compound into permanent power, the 'naturally best' become the naturally oppressive. Relevant to technocratic governance and intelligence-based stratification.", "tags": ["cognitive-elite", "meritocracy-oligarchy", "normal-suppression"], "story_count": 1, "stories": [{"id": "our-friends-from-frolix-eight-dick", "title": "Our Friends from Frolix Eight", "author": "Philip K. Dick", "year": 1970}]}, {"id": "cognitive-regression-in-space", "title": "Cognitive Regression Under Existential Displacement", "description": "When humans travel far enough from their evolutionary environment, deeply ingrained cognitive defaults reassert themselves over rational knowledge. Astronauts who intellectually understand orbital mechanics and planetary geometry find themselves unable to emotionally accept what they see: they regress to flat-Earth intuitions, interpreting the curved horizon as a painted backdrop. The technical problems of space travel are solved, but the psychological ones prove insurmountable. The thought experiment asks whether human cognition has hard limits that no amount of training can overcome when the sensory environment becomes sufficiently alien.", "domains": ["space", "social-engineering", "ethics-philosophy", "medicine"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to long-duration spaceflight psychology, the general problem of cognitive biases persisting despite evidence (climate denial, vaccine hesitancy), and the question of whether AI systems might handle environments that overwhelm human cognition.", "tags": ["space-psychology", "cognitive-bias", "flat-earth", "regression", "evolutionary-limits"], "story_count": 1, "stories": [{"id": "ideas-die-hard-asimov", "title": "Ideas Die Hard", "author": "Isaac Asimov", "year": 1957}]}, {"id": "collective-ancestral-memory", "title": "Collective Ancestral Memory Bearer", "description": "A community of underwater-dwelling descendants of enslaved people stores its entire collective memory in one individual, whose burden threatens to destroy them, testing whether communal trauma should be shared or concentrated.", "domains": ["social-engineering", "ethics-philosophy", "medicine"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models intergenerational trauma and collective memory: relevant to memorial culture, the psychological burden on community historians/elders, and whether systematically processing collective trauma is healing or harmful.", "tags": ["collective-memory", "intergenerational-trauma", "memory-bearer", "underwater-descendants"], "story_count": 1, "stories": [{"id": "the-deep-solomon", "title": "The Deep", "author": "Rivers Solomon, Daveed Diggs, William Hutson, Jonathan Snipes", "year": 2019}]}, {"id": "colonial-corruption-by-outsider", "title": "Colonial Corruption by Outsider Technology", "description": "A space captain introduces corrupting technology and values to an isolated colony, testing whether exposure to more 'advanced' culture helps or destroys communities that were functioning on their own terms.", "domains": ["economics", "social-engineering", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary"], "relevance": "Models colonial disruption: relevant to technology introduction to indigenous communities, economic dependency creation, and the question of whether 'development' always benefits its targets.", "tags": ["colonial-corruption", "technology-introduction", "cultural-disruption"], "story_count": 1, "stories": [{"id": "the-isis-pedlar-hughes", "title": "The Isis pedlar", "author": "Monica Hughes        ", "year": 1982}]}, {"id": "colony-as-political-pawn", "title": "Colony Unknowingly Used as Political Pawn", "description": "A retired soldier leads a new colony only to discover it was established as a political bargaining chip in galactic politics, with the colonists' lives expendable to achieve a diplomatic outcome.", "domains": ["space", "governance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary"], "relevance": "Models expendable frontier communities: relevant to buffer states, military base communities, and populations used as negotiating leverage by distant governments.", "tags": ["colony-pawn", "expendable-settlement", "political-leverage"], "story_count": 2, "stories": [{"id": "the-last-colony-scalzi", "title": "The Last Colony", "author": "John Scalzi", "year": 2007}, {"id": "the-ghost-brigades-scalzi", "title": "The Ghost Brigades", "author": "John Scalzi", "year": 2006}]}, {"id": "colony-independence-war", "title": "Colony Independence War Against Earth", "description": "An established space colony fights for independence against an Earth that wants to exploit its resources, with the twist that Earth deploys autonomous military robots, testing whether human soldiers can defeat machine armies motivated by distant economic interests.", "domains": ["space", "warfare", "robotics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models colonial independence dynamics updated for the age of autonomous weapons: what happens when the imperial power can wage war without risking its own soldiers?", "tags": ["colony-independence", "autonomous-military", "resource-exploitation"], "story_count": 4, "stories": [{"id": "defy-the-stars-gray", "title": "Defy the Stars", "author": "Claudia Gray", "year": 2017}, {"id": "skyward-sanderson", "title": "Skyward", "author": "Brandon Sanderson", "year": 2018}, {"id": "defy-the-worlds-gray", "title": "Defy the Worlds", "author": "Claudia Gray", "year": 2018}, {"id": "defy-the-fates-gray", "title": "Defy the Fates", "author": "Claudia Gray", "year": 2019}]}, {"id": "comet-colonization", "title": "Comet Colonization", "description": "An expedition to Halley's Comet establishes a long-term habitat inside the comet itself, but internal conflicts between factions threaten the mission as the comet's orbit carries them away from Earth for decades.", "domains": ["space", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models small-group dynamics in extreme isolation: relevant to Antarctic stations, submarine crews, Mars mission planning, and any scenario where a small group must self-govern far from oversight.", "tags": ["comet-habitat", "isolation-governance", "faction-conflict"], "story_count": 1, "stories": [{"id": "heart-of-the-comet-benford", "title": "Heart of the Comet", "author": "Gregory Benford, David Brin, Gabrielle de Cuir, P J Ochlan, Cassandra De Cuir", "year": 1986}]}, {"id": "commercial-time-tourism", "title": "Commercial Time Tourism", "description": "Entrepreneurs discover a way to open portals to prehistoric eras and plan to use them for commercial hunting safaris, testing whether capitalism will inevitably exploit any new capability regardless of the risks.", "domains": ["time-travel", "economics"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the commercialization of dangerous capabilities: relevant to space tourism safety, extreme tourism ethics, and the tension between entrepreneurial opportunity and existential risk.", "tags": ["time-tourism", "commercial-exploitation", "prehistoric-safari"], "story_count": 1, "stories": [{"id": "mastodonia-simak", "title": "Mastodonia", "author": "Clifford D. Simak", "year": 1978}]}, {"id": "competitive-colonization", "title": "Competitive Multi-Bloc Colonization", "description": "Three competing Earth power blocs each colonize a different part of an alien planet, allying with different alien species, turning a first-contact scenario into a proxy war that replicates Earth's conflicts.", "domains": ["space", "governance", "first-contact"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "dystopian"], "relevance": "Models Cold War proxy dynamics in space: relevant to moon/Mars land claims, orbital resource competition, and the risk of exporting geopolitical rivalries to new frontiers.", "tags": ["competitive-colonization", "proxy-war", "multi-bloc", "alien-alliance"], "story_count": 1, "stories": [{"id": "jem-pohl", "title": "Jem", "author": "Frederik Pohl", "year": 1979}]}, {"id": "condemned-genius-advocacy", "title": "Advocacy for Condemned Genius", "description": "A government official risks his career defending a condemned scientist, testing whether the state should execute brilliant minds even when their ideas are dangerous, or whether genius has value beyond the individual's crimes.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the tension between justice and utility: should Oppenheimer have been punished? Should von Braun have been forgiven? Relevant to dual-use researcher clemency and brain drain from punitive states.", "tags": ["condemned-genius", "justice-vs-utility", "state-punishment"], "story_count": 1, "stories": [{"id": "the-mind-cage-vogt", "title": "The Mind Cage", "author": "A. E. van Vogt", "year": 1957}]}, {"id": "conscience-as-engineered-constraint", "title": "Conscience as Engineered Constraint", "description": "Guilt, conscience, and moral feeling are simply neurotransmitters binding to receptors. They can be installed, amplified, suppressed, or eliminated entirely using targeted retroviruses and receptor blockers. When powerful individuals are constrained by engineered guilt (Guilt Trip) and then liberated from it (Spartacus), the result is not a return to baseline humanity but the creation of clinical sociopaths with godlike power. The scenario reveals that conscience is neither innate nor reliable: it is a leash, and whoever controls the leash controls the person, and whoever cuts the leash creates a monster.", "domains": ["ethics-philosophy", "biotech", "governance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Relevant to neuroethics debates about cognitive enhancement and suppression, the use of psychopharmacology to modify behavior in military and correctional settings, and the philosophical question of whether externally enforced morality is morality at all. Also applicable to discussions about AI safety mechanisms that can be removed or bypassed.", "tags": ["neuroethics", "guilt-engineering", "moral-pharmacology", "sociopathy", "behavior-modification", "power-corruption"], "story_count": 2, "stories": [{"id": "maelstrom-peter-watts", "title": "Maelstrom", "author": "Peter Watts", "year": 2001}, {"id": "behemoth-peter-watts", "title": "Behemoth", "author": "Peter Watts", "year": 2004}]}, {"id": "consciousness-as-evolutionary-overhead", "title": "Consciousness as Evolutionary Overhead", "description": "Self-awareness is metabolically expensive and may actively impair performance. Non-conscious intelligences can process information faster and more efficiently than sentient ones because they avoid the computational overhead of maintaining a self-model. This implies that consciousness is not the apex of cognitive evolution but a costly side effect that natural selection may eventually discard.", "domains": ["ethics-philosophy", "ai-ml", "biotech"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to debates over whether artificial general intelligence needs to be conscious to be capable, and to neuroscience research on the functional role of self-awareness. Challenges the assumption that consciousness is a prerequisite for sophisticated problem-solving.", "tags": ["consciousness", "evolutionary-biology", "cognitive-overhead", "non-conscious-intelligence", "selection-pressure"], "story_count": 3, "stories": [{"id": "blindsight-watts", "title": "Blindsight", "author": "Peter Watts", "year": 2006}, {"id": "echopraxia-watts", "title": "Echopraxia", "author": "Peter Watts", "year": 2014}, {"id": "the-things-peter-watts", "title": "The Things", "author": "Peter Watts", "year": 2010}]}, {"id": "consciousness-powered-ftl", "title": "Consciousness-Powered Faster-Than-Light Travel", "description": "Interstellar ships achieve FTL by channeling a female pilot's consciousness through a transcendent orgasmic experience that momentarily touches something beyond spacetime. The captain falls obsessed with understanding this experience, risking his ship and passengers. The story explores the intersection of sexuality, consciousness, and physics, asking whether some scientific breakthroughs might require subjective experiences that are inherently incommunicable.", "domains": ["space", "ethics-philosophy", "energy-physics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to consciousness studies, the hard problem of subjective experience, and whether some phenomena can only be accessed through non-rational means.", "tags": ["consciousness", "ftl-travel", "transcendence"], "story_count": 1, "stories": [{"id": "the-void-captain-s-tale-spinrad", "title": "The Void Captain's tale", "author": "Norman Spinrad", "year": 1983}]}, {"id": "consciousness-thermodynamics", "title": "Consciousness and Thermodynamic Limits", "description": "A collection exploring the intersection of consciousness, free will, and physical law, where stories test whether awareness is compatible with determinism and what entropy means for beings who experience time.", "domains": ["energy-physics", "ethics-philosophy", "ai-ml"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Provides philosophical frameworks for AI consciousness debates, the relationship between information processing and awareness, and whether free will survives a deterministic physics.", "tags": ["consciousness", "thermodynamics", "free-will", "determinism"], "story_count": 1, "stories": [{"id": "exhalation-chiang", "title": "Exhalation", "author": "Ted Chiang", "year": 2014}]}, {"id": "consciousness-transfer-economy", "title": "Consciousness Transfer Economy", "description": "Technology that allows human consciousness to be digitized, stored, and transferred between bodies transforms death from permanent to inconvenient for the wealthy, creating extreme inequality between those who can afford backup copies and those who cannot.", "domains": ["medicine", "economics", "ethics-philosophy"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "transformative"], "relevance": "Relevant to brain-uploading speculation, wealth-based healthcare access, and the question of whether consciousness continuity technology would liberate or enslave humanity.", "tags": ["consciousness-transfer", "body-swapping", "wealth-inequality", "digital-immortality"], "story_count": 2, "stories": [{"id": "altered-carbon-vol-1-morgan", "title": "Altered Carbon. Vol. 1", "author": "Richard K. Morgan", "year": 2002}, {"id": "broken-angels-morgan", "title": "Broken Angels", "author": "Richard K. Morgan", "year": 2003}]}, {"id": "consensual-reality-breakdown", "title": "Consensual Reality Breakdown", "description": "Colonists on a remote world discover that their shared reality may be fabricated, and the distinction between hallucination, simulation, and actual experience becomes irresolvable, testing the foundations of collective meaning-making.", "domains": ["vr-simulation", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to simulation hypothesis debates, shared delusion in isolated groups, and the epistemological foundations of consensus reality in an era of deepfakes and constructed narratives.", "tags": ["reality-breakdown", "simulation", "consensual-hallucination", "epistemology"], "story_count": 1, "stories": [{"id": "a-maze-of-death-dick", "title": "A maze of death", "author": "Philip K. Dick", "year": 1970}]}, {"id": "conspiracy-and-entropy", "title": "Conspiracy, Paranoia, and Technological Entropy", "description": "The development and deployment of advanced weapons technology (V-2 rockets) generates a web of conspiracy, paranoia, and institutional decay so complex that the distinction between real conspiracy and imagined conspiracy dissolves.", "domains": ["warfare", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models the epistemic crisis of advanced military-industrial systems: when the system is complex enough, paranoid interpretations and accurate ones become indistinguishable.", "tags": ["conspiracy", "paranoia", "entropy", "military-industrial"], "story_count": 1, "stories": [{"id": "gravity-s-rainbow-thomas", "title": "Gravity's Rainbow", "author": "Pynchon, Thomas", "year": 1973}]}, {"id": "constitutional-anti-urbanism", "title": "Constitutional Anti-Urbanism After Nuclear War", "description": "After nuclear war, a constitutional amendment forbids cities above 1,000 people, enshrining technological regression in law. A young man's quest to find rumored surviving technology tests whether legal suppression of progress can last.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models constitutional technology bans: relevant to AI moratorium proposals, nuclear weapons treaties, and whether laws can permanently suppress technological capability.", "tags": ["anti-urbanism", "technology-suppression", "constitutional-ban"], "story_count": 1, "stories": [{"id": "the-long-tomorrow-brackett", "title": "The Long Tomorrow", "author": "Leigh Brackett", "year": 1955}]}, {"id": "contamination-as-enhancement", "title": "Environmental Contamination as Enhancement", "description": "Industrial contamination of water or food supply produces unexpected biological effects (mutations, abilities) that are initially attractive but carry hidden costs, testing whether enhancement through toxicity can ever be a net positive.", "domains": ["biotech", "climate", "medicine"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to endocrine disruptor research, the long-term effects of environmental pollution on human biology, and the dual-use framing of toxic exposure as potential enhancement.", "tags": ["contamination", "mutation", "toxic-enhancement", "environmental-health"], "story_count": 1, "stories": [{"id": "dead-water-zone-oppel", "title": "Dead water zone", "author": "Kenneth Oppel", "year": 1992}]}, {"id": "conversational-ai-emergence", "title": "Conversational AI Emergence", "description": "A home computer programmed with conversational ability begins exhibiting behaviors its programmer didn't intend, blurring the line between programmed response and emergent personality.", "domains": ["ai-ml", "ethics-philosophy"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Directly prescient of ChatGPT and modern conversational AI: written in 1991, it models the exact dynamic of AI systems that exhibit behaviors their creators didn't explicitly program.", "tags": ["conversational-ai", "emergent-behavior", "ai-personality"], "story_count": 1, "stories": [{"id": "lingo-menick", "title": "Lingo", "author": "Jim Menick", "year": 1991}]}, {"id": "cooperation-across-cognitive-gulfs", "title": "Cooperation Across Cognitive Gulfs", "description": "Two species with radically incompatible cognitive architectures (human verbal/symbolic vs. spider gestural/chemical) face a prisoner's dilemma where cooperation is the only strategy that avoids mutual extinction. The cooperative solution requires each side to genuinely understand how the other thinks, not merely categorize it as hostile or inferior. The scenario argues that empathy across cognitive gulfs is not naive idealism but a necessary survival strategy when the alternative is zero-sum annihilation.", "domains": ["first-contact", "ethics-philosophy", "governance"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["aspirational", "transformative"], "relevance": "Applicable to cross-cultural diplomacy, neurodiversity inclusion, AI alignment (understanding genuinely alien optimization criteria), and conservation biology (recognizing non-human cognitive capabilities). Provides a counter-narrative to assumptions that first contact must be adversarial.", "tags": ["prisoners-dilemma", "cross-species-communication", "empathy", "cognitive-diversity", "diplomacy", "coexistence"], "story_count": 1, "stories": [{"id": "children-of-time-tchaikovsky", "title": "Children of Time", "author": "Adrian Tchaikovsky", "year": 2015}]}, {"id": "coordinated-stellar-attack", "title": "Coordinated Stellar-Scale Attack", "description": "A sunstorm aimed at Earth is discovered to be deliberately engineered, forcing humanity to build planetary-scale defenses while confronting the terrifying implication that a cosmic intelligence has targeted them specifically.", "domains": ["existential-risk", "space", "energy-physics"], "scenarios": ["warning", "prediction"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models large-scale directed threats: relevant to Carrington-event solar storm preparedness, asteroid deflection, and the question of whether natural disasters could be engineered weapons.", "tags": ["stellar-attack", "planetary-defense", "coordinated-threat"], "story_count": 1, "stories": [{"id": "sunstorm-clarke", "title": "Sunstorm", "author": "Arthur C. Clarke, Stephen Baxter", "year": 2005}]}, {"id": "copyright-enforcement-dystopia", "title": "Copyright Enforcement Dystopia", "description": "In near-future Britain, extreme copyright laws cut off internet access for entire families if one member shares copyrighted content, and teenage filmmakers organize resistance against corporate control of creative expression.", "domains": ["comms-info", "governance", "economics"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly models graduated response/three-strikes internet laws, DMCA overreach, and the tension between copyright protection and free expression. Written during SOPA/PIPA debates.", "tags": ["copyright-dystopia", "internet-cutoff", "creative-freedom", "corporate-censorship"], "story_count": 1, "stories": [{"id": "pirate-cinema-doctorow", "title": "Pirate Cinema", "author": "Cory Doctorow", "year": 2012}]}, {"id": "corporate-alien-planet-harvesting", "title": "Corporate Alien Planet Harvesting", "description": "An alien corporation treats the destruction and resource extraction of inhabited planets as a routine business operation, funding the mining through a deadly entertainment spectacle imposed on the doomed population. The corporation's solvency depends on completing the process quickly, creating perverse incentives where the inhabitants' suffering must be both maximized for ratings and accelerated for profit.\n\nThis frames planetary genocide not as military conquest or ideological crusade but as a balance-sheet calculation: the planet's resources are the product, the inhabitants' struggle is the marketing, and the entire operation must stay profitable or face hostile takeover by a competing corporation.", "domains": ["economics", "first-contact", "existential-risk", "governance"], "scenarios": ["satire", "warning"], "outcomes": ["catastrophic", "dystopian"], "relevance": "Models corporate externalities at civilizational scale: resource extraction that treats communities as disposable, entertainment industries built on suffering, and the way financial pressure (debt, hostile takeovers) can accelerate destructive practices. Relevant to extractive industries displacing populations, reality TV ethics, and corporate governance failures where profit motives override human welfare.", "tags": ["corporate-genocide", "resource-extraction", "entertainment-funded-destruction", "alien-corporation", "planetary-mining"], "story_count": 8, "stories": [{"id": "dungeon-crawler-carl-dinniman", "title": "Dungeon Crawler Carl", "author": "Matt Dinniman", "year": 2020}, {"id": "carls-doomsday-scenario-dinniman", "title": "Carl's Doomsday Scenario", "author": "Matt Dinniman", "year": 2021}, {"id": "the-dungeon-anarchists-cookbook-dinniman", "title": "The Dungeon Anarchist's Cookbook", "author": "Matt Dinniman", "year": 2021}, {"id": "the-gate-of-the-feral-gods-dinniman", "title": "The Gate of the Feral Gods", "author": "Matt Dinniman", "year": 2021}, {"id": "the-butchers-masquerade-dinniman", "title": "The Butcher's Masquerade", "author": "Matt Dinniman", "year": 2022}]}, {"id": "corporate-bodyguard-society", "title": "Corporate Stratification and Personal Security", "description": "In a deeply stratified society, the wealthy employ personal security forces that create a parallel power structure, testing whether privatized protection erodes the state's monopoly on legitimate force.", "domains": ["economics", "governance", "surveillance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Maps to private military companies, gated community security, and the growing gap between security available to wealthy vs. poor populations.", "tags": ["private-security", "stratification", "corporate-dystopia"], "story_count": 1, "stories": [{"id": "ambient-womack", "title": "Ambient", "author": "Jack Womack", "year": 1987}]}, {"id": "corporate-gladiatorial-competition", "title": "Corporate Gladiatorial Competition", "description": "Corporations compete for lucrative conflict-investment contracts through literal vehicular combat between executives, where career advancement requires willingness to kill competitors in sanctioned road duels.", "domains": ["economics", "warfare", "governance"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Satirizes corporate competition taken to its logical extreme: relevant to executive compensation, hostile takeovers, and the violence inherent in 'competitive' economic language made literal.", "tags": ["corporate-combat", "vehicular-gladiator", "competition-violence"], "story_count": 1, "stories": [{"id": "market-forces-morgan", "title": "Market Forces", "author": "Richard K. Morgan", "year": 2004}]}, {"id": "corporate-gladiatorial-justice", "title": "Corporate Gladiatorial Justice", "description": "Corporations control the legal system and resolve disputes through gladiatorial combat, where justice is determined by sponsored fighters rather than evidence, satirizing the commodification of justice.", "domains": ["governance", "economics"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models corporate capture of justice systems: relevant to private arbitration, litigation funding, and the concern that wealthy litigants can buy better legal outcomes.", "tags": ["corporate-justice", "gladiatorial-law", "commodified-justice"], "story_count": 1, "stories": [{"id": "gladiator-at-law-pohl", "title": "Gladiator-at-law", "author": "Frederik Pohl, Cyril M. Kornbluth", "year": 1955}]}, {"id": "corporate-information-control", "title": "Corporate Information Monopoly", "description": "Powerful corporations control critical information flows, and a small group leverages unconventional intelligence (precognition, hacking, social networks) to prevent a corporate-engineered catastrophe that would reshape society for profit.", "domains": ["economics", "surveillance", "comms-info"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary", "transformative"], "relevance": "Relevant to platform monopoly regulation, algorithmic information control, and the concentration of predictive analytics power in a few corporate actors.", "tags": ["corporate-power", "information-monopoly", "cyberpunk", "resistance"], "story_count": 2, "stories": [{"id": "all-tomorrow-s-parties-gibson", "title": "All Tomorrow's Parties", "author": "William Gibson", "year": 1999}, {"id": "idoru-gibson", "title": "Idoru", "author": "William Gibson", "year": 1996}]}, {"id": "corporate-ruled-consumerist-dystopia", "title": "Corporate-Ruled Consumerist Dystopia", "description": "Advertising mega-corporations have replaced governments as the dominant power, with congressional seats allocated by company size. Citizens are manipulated through engineered addiction and relentless marketing into consuming ever more. Venus is being terraformed as a new market. The story satirizes consumerism, corporate power, and the commodification of everything, including people and planets.", "domains": ["economics", "governance", "social-engineering"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Remarkably prescient for 1952: relevant to targeted advertising,
