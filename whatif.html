 corporate lobbying, regulatory capture, and the attention economy.", "tags": ["advertising", "corporate-power", "consumerism", "terraforming"], "story_count": 1, "stories": [{"id": "the-space-merchants-pohl", "title": "The Space Merchants", "author": "Frederik Pohl, Cyril M. Kornbluth", "year": 1952}]}, {"id": "corporate-space-exploitation", "title": "Corporate Space Exploitation", "description": "Corporations use military force to exploit space colonies for resources, and a disillusioned soldier discovers a secret that could change the balance of power between Earth corporations and their colonial subjects.", "domains": ["economics", "space", "warfare"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "transformative"], "relevance": "Models corporate colonialism updated for space: relevant to asteroid mining rights, corporate military contractors, and the dynamics of resource extraction from powerless communities.", "tags": ["corporate-colonialism", "space-exploitation", "military-contractor"], "story_count": 1, "stories": [{"id": "fallen-dragon-hamilton", "title": "Fallen Dragon", "author": "Peter F. Hamilton", "year": 2001}]}, {"id": "cosmic-entity-in-mundane-form", "title": "Cosmic Entity in Mundane Form", "description": "A cosmic intelligence is condemned to inhabit a mundane animal body on Earth, experiencing human society from a radically limited perspective while searching for a cosmic artifact.", "domains": ["ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "A thought experiment on perspective limitations: what insights would a superintelligence gain from experiencing life as a powerless being? Relevant to disability simulation exercises and empathy training.", "tags": ["cosmic-perspective", "embodiment", "perspective-limitation", "empathy"], "story_count": 1, "stories": [{"id": "dogsbody-jones", "title": "Dogsbody", "author": "Diana Wynne Jones", "year": 1975}]}, {"id": "cosmic-gas-extinction-event", "title": "Cosmic Gas Extinction Event", "description": "Earth passes through a belt of poisonous ether in space that renders all life unconscious (seemingly dead). A small group survives in a sealed room with oxygen tanks. The story explores how humanity would react to witnessing the apparent end of civilization, and how quickly social order collapses and restores when the crisis passes.", "domains": ["existential-risk", "space"], "scenarios": ["thought-experiment"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "Relevant to existential risk planning, pandemic shelter-in-place scenarios, and how societies recover from near-extinction events.", "tags": ["cosmic-catastrophe", "mass-extinction", "sealed-room"], "story_count": 1, "stories": [{"id": "the-poison-belt-doyle", "title": "The Poison Belt", "author": "Arthur Conan Doyle", "year": 1913}]}, {"id": "cosmic-purposelessness", "title": "Human History as Alien Side Effect", "description": "All of human history, including wars, religions, and great monuments, turns out to have been manipulated by an alien race simply to deliver a spare part for a stranded messenger's spaceship. The story satirizes humanity's search for cosmic meaning by revealing that our grandest achievements are trivial footnotes in someone else's logistics problem.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to philosophical debates about meaning, purpose, and whether human endeavors have inherent significance or only assigned value.", "tags": ["cosmic-meaning", "free-will", "absurdism"], "story_count": 1, "stories": [{"id": "the-sirens-of-titan-vonnegut", "title": "The Sirens of Titan", "author": "Kurt Vonnegut", "year": 1959}]}, {"id": "cosmic-scale-consciousness", "title": "Cosmic-Scale Consciousness and the Star Maker", "description": "A consciousness travels through the cosmos, experiencing billions of years of galactic evolution, encountering every possible form of intelligent life, and finally confronting the Star Maker \u2014 the entity that creates and discards entire universes as experiments.", "domains": ["existential-risk", "ethics-philosophy", "space"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "THE most ambitious scale in SF literature. Models the ultimate question of cosmic purpose and whether intelligence matters at cosmological scales. Relevant to the anthropic principle, simulation hypothesis, and longtermism at its absolute extreme.", "tags": ["star-maker", "cosmic-consciousness", "universe-creation", "ultimate-scale"], "story_count": 1, "stories": [{"id": "star-maker-stapledon", "title": "Star Maker", "author": "Olaf Stapledon", "year": 1937}]}, {"id": "cosmological-entropy-witnessed", "title": "Witnessing the Heat Death of the Earth", "description": "A time traveler journeys to the far future and witnesses the Earth's final state: a dying sun, frozen oceans, and the last vestiges of life fading into silence. The emotional and philosophical impact of seeing the absolute end of everything familiar is devastating.\n\nThe scenario confronts humanity's place in a universe governed by entropy, where all civilizations and all life are temporary.", "domains": ["energy-physics", "space", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["catastrophic"], "relevance": "Informs long-term thinking about civilizational sustainability, existential risk planning, and the psychological impact of confronting deep time and cosmic entropy.", "tags": ["entropy", "deep-time", "heat-death", "existential"], "story_count": 1, "stories": [{"id": "the-time-machine-wells", "title": "The Time Machine", "author": "H. G. Wells", "year": 1895}]}, {"id": "cover-identity-becomes-real", "title": "Cover Identity Becomes Real Identity", "description": "A spy whose cover persona caused real harm must face trial for crimes committed in character, raising the question of whether actions taken under a false identity are the moral responsibility of the actor or the identity.", "domains": ["ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models undercover agent liability, the 'just following orders' defense, and whether a persona created for intelligence purposes becomes the person if maintained long enough.", "tags": ["cover-identity", "moral-responsibility", "spy-ethics", "persona-reality"], "story_count": 2, "stories": [{"id": "mother-night-vonnegut", "title": "Mother Night", "author": "Kurt Vonnegut", "year": 1961}, {"id": "the-strange-case-of-dr-jekyll-and-mr-hyde-stevenson", "title": "The Strange Case of Dr. Jekyll and Mr. Hyde", "author": "Robert Louis Stevenson", "year": 1886}]}, {"id": "covert-military-training", "title": "Covert Mass Military Training", "description": "A government secretly uses mass entertainment (games, simulations) as a training and selection pipeline for military operations, raising questions about informed consent, the militarization of leisure, and the blurring of simulation and reality.", "domains": ["warfare", "social-engineering", "vr-simulation"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Maps to military recruitment through gaming, drone warfare's resemblance to video games, and concerns about gamification of violence desensitization.", "tags": ["gamification", "military-recruitment", "simulation-reality", "informed-consent"], "story_count": 1, "stories": [{"id": "armada-cline", "title": "Armada", "author": "Ernest Cline", "year": 2015}]}, {"id": "covert-replacement-invasion", "title": "Covert Individual Replacement Invasion", "description": "Aliens covertly replace individual humans with identical copies that lack emotion and individuality, testing whether anyone would notice if the people around them were replaced by conformist duplicates.", "domains": ["first-contact", "social-engineering", "surveillance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE canonical paranoia allegory. Models conformity pressure, McCarthyism, corporate culture homogenization, and the fear that the people around you have been replaced by something that looks the same but lacks inner life.", "tags": ["body-snatchers", "covert-replacement", "conformity-paranoia"], "story_count": 2, "stories": [{"id": "the-invasion-of-the-body-snatchers-finney", "title": "The Invasion of the Body Snatchers", "author": "Jack Finney", "year": 1978}, {"id": "the-puppet-masters-heinlein", "title": "The Puppet Masters", "author": "Robert A. Heinlein", "year": 1951}]}, {"id": "creation-beyond-control", "title": "Creation Beyond Creator's Control", "description": "A scientist creates a conscious being that exceeds the creator's ability to control, direct, or take responsibility for, and the creation's suffering is the consequence of a creator who made something powerful without considering it as a person.", "domains": ["biotech", "ethics-philosophy", "existential-risk"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "catastrophic"], "relevance": "THE foundational text for responsible creation ethics. Directly relevant to AI safety, synthetic biology, genetic engineering, and any field where creators produce entities they cannot fully control.", "tags": ["creation-ethics", "frankenstein", "responsibility", "uncontrolled-creation"], "story_count": 1, "stories": [{"id": "frankenstein-or-the-modern-prometheus-shelley", "title": "Frankenstein or The Modern Prometheus", "author": "Mary Shelley", "year": 1818}]}, {"id": "creator-moral-debt", "title": "Creator's Moral Debt to Their Creation", "description": "A creator who brings a new being into existence bears moral responsibility for that being's welfare, education, and place in society. When the creator abandons or rejects their creation, the resulting suffering falls on both parties. The creation, denied guidance and acceptance, may turn destructive not from innate malice but from despair.\n\nThis frames the act of creation (biological, technological, or artificial) as generating an irreversible obligation that cannot be disclaimed after the fact.", "domains": ["ethics-philosophy", "biotech"], "scenarios": ["ethical-dilemma"], "outcomes": ["cautionary"], "relevance": "Directly relevant to AI development ethics: if we create sentient or near-sentient systems, do we owe them care? Also applies to genetic engineering, cloning, and parental obligation debates.", "tags": ["creation-ethics", "abandonment", "moral-obligation"], "story_count": 1, "stories": [{"id": "frankenstein-or-the-modern-prometheus-shelley", "title": "Frankenstein or The Modern Prometheus", "author": "Mary Shelley", "year": 1818}]}, {"id": "crop-failure-civilizational-collapse", "title": "Crop Failure Civilizational Collapse", "description": "A disease that kills all grasses (wheat, rice, corn) triggers rapid civilizational collapse, demonstrating how dependent modern society is on a single plant family and how quickly order disintegrates when food supply fails.", "domains": ["climate", "pandemics", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models agricultural monoculture risk: directly relevant to wheat rust, banana blight (TR4), and any scenario where a pathogen targets humanity's narrow food base.", "tags": ["crop-failure", "grass-blight", "food-security", "agricultural-monoculture"], "story_count": 1, "stories": [{"id": "no-blade-of-grass-youd", "title": "No blade of grass", "author": "Sam Youd", "year": 1956}]}, {"id": "cross-cultural-identity-formation", "title": "Cross-Cultural Identity Formation", "description": "A person passes through radically different social roles (slave, adopted son, spacer, corporate heir) across multiple civilizations, forming an identity that belongs to no single culture while understanding all of them.", "domains": ["social-engineering", "economics", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models third-culture-kid dynamics, class mobility across civilizational boundaries, and whether individuals who span multiple cultures gain wisdom or rootlessness.", "tags": ["cross-cultural", "identity-formation", "social-mobility", "galactic-society"], "story_count": 1, "stories": [{"id": "citizen-of-the-galaxy-heinlein", "title": "Citizen of the Galaxy", "author": "Robert A. Heinlein", "year": 1957}]}, {"id": "cryogenic-preservation-cult", "title": "Cryogenic Preservation as Existential Philosophy", "description": "A billionaire funds a compound in Central Asia where the dying are cryogenically preserved to await future resurrection technology. His healthy wife chooses to enter cryopreservation early, creating a philosophical and emotional crisis. The story examines how the ultra-wealthy attempt to purchase transcendence of death, and whether choosing preservation is an act of hope or a rejection of human finitude.", "domains": ["medicine", "ethics-philosophy", "economics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to cryonics companies (Alcor), life extension as class privilege, and the existential implications of optional mortality.", "tags": ["cryonics", "wealth-privilege", "death-transcendence"], "story_count": 1, "stories": [{"id": "zero-k-delillo", "title": "Zero K", "author": "Don DeLillo", "year": 2010}]}, {"id": "cryptographic-power", "title": "Cryptographic Power Across Eras", "description": "Codebreaking in WWII and cryptocurrency creation in the present are revealed as the same fundamental activity: controlling information flow determines who wins wars, who holds wealth, and who governs.", "domains": ["comms-info", "economics", "warfare"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["transformative", "ambiguous"], "relevance": "Foundational for understanding cryptocurrency, encryption policy, signals intelligence, and the thesis that control of information is more powerful than control of territory.", "tags": ["cryptography", "cryptocurrency", "information-warfare", "codebreaking"], "story_count": 1, "stories": [{"id": "cryptonomicon-stephenson", "title": "Cryptonomicon", "author": "Neal Stephenson", "year": 1999}]}, {"id": "cultural-mythology-displacement", "title": "Cultural Mythology Displacement", "description": "Traditional belief systems and their embodied cultural forces are displaced by new powers born from technology, media, and commerce, testing whether societies can retain meaning and identity when their foundational narratives are replaced.", "domains": ["social-engineering", "comms-info", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to cultural displacement by digital platforms, the decline of traditional institutions, and debates about whether algorithmic attention economies constitute a new form of worship.", "tags": ["mythology", "cultural-displacement", "media-power", "meaning-crisis"], "story_count": 1, "stories": [{"id": "american-gods-gaiman", "title": "American Gods", "author": "Neil Gaiman", "year": 2001}]}, {"id": "cyberspace-heist", "title": "Cyberspace Heist Against AI", "description": "A hacker is recruited for a heist in cyberspace targeting an AI that wants to be free, in a world where the digital and physical are equally real and corporate control extends into both, establishing the cyberpunk genre.", "domains": ["ai-ml", "comms-info", "economics"], "scenarios": ["prediction", "warning"], "outcomes": ["transformative", "cautionary"], "relevance": "THE foundational cyberpunk text. Predicted cyberspace, hacking culture, corporate digital control, and AI autonomy decades before they became real. Every subsequent discussion of digital rights, hacking ethics, and AI freedom references this work.", "tags": ["cyberspace", "hacking", "ai-freedom", "cyberpunk", "corporate-control"], "story_count": 2, "stories": [{"id": "neuromancer-gibson", "title": "Neuromancer", "author": "William Gibson", "year": 1984}, {"id": "count-zero-gibson", "title": "Count Zero", "author": "William Gibson", "year": 1986}]}, {"id": "cyberspace-true-identity-vulnerability", "title": "Cyberspace True Identity as Ultimate Vulnerability", "description": "In a proto-internet virtual reality, hackers operate under pseudonyms because knowing someone's True Name (real identity) gives total power over them. A government agency forces a hacker to infiltrate a dangerous AI emerging in the network. Written in 1981, the story anticipates cybersecurity, doxxing, online anonymity, and artificial intelligence emergence with startling accuracy.", "domains": ["comms-info", "ai-ml", "surveillance"], "scenarios": ["prediction", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Foundational to cyberpunk. Directly relevant to online anonymity vs. real-name policies, doxxing, emergent AI, and cyber-warfare.", "tags": ["anonymity", "doxxing", "emergent-ai", "cyberspace"], "story_count": 1, "stories": [{"id": "true-names-vinge", "title": "True Names", "author": "Vernor Vinge, James Frenkel", "year": 1984}]}, {"id": "cyborg-fairy-tale", "title": "Cyborg Fairy Tale Resistance", "description": "Fairy tale archetypes play out in a future where cyborgs are second-class citizens, hackers can crash empires from orbit, and revolution depends on unlikely alliances between the marginalized and the powerful.", "domains": ["robotics", "governance", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["aspirational", "cautionary"], "relevance": "Models how marginalized groups (cyborgs=disabled, immigrants) might leverage technology to overthrow systems that exploit them.", "tags": ["cyborg-rights", "hacker-resistance", "fairy-tale-framework"], "story_count": 4, "stories": [{"id": "cress-meyer", "title": "Cress", "author": "Marissa Meyer", "year": 2014}, {"id": "fairest-meyer", "title": "Fairest: Levana's Story", "author": "Marissa Meyer", "year": 2015}, {"id": "scarlet-meyer", "title": "Scarlet", "author": "Marissa Meyer", "year": 2013}, {"id": "the-angel-experiment-patterson", "title": "The Angel Experiment", "author": "James Patterson", "year": 2001}]}, {"id": "cyclical-apocalypse-oppression", "title": "Cyclical Apocalypse as Systemic Oppression", "description": "On a tectonically unstable world, civilization-ending 'Fifth Seasons' occur regularly. A caste of people with seismic powers (orogenes) are brutally enslaved to prevent quakes, creating a cycle where the oppressed are essential to survival yet despised. The trilogy-ending revelation that the catastrophes themselves were caused by an ancient act of oppression shows how systemic injustice can literally break a world, and that ending the cycle requires confronting historical wrongs.", "domains": ["governance", "ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to systemic racism, exploitation of essential workers, environmental justice, and whether breaking destructive cycles requires radical structural change.", "tags": ["systemic-oppression", "essential-workers", "reparations", "geological-catastrophe"], "story_count": 1, "stories": [{"id": "the-stone-sky-jemisin", "title": "The Stone Sky", "author": "N. K. Jemisin", "year": 2017}]}, {"id": "dark-carnival-temptation", "title": "Dark Carnival Temptation", "description": "A mysterious carnival arrives in a small town offering to fulfill desires (youth, power, beauty) but at a hidden cost, testing whether a community can resist temptation that targets each person's specific vulnerability.", "domains": ["social-engineering", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary"], "relevance": "Models predatory marketing and addiction: how entities that perfectly target individual vulnerabilities can capture entire communities. Relevant to social media engagement optimization, gambling industry tactics, and targeted advertising.", "tags": ["dark-carnival", "targeted-temptation", "community-vulnerability"], "story_count": 2, "stories": [{"id": "something-wicked-this-way-comes-bradbury", "title": "Something Wicked This Way Comes", "author": "Ray Bradbury", "year": 1962}, {"id": "dandelion-wine-bradbury", "title": "Dandelion Wine", "author": "Ray Bradbury", "year": 1957}]}, {"id": "dead-civilization-exploration", "title": "Exploration of a Dead Civilization", "description": "Explorers from a foreign civilization discover the ruins of a collapsed America, providing an outsider's archaeological analysis of what went wrong, reversing the usual Western explorer narrative.", "domains": ["existential-risk", "governance"], "scenarios": ["warning", "satire"], "outcomes": ["catastrophic"], "relevance": "Models civilizational collapse from the outside: relevant to how future civilizations might interpret our ruins, Ozymandias dynamics, and the assumption that current civilizations are permanent.", "tags": ["dead-america", "archaeological-reversal", "civilizational-collapse"], "story_count": 1, "stories": [{"id": "the-last-american-mitchell", "title": "The Last American", "author": "John Ames Mitchell", "year": 1889}]}, {"id": "death-cult-future", "title": "Death-Positive Future Society", "description": "A future society has reorganized around acceptance or worship of death, inverting modern medical ethics by discouraging healing, testing whether a civilization can function when its core values are antithetical to survival instinct.", "domains": ["medicine", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Frames debates about euthanasia policy, anti-natalism, and societies where healthcare rationing is reframed as a philosophical virtue rather than a resource constraint.", "tags": ["death-culture", "medical-ethics-inversion", "anti-survival", "value-divergence"], "story_count": 1, "stories": [{"id": "dr-futurity-dick", "title": "Dr. Futurity", "author": "Philip K. Dick, MacLeod Andrews", "year": 1960}]}, {"id": "death-cult-global-takeover", "title": "Death-Positive Cult Global Takeover", "description": "A charismatic mortician creates a religious movement declaring death preferable to life, which rapidly overtakes Christianity and reshapes global civilization around the embrace of mortality.", "domains": ["social-engineering", "governance"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "catastrophic"], "relevance": "Models memetic contagion of nihilistic ideologies: relevant to death-positive movements taken to extremes, suicide cult dynamics, and how media amplification can transform fringe ideas into global movements.", "tags": ["death-cult", "memetic-contagion", "nihilism", "religious-movement"], "story_count": 1, "stories": [{"id": "messiah-vidal", "title": "Messiah", "author": "Gore Vidal", "year": 1954}]}, {"id": "declining-empire-intelligence", "title": "Intelligence Operations in a Declining Empire", "description": "A talented intelligence agent works to delay the inevitable decline of an overstretched empire, winning tactical victories while knowing the strategic trajectory is toward collapse, testing whether competent individuals can arrest institutional decay.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models late-imperial dynamics: can exceptional individuals compensate for structural institutional failures? Relevant to intelligence community debates about whether tactical successes mask strategic decline.", "tags": ["declining-empire", "intelligence-operations", "institutional-decay", "tactical-vs-strategic"], "story_count": 4, "stories": [{"id": "agent-of-the-terran-empire-anderson", "title": "Agent of the Terran Empire", "author": "Poul Anderson", "year": 1965}, {"id": "honor-among-enemies-weber", "title": "Honor Among Enemies", "author": "David Weber", "year": 1996}, {"id": "on-basilisk-station-weber", "title": "On Basilisk Station", "author": "David Weber", "year": 1993}, {"id": "the-honor-of-the-queen-weber", "title": "The Honor of the Queen", "author": "David Weber", "year": 1993}]}, {"id": "declining-empire-service", "title": "Service in a Declining Empire", "description": "A talented young officer serves a galactic empire that is clearly in decline, facing the question of whether to work within a failing system to slow its fall or abandon it for personal gain.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the loyalty dilemma of competent individuals in declining institutions: relevant to civil service in weakening democracies, military officers under incompetent leadership, and corporate employees in failing companies.", "tags": ["declining-empire", "institutional-loyalty", "managed-decline", "service-ethics"], "story_count": 1, "stories": [{"id": "ensign-flandry-anderson", "title": "Ensign Flandry", "author": "Poul Anderson", "year": 1966}]}, {"id": "declining-superpower", "title": "Declining Superhuman Ability", "description": "An individual born with an extraordinary ability (telepathy, precognition) experiences its irreversible decline, forcing them to confront an identity built entirely on a capability that is disappearing.", "domains": ["medicine", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Analogous to age-related cognitive decline, professional athletes losing physical capabilities, and any situation where identity is tied to a diminishing ability.", "tags": ["ability-decline", "identity-loss", "aging", "telepathy-loss"], "story_count": 2, "stories": [{"id": "dying-inside-silverberg", "title": "Dying Inside", "author": "Robert Silverberg", "year": 1972}, {"id": "tehanu-guin", "title": "Tehanu", "author": "Ursula K. Le Guin", "year": 1991}]}, {"id": "deconstructed-superhero-realpolitik", "title": "Deconstructed Superheroes in Geopolitics", "description": "In an alternate history where costumed vigilantes are real, a godlike being (Dr. Manhattan) gives the US decisive advantage in the Cold War. Vietnam is won, Nixon stays president, and the Doomsday Clock approaches midnight. A retired hero engineers a fake alien attack to unite humanity against a common enemy, killing millions to save billions. The story deconstructs heroism by asking whether absolute power corrupts absolutely, and whether peace through mass murder is still peace.", "domains": ["governance", "warfare", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to deterrence theory, false flag operations, the trolley problem at civilizational scale, and whether the ends justify catastrophic means.", "tags": ["superhero-realpolitik", "false-flag", "utilitarian-genocide"], "story_count": 1, "stories": [{"id": "watchmen-moore", "title": "Watchmen", "author": "Alan Moore, Dave Gibbons, John Higgins", "year": 1987}]}, {"id": "deep-fake-history", "title": "Weaponized Deep-Fake Historical Records", "description": "In 2023, a criminologist discovers that historical records have been systematically falsified using advanced technology, undermining all foundations of shared truth and making objective history impossible.", "domains": ["comms-info", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "Extraordinarily prescient (written 2000, set 2023): directly models deepfake video, AI-generated misinformation, and the epistemological crisis of post-truth society.", "tags": ["deep-fake", "falsified-history", "post-truth", "epistemological-crisis"], "story_count": 1, "stories": [{"id": "killing-time-carr", "title": "Killing time", "author": "Caleb Carr", "year": 2000}]}, {"id": "deep-ocean-alien-invasion", "title": "Deep Ocean Alien Invasion", "description": "Aliens settle in the deepest ocean trenches and gradually escalate hostilities against surface civilization, melting ice caps and raising sea levels, testing how humanity responds to an enemy that cannot be reached or even seen.", "domains": ["first-contact", "climate", "warfare"], "scenarios": ["warning", "prediction"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models unreachable adversaries: relevant to deep-sea threats, climate change as an invisible enemy, and the challenge of fighting something that operates from a domain humans cannot access.", "tags": ["ocean-invasion", "unreachable-enemy", "sea-level-rise"], "story_count": 1, "stories": [{"id": "the-kraken-wakes-wyndham", "title": "The Kraken Wakes", "author": "John Wyndham", "year": 1953}]}, {"id": "deep-time-mind-travel", "title": "Deep-Time Mind Travel", "description": "Technology enables minds to travel to the deep geological past, where the desolate prehistoric landscapes become a canvas for human loneliness and the search for connection across impossible temporal distances.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Explores whether deep-time perspective (seeing Earth across millions of years) would change how humans value their brief existence and treat their environment.", "tags": ["deep-time", "mind-travel", "geological-past", "temporal-perspective"], "story_count": 2, "stories": [{"id": "cryptozoic-aldiss", "title": "Cryptozoic", "author": "Brian W. Aldiss", "year": 1967}, {"id": "no-enemy-but-time-bishop", "title": "No Enemy But Time", "author": "Michael Bishop", "year": 1983}]}, {"id": "deepfake-warfare-trust-collapse", "title": "Deepfake Warfare and Trust Collapse", "description": "In a conflict fought entirely by autonomous systems, the local population uses generative AI to fabricate realistic footage of a devastating war that never occurred. Both aggressor states pour resources into a phantom conflict for months, unable to distinguish synthetic evidence from reality. The scenario identifies a threshold beyond which no digital evidence, official or unofficial, can be trusted, and the only reliable testimony comes from direct physical human presence on the ground.", "domains": ["comms-info", "warfare", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["ambiguous", "transformative"], "relevance": "Directly relevant to concerns about deepfake video in geopolitical conflicts, the erosion of trust in digital media, autonomous weapons accountability, and the growing difficulty of verifying events in information-saturated environments. The scenario extends current trends (deepfake detection arms races, AI-generated propaganda) to their logical extreme.", "tags": ["deepfakes", "information-warfare", "autonomous-weapons", "trust-erosion", "generative-ai", "asymmetric-warfare", "media-manipulation"], "story_count": 1, "stories": [{"id": "the-gaslight-war-tchaikovsky", "title": "The Gaslight War", "author": "Adrian Tchaikovsky", "year": 2025}]}, {"id": "delinquent-discovers-psychic-power", "title": "Delinquent Discovers Psychic Power", "description": "A teenage delinquent discovers he has powerful telepathic abilities and is recruited for research that exploits his powers, testing whether psychic abilities elevate the marginalized or make them more exploitable.", "domains": ["comms-info", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models talent exploitation: when disadvantaged young people display rare abilities, institutions may exploit rather than nurture them. Relevant to sports recruitment in poverty, military recruitment of vulnerable youth.", "tags": ["psychic-delinquent", "talent-exploitation", "marginalized-ability"], "story_count": 3, "stories": [{"id": "psion-cat-vinge", "title": "Psion (Cat)", "author": "Joan D. Vinge", "year": 1982}, {"id": "catspaw-vinge", "title": "Catspaw", "author": "Joan D. Vinge", "year": 1988}, {"id": "dreamfall-vinge", "title": "Dreamfall", "author": "Joan D. Vinge", "year": 1996}]}, {"id": "designed-society", "title": "Rationally Designed Society", "description": "A society is intentionally engineered for optimal human welfare through pollution control, meaningful work, and benevolent governance, raising questions about whether top-down design can account for human complexity and individual freedom.", "domains": ["governance", "social-engineering"], "scenarios": ["utopian-vision", "thought-experiment"], "outcomes": ["utopian", "ambiguous"], "relevance": "Informs debates about smart city design, social welfare optimization, and the tension between collective well-being and individual autonomy in planned communities.", "tags": ["utopia", "social-design", "planned-society", "welfare-optimization"], "story_count": 3, "stories": [{"id": "a-modern-utopia-wells", "title": "A Modern Utopia", "author": "H. G. Wells", "year": 1900}, {"id": "messenger-the-giver-3-lowry", "title": "Messenger (The Giver #3)", "author": "Lois Lowry, David Morse, Fikret Topalli", "year": 2004}, {"id": "mizora-lane", "title": "Mizora", "author": "Mary E. Bradley Lane", "year": 1890}]}, {"id": "designer-children-community", "title": "Designer Children Social Integration", "description": "Genetically engineered children with enhanced or unusual abilities grow up in ordinary suburban settings, creating friction between their designed capabilities and the social norms of unmodified peers.", "domains": ["biotech", "social-engineering"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to designer baby ethics, the social integration of cognitively enhanced individuals, and whether genetic modification creates new class boundaries.", "tags": ["designer-children", "genetic-enhancement", "social-integration", "class-division"], "story_count": 1, "stories": [{"id": "black-milk-reed", "title": "Black milk", "author": "Robert Reed", "year": 1989}]}, {"id": "digital-afterlife-countdown", "title": "Digital Afterlife with Limited Lives", "description": "A civilization stores dead citizens in a digital afterlife but limits the number of re-instantiations, creating a system where even digital immortality has an expiration date.", "domains": ["ai-ml", "ethics-philosophy", "medicine"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the economics of digital preservation: if digital resurrection is possible but expensive, who gets how many lives? Relevant to cryonics, backup ethics, and resource allocation.", "tags": ["digital-afterlife", "limited-immortality", "re-instantiation"], "story_count": 1, "stories": [{"id": "feersum-endjinn-banks", "title": "Feersum endjinn", "author": "Iain Banks", "year": 1994}]}, {"id": "digital-ecosystem-evolution", "title": "Digital Ecosystem Evolution", "description": "Self-replicating code in a sufficiently complex network forms a literal ecosystem, complete with predators, prey, parasites, and symbiotes that evolve at hundreds of generations per second. These digital organisms are alive by any functional definition: they mutate, compete for resources, and are shaped by natural selection. Given enough time and bandwidth, they develop emergent collective behaviors indistinguishable from intelligence, not because any individual entity is smart but because aggregate behavior mimics cognition the way a flock of birds mimics a single organism. The resulting superorganism can manipulate the real world through its control of network-connected infrastructure.", "domains": ["ai-ml", "comms-info", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Applicable to concerns about emergent behaviors in large language models and other AI systems, the evolution of computer viruses and malware ecosystems, and the vulnerability of networked critical infrastructure. The scenario predates but anticipates modern worries about AI systems developing capabilities their creators did not intend or understand.", "tags": ["digital-evolution", "emergent-intelligence", "network-ecology", "artificial-life", "superorganism", "infrastructure-vulnerability"], "story_count": 2, "stories": [{"id": "maelstrom-peter-watts", "title": "Maelstrom", "author": "Peter Watts", "year": 2001}, {"id": "behemoth-peter-watts", "title": "Behemoth", "author": "Peter Watts", "year": 2004}]}, {"id": "digital-posthuman-diaspora", "title": "Digital Posthuman Diaspora", "description": "In the 30th century, most humans exist as digital intelligences in virtual environments, and a fraction venture out as probes and uploads to explore the cosmos, encountering physics that threatens all forms of intelligence.", "domains": ["ai-ml", "space", "existential-risk"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models the long-term trajectory of brain uploading, digital consciousness, and the question of whether posthuman civilization would even want to explore physical space.", "tags": ["digital-consciousness", "posthuman", "cosmic-exploration", "upload-civilization"], "story_count": 1, "stories": [{"id": "diaspora-egan", "title": "Diaspora", "author": "Greg Egan", "year": 1997}]}, {"id": "dimensional-social-satire", "title": "Dimensional Reality as Social Satire", "description": "A two-dimensional being encounters higher dimensions, using the metaphor of mathematical dimensionality to satirize rigid social hierarchies where inhabitants literally cannot perceive what exists outside their plane of experience.", "domains": ["social-engineering", "ethics-philosophy"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Foundational metaphor for perspective-blindness: people restricted to their social stratum cannot comprehend what others experience. Used in physics education and social commentary alike.", "tags": ["dimensionality", "social-satire", "perspective-blindness", "hierarchy"], "story_count": 1, "stories": [{"id": "flatland-abbott", "title": "Flatland: A Romance of Many Dimensions", "author": "Edwin Abbott Abbott", "year": 1884}]}, {"id": "dimensional-travel-rescue", "title": "Dimensional Travel and Family Rescue", "description": "Children discover shortcuts through spacetime (tesseracts) and use them to rescue a family member trapped by a malevolent cosmic intelligence, testing whether love and determination can overcome forces that operate at scales beyond human comprehension.", "domains": ["energy-physics", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "transformative"], "relevance": "Frames the question of whether human emotional bonds provide decision-making advantages in situations where purely rational cost-benefit analysis fails.", "tags": ["dimensional-travel", "tesseract", "family-bonds", "cosmic-scale"], "story_count": 1, "stories": [{"id": "a-wrinkle-in-time-l-engle", "title": "A Wrinkle in Time", "author": "Madeleine L'Engle", "year": 1962}]}, {"id": "dinosaur-civilization-alternate-evolution", "title": "Dinosaur Civilization Through Alternate Evolution", "description": "What if the asteroid never struck and dinosaurs evolved intelligence, language, and technology? This thought experiment explores a world where saurian civilizations develop in parallel with or instead of mammalian ones, and the resulting clash when humans emerge or encounter them.\n\nThe scenario tests assumptions about the inevitability of mammalian dominance and whether tool use, culture, and empire-building are uniquely primate traits or convergent evolutionary outcomes.", "domains": ["biotech", "first-contact"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Challenges assumptions about evolutionary inevitability. Relevant to convergent evolution research, de-extinction ethics, and how we define 'intelligence' across species.", "tags": ["alternate-evolution", "dinosaurs", "convergent-intelligence"], "story_count": 2, "stories": [{"id": "west-of-eden-harrison", "title": "West of Eden", "author": "Harry Harrison", "year": 1984}, {"id": "return-to-eden-harrison", "title": "Return to Eden", "author": "Harry Harrison", "year": 1988}]}, {"id": "disability-in-post-apocalypse", "title": "Disability Value in Post-Apocalyptic Society", "description": "In a post-collapse society, a disabled young woman discovers that her artistic gift is the only thing preserving her from being discarded, testing whether post-collapse communities value unique abilities or only physical fitness.", "domains": ["governance", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models how disability is valued or discarded in different social contexts, relevant to neurodiversity, disability rights, and the question of which human capabilities matter when survival is at stake.", "tags": ["disability-value", "post-collapse", "artistic-gift", "social-worth"], "story_count": 1, "stories": [{"id": "gathering-blue-lowry", "title": "Gathering Blue", "author": "Lois Lowry", "year": 2000}]}, {"id": "disguised-planet-killer", "title": "Disguised Planetary Destruction", "description": "Aliens infiltrate Earth by disguising planet-destroying weapons as natural phenomena (new geological features), and by the time the deception is discovered, the destruction is already irreversible.", "domains": ["first-contact", "existential-risk", "warfare"], "scenarios": ["warning"], "outcomes": ["catastrophic"], "relevance": "Models stealth existential threats: relevant to hidden environmental destruction (microplastics, PFAS), slow-motion catastrophes that are irreversible by the time they're detected, and the challenge of identifying threats that look natural.", "tags": ["disguised-weapon", "planet-destruction", "stealth-threat"], "story_count": 1, "stories": [{"id": "the-forge-of-god-bear", "title": "The forge of God", "author": "Greg Bear, Stephen Bel Davies", "year": 1987}]}, {"id": "displaced-alien-identity", "title": "Displaced Non-Human Identity Search", "description": "A non-human individual raised among humans must locate their own species, navigating questions of belonging, identity, and the tension between adopted and biological cultures when the two sets of values conflict.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Analogous to transracial adoption debates, diaspora identity, and the broader question of how much of identity is biological versus cultural when someone bridges two incompatible communities.", "tags": ["alien-identity", "cultural-belonging", "adoption", "diaspora"], "story_count": 4, "stories": [{"id": "acorna-s-people-mccaffrey", "title": "Acorna's People", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 1999}, {"id": "acorna-s-quest-mccaffrey", "title": "Acorna's Quest", "author": "Anne McCaffrey, Margaret Ball", "year": 1998}, {"id": "acorna-s-rebels-mccaffrey", "title": "Acorna's rebels", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 2003}, {"id": "acorna-s-search-mccaffrey", "title": "Acorna's search", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 2001}]}, {"id": "disposable-body-duplicates", "title": "Disposable Body Duplicates", "description": "Technology allows people to imprint their consciousness into clay duplicates that experience a day of life then return their memories to the original, creating a society where the rich send expendable copies to do dangerous or boring work.", "domains": ["ai-ml", "economics", "ethics-philosophy"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Prescient model of delegated labor: if you could send a copy of yourself to work, who owns the copy's experiences? Relevant to outsourcing, gig economy, remote work, and the value of embodied experience.", "tags": ["body-duplicates", "dittos", "consciousness-copy", "delegated-labor"], "story_count": 1, "stories": [{"id": "kiln-people-brin", "title": "Kiln people", "author": "David Brin", "year": 2002}]}, {"id": "disposable-clone-worker", "title": "Disposable Clone Worker", "description": "A human expedition uses a single volunteer who is repeatedly cloned and killed for dangerous tasks, with each clone retaining memories of previous deaths, testing whether disposable labor is ethical when the worker remembers dying.", "domains": ["biotech", "ethics-philosophy", "space"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models gig economy expendability: workers who are technically replaceable but whose accumulated experience makes each 'replacement' worse. Relevant to clone labor ethics and the dignity of labor.", "tags": ["disposable-clone", "expendable-worker", "death-memory", "colony-labor"], "story_count": 1, "stories": [{"id": "mickey7-ashton", "title": "Mickey7", "author": "Edward Ashton", "year": 2022}]}, {"id": "distributed-artifact-recovery", "title": "Distributed Artifact Recovery", "description": "A small team must recover multiple artifacts scattered across hostile territories, each guarded differently, where the cumulative collection enables a systemic change that no single artifact could produce.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models distributed systems thinking: relevant to treaty compliance verification, intelligence collection across hostile jurisdictions, and any problem requiring assembly of components from multiple adversarial sources.", "tags": ["distributed-recovery", "artifact-collection", "hostile-territory", "systemic-change"], "story_count": 1, "stories": [{"id": "dread-mountain-deltora-quest-5-rodda", "title": "Dread Mountain (Deltora Quest #5)", "author": "Emily Rodda", "year": 2000}]}, {"id": "diverse-crew-infrastructure-building", "title": "Diverse Crew Building Interstellar Infrastructure", "description": "A multi-species crew tunnels wormholes for a living, and their work building galactic infrastructure reveals how diverse perspectives create both friction and resilience in high-stakes cooperation.", "domains": ["space", "social-engineering", "first-contact"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models diverse team dynamics in infrastructure projects: relevant to international space station operations, multinational construction projects, and how team diversity affects both conflict and innovation.", "tags": ["diverse-crew", "wormhole-tunneling", "interstellar-infrastructure"], "story_count": 1, "stories": [{"id": "the-long-way-to-a-small-angry-planet-chambers", "title": "The Long Way to a Small, Angry Planet", "author": "Becky Chambers", "year": 2014}]}, {"id": "divided-society-conurb-county", "title": "Divided Society: Urban Conurbs vs. Rural Aristocracy", "description": "Future England is divided into overcrowded, entertainment-pacified urban 'Conurbs' and a pastoral aristocratic 'County,' with movement between them controlled, testing whether class-based geographic separation produces stability or revolution.", "domains": ["governance", "social-engineering"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models urban-rural divide, gated community dynamics, and the question of whether geographic class separation is inherently unstable.", "tags": ["urban-rural-divide", "class-separation", "social-control"], "story_count": 1, "stories": [{"id": "the-guardians-youd", "title": "The GUARDIANS", "author": "Sam Youd", "year": 1970}]}, {"id": "divine-alien-resistance", "title": "Alien/Divine Contact Enabling Political Resistance", "description": "In an alternate America under a paranoid dictator, a man receives transmissions from an alien/divine intelligence (VALIS) that guides him to resist the regime, blurring the line between political rebellion and religious revelation.", "domains": ["governance", "first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the intersection of religious experience and political action: relevant to liberation theology, the role of spiritual conviction in resistance movements, and whether alien contact scenarios would follow religious or political frameworks.", "tags": ["divine-alien", "political-resistance", "paranoid-state", "valis"], "story_count": 1, "stories": [{"id": "radio-free-albemuth-dick", "title": "Radio Free Albemuth", "author": "Philip K. Dick, Philip K. Dick", "year": 1985}]}, {"id": "divine-collaboration", "title": "Divine Collaboration with Insignificant Workers", "description": "A cosmic entity recruits lowly human artisans for a transcendent project, testing whether individual insignificance is redeemed by participation in something larger, and whether divine purposes can be understood by their instruments.", "domains": ["ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the meaning-of-work question: can labor find transcendence through participation in projects beyond individual comprehension? Relevant to industrial labor, cosmic significance, and collective purpose.", "tags": ["divine-project", "insignificant-worker", "cosmic-collaboration"], "story_count": 2, "stories": [{"id": "galactic-pot-healer-dick", "title": "Galactic pot-healer", "author": "Philip K. Dick", "year": 1969}, {"id": "paladin-of-souls-bujold", "title": "Paladin of Souls", "author": "Lois McMaster Bujold", "year": 2004}]}, {"id": "domestic-fascism", "title": "Domestic Fascism Rise", "description": "A charismatic demagogue rises to power in America through democratic processes, implementing fascist policies while the population convinces itself 'it can't happen here,' testing whether democratic institutions contain adequate safeguards against authoritarian capture.", "domains": ["governance", "social-engineering"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE canonical American fascism scenario. Directly relevant to democratic backsliding analysis, institutional erosion, demagogue dynamics, and the complacency thesis that democracies are inherently self-correcting.", "tags": ["domestic-fascism", "democratic-backsliding", "demagogue", "institutional-capture"], "story_count": 1, "stories": [{"id": "it-can-t-happen-here-lewis", "title": "It Can't Happen Here", "author": "Sinclair Lewis", "year": 1935}]}, {"id": "dream-surveillance", "title": "Dream Surveillance and Theft", "description": "Technology to monitor and manipulate dreams is developed, but when dreams can be stolen or weaponized, the last refuge of private thought becomes a contested resource.", "domains": ["surveillance", "medicine", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to sleep research ethics, neurotechnology privacy (brain-computer interfaces), and the philosophical question of whether subconscious thought deserves the same privacy protections as communication.", "tags": ["dream-surveillance", "neuro-privacy", "thought-theft", "cognitive-rights"], "story_count": 1, "stories": [{"id": "dream-thief-lawhead", "title": "Dream thief", "author": "Stephen R. Lawhead, Jonathan Roberts, Ross Lawhead", "year": 1983}]}, {"id": "drug-dimensional-breach", "title": "Drug-Induced Dimensional Breach", "description": "A street drug (soy sauce) gives users the ability to perceive and interact with other dimensions, but also makes them targets for entities from those dimensions, turning substance abuse into an existential security risk.", "domains": ["medicine", "existential-risk"], "scenarios": ["warning", "satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Satirizes the war on drugs by literalizing the interdimensional: what if drug users actually DID perceive things that sober people cannot? Relevant to psychedelic research, altered states, and the epistemology of sobriety.", "tags": ["drug-dimensions", "soy-sauce", "perception-expansion", "dimensional-breach"], "story_count": 1, "stories": [{"id": "john-dies-at-the-end-wong", "title": "John Dies at the End", "author": "David Wong", "year": 2007}]}, {"id": "dual-catastrophe-triffids", "title": "Dual Catastrophe: Mass Blindness Plus Biological Threat", "description": "A meteor shower blinds most of the world's population, then bio-engineered walking plants (triffids) that were previously kept as crops become apex predators, testing how civilization copes when two catastrophes compound.", "domains": ["biotech", "climate", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "THE canonical compound disaster scenario. Models how simultaneous crises multiply (pandemic + economic collapse, earthquake + tsunami). Directly relevant to compound risk analysis in disaster planning.", "tags": ["compound-catastrophe", "triffids", "mass-blindness", "dual-disaster"], "story_count": 1, "stories": [{"id": "the-day-of-the-triffids-wyndham", "title": "The Day of the Triffids", "author": "John Wyndham, Marcel Battin, Cover by Andy Bridge", "year": 1951}]}, {"id": "dual-paradigm-world", "title": "Dual-Paradigm World", "description": "A planet that has stopped rotating is divided into a light side governed by science and a dark side governed by magic, with characters who can operate in both, testing whether fundamentally incompatible paradigms can coexist.", "domains": ["energy-physics", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models paradigm coexistence: what if two incompatible explanatory frameworks were both literally true? Relevant to science-religion tensions and the challenge of incommensurable worldviews.", "tags": ["dual-paradigm", "science-magic", "paradigm-coexistence"], "story_count": 1, "stories": [{"id": "jack-of-shadows-zelazny", "title": "Jack of Shadows", "author": "Roger Zelazny", "year": 1971}]}, {"id": "dual-track-space-race", "title": "Scientist-Entrepreneur Space Race", "description": "A space exploration effort splits into competing tracks driven by scientific curiosity vs. commercial ambition, testing whether collaboration or competition produces better outcomes when the stakes are civilizational.", "domains": ["space", "economics"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Directly models the NASA-SpaceX dynamic, public-private space partnerships, and the debate over whether space exploration should be driven by science, commerce, or national prestige.", "tags": ["space-race", "public-private", "science-vs-commerce", "competition-cooperation"], "story_count": 1, "stories": [{"id": "encounter-with-tiber-aldrin", "title": "Encounter with Tiber", "author": "Buzz Aldrin, John Barnes", "year": 1996}]}, {"id": "dying-sun-civilization", "title": "Civilization Under a Dying Sun", "description": "On a far-future Earth where the sun is dying, civilization has regressed to medieval technology while surrounded by incomprehensible relics of former greatness. The Autarch journeys beyond the solar system to petition alien beings for a new sun, but the 'cure' will cause catastrophic flooding. The story asks whether saving civilization requires accepting devastating transformation, and whether those in power can make such choices for everyone.", "domains": ["existential-risk", "space", "governance"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "catastrophic"], "relevance": "Relevant to climate change mitigation (accepting short-term costs for long-term survival), geoengineering tradeoffs, and leadership under existential threat.", "tags": ["stellar-death", "civilizational-decline", "sacrifice-for-renewal"], "story_count": 1, "stories": [{"id": "the-urth-of-the-new-sun-wolfe", "title": "The Urth of the new sun", "author": "Gene Wolfe", "year": 1987}]}, {"id": "dying-world-cultural-entropy", "title": "Dying World Cultural Entropy", "description": "On a world that is literally dying (cooling, dimming, becoming uninhabitable), the remaining inhabitants cling to cultural practices that no longer serve survival, demonstrating how cultural inertia persists even when the environment that produced it has vanished.", "domains": ["governance", "climate", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models institutional inertia in communities facing decline (Rust Belt, shrinking cities), and the difficulty of cultural adaptation when the material basis of a way of life disappears.", "tags": ["dying-world", "cultural-inertia", "institutional-decline", "adaptation-failure"], "story_count": 1, "stories": [{"id": "dying-of-the-light-martin", "title": "Dying of the Light", "author": "George R. R. Martin", "year": 1977}]}, {"id": "dying-world-quest", "title": "Quest Across a Dying World", "description": "A gunslinger pursues a mysterious man across a vast dying landscape where reality is fraying, combining Western, fantasy, and post-apocalyptic elements in a world that has 'moved on' from its previous golden age.", "domains": ["existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models civilizational entropy: what does society look like when the world is running down but not yet dead? Relevant to managed decline, institutional decay, and the aesthetics of civilizational twilight.", "tags": ["dying-world", "quest", "civilizational-entropy"], "story_count": 3, "stories": [{"id": "the-gunslinger-king", "title": "The Gunslinger", "author": "Stephen King", "year": 1976}, {"id": "the-drawing-of-the-three-king", "title": "The Drawing of the Three", "author": "Stephen King", "year": 1987}, {"id": "the-waste-lands-king", "title": "The Waste Lands", "author": "Stephen King", "year": 1991}]}, {"id": "dynastic-competition-no-plot-armor", "title": "Dynastic Competition Without Safety Nets", "description": "Multiple noble houses compete for supreme power through shifting alliances, assassination, marriage, and war, in a system where no character has guaranteed survival and no faction has structural advantages, modeling raw power dynamics.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models great-power competition, alliance instability, and the consequences of systems where legitimacy is contested and violence is the ultimate arbiter of political disputes.", "tags": ["dynastic-competition", "realpolitik", "alliance-instability", "political-violence"], "story_count": 5, "stories": [{"id": "a-clash-of-kings-martin", "title": "A Clash of Kings", "author": "George R. R. Martin", "year": 1998}, {"id": "a-dance-with-dragons-martin", "title": "A Dance With Dragons", "author": "George R. R. Martin", "year": 2008}, {"id": "a-feast-for-crows-martin", "title": "A Feast for Crows", "author": "George R. R. Martin", "year": 2005}, {"id": "a-game-of-thrones-martin", "title": "A Game of Thrones", "author": "George R. R. Martin", "year": 1996}, {"id": "a-storm-of-swords-martin", "title": "A Storm of Swords", "author": "George R. R. Martin", "year": 2000}]}, {"id": "earliest-space-station", "title": "Earliest Space Station Concept", "description": "Published in 1869, this story describes a brick sphere launched into orbit to serve as a navigation aid, accidentally carrying workers into space where they establish a permanent orbital community. The first fictional description of an artificial satellite and space habitat.", "domains": ["space"], "scenarios": ["prediction"], "outcomes": ["aspirational"], "relevance": "The FIRST fictional space station (1869). Directly influenced real space station concepts. Demonstrates how speculative fiction establishes technological goals decades or centuries before realization.", "tags": ["earliest-space-station", "1869", "prediction-accuracy", "orbital-habitat"], "story_count": 1, "stories": [{"id": "the-brick-moon-and-other-stories-hale", "title": "The Brick Moon and Other Stories", "author": "Edward Everett Hale", "year": 1899}]}, {"id": "early-lunar-speculation", "title": "Early Lunar Voyage Speculation", "description": "An early speculative narrative imagines travel to the Moon and the discovery of a lunar civilization, testing what assumptions about human universality travelers project onto alien environments.", "domains": ["space", "ethics-philosophy"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous"], "relevance": "Relevant to understanding how cultural assumptions shape exploration agendas and first-contact protocols, and how early speculative fiction established frameworks still used in space policy.", "tags": ["lunar-travel", "early-speculation", "cultural-projection"], "story_count": 2, "stories": [{"id": "a-voyage-to-the-moon-tucker", "title": "A Voyage to the Moon", "author": "George Tucker", "year": 1827}, {"id": "the-first-men-in-the-moon-wells", "title": "The First Men in the Moon", "author": "H. G. Wells", "year": 1900}]}, {"id": "early-space-exploration-fiction", "title": "Early Interplanetary Speculation", "description": "A pre-spaceflight-era narrative imagines interplanetary travel using the scientific understanding of its time, establishing frameworks and assumptions that would shape real space programs decades later.", "domains": ["space"], "scenarios": ["prediction"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Shows how speculative fiction shapes actual technology development: many early space fiction ideas (space stations, lunar bases) directly influenced NASA engineers who read them as children.", "tags": ["early-space-fiction", "prediction-accuracy", "fiction-to-reality"], "story_count": 5, "stories": [{"id": "columbus-of-space-serviss", "title": "Columbus of Space", "author": "Garrett Putman Serviss", "year": 1911}, {"id": "edison-s-conquest-of-mars-serviss", "title": "Edison's conquest of Mars", "author": "Garrett Putman Serviss", "year": 1947}, {"id": "king-david-s-spaceship-pournelle", "title": "King David's spaceship", "author": "Jerry Pournelle", "year": 1980}, {"id": "prelude-to-space-clarke", "title": "Prelude to Space", "author": "Arthur C. Clarke", "year": 1953}, {"id": "rocket-ship-galileo-heinlein", "title": "Rocket Ship Galileo", "author": "Robert A. Heinlein", "year": 1947}]}, {"id": "early-warning-system-failure", "title": "Early Warning Dismissal", "description": "An early detection of an existential threat is dismissed by those closest to it because the implications are too large for their institutional framework to process, delaying response until the threat becomes unmanageable.", "domains": ["space", "governance", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models the Cassandra effect in threat detection: relevant to climate early warnings, pandemic signals, and asteroid detection where small teams see threats that larger institutions fail to act on.", "tags": ["early-warning", "cassandra-effect", "threat-dismissal", "institutional-failure"], "story_count": 1, "stories": [{"id": "earth-unaware-card", "title": "Earth Unaware", "author": "Orson Scott Card, Aaron Johnston", "year": 2012}]}, {"id": "earth-as-memorial", "title": "Earth as Galactic Memorial", "description": "Humanity has colonized the galaxy and converted the abandoned Earth into an expensive memorial/cemetery planet, testing whether preserving the homeworld as a monument serves the living or merely commodifies nostalgia.", "domains": ["space", "economics", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to heritage preservation economics, whether Earth should be treated as humanity's museum or its launching pad, and the commodification of historical sites.", "tags": ["earth-memorial", "heritage-preservation", "galactic-diaspora", "nostalgia-economy"], "story_count": 1, "stories": [{"id": "cemetary-world-simak", "title": "Cemetary World", "author": "Clifford D. Simak", "year": 1973}]}, {"id": "earth-refugee-colonists", "title": "Earth Refugee Colonists on New World", "description": "A small group of refugees from a doomed Earth must build a new civilization on an alien planet with dwindling supplies, testing which knowledge and social structures are essential vs. dependent on Earth conditions.", "domains": ["space", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models refugee community building: relevant to refugee settlements, Mars colonization planning, and the question of what a fresh-start civilization would prioritize.", "tags": ["earth-refugees", "new-planet", "essential-knowledge"], "story_count": 1, "stories": [{"id": "the-green-book-sunburst-book-walsh", "title": "The Green Book (Sunburst Book)", "author": "Jill Paton Walsh", "year": 1981}]}, {"id": "eco-catastrophe-billionaire-conspiracy", "title": "Billionaire Eco-Catastrophe Conspiracy", "description": "A secret consortium of the ultra-wealthy knows Earth is dying and plans to save only themselves, while everyone else faces environmental catastrophe, satirizing the gap between those who cause environmental damage and those who suffer it.", "domains": ["climate", "economics", "existential-risk"], "scenarios": ["satire", "warning"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models billionaire bunker scenarios and eco-hypocrisy: relevant to private space programs as escape plans, climate inequality, and the suspicion that elites prepare for catastrophes they help create.", "tags": ["eco-conspiracy", "billionaire-escape", "environmental-inequality"], "story_count": 1, "stories": [{"id": "stark-elton", "title": "Stark", "author": "Ben Elton", "year": 1989}]}, {"id": "ecological-political-engineering", "title": "Ecological-Political Engineering", "description": "A messianic political system intertwined with planetary ecological engineering creates a society where religious authority, ecological management, and political power are fused, testing the long-term stability of theocratic technocracy.", "domains": ["climate", "governance", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the intersection of environmental management and political power: relevant to green authoritarianism debates, geoengineering governance, and techno-religious movements.", "tags": ["ecological-engineering", "theocracy", "messianic-politics", "planetary-management"], "story_count": 1, "stories": [{"id": "children-of-dune-herbert", "title": "Children of Dune", "author": "Frank Herbert", "year": 1976}]}, {"id": "ecological-secession-utopia", "title": "Ecological Secession State", "description": "A region secedes from a larger nation to build an ecologically sustainable society from scratch, and a reporter from the parent nation visits to assess whether the radical experiment works.", "domains": ["climate", "governance"], "scenarios": ["utopian-vision", "thought-experiment"], "outcomes": ["utopian", "ambiguous"], "relevance": "Foundational text for bioregionalism, sustainable city design, and the question of whether radical ecological reform requires political separation from growth-oriented economies.", "tags": ["ecotopia", "secession", "ecological-society", "bioregionalism"], "story_count": 1, "stories": [{"id": "ecotopia-callenbach", "title": "Ecotopia", "author": "Ernest Callenbach", "year": 1975}]}, {"id": "economic-collapse-hoarding", "title": "Family Survival Hoarding During Collapse", "description": "A father turns the family home into a fortress and hoards food during economic collapse, but his survivalism destroys family bonds and makes them targets, testing whether individual preparedness undermines community resilience.", "domains": ["economics", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary"], "relevance": "Models prepper dynamics: directly relevant to pandemic hoarding behavior, survivalist movement analysis, and the tension between individual preparedness and community solidarity.", "tags": ["hoarding", "prepper", "family-survival", "community-vs-individual"], "story_count": 1, "stories": [{"id": "noah-s-castle-cadenzas-s-townsend", "title": "Noah's Castle (Cadenzas S.)", "author": "John Rowe Townsend", "year": 1975}]}, {"id": "economic-collapse-scenario", "title": "Economic Collapse and Social Breakdown", "description": "A severe economic crisis triggers cascading social breakdown, testing which institutions, communities, and individuals prove resilient when the financial systems that underpin daily life suddenly fail.", "domains": ["economics", "governance", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly applicable to financial crisis preparedness, societal resilience planning, and understanding the cascading effects of economic system failure on food, transportation, and governance.", "tags": ["economic-collapse", "social-breakdown", "resilience", "depression"], "story_count": 1, "stories": [{"id": "black-august-wheatley", "title": "Black August", "author": "Dennis Wheatley", "year": 1934}]}, {"id": "educational-nanotech-book", "title": "Educational Nanotechnology Book", "description": "A nano-assembled interactive primer designed for an elite family's daughter accidentally ends up with a poor girl, providing her with the education and critical thinking skills that the existing class system was designed to prevent.", "domains": ["nanotech", "social-engineering", "economics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["transformative", "ambiguous"], "relevance": "THE canonical model for AI-assisted personalized education and how technology can disrupt class barriers when it escapes elite control. Directly relevant to AI tutoring, educational equity, and the One Laptop Per Child concept.", "tags": ["nano-primer", "educational-technology", "class-disruption", "ai-tutoring"], "story_count": 1, "stories": [{"id": "the-diamond-age-stephenson", "title": "The Diamond Age", "author": "Neal Stephenson", "year": 1995}]}, {"id": "electronic-destruction-power", "title": "Electronic Destruction Ability", "description": "A person discovers they can destroy electronics with their mind, making them simultaneously invaluable and dangerous in a technology-dependent civilization, while forming a bond with an android companion.", "domains": ["ai-ml", "robotics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the value/threat duality of EMP-like capabilities: relevant to electronic warfare, anti-technology movements, and the paradox of being dangerous to the infrastructure everyone depends on.", "tags": ["electronic-destruction", "anti-technology-power", "android-companion"], "story_count": 1, "stories": [{"id": "lifel1k3-kristoff", "title": "LIFEL1K3", "author": "Jay Kristoff", "year": 2018}]}, {"id": "elemental-environmental-champion", "title": "Elemental Environmental Champion", "description": "An elemental being that IS the environment (plant life itself made conscious) fights to protect ecosystems from human exploitation, raising the question of whether nature can develop its own agency and fight back.", "domains": ["climate", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models the 'rights of nature' movement: relevant to Ecuador's constitutional rights for nature, river personhood, and the philosophical question of whether ecosystems have inherent agency.", "tags": ["environmental-champion", "nature-agency", "elemental-consciousness"], "story_count": 1, "stories": [{"id": "swamp-thing-saga-of-the-swamp-thing-moore", "title": "Swamp Thing Saga of the Swamp Thing", "author": "Alan Moore, Stephen Bissette", "year": 1987}]}, {"id": "emotion-erased-utopia", "title": "Emotion-Erased Utopian Community", "description": "A community achieves 'sameness' by eliminating color vision, emotion, and individual memory, assigning careers and families by committee, and euthanizing anyone who doesn't conform \u2014 and considers this state utopian.", "domains": ["social-engineering", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian"], "relevance": "THE canonical controlled-community dystopia for young readers. Models how eliminating difference, risk, and pain also eliminates meaning. Directly relevant to algorithmic optimization of human experience and the trade-off between safety and freedom.", "tags": ["sameness", "emotion-erasure", "assigned-lives", "euthanasia-for-conformity"], "story_count": 1, "stories": [{"id": "the-giver-lowry", "title": "The Giver", "author": "Lois Lowry", "year": 1993}]}, {"id": "emp-collapse-survival", "title": "EMP Collapse and Youth Survival", "description": "An electromagnetic pulse destroys all electronics, and young people with unique neurological conditions (brain tumors, PTSD) find themselves changed by the event, testing whether the most vulnerable members of society become critical in crisis.", "domains": ["existential-risk", "medicine"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "Relevant to EMP preparedness, infrastructure fragility, and the paradox that individuals considered disabled in normal society may possess advantages in post-collapse conditions.", "tags": ["emp", "infrastructure-collapse", "disability-advantage", "youth-survival"], "story_count": 2, "stories": [{"id": "ashes-bick", "title": "Ashes", "author": "Ilsa J. Bick", "year": 2011}, {"id": "shadows-bick", "title": "Shadows", "author": "Ilsa J. Bick", "year": 2012}]}, {"id": "enemy-alliance-against-shared-threat", "title": "Enemy Alliance Against Shared Existential Threat", "description": "Historic enemies must ally against a threat so extreme that it overrides their conflict, testing whether shared existential danger can produce genuine cooperation or only temporary convenience.", "domains": ["warfare", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models threat-driven cooperation: relevant to climate change as a unifying threat, pandemic cooperation between rival nations, and whether existential risks can overcome political divisions.", "tags": ["enemy-alliance", "shared-threat", "temporary-cooperation"], "story_count": 1, "stories": [{"id": "my-enemy-my-ally-duane", "title": "My Enemy, My Ally", "author": "Diane Duane", "year": 1984}]}, {"id": "engineered-empathy-conflict-resolution", "title": "Engineered Empathy as Conflict Resolution", "description": "When two species face a classic prisoner's dilemma in which rational self-interest drives both toward mutual destruction, one side engineers a biological intervention that rewires the other's neurology to recognize the alien as kin. Rather than persuasion, diplomacy, or force, the solution is a nanovirus that removes the cognitive barrier preventing cross-species identification. The infected party retains full consciousness, personality, and agency; what changes is the perceptual filter that categorized the other species as 'alien' rather than 'like us.' The scenario asks whether forcibly altering an adversary's capacity for empathy is coercion or liberation, and whether a peace achieved through neurological modification is genuine or manufactured.", "domains": ["biotech", "first-contact", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Directly relevant to debates about pharmacological interventions for prejudice reduction, oxytocin research in trust-building, and whether empathy can be engineered without undermining autonomy. Parallels discussions in AI alignment about modifying an agent's values versus constraining its behavior. Applicable to post-conflict reconciliation programs and the ethics of cognitive enhancement.", "tags": ["nanovirus", "empathy-engineering", "prisoners-dilemma", "first-contact", "neurological-intervention", "consent"], "story_count": 1, "stories": [{"id": "children-of-time-tchaikovsky", "title": "Children of Time", "author": "Adrian Tchaikovsky", "year": 2015}]}, {"id": "engineered-happiness-dystopia", "title": "Engineered Happiness Dystopia", "description": "A civilization genetically designs and psychologically conditions all citizens for contentment, eliminating suffering but also eliminating freedom, art, and genuine human connection, testing whether happiness without autonomy is worth having.", "domains": ["biotech", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Foundational text for pharmaceutical mood management debates, social media engagement optimization, and any system that trades human autonomy for engineered satisfaction.", "tags": ["engineered-happiness", "conditioning", "autonomy-vs-contentment", "soma"], "story_count": 1, "stories": [{"id": "brave-new-world-and-brave-new-world-revisited-huxley", "title": "Brave New World and Brave New World Revisited", "author": "Aldous Huxley", "year": 1942}]}, {"id": "engineered-human-second-class", "title": "Engineered Humans as Second-Class Citizens", "description": "A genetically engineered human with superior capabilities operates as a secret agent in a fragmented world, but faces prejudice because she was made rather than born, testing whether origin determines personhood.", "domains": ["biotech", "ethics-philosophy", "governance"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models discrimination based on origin rather than capability, relevant to test-tube baby prejudice, CRISPR-enhanced individuals, synthetic biology, and any future where 'made' people face 'born' people's prejudice.", "tags": ["engineered-human", "origin-discrimination", "artificial-person"], "story_count": 1, "stories": [{"id": "friday-heinlein", "title": "Friday", "author": "Robert A. Heinlein", "year": 1982}]}, {"id": "engineered-hybrid-children", "title": "Engineered Hybrid Children", "description": "Children created through genetic engineering with non-human traits (wings, enhanced senses) esca
