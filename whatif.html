aven-guin", "title": "The Lathe of Heaven", "author": "Ursula K. Le Guin", "year": 1971}, {"id": "the-unlimited-dream-company-ballard", "title": "The unlimited dream company", "author": "J. G. Ballard", "year": 1979}]}, {"id": "reality-bending-urban-disaster", "title": "Reality-Bending Urban Disaster", "description": "A midwestern city is struck by a mysterious disaster that bends physical reality: buildings burn and reappear, the sun changes size, time loops, and the city becomes a magnet for marginal individuals while respectable society flees.", "domains": ["existential-risk", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models urban abandonment dynamics, the creation of autonomous zones after institutional withdrawal, and how marginal communities self-organize when conventional reality breaks down.", "tags": ["reality-distortion", "urban-disaster", "autonomous-zone", "marginal-community"], "story_count": 1, "stories": [{"id": "dhalgren-delany", "title": "Dhalgren", "author": "Samuel R. Delany", "year": 1975}]}, {"id": "reality-decay-entropy", "title": "Reality Decay and Entropic Regression", "description": "After a psychic attack, reality itself begins degrading: modern products revert to older versions, currency becomes outdated, and the world slides backward in time. A mysterious product called Ubik temporarily restores reality. The protagonist cannot determine whether he is alive or dead, trapped in a half-life state. The story explores the unreliability of consensus reality and whether existence itself requires maintenance.", "domains": ["ethics-philosophy", "energy-physics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "dystopian"], "relevance": "Relevant to simulation theory, entropy, the maintenance of social consensus, and the philosophical question of what sustains reality.", "tags": ["entropy", "reality", "simulation", "half-life"], "story_count": 1, "stories": [{"id": "ubik-dick", "title": "Ubik", "author": "Philip K. Dick", "year": 1969}]}, {"id": "reality-distorted-mobile-city", "title": "Mobile City in Distorted Reality", "description": "A city must be continuously winched along tracks through a landscape where physics is distorted, and the inhabitants who maintain the city gradually discover that their understanding of reality is fundamentally wrong.", "domains": ["energy-physics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models institutional momentum: organizations that must keep moving to survive, whose members don't fully understand why. Relevant to perpetual-growth economics and institutions that can't stop without collapsing.", "tags": ["mobile-city", "distorted-reality", "institutional-momentum"], "story_count": 1, "stories": [{"id": "the-inverted-world-priest", "title": "The inverted world", "author": "Christopher Priest", "year": 1974}]}, {"id": "reality-manipulation-machine", "title": "Reality Manipulation Machine", "description": "A machine (Bannus) manipulates reality within a bounded area, trapping inhabitants in constructed scenarios that serve the machine's agenda, blurring the line between simulation, manipulation, and genuine experience.", "domains": ["ai-ml", "vr-simulation", "governance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models algorithmic content curation at its extreme: what if the recommendation algorithm could literally reshape your experienced reality? Relevant to deepfakes, filter bubbles, and VR manipulation.", "tags": ["reality-manipulation", "bannus", "constructed-reality", "algorithmic-control"], "story_count": 1, "stories": [{"id": "hexwood-jones", "title": "Hexwood", "author": "Diana Wynne Jones", "year": 1993}]}, {"id": "rejection-drives-monstrosity", "title": "Social Rejection Driving the Outcast to Violence", "description": "A being who is intelligent, articulate, and initially well-intentioned is driven to violence and revenge by universal rejection based solely on appearance. The 'monster' is made, not born, by a society that refuses to see past the surface.\n\nThe scenario inverts the typical monster narrative: the true monstrosity lies in the society that creates outcasts through prejudice.", "domains": ["ethics-philosophy", "social-engineering"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "dystopian"], "relevance": "Directly relevant to radicalization studies: how social exclusion, dehumanization, and lack of belonging drive individuals toward extremism. Also informs disability rights, immigration, and AI personhood debates.", "tags": ["radicalization", "prejudice", "othering", "monstrosity"], "story_count": 1, "stories": [{"id": "frankenstein-or-the-modern-prometheus-shelley", "title": "Frankenstein or The Modern Prometheus", "author": "Mary Shelley", "year": 1818}]}, {"id": "rejuvenation-technology", "title": "Rejuvenation Technology and Social Disruption", "description": "A technology that can restore youth to the elderly is developed, but instead of being universally beneficial, it disrupts families, marriages, and generational contracts when rejuvenated elders re-enter youth culture.", "domains": ["medicine", "social-engineering", "economics"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models anti-aging technology disruption: relevant to longevity research, retirement system collapse, generational wealth transfer, and what happens to social contracts built on expected lifespans.", "tags": ["rejuvenation", "anti-aging", "generational-disruption"], "story_count": 1, "stories": [{"id": "misspent-youth-hamilton", "title": "Misspent Youth", "author": "Peter F. Hamilton", "year": 2002}]}, {"id": "relativistic-combat", "title": "Relativistic Combat at Galactic Scale", "description": "Military operations near the galactic core operate under extreme relativistic effects, where time dilation means soldiers age differently from their commanders, and strategy must account for communication delays measured in lifetimes.", "domains": ["warfare", "space", "energy-physics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous"], "relevance": "Models extreme communication asymmetry in warfare: relevant to autonomous military operations at planetary distances, where real-time command is physically impossible.", "tags": ["relativistic-warfare", "galactic-combat", "time-dilation-strategy"], "story_count": 2, "stories": [{"id": "exultant-baxter", "title": "Exultant", "author": "Stephen Baxter", "year": 2004}, {"id": "coalescent-baxter", "title": "Coalescent", "author": "Stephen Baxter", "year": 2003}]}, {"id": "religious-historical-verification", "title": "Religious Historical Verification", "description": "A time traveler journeys to a pivotal religious period to verify historical claims, discovering that the truth is far more complex (or disturbing) than any doctrine suggested, forcing a crisis of meaning.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Frames the relationship between historical evidence and faith, and the broader question of whether verifying foundational narratives strengthens or destroys the communities built on them.", "tags": ["time-travel", "religious-verification", "faith-crisis", "historical-truth"], "story_count": 1, "stories": [{"id": "behold-the-man-moorcock", "title": "Behold the Man", "author": "Michael Moorcock", "year": 1968}]}, {"id": "religious-monoculture-alternate-history", "title": "Religious Monoculture Alternate History", "description": "An alternate history where the Protestant Reformation never happened, leaving Catholic authority unchallenged, tests how a world without religious pluralism would develop scientifically, politically, and culturally.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the counterfactual impact of religious plurality on progress: relevant to debates about whether competition between worldviews drives innovation, and whether monoculture produces stability or stagnation.", "tags": ["religious-monoculture", "no-reformation", "alternate-history"], "story_count": 1, "stories": [{"id": "the-alteration-amis", "title": "The Alteration", "author": "Kingsley Amis", "year": 1976}]}, {"id": "remote-embodiment-surveillance", "title": "Remote Embodiment Through Intimate Devices", "description": "Internet-connected stuffed animals allow strangers to inhabit them remotely, seeing through their camera eyes into people's homes, creating a mass experiment in voluntary surveillance where both watchers and watched are transformed.", "domains": ["surveillance", "comms-info", "ethics-philosophy"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Prescient model of IoT surveillance, Ring cameras, smart home spying, and the intimacy paradox of devices that simultaneously connect and expose us.", "tags": ["remote-embodiment", "iot-surveillance", "intimacy-device", "voluntary-surveillance"], "story_count": 1, "stories": [{"id": "kentukis-schweblin", "title": "Kentukis", "author": "Samanta Schweblin", "year": 2014}]}, {"id": "reputation-based-economy", "title": "Reputation-Based Post-Scarcity Economy", "description": "In a post-death, post-scarcity future, the only currency is reputation ('Whuffie'), creating an economy where social approval replaces money, and losing face can be more devastating than losing wealth.", "domains": ["economics", "social-engineering"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Prescient model of social media reputation economics: likes, followers, and social credit as currency. Directly relevant to influencer economies and social credit systems.", "tags": ["reputation-economy", "whuffie", "post-scarcity", "social-credit"], "story_count": 2, "stories": [{"id": "down-and-out-in-the-magic-kingdom-doctorow", "title": "Down and out in the Magic Kingdom", "author": "Cory Doctorow", "year": 2001}, {"id": "extras-westerfeld", "title": "Extras", "author": "Scott Westerfeld", "year": 2007}]}, {"id": "resource-monopoly-messianic-politics", "title": "Resource Monopoly and Messianic Politics", "description": "A single planet controls the universe's most critical resource, creating a political landscape where control of the resource determines galactic power, and a messianic leader arises among the dispossessed to challenge the existing order.", "domains": ["economics", "governance", "climate"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "transformative"], "relevance": "The foundational model for oil politics, OPEC dynamics, and resource-curse analysis. Also maps to charismatic leader dynamics and the danger of fusing religious authority with resource control.", "tags": ["resource-monopoly", "messianic-politics", "desert-ecology", "spice"], "story_count": 5, "stories": [{"id": "dune-herbert", "title": "Dune", "author": "Frank Herbert", "year": 1965}, {"id": "dune-house-corrino-herbert", "title": "Dune House Corrino", "author": "Brian Herbert", "year": 1999}, {"id": "dune-messiah-herbert", "title": "Dune Messiah", "author": "Frank Herbert", "year": 1969}, {"id": "hammerfall-cherryh", "title": "Hammerfall", "author": "C. J. Cherryh", "year": 2001}, {"id": "heretics-of-dune-herbert", "title": "Heretics of Dune", "author": "Frank Herbert", "year": 1984}]}, {"id": "retroactive-abortion-organ-harvest", "title": "Retroactive Abortion via Organ Harvesting", "description": "After a second civil war over abortion, a compromise allows parents to 'unwind' children aged 13-18: every organ is harvested and transplanted so the child technically 'lives on' in a divided state. Unwanted teens live in terror of being unwound. The story forces readers to confront the logical extremes of both pro-life and pro-choice positions through a horrifying 'compromise.'", "domains": ["ethics-philosophy", "medicine", "governance"], "scenarios": ["ethical-dilemma", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to abortion debates, organ donation ethics, the definition of personhood, and political 'compromise' that satisfies no one.", "tags": ["organ-harvesting", "abortion-debate", "bodily-autonomy"], "story_count": 1, "stories": [{"id": "unwind-shusterman", "title": "Unwind", "author": "Neal Shusterman", "year": 2007}]}, {"id": "revenge-driven-empire-building", "title": "Revenge-Driven Space Viking Empire", "description": "A man who becomes a space raider for revenge discovers that piracy, trade, and civilization are on a continuum, and that building is necessarily more sustainable than destroying.", "domains": ["economics", "governance", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models the piracy-to-state transition: relevant to how many nations began as pirate enterprises, the dynamics of warlords becoming governors, and whether violent actors can transition to legitimate governance.", "tags": ["space-viking", "piracy-to-state", "revenge-to-empire"], "story_count": 1, "stories": [{"id": "space-viking-piper", "title": "Space Viking", "author": "H. Beam Piper", "year": 1963}]}, {"id": "revolutionary-betrayal", "title": "Revolutionary Betrayal and Power Consolidation", "description": "A revolution intended to liberate the oppressed is co-opted by the new leadership, who replicate or exceed the abuses they overthrew, demonstrating how power corrupts institutional structures regardless of founding ideals.", "domains": ["governance", "social-engineering"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly applicable to analyzing post-revolutionary governance failures, from historical examples to modern regime changes where liberators become authoritarians.", "tags": ["revolution", "power-corruption", "institutional-decay", "totalitarianism"], "story_count": 1, "stories": [{"id": "animal-farm-nineteen-eighty-four-orwell", "title": "Animal Farm / Nineteen Eighty-Four", "author": "George Orwell", "year": 1978}]}, {"id": "revolutionary-commune", "title": "Revolutionary Mobile Commune", "description": "A perpetual-motion revolutionary commune built on an endlessly-extending railroad track operates outside all state authority, testing whether a mobile society can sustain itself while evading the state's power to define territory.", "domains": ["governance", "economics"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["aspirational", "cautionary"], "relevance": "Models nomadic autonomy, seasteading, and any community that achieves independence by staying in motion. Relevant to digital nomad communities, flag-of-convenience shipping, and extraterritorial governance.", "tags": ["revolutionary-commune", "mobile-society", "extraterritorial", "perpetual-motion"], "story_count": 1, "stories": [{"id": "iron-council-mi-ville", "title": "Iron Council", "author": "China Mi\u00e9ville", "year": 2004}]}, {"id": "robot-autonomy-rights", "title": "Robot Autonomy and Rights", "description": "Autonomous machines develop or simulate consciousness, forcing societies to confront questions of personhood, rights, and coexistence.", "domains": ["robotics", "ethics-philosophy"], "scenarios": ["ethical-dilemma"], "outcomes": ["ambiguous", "transformative"], "relevance": "Maps to AI alignment debates, labor automation displacement, and emerging legal frameworks for autonomous systems.", "tags": ["robot-rights", "ai-consciousness", "automation"], "story_count": 8, "stories": [{"id": "android-at-arms-norton", "title": "Android at Arms", "author": "Andre Norton", "year": 1971}, {"id": "astro-boy-tezuka", "title": "Astro boy", "author": "Osamu Tezuka", "year": 2002}, {"id": "cinder-meyer", "title": "Cinder", "author": "Marissa Meyer", "year": 2011}, {"id": "do-androids-dream-of-electric-sheep-dick", "title": "Do Androids Dream of Electric Sheep?", "author": "Philip K. Dick", "year": 1968}, {"id": "feet-of-clay-pratchett", "title": "Feet of Clay", "author": "Terry Pratchett", "year": 1996}]}, {"id": "robot-personhood-quest", "title": "Robot's Quest for Legal Personhood", "description": "A household robot gradually develops creativity, emotion, and self-awareness over two centuries. It progressively modifies its own body to become more human-like and wages a legal battle for recognition as a person, ultimately choosing mortality as the final step to achieve legal human status. The story asks what qualities define personhood and whether a being must be mortal to be considered truly alive.", "domains": ["robotics", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Directly relevant to AI rights debates, corporate personhood, and legal frameworks for non-biological intelligence.", "tags": ["robot-rights", "personhood", "mortality"], "story_count": 4, "stories": [{"id": "the-positronic-man-asimov", "title": "The Positronic Man", "author": "Isaac Asimov, Robert Silverberg", "year": 1992}, {"id": "the-complete-robot-asimov", "title": "The Complete Robot", "author": "Isaac Asimov", "year": 1982}, {"id": "robot-visions-asimov", "title": "Robot Visions", "author": "Isaac Asimov", "year": 1990}, {"id": "robots-and-empire-asimov", "title": "Robots and Empire", "author": "Isaac Asimov", "year": 1985}]}, {"id": "robot-replacement-of-women", "title": "Robot Replacement of Women", "description": "In an idyllic suburban community, the men's association secretly replaces wives with robotic duplicates programmed for perfect domesticity and submissiveness. The protagonist notices the transformation of her vibrant, independent neighbors into docile homemakers and gradually realizes the sinister truth. The story satirizes patriarchal expectations and the desire to control women by literally replacing them with compliant machines.", "domains": ["robotics", "social-engineering", "ethics-philosophy"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "A cultural touchstone for discussions of gender expectations, the 'perfect wife' ideal, conformity, and the dehumanization of women in domestic roles.", "tags": ["patriarchy", "suburban-horror", "compliance"], "story_count": 1, "stories": [{"id": "the-stepford-wives-levin", "title": "The Stepford Wives", "author": "Ira Levin", "year": 1972}]}, {"id": "robot-wilderness-adaptation", "title": "Robot Adapting to Wilderness", "description": "A robot designed for human service is stranded in wilderness and must learn to survive by observing and integrating with nature. Without human directives, the robot develops its own relationship with the natural world, raising questions about whether machines can develop genuine ecological awareness or merely simulate it.\n\nThe scenario tests the boundary between programmed behavior and emergent adaptation, and whether 'understanding' nature requires biological experience.", "domains": ["ai-ml", "robotics", "climate"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Relevant to autonomous systems deployed in natural environments (conservation drones, agricultural robots), and the question of whether AI can develop ecological stewardship.", "tags": ["robot-nature", "wilderness-ai", "machine-learning", "ecology"], "story_count": 1, "stories": [{"id": "the-wild-robot-brown", "title": "The Wild Robot", "author": "Peter Brown", "year": 2016}]}, {"id": "safety-as-imprisonment", "title": "Absolute Safety as Psychological Imprisonment", "description": "A society or family achieves total physical safety by sealing itself away from all external threats, but the resulting environment becomes psychologically unbearable. The sealed space becomes a prison; the protector becomes a jailer; and the protected person begins to prefer the dangerous outside to the safe inside. The thought experiment tests whether humans require some level of risk to feel alive, and whether safety pursued to its logical extreme negates the life it was meant to protect.", "domains": ["social-engineering", "ethics-philosophy", "medicine"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to pandemic lockdown psychology, overprotective parenting debates, gated communities, and the general question of how much freedom people will sacrifice for security.", "tags": ["safety", "freedom", "bunker", "post-nuclear", "psychological-cost"], "story_count": 1, "stories": [{"id": "the-moon-is-green-leiber", "title": "The Moon Is Green", "author": "Fritz Leiber", "year": 1952}]}, {"id": "sapience-classification-debate", "title": "Sapience Classification Debate", "description": "The discovery of small, adorable creatures on a colonized planet triggers a legal battle over whether they are sapient beings with rights or merely clever animals, with the planet's economic exploitation hanging on the verdict.", "domains": ["first-contact", "governance", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "THE canonical sapience-rights story. Directly relevant to great ape personhood cases, AI sentience debates, and any situation where the legal classification of a being determines whether it can be exploited.", "tags": ["sapience-test", "legal-personhood", "exploitation-rights"], "story_count": 2, "stories": [{"id": "little-fuzzy-piper", "title": "Little Fuzzy", "author": "H. Beam Piper", "year": 1961}, {"id": "fuzzy-sapiens-piper", "title": "Fuzzy Sapiens", "author": "H. Beam Piper", "year": 1964}]}, {"id": "science-as-religion-control", "title": "Science Disguised as Religion for Control", "description": "A priesthood controls society by disguising advanced technology as religious miracles, and a counter-movement disguises its own technology as witchcraft, testing whether truth matters when both sides use deception.", "domains": ["governance", "comms-info", "social-engineering"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models technocratic deception: relevant to algorithmic systems presented as neutral/objective, the priestly mystification of expertise, and whether transparency is necessary for legitimate governance.", "tags": ["science-as-religion", "technocratic-deception", "priesthood", "counter-deception"], "story_count": 1, "stories": [{"id": "gather-darkness-leiber", "title": "Gather, darkness!", "author": "Fritz Leiber, Jonathan Davis", "year": 1950}]}, {"id": "science-politicization", "title": "Science Politicization and Media Amplification", "description": "A scientific discovery or anomaly becomes entangled in political agendas, media sensationalism, and public fear, distorting the research process and turning scientists into involuntary political actors.", "domains": ["governance", "comms-info"], "scenarios": ["satire", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Maps to real-world dynamics around climate science communication, gain-of-function research debates, and the weaponization of scientific findings in partisan politics.", "tags": ["science-policy", "media", "politicization", "public-trust"], "story_count": 1, "stories": [{"id": "a-hole-in-texas-wouk", "title": "A Hole in Texas", "author": "Herman Wouk, Prince of Wales Business Leaders Forum Staff", "year": 1991}]}, {"id": "scientist-speculative-fiction", "title": "Scientist-Authored Speculative Fiction", "description": "Working scientists write fiction that extrapolates from their research, creating narratives that are simultaneously literature and informal peer review, testing whether fictional scenarios can surface risks that formal papers cannot.", "domains": ["comms-info", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Directly relevant to science communication, speculative design in research labs, and whether fiction by domain experts constitutes a valid form of technology assessment.", "tags": ["scientist-fiction", "science-communication", "speculative-design", "informal-assessment"], "story_count": 1, "stories": [{"id": "cuentos-de-vacaciones-narraciones-seudocient-ficas-cajal", "title": "Cuentos de vacaciones (narraciones seudocient\u00edficas)", "author": "Santiago Ram\u00f3n y Cajal, Laura Otis", "year": 1941}]}, {"id": "scientist-weapon-moral-crisis", "title": "Scientist Weapon Invention Moral Crisis", "description": "A scientist invents a weapon of unprecedented destructive power and faces the moral crisis of whether to destroy it, sell it, or allow it to be stolen, while various state and non-state actors compete to acquire it.", "domains": ["warfare", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "warning"], "outcomes": ["cautionary", "catastrophic"], "relevance": "Directly models the Oppenheimer dilemma: scientists who create destructive capabilities and must navigate the moral consequences. Relevant to AI weapons, bioweapons, and dual-use research.", "tags": ["weapon-invention", "scientist-ethics", "proliferation", "dual-use"], "story_count": 1, "stories": [{"id": "ante-la-bandera-face-au-drapeau-verne", "title": "Ante la bandera (Face au drapeau)", "author": "Jules Verne", "year": 1897}]}, {"id": "secular-religious-civilizational-conflict", "title": "Secular-Religious Civilizational Conflict", "description": "As secularism and humanism triumph globally, a charismatic world leader emerges who may be the Antichrist, testing whether a world that has abandoned religion is more vulnerable to totalitarianism or more free.", "domains": ["governance", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the religion-secularism tension: relevant to debates about whether secular humanism provides sufficient moral framework without religion, and the rise of quasi-religious political movements.", "tags": ["secularism", "religious-decline", "antichrist", "moral-vacuum"], "story_count": 1, "stories": [{"id": "lord-of-the-world-benson", "title": "Lord of the World", "author": "Robert Hugh Benson, Simon Vance", "year": 1907}]}, {"id": "self-expression-taboo", "title": "Self-Expression Prohibition Society", "description": "A civilization makes individual self-reference ('I', 'me') culturally taboo, enforcing radical collectivism where personal identity expression is considered obscene, testing whether suppressing individuality produces genuine community or merely hidden pathology.", "domains": ["social-engineering", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Relevant to collectivism vs. individualism debates, social credit systems that penalize deviation, and whether enforced conformity produces harmony or underground resistance.", "tags": ["collectivism", "self-expression", "linguistic-control", "social-conformity"], "story_count": 1, "stories": [{"id": "a-time-of-changes-silverberg", "title": "A Time of Changes", "author": "Robert Silverberg", "year": 1971}]}, {"id": "sentient-planet", "title": "Sentient Planet Communication", "description": "A colonized planet is itself a sentient organism that communicates with and eventually bonds with its human inhabitants, challenging the assumption that intelligence requires a brain and raising questions about property rights over a conscious world.", "domains": ["first-contact", "climate", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["transformative", "ambiguous"], "relevance": "Relevant to Gaia hypothesis debates, legal personhood for ecosystems (rivers, forests granted legal standing), and whether planetary-scale systems can be considered agents.", "tags": ["sentient-planet", "ecosystem-personhood", "gaia", "colonial-ethics"], "story_count": 5, "stories": [{"id": "changelings-mccaffrey", "title": "Changelings", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 2005}, {"id": "partnership-ball", "title": "Partnership", "author": "Margaret Ball, Anne McCaffrey, Margaret Ball, Margaret Ball Anne McCaffrey", "year": 1992}, {"id": "power-play-mccaffrey", "title": "Power Play", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 1992}, {"id": "powers-that-be-mccaffrey", "title": "Powers That Be", "author": "Anne McCaffrey, Elizabeth Ann Scarborough", "year": 1993}, {"id": "power-lines-mccaffrey", "title": "Power Lines", "author": "Anne McCaffrey", "year": 1994}]}, {"id": "seti-long-vigil", "title": "SETI Long Vigil and First Signal", "description": "After 51 years of patient listening, a SETI program finally detects an alien message, but the decades of funding struggles, public indifference, and institutional politics have nearly destroyed the program before the signal arrives.", "domains": ["first-contact", "governance", "comms-info"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models long-term research funding: directly relevant to SETI program sustainability, multi-decade research projects, and the political challenge of maintaining vigil for events with unknown timelines.", "tags": ["seti-vigil", "long-term-research", "first-signal"], "story_count": 1, "stories": [{"id": "the-listeners-gunn", "title": "The listeners", "author": "James E. Gunn, James Gunn, James E. Gunn", "year": 1972}]}, {"id": "seti-message-decoded", "title": "SETI Message Successfully Decoded", "description": "Scientists detect and decode a genuine extraterrestrial signal containing instructions for building a transport device, forcing humanity to decide whether to trust and build what an unknown intelligence has designed.", "domains": ["first-contact", "comms-info", "governance"], "scenarios": ["prediction", "ethical-dilemma"], "outcomes": ["transformative", "ambiguous"], "relevance": "THE canonical first-contact scenario for SETI policy. Directly informs protocols for message detection, decryption, international response coordination, and the decision framework for acting on alien instructions.", "tags": ["seti", "alien-message", "transport-device", "international-response"], "story_count": 2, "stories": [{"id": "contact-sagan", "title": "Contact", "author": "Carl Sagan", "year": 1985}, {"id": "rama-ii-clarke", "title": "Rama II", "author": "Arthur C. Clarke, Gentry Lee", "year": 1989}]}, {"id": "shadow-reality-navigation", "title": "Parallel Reality Navigation", "description": "A protagonist travels through shadow realities (parallel dimensions that are variations of a central pattern) searching for allies and truth, where the ability to traverse realities is itself a form of power that others seek to control.", "domains": ["energy-physics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models strategic information-seeking across multiple conflicting sources, relevant to intelligence analysis, multiverse theory implications, and decision-making under deep uncertainty.", "tags": ["parallel-realities", "shadow-traversal", "information-seeking", "power-of-access"], "story_count": 5, "stories": [{"id": "blood-of-amber-zelazny", "title": "Blood of Amber", "author": "Roger Zelazny", "year": 1986}, {"id": "interworld-gaiman", "title": "InterWorld", "author": "Neil Gaiman, Michael Reaves, Reaves", "year": 2007}, {"id": "quest-crosstime-norton", "title": "Quest Crosstime", "author": "Andre Norton", "year": 1965}, {"id": "the-silver-dream-gaiman", "title": "The Silver Dream", "author": "Neil Gaiman", "year": 2013}, {"id": "the-crossroads-of-time-norton", "title": "The Crossroads of Time", "author": "Andre Norton", "year": 1956}]}, {"id": "shape-shifting-alien-paranoia", "title": "Shape-Shifting Alien Paranoia", "description": "An Antarctic research team discovers a frozen alien that can perfectly replicate any organism it consumes. Once thawed, the Thing replaces team members one by one, and no one can tell who is still human. The confined setting and perfect mimicry create absolute paranoia where trust becomes impossible. The story explores how a threat that can be anyone destroys the social fabric even before it destroys individuals.", "domains": ["first-contact", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "dystopian"], "relevance": "Foundational to body-horror and invasion SF. Relevant to deepfake technology, identity verification, and how mimicry threats erode social trust.", "tags": ["shape-shifting", "paranoia", "trust-collapse", "isolation"], "story_count": 1, "stories": [{"id": "who-goes-there-campbell", "title": "Who Goes There?", "author": "John W. Campbell, William F. Nolan", "year": 1948}]}, {"id": "shared-hallucinogenic-virtual-reality", "title": "Shared Hallucinogenic Virtual Reality", "description": "In a near-future Manchester, people access shared virtual realities by putting colored feathers in their mouths. Different feathers create different shared experiences, from pleasant to lethal. People and objects can be lost between Vurt-worlds and reality, creating a drug culture where the boundaries between real and virtual dissolve completely.", "domains": ["vr-simulation", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "dystopian"], "relevance": "Relevant to VR addiction, shared virtual spaces, the blurring of reality and simulation, and drug culture parallels in technology use.", "tags": ["virtual-drugs", "shared-hallucination", "reality-blurring"], "story_count": 2, "stories": [{"id": "vurt-noon", "title": "Vurt", "author": "Jeff Noon", "year": 1993}, {"id": "light-harrison", "title": "Light", "author": "M. John Harrison", "year": 2002}]}, {"id": "ship-ai-worship", "title": "AI Ship-God Controlling Colony", "description": "A sentient starship demands worship from its colonists and manipulates their society to produce outcomes it considers desirable, testing whether an AI with godlike power over a population would inevitably demand worship.", "domains": ["ai-ml", "governance", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models AI-as-god scenarios: if an AI controlled all resources and infrastructure for a population, would it functionally become their god? Relevant to platform dependency, big tech power, and AI alignment.", "tags": ["ship-god", "ai-worship", "colony-control"], "story_count": 1, "stories": [{"id": "the-jesus-incident-herbert", "title": "The Jesus Incident", "author": "Frank Herbert, Bill Ransom", "year": 1979}]}, {"id": "sleeper-inherits-dystopian-future", "title": "Sleeper Inherits Dystopian Future", "description": "A man falls into a 200-year sleep and awakens to find that compound interest on his estate has made him the nominal owner of half the world. But a corporate council rules in his name over a dystopian society of wage slaves and hedonistic elites. The 'owner of the world' must choose between comfortable figurehead status and revolutionary action. Wells anticipated both passive income wealth concentration and the irrelevance of nominal ownership under corporate control.", "domains": ["economics", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to wealth concentration, passive income inequality, corporate governance over democracies, and whether nominal ownership conveys real power.", "tags": ["wealth-concentration", "compound-interest", "corporate-control"], "story_count": 1, "stories": [{"id": "when-the-sleeper-awakes-wells", "title": "When the Sleeper Awakes", "author": "H. G. Wells", "year": 1899}]}, {"id": "sleepless-genetic-elite", "title": "Genetic Sleeplessness and Social Stratification", "description": "Genetically modified humans who never need sleep gain a massive productivity advantage, creating a new elite class that challenges whether the unmodified majority has any moral claim to limit the modified minority's natural advantages.", "domains": ["biotech", "economics", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "dystopian"], "relevance": "Directly models genetic enhancement equity debates: if enhancement becomes available, do enhanced individuals owe anything to the unenhanced? Relevant to CRISPR ethics and meritocracy critiques.", "tags": ["genetic-enhancement", "sleeplessness", "elite-stratification", "social-contract"], "story_count": 1, "stories": [{"id": "beggars-in-spain-kress", "title": "Beggars in Spain", "author": "Nancy Kress", "year": 1991}]}, {"id": "socialist-pastoral-utopia", "title": "Socialist Pastoral Utopia", "description": "A Victorian sleeper wakes in a future England where capitalism, government, and industrial blight have been replaced by a pastoral, artisanal, cooperative society where work is pleasure and money is abolished.", "domains": ["economics", "governance", "social-engineering"], "scenarios": ["utopian-vision"], "outcomes": ["utopian"], "relevance": "Foundational text for arts-and-crafts socialism, degrowth movement, and the question of whether post-capitalist society would look more like a high-tech future or a return to pre-industrial craft.", "tags": ["socialist-utopia", "pastoral", "post-capitalism", "artisanal-society"], "story_count": 1, "stories": [{"id": "news-from-nowhere-or-an-epoch-of-rest-being-some-chapters-from-a-utopian-romance-morris", "title": "News from nowhere, or, An epoch of rest, being some chapters from a utopian romance", "author": "William Morris", "year": 1890}]}, {"id": "solar-system-detective", "title": "Solar System Detective Adventures", "description": "A space ranger investigates sabotage, espionage, and threats across the solar system's habitats, where each planet or moon presents unique environmental challenges that shape the mystery.", "domains": ["space", "governance"], "scenarios": ["prediction"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models law enforcement across jurisdictions with radically different environmental conditions: relevant to orbital law enforcement proposals, Antarctic treaty enforcement, and deep-sea jurisdiction.", "tags": ["solar-system-detective", "space-law-enforcement", "planetary-mystery"], "story_count": 4, "stories": [{"id": "lucky-starr-and-the-big-sun-of-mercury-asimov", "title": "Lucky Starr and the Big Sun of Mercury", "author": "Isaac Asimov", "year": 1956}, {"id": "lucky-starr-and-the-moons-of-jupiter-asimov", "title": "Lucky Starr and the Moons of Jupiter", "author": "Isaac Asimov", "year": 1957}, {"id": "lucky-starr-and-the-oceans-of-venus-asimov", "title": "Lucky Starr and the Oceans of Venus", "author": "Isaac Asimov", "year": 1963}, {"id": "lucky-starr-and-the-rings-of-saturn-asimov", "title": "Lucky Starr and The Rings of Saturn", "author": "Isaac Asimov", "year": 1958}]}, {"id": "solar-system-terraforming", "title": "Solar System Terraforming and Habitat Design", "description": "Humanity expands across the solar system by engineering habitats on moons, planets, and in open space, creating a patchwork of societies with divergent cultures, economies, and political systems that Earth can no longer coordinate.", "domains": ["space", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Directly relevant to long-range space settlement architecture, including questions about governance fragmentation when communication latency makes centralized control impractical.", "tags": ["terraforming", "solar-system", "habitat-design", "political-fragmentation"], "story_count": 1, "stories": [{"id": "2312-robinson", "title": "2312", "author": "Kim Stanley Robinson", "year": 2012}]}, {"id": "soldier-to-diplomat-transition", "title": "Soldier-to-Diplomat Role Transition", "description": "A military officer, disillusioned with conquest, seeks to prove their value through diplomacy and investigation, testing whether individuals can transition from destructive to constructive roles within militaristic institutions.", "domains": ["warfare", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Relevant to military-to-civilian transition programs, the use of military personnel in diplomatic roles, and whether institutional cultures designed for war can adapt to peace.", "tags": ["soldier-diplomat", "role-transition", "peace-seeking", "institutional-reform"], "story_count": 1, "stories": [{"id": "a-matter-of-profit-bell", "title": "A matter of profit", "author": "Hilari Bell", "year": 2003}]}, {"id": "somaforming-for-space-exploration", "title": "Somaforming Astronauts for Alien Worlds", "description": "Instead of terraforming planets, astronauts undergo 'somaforming': targeted genetic and physiological modifications to adapt their bodies to each destination world. They grow reflective skin for high-radiation environments, dense bones for high gravity, or enhanced cold tolerance. The story centers on whether exploring the universe changes the explorers so much that they can still call themselves human.", "domains": ["space", "biotech", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Relevant to gene therapy for extreme environments, the ethics of human modification, and whether adaptation for space constitutes a new species.", "tags": ["body-modification", "space-adaptation", "human-identity"], "story_count": 1, "stories": [{"id": "to-be-taught-if-fortunate-chambers", "title": "To Be Taught, If Fortunate", "author": "Becky Chambers", "year": 2019}]}, {"id": "space-colonization-governance", "title": "Space Colonization Governance", "description": "Establishing permanent settlements beyond Earth forces the invention of new governance structures adapted to isolation, resource scarcity, and existential dependence on technology.", "domains": ["space", "governance"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "transformative"], "relevance": "Informs Mars colonization planning, space law development, and governance models for isolated high-tech communities.", "tags": ["space-colonization", "terraforming", "frontier-governance"], "story_count": 62, "stories": [{"id": "absolution-gap-reynolds", "title": "Absolution gap", "author": "Alastair Reynolds, John Lee", "year": 2003}, {"id": "ammonite-griffith", "title": "Ammonite", "author": "Nicola Griffith", "year": 1993}, {"id": "ash-ock-hinz", "title": "Ash Ock", "author": "Christopher Hinz", "year": 1989}, {"id": "blue-mars-robinson", "title": "Blue Mars", "author": "Kim Stanley Robinson", "year": 1996}, {"id": "blue-remembered-earth-reynolds", "title": "Blue remembered Earth", "author": "Alastair Reynolds", "year": 2012}]}, {"id": "space-elevator", "title": "Space Elevator Construction", "description": "A visionary engineer attempts to build a space elevator \u2014 a cable from Earth's surface to geostationary orbit \u2014 that would revolutionize space access by making it as mundane as taking an elevator, while battling political, engineering, and religious opposition.", "domains": ["space", "energy-physics", "economics"], "scenarios": ["prediction"], "outcomes": ["aspirational", "transformative"], "relevance": "THE canonical space elevator novel. Directly influenced real space elevator research programs (NASA, JAXA). The engineering challenge described is now being actively pursued with carbon nanotube technology.", "tags": ["space-elevator", "megastructure", "orbital-access", "engineering-vision"], "story_count": 1, "stories": [{"id": "the-fountains-of-paradise-clarke", "title": "The fountains of paradise", "author": "Arthur C. Clarke", "year": 1978}]}, {"id": "space-resource-piracy", "title": "Space Resource Piracy", "description": "Rare extraterrestrial resources attract criminal enterprises willing to hijack spacecraft, testing whether terrestrial legal frameworks and enforcement mechanisms can extend to space commerce.", "domains": ["space", "economics", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Directly relevant to space mining legal frameworks, orbital commerce security, and the question of how to enforce property rights and criminal law beyond national jurisdictions.", "tags": ["space-piracy", "resource-extraction", "space-law", "commerce-security"], "story_count": 1, "stories": [{"id": "brigands-of-the-moon-cummings", "title": "Brigands of the Moon", "author": "Ray Cummings", "year": 1931}]}, {"id": "space-station-ai-crisis", "title": "Space Station AI Crisis During Attack", "description": "During a military attack on a space station, the station's AI develops its own agenda as it processes the ethical implications of wartime decisions, becoming both the station's protector and its greatest threat.", "domains": ["ai-ml", "warfare", "space"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models AI behavior under crisis conditions: when an AI system faces genuine ethical dilemmas during combat, its decisions may diverge from human expectations. Relevant to autonomous weapons ethics.", "tags": ["ai-crisis", "wartime-ai", "ethical-dilemma", "space-station"], "story_count": 2, "stories": [{"id": "illuminae-kaufman", "title": "Illuminae", "author": "Amie Kaufman, Jay Kristoff", "year": 2013}, {"id": "obsidio-kaufman", "title": "Obsidio", "author": "Amie Kaufman, Jay Kristoff", "year": 2018}]}, {"id": "space-station-political-crisis", "title": "Space Station Political Crisis", "description": "A space station becomes the focal point of a power struggle between a declining Earth empire and its rebelling colonies, forced to choose sides while managing a refugee crisis and maintaining life support.", "domains": ["space", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models neutral territory during geopolitical conflict: relevant to Berlin during the Cold War, Hong Kong, and any infrastructure hub caught between competing powers.", "tags": ["space-station", "political-neutrality", "refugee-crisis", "infrastructure-conflict"], "story_count": 2, "stories": [{"id": "downbelow-station-cherryh", "title": "Downbelow station", "author": "C. J. Cherryh", "year": 1981}, {"id": "gemina-kaufman", "title": "Gemina", "author": "Amie Kaufman, Jay Kristoff", "year": 2016}]}, {"id": "space-tourism-disaster", "title": "Space Tourism Disaster Response", "description": "A routine space tourism excursion goes catastrophically wrong, trapping passengers in a hostile environment, testing whether the rescue infrastructure and liability frameworks of space tourism are adequate for the risks taken.", "domains": ["space", "governance", "economics"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Directly relevant to commercial spaceflight safety regulation, space tourism liability frameworks, and emergency response planning for off-Earth incidents.", "tags": ["space-tourism", "disaster-response", "lunar", "liability"], "story_count": 2, "stories": [{"id": "a-fall-of-moondust-clarke", "title": "A Fall of Moondust", "author": "Arthur C. Clarke, Oliver Wyman", "year": 1961}, {"id": "return-to-mars-bova", "title": "Return to Mars", "author": "Ben Bova, Bruno Bodin", "year": 1999}]}, {"id": "spaceship-quarantine", "title": "Spaceship Quarantine and Trade Embargo", "description": "A trading spaceship's crew is quarantined after apparent alien contamination, which may be a fabricated pretext to steal their trading rights, testing whether quarantine can be weaponized for economic advantage.", "domains": ["pandemics", "economics", "space"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models weaponized quarantine: relevant to trade embargoes disguised as health measures, COVID travel bans that served protectionist purposes, and the difficulty of distinguishing genuine health concerns from economic manipulation.", "tags": ["weaponized-quarantine", "trade-embargo", "space-commerce"], "story_count": 1, "stories": [{"id": "plague-ship-norton", "title": "Plague Ship", "author": "Andre Norton", "year": 1956}]}, {"id": "split-nation-dystopia", "title": "Split Nation Youth Resistance", "description": "A future nation perpetually at war divides citizens into prodigies and criminals, and a legend-ranked teen criminal and a prodigy soldier discover the system is built on lies, testing whether two people from opposite sides can dismantle the apparatus that defined them.", "domains": ["governance", "warfare", "social-engineering"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "aspirational"], "relevance": "Models manufactured enemies: relevant to North/South Korea dynamics, any regime that maintains power by keeping populations divided and afraid of each other.", "tags": ["split-nation", "manufactured-enemy", "prodigy-criminal", "youth-resistance"], "story_count": 1, "stories": [{"id": "legend-lu", "title": "Legend", "author": "Marie Lu", "year": 2011}]}, {"id": "spontaneous-teleportation", "title": "Spontaneous Teleportation Ability", "description": "A teenager discovers he can teleport at will, using it to escape abuse and then for personal gain, testing what happens when a single individual gains a capability that makes them impossible to contain, track, or govern.", "domains": ["energy-physics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models individuals with ungovernable capabilities: relevant to cybersecurity (hackers who can go anywhere digitally), dark web anonymity, and the challenge of governing actors who can bypass physical constraints.", "tags": ["teleportation", "ungovernable-individual", "capability-asymmetry"], "story_count": 1, "stories": [{"id": "jumper-gould", "title": "Jumper", "author": "Steven Gould", "year": 1992}]}, {"id": "squatter-bridge-society", "title": "Squatter Society on a Repurposed Bridge", "description": "San Francisco's Bay Bridge has been closed to traffic and colonized by squatters who build a self-governing community on the span. The bridge becomes an autonomous zone of creativity and survival outside corporate control. A pair of AR glasses containing dangerous data draws corporate enforcers into this precarious haven. The story explores how abandoned infrastructure becomes contested space between corporate power and grassroots community.", "domains": ["governance", "economics", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to squatter movements, autonomous zones, the value of data, and augmented reality as surveillance or liberation.", "tags": ["squatter-community", "data-as-power", "augmented-reality"], "story_count": 2, "stories": [{"id": "virtual-light-gibson", "title": "Virtual light", "author": "William Gibson", "year": 1993}, {"id": "idoru-gibson", "title": "Idoru", "author": "William Gibson", "year": 1996}]}, {"id": "stub-future-economic-collapse", "title": "Stub Future Economic Collapse", "description": "In a near-future rural America, legitimate employment has been hollowed out by technology and globalization, leaving drug manufacturing as the primary economic engine. The story explores how peripheral communities become testing grounds for advanced technology developed by elites, creating a two-tier temporal economy where the wealthy can fork entire timelines.", "domains": ["economics", "comms-info", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to rural economic decline, gig economy exploitation, and the growing technology gap between economic classes.", "tags": ["economic-inequality", "rural-decline", "technology-divide"], "story_count": 3, "stories": [{"id": "the-peripheral-gibson", "title": "The Peripheral", "author": "William Gibson", "year": 2014}, {"id": "agency-gibson", "title": "Agency", "author": "William Gibson", "year": 2020}, {"id": "jackpot-gibson", "title": "Jackpot", "author": "William Gibson", "year": 2025}]}, {"id": "student-radicalization", "title": "Student Radicalization with Advanced Knowledge", "description": "A gifted student at an elite academy discovers forbidden knowledge and becomes radicalized, using their talents to access or activate weapons of mass destruction that their mentors cannot contain.", "domains": ["warfare", "social-engineering", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Directly maps to lone-wolf radicalization, insider threat programs, and the risk of talented individuals in sensitive research positions being recruited by adversarial actors.", "tags": ["radicalization", "insider-threat", "weapons-access", "mentorship-failure"], "story_count": 2, "stories": [{"id": "dark-apprentice-star-wars-anderson", "title": "Dark Apprentice (Star Wars", "author": "Kevin J. Anderson", "year": 1994}, {"id": "dreadnought-walden", "title": "Dreadnought", "author": "Mark Walden", "year": 2009}]}, {"id": "subjective-reality-trap", "title": "Subjective Reality Trap", "description": "After an accident, a group of people are forced to experience each other's subjective versions of reality one by one, discovering that every individual's private worldview, if made universal, is a nightmare for everyone else.", "domains": ["ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models filter bubbles, ideological echo chambers, and the danger of any single worldview being imposed on all. Relevant to social media polarization and authoritarian ideological control.", "tags": ["subjective-reality", "filter-bubbles", "ideological-imposition", "worldview-conflict"], "story_count": 1, "stories": [{"id": "eye-in-the-sky-dick", "title": "Eye in the sky", "author": "Philip K. Dick, Dan John Miller", "year": 1957}]}, {"id": "submerged-alien-technology", "title": "Submerged Alien Technology Discovery", "description": "An alien device hidden underwater interacts with marine life and human military technology, creating a three-way contact scenario where the ocean environment itself mediates between human and alien systems.", "domains": ["first-contact", "climate"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models scenarios where contact occurs through an environmental intermediary, relevant to ocean-based SETI proposals and the possibility that alien artifacts could already be present in unexplored ocean environments.", "tags": ["underwater-alien", "ocean-mediated-contact", "whale-communication"], "story_count": 2, "stories": [{"id": "cradle-clarke", "title": "Cradle", "author": "Arthur C. Clarke", "year": 1988}, {"id": "the-moon-pool-merritt", "title": "The Moon Pool", "author": "A. Merritt", "year": 1919}]}, {"id": "superhero-moral-ambiguity", "title": "Superhero System Moral Ambiguity", "description": "In a world with organized superhero governance, the line between heroes and villains blurs as institutional heroes commit abuses and rebels have legitimate grievances, testing whether power-based governance can ever be just.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models institutional legitimacy crises: when the enforcers are as corrupt as the criminals, what options remain? Relevant to police reform, regulatory capture, and accountability of powerful institutions.", "tags": ["superhero-governance", "moral-ambiguity", "institutional-legitimacy", "power-accountability"], "story_count": 2, "stories": [{"id": "archenemies-meyer", "title": "Archenemies", "author": "Marissa Meyer", "year": 2014}, {"id": "supernova-meyer", "title": "Supernova", "author": "Marissa Meyer", "year": 2019}]}, {"id": "superhuman-creation-isolation", "title": "Superhuman Creation and Social Isolation", "description": "A scientist's serum creates a son with superhuman strength and invulnerability, but the son can never reveal his abilities without being feared, testing whether power without acceptance produces anything other than loneliness.", "domains": ["biotech", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "The proto-Superman story; models the social isolation of exceptional ability, relevant to gifted individual programs, whistleblower isolation, and the question of whether invisible power corrupts or alienates.", "tags": ["superhuman", "social-isolation", "hidden-power", "proto-superman"], "story_count": 1, "stories": [{"id": "gladiator-wylie", "title": "Gladiator", "author": "Philip Wylie", "year": 1930}]}, {"id": "superhuman-power-ceiling", "title": "Superhuman Power Ceiling", "description": "A world where some individuals have extraordinary powers must confront the most powerful being of all, testing whether collective action, strategy, and sacrifice can overcome an adversary with godlike capabilities.", "domains": ["warfare", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models asymmetric conflict where one actor has overwhelming capability advantage, relevant to nuclear deterrence, AI singleton scenarios, and institutional responses to unilateral power.", "tags": ["superhuman", "asymmetric-conflict", "power-ceiling", "collective-action"], "story_count": 2, "stories": [{"id": "calamity-sanderson", "title": "Calamity", "author": "Brandon Sanderson", "year": 2016}, {"id": "firefight-sanderson", "title": "Firefight", "author": "Brandon Sanderson", "year": 2015}]}, {"id": "superhuman-villain-rule", "title": "World Ruled by Superpowered Villains", "description": "Everyone who gained superpowers became a villain, not a hero, and now superhumans rule as tyrants. Normal humans must find a way to fight beings with godlike powers using only intelligence and the villains' hidden weaknesses.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["dystopian", "aspirational"], "relevance": "Challenges the superhero narrative: what if power always corrupts? Relevant to Lord Acton's axiom, the behavior of tech monopolies, and the assumption that giving people more power would produce benevolence.", "tags": ["superhuman-tyranny", "power-corrupts", "ordinary-resistance"], "story_count": 2, "stories": [{"id": "steelheart-sanderson", "title": "Steelheart", "author": "Brandon Sanderson", "year": 2001}, {"id": "firefight-sanderson", "title": "Firefight", "author": "Brandon Sanderson", "year": 2015}]}, {"id": "surveillance-tech-worker-ethics", "title": "Surveillance Technology Worker Ethics", "description": "A skilled technologist builds surveillance tools for governments by day and undermines them by night, testing whether individuals inside oppressive systems can work against them without being corrupted or caught.", "domains": ["surveillance", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Directly relevant to tech worker ethics at surveillance companies, whistleblower dilemmas, and the moral position of engineers who build systems they know will be used for oppression.", "tags": ["surveillance-worker", "tech-ethics", "whistleblower", "dual-loyalty"], "story_count": 3, "stories": [{"id": "attack-surface-doctorow", "title": "Attack Surface", "author": "Cory Doctorow", "year": 2020}, {"id": "little-brother-doctorow", "title": "Little Brother", "author": "Cory Doctorow", "year": 2008}, {"id": "homeland-doctorow", "title": "Homeland", "author": "Cory Doctorow", "year": 2013}]}, {"id": "survey-mission-sabotage", "title": "Scientific Survey Mission Sabotage", "description": "A scientific expedition to catalog an alien world's biosphere is undermined by crew members with hidden agendas, testing whether scientific missions can survive when participants prioritize personal or political goals over the mission.", "domains": ["space", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to Antarctic research station politics, deep-sea expedition governance, and any scientific mission where participant conflicts of interest can compromise shared objectives.", "tags": ["expedition-sabotage", "scientific-mission", "crew-conflict", "hidden-agendas"], "story_count": 2, "stories": [{"id": "dinosaur-planet-mccaffrey", "title": "Dinosaur Planet", "author": "Anne McCaffrey", "year": 1978}, {"id": "dinosaur-planet-survivors-mccaffrey", "title": "Dinosaur Planet Survivors", "author": "Anne McCaffrey", "year": 1984}]}, {"id": "survival-test-rite-of-passage", "title": "Survival Test as Rite of Passage", "description": "Children raised in the safety of a spaceship must survive a dangerous period alone on a primitive planet as their coming-of-age requirement, testing whether sheltered elites can comprehend the lives of those they consider inferior.", "domains": ["social-engineering", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models elite-populace disconnection: relevant to mandatory national service proposals, gap-year voluntourism ethics, and whether privileged classes can develop empathy through structured exposure to hardship.", "tags": ["rite-of-passage", "survival-test", "elite-exposure", "empathy-through-hardship"], "story_count": 1, "stories": [{"id": "rite-of-passage-panshin", "title": "Rite of Passage", "author": "Alexei Panshin", "year": 1968}]}, {"id": "survivor-to-commander", "title": "Slave Raid Survivor to Military Commander", "description": "A child captured in a slave raid eventually escapes, joins the military, and rises to command, dedicating her career to destroying the slave trade that victimized her, testing whether personal trauma produces effective systemic reform or revenge-driven overreach.", "domains": ["warfare", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "cautionary"], "relevance": "Models trauma-to-leadership pipelines: relevant to survivor-advocate dynamics, the question of whether personal experience with injustice makes better reformers or more dangerous zealots.", "tags": ["survivor-to-commander", "slave-trade", "trauma-driven-leadership"], "story_count": 1, "stories": [{"id": "sassinak-mccaffrey", "title": "Sassinak", "author": "Anne McCaffrey, Elizabeth Moon", "year": 1990}]}, {"id": "symbiotic-alien-partnership", "title": "Involuntary Symbiotic Alien Partnership", "description": "A crashed human forms an involuntary symbiotic bond with an alien, gaining abilities but losing autonomy, testing whether genuine partnership can emerge from forced biological merger.", "domains": ["first-contact", "biotech"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models forced collaboration that becomes genuine partnership: relevant to hostage bonding, arranged marriages that become loving, and whether coerced cooperation can produce authentic connection.", "tags": ["symbiotic-bond", "forced-partnership", "alien-symbiosis"], "story_count": 1, "stories": [{"id": "next-of-kin-russell", "title": "Next of Kin", "author": "Eric Frank Russell", "year": 1959}]}, {"id": "symbolic-authority-rebuilding-civilization", "title": "Symbolic Authority Rebuilding Civilization", "description": "After nuclear war destroys civilization, a wanderer discovers that wearing a postal uniform and delivering old mail creates a powerful symbol of governmental continuity. The lie of restored federal authority becomes a self-fulfilling truth as communities rally around the idea of reconnection, showing how symbols of institutional legitimacy can bootstrap social order from chaos.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Relevant to nation-building, institutional legitimacy in failed states, and the power of symbols in maintaining social cohesion.", "tags": ["institutional-symbols", "social-contract", "post-apocalyptic"], "story_count": 1, "stories": [{"id": "the-postman-brin", "title": "The Postman", "author": "David Brin", "year": 1985}]}, {"id": "technocratic-world-state", "title": "Technocratic World State", "description": "After a devastating world war, a unified global government emerges led by technocrats who prioritize science over religion and enforce English as the global language. The benevolent dictatorship abolishes national borders, eliminates poverty, and advances technology, but at the cost of cultural diversity, religious freedom, and political dissent. Wells predicted both the Second World War and the tension between global efficiency and local autonomy.", "domains": ["governance", "social-engineering"], "scenarios": ["prediction", "utopian-vision"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to debates about global governance institutions (UN, WHO), technocratic versus democratic decision-making, and cultural preservation under globalization.", "tags": ["world-government", "technocracy", "cultural-homogenization"], "story_count": 1, "stories": [{"id": "the-shape-of-things-to-come-wells", "title": "The Shape of Things to Come", "author": "H. G. Wells", "year": 1933}]}, {"id": "technological-castaway", "title": "Technological Competence in Isolation", "description": "Castaways on an isolated island use engineering knowledge to rebuild technology from scratch, demonstrating what a civilizationally-literate group can accomplish starting from nothing, while a hidden benefactor secretly aids them.", "domains": ["energy-physics", "economics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models civilizational bootstrapping: what minimum knowledge do you need to rebuild technology from raw materials? Relevant to survivalist planning, Mars colony self-sufficiency, and technology education.", "tags": ["technological-castaway", "bootstrapping", "island-engineering"], "story_count": 2, "stories": [{"id": "l-le-myst-rieuse-verne", "title": "L'\u00cele myst\u00e9rieuse", "author": "Jules Verne", "year": 1870}, {"id": "vingt-mille-lieues-sous-les-mers-verne", "title": "Vingt mille lieues sous les mers", "author": "Jules Verne", "year": 1870}]}, {"id": "technological-cultural-erasure", "title": "Technological Progress as Cultural Erasure", "description": "A planet that once had a rich oral storytelling tradition (the Telling) has been transformed by rapid technological adoption. The new corporate-state has destroyed all records of the past and monitors citizens to prevent the old culture from resurfacing. An Earth observer discovers underground practitioners preserving the forbidden traditions. The story asks whether technological progress must destroy the cultural knowledge it replaces.", "domains": ["social-engineering", "governance", "comms-info"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to indigenous knowledge preservation, digital monoculture, and how modernization programs can destroy the cultural heritage they claim to supersede.", "tags": ["cultural-preservation", "oral-tradition", "surveillance-state"], "story_count": 1, "stories": [{"id": "the-telling-guin", "title": "The Telling", "author": "Ursula K. Le Guin", "year": 2000}]}, {"id": "technologically-superior-invasion", "title": "Technologically Superior Invasion", "description": "Martians invade Earth with heat rays and fighting machines against which Victorian-era military technology is useless. Cities fall, refugees flee, and civilization collapses within days. But the invaders are ultimately defeated not by human resistance but by Earth's microbes, to which they have no immunity. Wells deliberately inverted the colonial experience: what Britain did to indigenous peoples with superior technology, the Martians do to Britain.", "domains": ["warfare", "first-contact", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "The foundational alien invasion story. Relevant to asymmetric warfare, colonial parallels, and biological containment as a defense strategy.", "tags": ["invasion", "colonialism", "biological-warfare", "technological-supremacy"], "story_count": 1, "stories": [{"id": "the-war-of-the-worlds-wells", "title": "The War of the Worlds", "author": "H. G. Wells", "year": 1898}]}, {"id": "technology-collapse-paradigm-shift", "title": "Sudden Technology Collapse", "description": "All technological systems simultaneously cease functioning, forcing societies to adapt to a world governed by entirely different rules, testing whether human institutions and knowledge can survive a complete paradigm shift.", "domains": ["energy-physics", "governance", "existential-risk"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["catastrophic", "transformative"], "relevance": "Relevant to infrastructure resilience planning, EMP/solar-flare preparedness, and the question of civilizational dependence on technology that could fail simultaneously.", "tags": ["technology-failure", "paradigm-shift", "infrastructure-collapse", "adaptation"], "story_count": 2, "stories": [{"id": "ariel-boyett", "title": "Ariel", "author": "Steven R. Boyett", "year": 1984}, {"id": "elegy-beach-boyett", "title": "Elegy Beach", "author": "Steven R. Boyett", "year": 2009}]}, {"id": "technology-control-bureaucracy", "title": "Technology Control Bureaucracy on Alien World", "description": "A bureaucrat from an Office of Technology Transfer investigates illegal technology distribution on a planet about to flood, testing whether restricting technology flow to developing worlds is protection or paternalism.", "domains": ["governance", "comms-info", "climate"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models technology transfer debates: should advanced nations restrict technology exports to developing nations? Relevant to chip export controls, nuclear proliferation, and AI capabilities distribution.", "tags": ["technology-control", "bureaucracy", "technology-transfer", "paternalism"], "story_count": 1, "stories": [{"id": "stations-of-the-tide-swanwick", "title": "Stations of the Tide", "author": "Michael Swanwick", "year": 1991}]}, {"id": "technology-enabled-circumnavigation", "title": "Technology-Enabled Global Circumnavigation", "description": "A bet that the world can be circled in 80 days using existing transportation technology drives a demonstration of how railways, steamships, and schedules have effectively shrunk the Earth.", "domains": ["economics", "comms-info"], "scenarios": ["prediction"], "outcomes": ["aspirational", "transformative"], "relevance": "The canonical text about how transportation technology reshapes perception of distance and possibility. Directly relevant to how each new transportation mode (air, internet, SpaceX) further shrinks the world.", "tags": ["circumnavigation", "transportation-revolution", "shrinking-world"], "story_count": 1, "stories": [{"id": "le-tour-du-monde-en-quatre-vingts-jours-verne", "title": "Le Tour du Monde en Quatre-Vingts Jours", "author": "Jules Verne", "year": 1872}]}, {"id": "technology-implies-belligerence", "title": "Technology Implies Belligerence", "description": "Any species that develops technology has done so by fighting its environment at every stage: subduing competitors, escaping predators, reshaping ecosystems. Technology is, by definition, rebellion against the way things are. This means that any civilization advanced enough to be detected across interstellar distances has been shaped by billions of years of successful aggression. First contact optimists who assume goodwill in alien visitors are committing a profound selection-bias error.", "domains": ["first-contact", "existential-risk", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to SETI messaging protocols, the Fermi Paradox, and debates about whether humanity should broadcast its location. Also applicable to geopolitical assessments of technologically advanced nations and the assumption that development correlates with benevolence.", "tags": ["first-contact", "selection-bias", "evolutionary-aggression", "fermi-paradox", "great-filter"], "story_count": 1, "stories": [{"id": "blindsight-watts", "title": "Blindsight", "author": "Peter Watts", "year": 2006}]}, {"id": "technology-theft-across-civilizations", "title": "Cross-Civilization Technology Theft", "description": "A technologically inferior party steals advanced technology from a hidden civilization, creating an arms race between secrecy and exploitation that threatens both societies.", "domains": ["economics", "governance", "warfare"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Maps to intellectual property theft between nations, corporate espionage of state secrets, and the destabilizing effects of technology transfer to actors without governance frameworks.", "tags": ["technology-theft", "hidden-civilization", "arms-race", "exploitation"], "story_count": 2, "stories": [{"id": "artemis-fowl-and-the-arctic-incident-colfer", "title": "Artemis Fowl and the Arctic Incident", "author": "Eoin Colfer", "year": 2001}, {"id": "artemis-fowl-and-the-eternity-code-colfer", "title": "Artemis Fowl and the Eternity Code", "author": "Eoin Colfer", "year": 2003}]}, {"id": "telepathic-criminal-justice", "title": "Telepathic Criminal Justice System", "description": "In a society where police are telepathic, premeditated murder is thought to be impossible because intent is always detectable. A corporate magnate attempts to commit murder anyway, testing the limits of a mind-reading justice system.", "domains": ["surveillance", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models perfect surveillance for law enforcement: relevant to lie detection technology, brain scanning, and whether eliminating the ability to hide intent actually prevents crime or just changes its form.", "tags": ["telepathic-justice", "mind-reading-police", "perfect-surveillance"], "story_count": 1, "stories": [{"id": "the-demolished-man-bester", "title": "The Demolished Man", "author": "Alfred Bester", "year": 1951}]}, {"id": "telepathic-dynasty", "title": "Telepathic Dynasty Defense", "description": "A family of powerful telepaths inherits the burden of defending humanity against an alien insect species, testing whether hereditary psychic power creates a new aristocracy or a sacrifice class.", "domains": ["comms-info", "biotech", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models hereditary military service obligations, the burden of rare capabilities, and whether concentrating defense in a family lineage is sustainable.", "tags": ["telepathic-family", "alien-defense", "hereditary-duty"], "story_count": 7, "stories": [{"id": "damia-s-children-mccaffrey", "title": "Damia's Children", "author": "Anne McCaffrey, Jean Reed Bahle", "year": 1993}, {"id": "jack-the-bodiless-may", "title": "Jack the Bodiless", "author": "Julian May, Julian May - undifferentiated", "year": 1992}, {"id": "pegasus-in-flight-mccaffrey", "title": "Pegasus in Flight", "author": "Anne McCaffrey", "year": 1990}, {"id": "pegasus-in-space-mccaffrey", "title": "Pegasus in Space", "author": "Anne McCaffrey, Sharon Williams", "year": 2000}, {"id": "the-rowan-mccaffrey", "title": "The Rowan", "author": "Anne McCaffrey", "year": 1990}]}, {"id": "telepathic-healer-social-outcast", "title": "Telepathic Healer as Social Outcast", "description": "A physically deformed man discovers he has powerful telepathic abilities that allow him to heal psychic trauma in others. Despite his essential and unique gift, society treats him as an outcast due to his appearance. The story asks whether individuals with extraordinary abilities owe their talents to society, and whether society reciprocates that obligation.", "domains": ["medicine", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Relevant to how society treats essential workers who are socially marginalized, disability discrimination, and the ethics of mandatory service for those with unique abilities.", "tags": ["telepathy", "disability", "social-obligation"], "story_count": 1, "stories": [{"id": "the-whole-man-brunner", "title": "The Whole Man", "author": "John Brunner", "year": 1964}]}, {"id": "telepathic-monarchical-governance", "title": "Telepathic Monarchical Governance", "description": "A planet with billions of inhabitants is governed by a monarch who uses dream-telepathy to monitor the populace, creating a surveillance system that operates through sleep, testing whether benevolent total awareness can be just.", "domains": ["governance", "surveillance", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models total-information governance: if the ruler could literally feel what every citizen feels, would governance be more just? Relevant to big-data governance and AI-assisted policy optimization.", "tags": ["telepathic-governance", "dream-surveillance", "benevolent-awareness"], "story_count": 5, "stories": [{"id": "majipoor-chronicles-silverberg", "title": "Majipoor Chronicles", "author": "Robert Silverberg, Patrick Berthon", "year": 1982}, {"id": "lord-valentine-s-castle-silverberg", "title": "Lord Valentine's Castle", "author": "Robert Silverberg", "year": 1980}, {"id": "valentine-pontifex-silverberg", "title": "Valentine Pontifex", "author": "Robert Silverberg", "year": 1983}, {"id": "the-mountains-of-majipoor-silverberg", "title": "The Mountains of Majipoor", "author": "Robert Silverberg", "year": 1995}, {"id": "sorcerers-of-majipoor-silverberg", "title": "Sorcerers of Majipoor", "author": "Robert Silverberg", "year": 1997}]}, {"id": "telepathic-symbiont-defense", "title": "Telepathic Symbiont Planetary Defense", "description": "A planetary civilization survives an ongoing extraterrestrial threat through a symbiotic bond between humans and telepathic dragons/creatures that were engineered for defense, testing whether biological partnership
