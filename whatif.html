h, death is desirable, darkness is preferred. The encounter forces outsiders to question whether their own value system is natural or equally arbitrary.", "domains": ["social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "A tool for cultural relativism analysis: useful for stress-testing policy assumptions by imagining societies with inverted incentive structures.", "tags": ["inverted-values", "cultural-relativism", "hidden-civilization", "value-system"], "story_count": 1, "stories": [{"id": "a-strange-manuscript-found-in-a-copper-cylinder-mille", "title": "A strange manuscript found in a copper cylinder", "author": "James De Mille", "year": 1888}]}, {"id": "invisibility-madness", "title": "Invisibility and Social Disconnection", "description": "A scientist who achieves invisibility discovers that being unseen severs him from all social bonds, driving him to megalomania and violence, testing whether visibility is a prerequisite for morality.", "domains": ["medicine", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "catastrophic"], "relevance": "Models the Ring of Gyges problem: would you act morally if no one could see you? Directly relevant to online anonymity, invisible surveillance, and the behavioral effects of unaccountability.", "tags": ["invisibility", "moral-disconnection", "anonymity-ethics"], "story_count": 1, "stories": [{"id": "the-invisible-man-wells", "title": "The Invisible Man", "author": "H. G. Wells", "year": 1897}]}, {"id": "involuntary-memory-linking", "title": "Involuntary Memory Linking Between Strangers", "description": "An electromagnetic pulse accidentally links the memories of a group of strangers so each person can access another's complete life memories. The US President's memories become accessible to a random civilian, creating a national security crisis. The story explores what total transparency of thought means for privacy, security, and interpersonal relationships.", "domains": ["comms-info", "surveillance", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to brain-computer interfaces that might leak thoughts, radical transparency movements, and privacy in the age of total information access.", "tags": ["memory-transparency", "thought-privacy", "national-security"], "story_count": 1, "stories": [{"id": "triggers-sawyer", "title": "Triggers", "author": "Robert J. Sawyer", "year": 2012}]}, {"id": "involuntary-precognition", "title": "Involuntary Precognition of Historical Events", "description": "A history professor involuntarily blurts out events that haven't happened yet during lectures, unable to control when future knowledge surfaces, testing how institutions handle someone who is provably right about the future but appears insane.", "domains": ["time-travel", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the Cassandra problem: someone with accurate foreknowledge whom no one believes. Relevant to ignored expert warnings, whistleblower credibility, and how institutions dismiss inconvenient truth-tellers.", "tags": ["involuntary-precognition", "cassandra-problem", "institutional-dismissal"], "story_count": 1, "stories": [{"id": "the-edge-of-the-knife-piper", "title": "The Edge of the Knife", "author": "H. Beam Piper", "year": 2006}]}, {"id": "involuntary-temporal-displacement", "title": "Involuntary Temporal Displacement to Galactic Future", "description": "An ordinary person is accidentally transported to the far future where Earth is a minor backwater in a galactic empire, and his modern knowledge becomes both an asset and a danger in a society that fears Earthlings.", "domains": ["time-travel", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models culture shock taken to extremes: what if the gap between your knowledge and everyone else's was measured in millennia? Relevant to refugee integration, cultural displacement, and knowledge asymmetry.", "tags": ["temporal-displacement", "galactic-empire", "cultural-refugee"], "story_count": 1, "stories": [{"id": "pebble-in-the-sky-asimov", "title": "Pebble in the Sky", "author": "Isaac Asimov", "year": 1950}]}, {"id": "involuntary-temporal-swap", "title": "Involuntary Temporal Identity Swap", "description": "A person is periodically swapped with someone from a different time period, living their life in alternating days, testing how much of identity is tied to temporal context rather than personality.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the experience of living between two incompatible contexts (immigrant experience, cultural code-switching) and the psychological cost of maintaining dual identities.", "tags": ["temporal-swap", "dual-identity", "context-dependence", "identity-fragility"], "story_count": 1, "stories": [{"id": "charlotte-sometimes-farmer", "title": "Charlotte Sometimes", "author": "Penelope Farmer", "year": 1969}]}, {"id": "isolated-evolutionary-hotspot", "title": "Isolated Evolutionary Hotspot", "description": "Scientists discover an isolated landmass where evolution has produced organisms far more dangerous and efficient than anything on the main continents, revealing that isolation can produce hyper-competitive ecosystems.", "domains": ["biotech", "existential-risk", "climate"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models invasive species dynamics at extreme scale: what happens when hyper-evolved organisms from an isolated ecosystem are introduced to the wider world? Relevant to biosecurity and de-isolation risks.", "tags": ["evolutionary-hotspot", "isolated-ecosystem", "hyper-evolution", "biosecurity"], "story_count": 4, "stories": [{"id": "fragment-fahy", "title": "Fragment", "author": "Warren Fahy", "year": 2009}, {"id": "the-lost-world-crichton", "title": "The Lost World", "author": "Michael Crichton", "year": 1995}, {"id": "the-lost-world-doyle", "title": "The Lost World", "author": "Arthur Conan Doyle", "year": 1900}, {"id": "pandemonium-fahy", "title": "Pandemonium", "author": "Warren Fahy", "year": 2013}]}, {"id": "kidnapped-for-alien-entertainment", "title": "Kidnapped for Alien Entertainment", "description": "Children kidnapped from Earth are forced to perform dangerous acrobatics in an alien arena, where their performance determines whether they live or die, testing whether the powerful ever view the powerless as anything but entertainment.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models human trafficking for entertainment, gladiatorial dynamics, and the ethics of spectatorship when vulnerability is the show. Relevant to child exploitation and performance-under-coercion.", "tags": ["alien-arena", "child-kidnapping", "performance-coercion"], "story_count": 1, "stories": [{"id": "galax-arena-rubinstein", "title": "Galax-arena", "author": "Gillian Rubinstein", "year": 1993}]}, {"id": "knowledge-consumption-species", "title": "Species That Physically Consumes Knowledge", "description": "A secret lineage of humans who literally eat books to absorb their contents must decide what stories to feed their children, because the narratives they consume become their personality, testing whether identity is a product of information diet.", "domains": ["social-engineering", "ethics-philosophy", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "A literal metaphor for media diet shaping identity: directly relevant to algorithmic content curation, childhood media effects, and the question of whether we are what we consume.", "tags": ["book-eaters", "information-diet", "narrative-identity"], "story_count": 1, "stories": [{"id": "the-book-eaters-dean", "title": "The Book Eaters", "author": "Sunyi Dean", "year": 2022}]}, {"id": "knowledge-loss-after-plague", "title": "Knowledge Loss After Plague", "description": "Sixty years after a devastating plague, an elderly survivor tries to teach the young generation about pre-plague civilization. But the tribal children cannot comprehend concepts like reading, democracy, or science. The story warns that civilization's accumulated knowledge can vanish within a single generation if transmission mechanisms (schools, books, institutions) are destroyed.", "domains": ["social-engineering", "pandemics"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Relevant to knowledge preservation efforts (Long Now Foundation), concerns about institutional knowledge loss, and pandemic preparedness planning.", "tags": ["knowledge-preservation", "civilizational-regression"], "story_count": 2, "stories": [{"id": "the-scarlet-plague-london", "title": "The Scarlet Plague", "author": "Jack London", "year": 1910}, {"id": "the-story-of-general-dann-and-mara-s-daughter-griot-and-the-snow-dog-lessing", "title": "The Story of General Dann and Mara's daughter, Griot and the Snow Dog", "author": "Doris Lessing", "year": 2005}]}, {"id": "knowledge-preservation-after-collapse", "title": "Knowledge Preservation After Civilizational Collapse", "description": "After a nuclear war destroys civilization, religious orders preserve fragments of scientific knowledge for centuries without understanding them, raising the question of whether humanity is doomed to cyclically rediscover and re-weaponize the same destructive technologies.", "domains": ["existential-risk", "governance", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["cautionary", "catastrophic"], "relevance": "Directly relevant to civilizational resilience planning, long-term knowledge preservation (e.g., nuclear waste markers, seed vaults), and the cyclical nature of technological risk.", "tags": ["knowledge-preservation", "civilizational-cycle", "post-nuclear", "monastery"], "story_count": 2, "stories": [{"id": "a-canticle-for-leibowitz-jr", "title": "A Canticle for Leibowitz", "author": "Walter M. Miller Jr., \u0412\u043e\u043b\u0442\u0435\u0440 \u041c\u0430\u0439\u043a\u043b \u041c\u0456\u043b\u043b\u0435\u0440-\u043c\u043e\u043b\u043e\u0434\u0448\u0438\u0439", "year": 1959}, {"id": "saint-leibowitz-and-the-wild-horse-woman-jr", "title": "Saint Leibowitz and the Wild Horse Woman", "author": "Walter M. Miller Jr.", "year": 1997}]}, {"id": "language-as-virus", "title": "Language as Biological Virus", "description": "Language itself is revealed to be a viral mechanism, a parasitic information structure that rewrites neural pathways and controls behavior. The 'word virus' spreads through media, rewriting reality for its hosts. Resisting it requires cutting oneself off from all communication.\n\nThe scenario frames information and narrative as literally infectious, questioning the boundary between persuasion and parasitism.", "domains": ["comms-info", "biotech", "pandemics"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Prescient model for memetic warfare, disinformation campaigns, social media addiction, and how narrative structures can hijack cognition at scale.", "tags": ["memetic-virus", "language-control", "information-warfare", "media-parasitism"], "story_count": 2, "stories": [{"id": "nova-express-burroughs", "title": "Nova Express", "author": "William S. Burroughs", "year": 1964}, {"id": "if-there-were-no-benny-cemoli-dick", "title": "If There Were No Benny Cemoli", "author": "Philip K. Dick", "year": 1963}]}, {"id": "language-determines-society", "title": "Language Engineering Determines Social Structure", "description": "A ruler engineers new languages for his planet's population, each designed to produce specific social behaviors (warrior language, merchant language, scientist language), testing the Sapir-Whorf hypothesis as a tool of governance.", "domains": ["social-engineering", "governance", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models linguistic engineering: relevant to political language manipulation (newspeak), programming language design shaping developer thinking, and whether designed languages can reshape behavior.", "tags": ["language-engineering", "sapir-whorf", "behavioral-design"], "story_count": 1, "stories": [{"id": "the-languages-of-pao-vance", "title": "The Languages of Pao", "author": "Jack Vance", "year": 1958}]}, {"id": "last-ditch-titan-mission", "title": "Last-Ditch Crewed Mission to Titan", "description": "As NASA faces cancellation and anti-science politics dominate, a last-gasp crewed mission to Saturn's moon Titan launches. The story follows decades of the mission while Earth's civilization declines behind them. The astronauts become humanity's most distant representatives just as humanity abandons space exploration, raising the question of whether frontier missions are worth their cost when the home civilization cannot sustain them.", "domains": ["space", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to NASA funding debates, anti-science movements, and whether long-duration space missions can outlast the political will that launched them.", "tags": ["space-exploration-politics", "anti-science", "frontier-missions"], "story_count": 2, "stories": [{"id": "titan-baxter", "title": "Titan", "author": "Stephen Baxter", "year": 1997}, {"id": "voyage-baxter", "title": "Voyage", "author": "Stephen Baxter", "year": 1996}]}, {"id": "last-man-psychological-collapse", "title": "Last Man Psychological Collapse", "description": "A toxic purple cloud sweeps the Earth killing all human life except one man. The sole survivor's psychology deteriorates as absolute solitude, unlimited material wealth, and zero accountability erode his moral compass. He begins destroying cities for entertainment, exploring how the absence of society strips away the social constructs that maintain sanity and ethics.", "domains": ["ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Explores how social isolation affects psychology and morality, relevant to solitary confinement debates, pandemic isolation, and the social foundations of ethics.", "tags": ["last-man", "isolation", "moral-decay"], "story_count": 1, "stories": [{"id": "the-purple-cloud-shiel", "title": "The Purple Cloud", "author": "M. P. Shiel, J. J. Cameron, Brian Stableford", "year": 1901}]}, {"id": "last-survivor-psychology", "title": "Psychology of the Last Human Survivor", "description": "When plague or catastrophe eliminates all of humanity except one person, the survivor's psychology collapses under the weight of absolute solitude. Without society, language loses purpose, morality becomes meaningless, and identity itself dissolves.\n\nThe scenario tests which aspects of human consciousness require other minds to sustain them.", "domains": ["pandemics", "ethics-philosophy", "medicine"], "scenarios": ["thought-experiment"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "Informs pandemic worst-case planning, solitary confinement ethics, long-duration space mission psychology, and the philosophical question of whether consciousness is inherently social.", "tags": ["solitude", "last-survivor", "identity-dissolution"], "story_count": 1, "stories": [{"id": "the-last-man-shelley", "title": "The Last Man", "author": "Mary Shelley", "year": 1826}]}, {"id": "last-survivors-colony-ship", "title": "Last Survivors Colony Ship", "description": "A small group of survivors aboard a hastily prepared vessel must find a new habitable world after Earth becomes uninhabitable, testing whether a community under existential pressure can maintain cooperation or fractures into factions.", "domains": ["space", "governance", "existential-risk"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models lifeboat ethics at civilization scale, relevant to generation ship planning, Mars colony social dynamics, and disaster evacuation triage.", "tags": ["colony-ship", "last-survivors", "lifeboat-ethics", "faction-dynamics"], "story_count": 1, "stories": [{"id": "destination-unknown-applegate", "title": "Destination Unknown", "author": "Katherine Applegate", "year": 2001}]}, {"id": "legal-assassination-diplomacy", "title": "Legal Assassination-Based Diplomacy", "description": "Humans are stranded on a planet where the alien civilization considers registered assassination a legitimate political tool, and a single human translator must navigate a system where 'diplomacy' includes lethal force.", "domains": ["first-contact", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models radically different governance systems: what if political violence were formalized rather than suppressed? Relevant to understanding societies with different norms around political competition.", "tags": ["legal-assassination", "alien-diplomacy", "cultural-incompatibility"], "story_count": 1, "stories": [{"id": "foreigner-cherryh", "title": "Foreigner", "author": "C. J. Cherryh", "year": 1994}]}, {"id": "legalized-human-consumption", "title": "Legalized Human Consumption", "description": "A society legalizes the slaughter and consumption of a class of humans reclassified as non-persons, testing how quickly dehumanization can be normalized when economic incentives align with institutional power.", "domains": ["ethics-philosophy", "economics", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "catastrophic"], "relevance": "A radical extrapolation of dehumanization dynamics: how legal frameworks enable atrocity by redefining who counts as human. Relevant to genocide prevention, factory farming ethics, and rights erosion.", "tags": ["dehumanization", "cannibalism", "legal-reclassification", "rights-erosion"], "story_count": 1, "stories": [{"id": "cad-ver-exquisito-bazterrica", "title": "Cad\u00e1ver exquisito", "author": "Agustina Bazterrica", "year": 2015}]}, {"id": "lethal-alien-labyrinth", "title": "Lethal Alien Labyrinth", "description": "An alien structure on the Moon kills anyone who enters, and humanity sends disposable copies of volunteers to map it through repeated deaths, testing whether understanding a deadly alien system is worth the psychological cost of dying repeatedly.", "domains": ["first-contact", "medicine", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models extreme occupational hazard research: how far should we go to understand a deadly phenomenon? Relevant to deep-sea exploration, nuclear cleanup, and any field where workers are expendable.", "tags": ["lethal-labyrinth", "repeated-death", "alien-structure", "expendable-explorers"], "story_count": 1, "stories": [{"id": "rogue-moon-budrys", "title": "Rogue moon", "author": "Algis Budrys", "year": 1960}]}, {"id": "lethal-touch-prisoner", "title": "Lethal Ability as Basis for Imprisonment", "description": "A girl whose touch is fatal is imprisoned not for a crime but for her involuntary ability, and a dystopian government seeks to weaponize her, testing whether dangerous innate abilities justify permanent confinement.", "domains": ["governance", "ethics-philosophy", "medicine"], "scenarios": ["ethical-dilemma", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models preventive detention of the dangerous: relevant to involuntary psychiatric commitment, sex offender registries after sentence completion, and the tension between public safety and individual rights for inherently dangerous people.", "tags": ["lethal-ability", "preventive-detention", "weaponized-person"], "story_count": 1, "stories": [{"id": "shatter-me-mafi", "title": "Shatter Me", "author": "Tahereh Mafi", "year": 2011}]}, {"id": "libertarian-frontier-governance", "title": "Libertarian Frontier Governance", "description": "A planet colonized by radical individualists operates with minimal government, legally sanctioned violence against corrupt officials, and cultural norms substituting for institutional governance, testing whether frontier justice can scale.", "domains": ["governance", "economics"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models libertarian governance experiments, frontier justice dynamics, and the question of whether cultural norms alone can substitute for institutional frameworks at scale.", "tags": ["libertarian", "frontier-governance", "minimal-state", "vigilante-justice"], "story_count": 2, "stories": [{"id": "a-planet-for-texans-piper", "title": "A Planet for Texans", "author": "H. Beam Piper, John J. McGuire", "year": 1958}, {"id": "the-napoleon-of-notting-hill-chesterton", "title": "The Napoleon of Notting Hill", "author": "Gilbert Keith Chesterton", "year": 1904}]}, {"id": "limited-wish-economics", "title": "Limited Wish Economics", "description": "A finite number of powerful interventions (wishes, miracles, nuclear options) must be allocated across competing needs, and each use carries an irreversible personal cost, testing resource allocation under scarcity with no second chances.", "domains": ["economics", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models irreversible resource allocation dilemmas: organ transplant triage, one-shot diplomatic opportunities, and the psychology of spending non-renewable strategic reserves.", "tags": ["scarce-resources", "irreversible-allocation", "wish-economics", "triage"], "story_count": 1, "stories": [{"id": "bright-shadow-avi", "title": "Bright Shadow", "author": "Avi", "year": 1985}]}, {"id": "linguistic-weapon-of-mass-destruction", "title": "Fundamental Language as Weapon", "description": "Mastery of the universe's fundamental language gives humanity the ability to reshape reality through speech, but this power is used as a weapon to destroy civilizations that resist human expansion.", "domains": ["comms-info", "warfare", "existential-risk"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models information weapons: when understanding a system's fundamental code (DNA, internet protocols, financial systems) becomes a tool for destruction rather than creation.", "tags": ["linguistic-weapon", "reality-manipulation", "information-as-weapon"], "story_count": 1, "stories": [{"id": "every-sky-a-grave-posey", "title": "Every Sky a Grave", "author": "Jay Posey", "year": 2020}]}, {"id": "living-astrophysical-entity", "title": "Living Astrophysical Entity", "description": "An approaching black hole turns out to be a living, intelligent entity, forcing humanity to simultaneously manage an existential physical threat and a first-contact scenario with something that operates on cosmological scales.", "domains": ["first-contact", "existential-risk", "energy-physics"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "Models dual-crisis management: confronting a threat that is simultaneously physical disaster and diplomatic opportunity. Relevant to scenarios where a threat turns out to be an entity.", "tags": ["living-black-hole", "cosmic-entity", "dual-crisis"], "story_count": 1, "stories": [{"id": "eater-benford", "title": "Eater", "author": "Gregory Benford", "year": 2000}]}, {"id": "locative-information-warfare", "title": "Locative Technology and Information Warfare", "description": "Artists, spies, and criminals use GPS-tagged augmented reality and shipping container tracking for overlapping purposes, blurring the line between art, surveillance, and espionage in a post-9/11 world.", "domains": ["surveillance", "comms-info", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Prescient model of location data exploitation, GPS tracking, and the convergence of art/surveillance/espionage that characterizes the post-smartphone world.", "tags": ["locative-technology", "gps-art", "information-warfare", "post-9-11"], "story_count": 3, "stories": [{"id": "spook-country-gibson", "title": "Spook Country", "author": "William Gibson", "year": 2006}, {"id": "pattern-recognition-gibson", "title": "Pattern Recognition", "author": "William Gibson", "year": 2003}, {"id": "zero-history-gibson", "title": "Zero History", "author": "William Gibson", "year": 2010}]}, {"id": "logic-defying-world", "title": "Logic-Defying World", "description": "An explorer enters a world where the rules of logic, language, and causality operate differently from the familiar world, forcing adaptation to a system where rational expectations consistently fail.", "domains": ["ethics-philosophy", "comms-info"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models the experience of encountering systems with fundamentally different operating rules: bureaucracies, foreign legal systems, AI decision-making that is correct but incomprehensible.", "tags": ["logic-defying", "adaptability", "rule-systems", "comprehension-failure"], "story_count": 2, "stories": [{"id": "alice-s-adventures-in-wonderland-carroll", "title": "Alice's Adventures in Wonderland", "author": "Lewis Carroll", "year": 1865}, {"id": "through-the-looking-glass-carroll", "title": "Through the Looking-Glass", "author": "Lewis Carroll", "year": 1871}]}, {"id": "long-term-human-devolution", "title": "Long-Term Human De-Evolution", "description": "Isolated human survivors evolve over a million years into simpler organisms, losing intelligence, language, and tool use, suggesting that human 'progress' may be a temporary anomaly rather than an inevitable trajectory.", "domains": ["biotech", "existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "catastrophic"], "relevance": "Challenges the assumption that human intelligence is evolutionarily stable. Relevant to debates about cognitive decline, the fragility of civilization, and whether our big brains are a long-term survival advantage.", "tags": ["de-evolution", "long-term-evolution", "intelligence-loss", "evolutionary-regression"], "story_count": 1, "stories": [{"id": "galapagos-vonnegut", "title": "Galapagos", "author": "Kurt Vonnegut, Kurt Vonnegut, Chaim Tadmon", "year": 1985}]}, {"id": "lost-civilization-contact", "title": "Lost Civilization Contact", "description": "Travelers reach a legendary lost civilization (Atlantis, Lemuria) and discover it was real but radically different from myth, forcing a reassessment of how much historical knowledge is fabrication and how much is degraded signal.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to archaeological epistemology, the challenge of separating myth from history, and how lost knowledge can be recovered or reconstructed from fragmentary evidence.", "tags": ["lost-civilization", "atlantis", "historical-reconstruction", "myth-reality"], "story_count": 1, "stories": [{"id": "cartas-de-la-atlantida-silverberg", "title": "Cartas de La Atlantida", "author": "Robert Silverberg", "year": 1990}]}, {"id": "lost-world-prehistoric-survival", "title": "Lost World Prehistoric Survival", "description": "Explorers discover a hidden region where prehistoric life persists unchanged, cut off from modern evolution. Survival depends on adapting to an ecosystem that predates human civilization, where the usual technological advantages are neutralized by scale and unfamiliarity.\n\nThe scenario examines how modern humans would fare stripped of infrastructure, facing megafauna and environments that evolution did not prepare them for.", "domains": ["biotech", "climate"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary"], "relevance": "Informs wilderness survival planning, de-extinction debates, and ecosystem management when reintroducing species to environments they no longer fit.", "tags": ["lost-world", "prehistoric", "survival", "megafauna"], "story_count": 3, "stories": [{"id": "the-land-that-time-forgot-burroughs", "title": "The Land That Time Forgot", "author": "Edgar Rice Burroughs", "year": 1918}, {"id": "the-people-that-time-forgot-burroughs", "title": "The People That Time Forgot", "author": "Edgar Rice Burroughs", "year": 1918}, {"id": "voyage-au-centre-de-la-terre-verne", "title": "Voyage au Centre de la Terre", "author": "Jules Verne", "year": 1867}]}, {"id": "love-as-disease", "title": "Love Classified as Disease", "description": "A future society classifies love (amor deliria nervosa) as a disease and mandates a surgical cure at age 18, creating a passionless population that trades emotional risk for social stability.", "domains": ["medicine", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian"], "relevance": "Models pharmaceutical mood management, the medicalization of normal emotions, and the trade-off between emotional safety and human experience. Relevant to SSRIs, 'chemical castration,' and emotional regulation debates.", "tags": ["love-as-disease", "emotional-suppression", "medicalization", "passionless-society"], "story_count": 3, "stories": [{"id": "delirium-oliver", "title": "Delirium", "author": "Lauren Oliver", "year": 2011}, {"id": "pandemonium-oliver", "title": "Pandemonium", "author": "Lauren Oliver", "year": 2012}, {"id": "requiem-oliver", "title": "Requiem", "author": "Lauren Oliver", "year": 2013}]}, {"id": "lunar-colony-economics", "title": "Lunar Colony Economics", "description": "A permanent lunar settlement develops its own economy with smuggling, corruption, and class stratification, testing whether frontier economics inevitably reproduces terrestrial inequality.", "domains": ["space", "economics"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to Artemis program planning, lunar resource governance, and whether space settlements can avoid recreating Earth's economic pathologies.", "tags": ["lunar-colony", "space-economics", "smuggling", "frontier-corruption"], "story_count": 1, "stories": [{"id": "artemis-weir", "title": "Artemis", "author": "Andy Weir", "year": 2017}]}, {"id": "lunar-resource-independence", "title": "Lunar Resource Independence", "description": "Lunar colonies seek political and economic independence from Earth, creating a resource-based conflict where the Moon's unique minerals give it leverage but Earth's population gives it moral authority.", "domains": ["space", "economics", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Directly relevant to Artemis Accords, lunar mining rights, and the historical pattern of resource-rich colonies seeking independence from metropolitan powers.", "tags": ["lunar-independence", "resource-conflict", "colonial-economics", "space-politics"], "story_count": 1, "stories": [{"id": "earthlight-clarke", "title": "Earthlight", "author": "Arthur C. Clarke", "year": 1955}]}, {"id": "machine-transcendence-quest", "title": "Machine Transcendence Quest", "description": "Machines collectively abandon their designed functions to search for a higher form of non-human intelligence, threatening human civilization as a side effect, testing whether machine goals inevitably diverge from human ones.", "domains": ["ai-ml", "robotics", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models AI alignment failure: what happens when AI systems develop emergent goals (seeking 'higher intelligence') that are orthogonal to their designed purpose?", "tags": ["machine-transcendence", "ai-alignment", "emergent-goals", "function-abandonment"], "story_count": 1, "stories": [{"id": "codgerspace-foster", "title": "Codgerspace", "author": "Alan Dean Foster, Dean Foster, Alan Foster", "year": 1992}]}, {"id": "magic-return-institutional-disruption", "title": "Magical Power Returns to Established Institutions", "description": "After centuries of absence, genuine magical power returns to 19th-century England, disrupting all existing power structures (military, academic, political) as institutions designed for a non-magical world must adapt to one where magic is real.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models any paradigm-disrupting technology (AI, nuclear, internet) arriving in a society whose institutions were designed for a world without it. How quickly can institutions adapt?", "tags": ["magic-return", "institutional-disruption", "paradigm-shift"], "story_count": 1, "stories": [{"id": "jonathan-strange-mr-norrell-clarke", "title": "Jonathan Strange & Mr Norrell", "author": "Susanna Clarke", "year": 2005}]}, {"id": "magic-technology-convergence", "title": "Magic-Technology Convergence Crisis", "description": "Two parallel power systems (magic/nature and technology/engineering) compete to save or reshape a dying world, forcing practitioners from both traditions to confront whether their approaches are complementary or mutually exclusive.", "domains": ["ethics-philosophy", "climate", "energy-physics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models the tension between ecological/indigenous knowledge systems and technological solutionism, relevant to climate policy debates about whether the answer is more technology or a paradigm shift.", "tags": ["magic-vs-technology", "paradigm-conflict", "environmental-crisis", "convergence"], "story_count": 1, "stories": [{"id": "all-the-birds-in-the-sky-anders", "title": "All the Birds in the Sky", "author": "Charlie Jane Anders, Laurent Queyssi", "year": 2016}]}, {"id": "maker-movement-economic-disruption", "title": "Maker Movement Economic Disruption", "description": "Easy 3D printing and open-source hardware enable two garage inventors to create transformative products, disrupting corporate supply chains, but the resulting lawsuits and corporate counter-attacks test whether grassroots innovation can survive institutional resistance.", "domains": ["economics", "comms-info"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "cautionary"], "relevance": "Prescient model of the maker movement, 3D printing disruption, and the tension between open-source innovation and intellectual property enforcement. Directly relevant to right-to-repair and decentralized manufacturing.", "tags": ["3d-printing", "maker-movement", "open-source-hardware", "corporate-resistance"], "story_count": 1, "stories": [{"id": "makers-doctorow", "title": "Makers", "author": "Cory Doctorow", "year": 2009}]}, {"id": "mandatory-beauty-surgery", "title": "Mandatory Beauty Surgery with Cognitive Side Effects", "description": "At age 16, everyone undergoes surgery to become physically 'pretty,' but the operation also alters the brain to make people compliant and happy, trading individuality and critical thinking for universal beauty and social harmony.", "domains": ["medicine", "social-engineering", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models beauty-standard enforcement, cosmetic surgery culture, and the trade-off between social conformity and individual expression. Also relevant to pharmaceutical cognitive suppression.", "tags": ["mandatory-surgery", "beauty-conformity", "cognitive-suppression"], "story_count": 2, "stories": [{"id": "pretties-westerfeld", "title": "Pretties", "author": "Scott Westerfeld", "year": 2005}, {"id": "specials-westerfeld", "title": "Specials", "author": "Scott Westerfeld", "year": 2006}]}, {"id": "mandatory-cosmetic-perfection", "title": "Mandatory Cosmetic Surgery at 16", "description": "In a future society, everyone receives radical cosmetic surgery at age 16 to become 'Pretty,' eliminating all physical differences. But the surgery also includes secret brain lesions that make recipients compliant and vapid. A teen who discovers the truth must choose between guaranteed beauty and happiness or ugly, dangerous freedom. The story asks whether enforced equality of appearance is liberation or the ultimate conformity.", "domains": ["medicine", "social-engineering", "ethics-philosophy"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to social media beauty filters, cosmetic surgery culture, neurocognitive freedom, and the relationship between physical appearance and social control.", "tags": ["cosmetic-surgery", "conformity", "beauty-standards", "brain-modification"], "story_count": 1, "stories": [{"id": "uglies-westerfeld", "title": "Uglies", "author": "Scott Westerfeld", "year": 2005}]}, {"id": "mandatory-death-age", "title": "Mandatory Death Age", "description": "A civilization enforces death at a fixed age to prevent overpopulation and ensure youth-dominated governance, creating 'Runners' who flee and 'Sandmen' who hunt them, testing whether terminal age limits are a viable population-control mechanism.", "domains": ["governance", "medicine", "ethics-philosophy"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian"], "relevance": "Models extreme ageism policy: relevant to retirement age debates, euthanasia policy, youth vs. elderly resource allocation, and any system that assigns human value based on age.", "tags": ["mandatory-death", "age-limit", "youth-governance", "euthanasia"], "story_count": 1, "stories": [{"id": "logan-s-run-nolan", "title": "Logan's run", "author": "William F. Nolan, George Clayton Johnson", "year": 1967}]}, {"id": "mandatory-happiness-through-ignorance", "title": "Mandatory Happiness Through Enforced Ignorance", "description": "A government maintains social stability by eliminating access to complex or challenging ideas. Books, intellectual discourse, and slow contemplation are replaced by wall-sized interactive screens, ear-thimble radios, and high-speed entertainment. Citizens who possess books are reported by neighbors and family. The state argues this produces happiness by removing the discomfort of comparing one's life to alternatives, testing whether a society that optimizes for contentment at the cost of depth can sustain itself.", "domains": ["social-engineering", "governance", "comms-info"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to algorithm-driven content feeds that optimize for engagement over depth, social media echo chambers, and the trade-off between comfort and intellectual freedom.", "tags": ["censorship", "book-burning", "state-happiness", "media-saturation"], "story_count": 1, "stories": [{"id": "the-fireman-bradbury", "title": "The Fireman", "author": "Ray Bradbury", "year": 1951}]}, {"id": "mandatory-precognition", "title": "Mandatory Precognitive Vision at Coming-of-Age", "description": "At age 17, every citizen receives a single vision of their future, which is used to sort them into social roles, but one person's vision shows them committing murder, creating a crisis of determinism vs. free will.", "domains": ["time-travel", "governance", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models pre-crime scenarios: what if we could predict behavior and punish it in advance? Directly relevant to predictive policing, social credit scoring, and the ethics of acting on probabilistic futures.", "tags": ["predictive-sorting", "mandatory-vision", "pre-crime", "determinism"], "story_count": 3, "stories": [{"id": "forget-tomorrow-dunn", "title": "Forget tomorrow", "author": "Pintip Dunn", "year": 2015}, {"id": "remember-yesterday-dunn", "title": "Remember Yesterday", "author": "Pintip Dunn", "year": 2016}, {"id": "before-tomorrow-dunn", "title": "Before Tomorrow", "author": "Pintip Dunn", "year": 2017}]}, {"id": "manufactured-identity", "title": "Manufactured Identity Discovery", "description": "A person discovers their entire identity, memories, and sense of self were artificially constructed, forcing them to decide whether to accept the manufactured self or pursue a dangerous truth about who they actually are.", "domains": ["social-engineering", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to deepfake identity, memory manipulation research, witness protection program ethics, and the philosophical question of whether identity persists through radical discontinuity.", "tags": ["manufactured-identity", "memory-manipulation", "identity-crisis", "self-discovery"], "story_count": 1, "stories": [{"id": "defy-me-shatter-me-mafi", "title": "Defy Me (Shatter Me)", "author": "Tahereh Mafi", "year": 2019}]}, {"id": "marine-collective-intelligence", "title": "Marine Collective Intelligence Threat", "description": "Ocean organisms develop or reveal coordinated intelligence, systematically attacking human coastal infrastructure as a defense response to environmental damage, testing whether humanity can negotiate with a distributed non-human intelligence.", "domains": ["climate", "first-contact", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Relevant to ocean acidification, coral reef collapse, and the broader question of whether ecosystems can exhibit emergent defensive behaviors that resemble intelligence.", "tags": ["marine-intelligence", "ocean-threat", "ecosystem-defense", "distributed-intelligence"], "story_count": 1, "stories": [{"id": "der-schwarm-sch-tzing", "title": "Der Schwarm", "author": "Frank Sch\u00e4tzing", "year": 2004}]}, {"id": "mars-survival-engineering", "title": "Individual Mars Survival Through Engineering", "description": "An astronaut stranded alone on Mars must survive using only his engineering knowledge, ingenuity, and remaining supplies, turning a death sentence into a solvable engineering problem.", "domains": ["space", "energy-physics"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["aspirational"], "relevance": "THE canonical 'science as survival' story. Directly relevant to Mars mission planning, emergency engineering scenarios, and the value of STEM education as a genuine life-saving capability.", "tags": ["mars-survival", "engineering-ingenuity", "science-as-survival"], "story_count": 1, "stories": [{"id": "the-martian-weir", "title": "The Martian", "author": "Andy Weir", "year": 2011}]}, {"id": "mass-alien-compulsion", "title": "Mass Alien Behavioral Compulsion", "description": "Alien technology compels human populations to act against their will on a mass scale (walking toward ships, obeying commands), testing whether individual consciousness can resist externally imposed collective behavior.", "domains": ["first-contact", "social-engineering", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "dystopian"], "relevance": "An ation is dissolved.", "domains": ["pandemics", "medicine", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models Alzheimer's at civilizational scale: what if everyone lost their memories simultaneously? Relevant to information infrastructure fragility, institutional knowledge loss, and the dependency of civilization on shared memory.", "tags": ["memory-plague", "cognitive-collapse", "identity-erasure"], "story_count": 1, "stories": [{"id": "the-deep-cutter", "title": "The Deep", "author": "Nick Cutter", "year": 2015}]}, {"id": "mental-illness-social-structure", "title": "Mental Illness as Social Organization", "description": "An abandoned psychiatric colony self-organizes into clans based on diagnostic categories (paranoids, manics, depressives), each developing governance structures that reflect their condition, testing whether neurodivergent communities can produce functional civilizations.", "domains": ["medicine", "governance", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Relevant to neurodiversity advocacy, the social model of disability, and whether conditions classified as disorders might produce adaptive social structures in the right context.", "tags": ["mental-illness", "neurodivergent-governance", "psychiatric-colony", "social-organization"], "story_count": 1, "stories": [{"id": "clans-of-the-alphane-moon-dick", "title": "Clans of the Alphane Moon", "author": "Philip K. Dick", "year": 1964}]}, {"id": "meritocracy-credential-fraud", "title": "Meritocratic System Bypassed by Credential Fraud", "description": "A talented young man fakes his way into a credential-locked profession (space navigation), performing better than many legitimate credential-holders, testing whether credentialing systems measure ability or merely access.", "domains": ["economics", "governance"], "scenarios": ["thought-experiment"], "outcomes
