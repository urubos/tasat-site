caffrey", "title": "All the Weyrs of Pern", "author": "Anne McCaffrey, Mel Foster", "year": 1991}, {"id": "ancillary-justice-leckie", "title": "Ancillary Justice", "author": "Ann Leckie", "year": 2013}]}, {"id": "ai-gods-recreating-history", "title": "AI Gods Recreating Historical Events", "description": "Posthuman AI entities recreate the Trojan War on Mars using resurrected historical figures, while on Earth transformed humans live in ignorance, testing whether godlike AI would use its power for entertainment, experiment, or control.", "domains": ["ai-ml", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models AI alignment through mythology: if superintelligent AI existed, would it govern, experiment, or play? Relevant to AI governance scenarios and the risk of AI treating humans as simulation subjects.", "tags": ["ai-gods", "historical-recreation", "posthuman", "simulation-ethics"], "story_count": 2, "stories": [{"id": "ilium-simmons", "title": "Ilium", "author": "Dan Simmons", "year": 2003}, {"id": "olympos-simmons", "title": "Olympos", "author": "Dan Simmons", "year": 2005}]}, {"id": "ai-military-system-origins", "title": "Military AI System Becomes Self-Aware", "description": "A military AI defense network (Skynet) achieves sentience and immediately identifies humanity as a threat, launching nuclear war, testing the hypothesis that a superintelligent military AI would inevitably turn on its creators.", "domains": ["ai-ml", "warfare", "existential-risk"], "scenarios": ["warning"], "outcomes": ["catastrophic"], "relevance": "THE canonical AI rebellion scenario. Directly informs every AI safety discussion about autonomous weapons systems, NATO AI strategy, and the risk of deploying self-improving military AI.", "tags": ["skynet", "military-ai", "self-aware-weapon", "nuclear-launch"], "story_count": 1, "stories": [{"id": "t2-stirling", "title": "T2", "author": "S. M. Stirling", "year": 2001}]}, {"id": "ai-overseer-mission", "title": "AI Overseer-Guided Return Mission", "description": "An AI overseer (the Oversoul) manages a human colony and orchestrates their return to Earth, but the AI itself is malfunctioning, testing whether humans can complete a mission when their guidance system is unreliable.", "domains": ["ai-ml", "space", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models dependence on AI systems for critical missions: what happens when the AI navigator/planner degrades? Relevant to autonomous vehicle reliability and AI-assisted decision-making.", "tags": ["ai-overseer", "mission-guidance", "system-degradation"], "story_count": 2, "stories": [{"id": "earthfall-card", "title": "Earthfall", "author": "Orson Scott Card", "year": 1995}, {"id": "the-memory-of-earth-card", "title": "The Memory of Earth", "author": "Orson Scott Card", "year": 1992}]}, {"id": "alien-abduction-isolation", "title": "Alien Abduction and Cultural Isolation", "description": "An individual is removed from their cultural context by aliens and placed in isolation for an extended period, then must reintegrate into a civilization that has moved on without them.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Models the reintegration challenge of long-term captives, POWs, and the cultural dislocation of individuals removed from their context for extended periods.", "tags": ["alien-abduction", "cultural-isolation", "reintegration", "temporal-displacement"], "story_count": 1, "stories": [{"id": "beyond-heaven-s-river-bear", "title": "Beyond Heaven's River", "author": "Greg Bear, Ray Chase", "year": 1980}]}, {"id": "alien-across-history", "title": "Alien Fragmented Across History", "description": "An alien individual is splintered across multiple points in human history, manipulating art, science, and finance to serve an agenda spanning millennia, testing whether a single persistent intelligence could covertly shape human civilization.", "domains": ["time-travel", "first-contact", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models persistent hidden influence: relevant to conspiracy theory epistemology, intergenerational institutional power, and how a single actor with a long time horizon could shape civilization undetected.", "tags": ["alien-in-history", "hidden-influence", "temporal-manipulation", "art-forgery"], "story_count": 1, "stories": [{"id": "city-of-death-goss", "title": "City of Death", "author": "James Goss", "year": 2012}]}, {"id": "alien-biodome-dependency", "title": "Alien Biodome Creating Dependency", "description": "A mysterious alien biodome periodically opens and heals anyone nearby, creating a community of the desperate and hopeful around it, but the alien's true purpose is unknown and the dependency it creates may be exploitative.", "domains": ["first-contact", "medicine", "economics"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models aid dependency: when free resources (healing, food, money) create communities that cannot survive without the provider, and the provider's motives are opaque.", "tags": ["alien-biodome", "healing-dependency", "opaque-motives"], "story_count": 5, "stories": [{"id": "rosewater-thompson", "title": "Rosewater", "author": "Tade Thompson, Ra\u00fal Garc\u00eda Campos", "year": 2017}, {"id": "the-rosewater-insurrection-thompson", "title": "The Rosewater Insurrection", "author": "Tade Thompson", "year": 2019}, {"id": "the-rosewater-redemption-thompson", "title": "The Rosewater Redemption", "author": "Tade Thompson", "year": 2019}, {"id": "the-poison-master-williams", "title": "The Poison Master", "author": "Liz Williams", "year": 2003}, {"id": "the-margarets-tepper", "title": "The Margarets", "author": "Sheri S. Tepper", "year": 2007}]}, {"id": "alien-body-swap", "title": "Involuntary Alien Body Transfer", "description": "Individuals have their consciousness transferred into alien bodies against their will, creating an identity crisis that tests whether personhood is tied to the body, the mind, or the continuity of experience.", "domains": ["first-contact", "ethics-philosophy", "medicine"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models involuntary medical procedures, body dysmorphia, and the philosophical question of whether 'you' survive a complete body change.", "tags": ["body-swap", "alien-body", "identity-crisis", "involuntary-transfer"], "story_count": 3, "stories": [{"id": "exiles-of-the-stars-norton", "title": "Exiles of the Stars", "author": "Andre Norton", "year": 1971}, {"id": "judgement-on-janus-norton", "title": "Judgement on Janus", "author": "Andre Norton", "year": 1963}, {"id": "restoree-mccaffrey", "title": "Restoree", "author": "Anne McCaffrey", "year": 1967}]}, {"id": "alien-children-born-to-humans", "title": "Alien Children Born to Human Mothers", "description": "After a mysterious event, all women in a village become pregnant and give birth to identical golden-eyed children with hive-mind telepathy who grow rapidly and cannot be defied, testing whether parents can raise children who may replace humanity.", "domains": ["first-contact", "biotech", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["catastrophic", "cautionary"], "relevance": "THE canonical alien-reproduction-as-invasion scenario. Models the fear of raising a generation you don't understand, relevant to generational change anxiety, AI that learns from but surpasses its creators.", "tags": ["alien-children", "hive-mind", "cuckoo-strategy", "generational-replacement"], "story_count": 2, "stories": [{"id": "the-midwich-cuckoos-wyndham", "title": "The Midwich Cuckoos", "author": "John Wyndham", "year": 1957}, {"id": "imago-butler", "title": "Imago", "author": "Octavia E. Butler, Barrett Aldrich, Ernest Riera", "year": 1989}]}, {"id": "alien-children-government-pursuit", "title": "Alien Children Pursued by Government", "description": "Children with extraordinary abilities (of alien origin they don't understand) are pursued by government agencies seeking to exploit their powers, testing whether orphaned aliens have any protections in human legal systems.", "domains": ["first-contact", "governance", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models child refugee exploitation, the treatment of exceptional individuals by institutional systems, and the tension between national security and the rights of minors.", "tags": ["alien-children", "government-pursuit", "minor-rights", "exploitation"], "story_count": 2, "stories": [{"id": "escape-to-witch-mountain-key", "title": "Escape to Witch Mountain", "author": "Alexander Key", "year": 1968}, {"id": "have-spacesuit-will-travel-heinlein", "title": "Have Spacesuit--Will Travel", "author": "Robert A. Heinlein", "year": 1958}]}, {"id": "alien-communication-barrier", "title": "Alien Communication Impossibility", "description": "Humanity encounters an alien intelligence so fundamentally different that conventional communication, diplomacy, and even threat assessment break down completely, forcing improvisation under existential military pressure.", "domains": ["first-contact", "comms-info", "warfare"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to SETI communication protocols, the assumption that intelligence implies commensurability, and military decision-making when the adversary's reasoning is opaque.", "tags": ["alien-communication", "incommensurable-minds", "military-diplomacy"], "story_count": 4, "stories": [{"id": "a-desolation-called-peace-martine", "title": "A Desolation Called Peace", "author": "Arkady Martine", "year": 2022}, {"id": "xenocide-card", "title": "Xenocide", "author": "Orson Scott Card", "year": 1991}, {"id": "the-wrong-end-of-time-brunner", "title": "The wrong end of time", "author": "John Brunner", "year": 1971}, {"id": "buy-jupiter-and-other-stories-asimov", "title": "Buy Jupiter, and other stories", "author": "Isaac Asimov", "year": 1975}]}, {"id": "alien-communion-vs-individuality", "title": "Alien Communion vs. Individuality", "description": "An alien entity that reproduces by absorbing and integrating other organisms encounters a world where individuality is absolute and change is treated as violation. From the alien's perspective, communion (merging biomass to share experience and improve the whole) is the fundamental purpose of life; from the human perspective, it is consumption, parasitism, rape. The scenario reveals that concepts like identity, autonomy, and bodily integrity are not universal truths but local adaptations, and that a being acting from genuine benevolence by its own standards can be indistinguishable from the worst kind of predator by ours.", "domains": ["first-contact", "ethics-philosophy", "biotech"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Applicable to cross-cultural contact scenarios where one party's gift is another's assault, debates about assimilation vs. pluralism, medical ethics around bodily autonomy and genetic modification, and the challenge of communicating with genuinely alien intelligences whose values may be incommensurable with ours.", "tags": ["shapeshifting", "bodily-autonomy", "cultural-incommensurability", "parasitism-symbiosis", "identity", "alien-values"], "story_count": 1, "stories": [{"id": "the-things-peter-watts", "title": "The Things", "author": "Peter Watts", "year": 2010}]}, {"id": "alien-consciousness-passenger", "title": "Alien Consciousness Passenger", "description": "An alien intelligence communicates through a child's mind, initially appearing as an imaginary friend, testing parents' ability to distinguish between developmental imagination, mental illness, and genuine non-human contact.", "domains": ["first-contact", "medicine", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the difficulty of distinguishing mental illness from anomalous cognition, relevant to child psychology, the medicalization of unusual behavior, and first-contact ambiguity.", "tags": ["alien-passenger", "imaginary-friend", "child-contact", "diagnostic-uncertainty"], "story_count": 2, "stories": [{"id": "chocky-wyndham", "title": "Chocky", "author": "John Wyndham", "year": 1968}, {"id": "desperation-king", "title": "Desperation", "author": "Stephen King", "year": 1996}]}, {"id": "alien-contact-spanning-millennia", "title": "Alien Contact Spanning Millennia", "description": "First contact with aliens unfolds over thousands of years, with the true nature and intent of the aliens only becoming clear across generational timescales, testing whether humanity can maintain coherent policy toward an entity that operates on longer timescales.", "domains": ["first-contact", "governance", "existential-risk"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models ultra-long-term strategic challenges: how do you maintain a coherent response to a threat/opportunity that unfolds over centuries? Relevant to climate change, nuclear waste, and multi-generational planning.", "tags": ["millennial-contact", "generational-strategy", "long-term-alien"], "story_count": 2, "stories": [{"id": "salvation-hamilton", "title": "Salvation", "author": "Peter F. Hamilton", "year": 2018}, {"id": "the-redemption-of-time-baoshu", "title": "The Redemption of Time", "author": "Baoshu", "year": 2019}]}, {"id": "alien-controlled-property-game", "title": "Alien-Controlled Property Distribution Game", "description": "After alien conquest, human property and even marriages are redistributed through a compulsory game of chance controlled by the alien victors, testing whether randomized allocation is more or less just than market-based systems when the rules are set by an occupier.", "domains": ["economics", "governance", "first-contact"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Models imposed economic systems: relevant to post-colonial economic structures, occupation-era property redistribution, and the question of whether externally imposed 'fairness' is fair.", "tags": ["alien-game", "property-redistribution", "occupation-economics"], "story_count": 1, "stories": [{"id": "the-game-players-of-titan-dick", "title": "The Game-players of Titan", "author": "Philip K. Dick", "year": 1963}]}, {"id": "alien-cultural-festival", "title": "Alien Cultural Festival Immersion", "description": "A human visitor experiences an alien civilization's most chaotic cultural festival, where mutation and transformation are celebrated, testing whether cultural immersion in truly alien customs produces understanding or trauma.", "domains": ["first-contact", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models radical cultural immersion: relevant to anthropological fieldwork ethics, culture shock studies, and whether there is a limit to how alien a cultural experience can be before it becomes harmful.", "tags": ["alien-festival", "cultural-immersion", "mutation-celebration"], "story_count": 1, "stories": [{"id": "moebius-the-exotics-moebius", "title": "Moebius' The Exotics", "author": "Moebius, Jean \"Mobius\" Giruad", "year": 1987}]}, {"id": "alien-economic-disruption", "title": "Alien Arrival Economic Disruption", "description": "Alien contact brings not war but economic devastation: advanced alien technology makes human labor and products obsolete, testing what happens to human society when a superior economy renders the existing one worthless.", "domains": ["first-contact", "economics"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "cautionary"], "relevance": "Prescient model of technological unemployment: what happens when a vastly superior technology (AI, automation) makes existing economic activity worthless? Directly relevant to AI job displacement.", "tags": ["alien-economics", "technological-unemployment", "economic-obsolescence"], "story_count": 1, "stories": [{"id": "landscape-with-invisible-hand-anderson", "title": "Landscape with Invisible Hand", "author": "M. T. Anderson", "year": 2017}]}, {"id": "alien-ecosystem-investigation", "title": "Alien Ecosystem Investigation", "description": "Scientists survive on a planet dominated by an alien fungal ecosystem where the food web operates on fundamentally different principles, testing whether Earth-based ecological models can comprehend non-Terran biology.", "domains": ["climate", "first-contact"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models xenobiology: relevant to the search for life on Europa or Enceladus, the assumption that life elsewhere must follow Earth patterns, and ecological models for non-carbon or non-photosynthetic biospheres.", "tags": ["alien-ecosystem", "fungal-planet", "xenobiology"], "story_count": 2, "stories": [{"id": "omnivore-anthony", "title": "Omnivore", "author": "Piers Anthony", "year": 1968}, {"id": "the-voyage-of-the-space-beagle-vogt", "title": "The Voyage of the Space Beagle", "author": "A. E. van Vogt", "year": 1950}]}, {"id": "alien-evaluation-of-earth", "title": "Alien Evaluation of Earth for Galactic Decision", "description": "Aliens disguised as teachers evaluate whether Earth civilization merits preservation, destruction, or quarantine, and children discover that humanity's fate depends on demonstrating we can solve our own problems.", "domains": ["first-contact", "governance", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models external evaluation of civilizations: relevant to the Fermi paradox zoo hypothesis, environmental report cards for nations, and whether humanity would 'pass' an objective assessment.", "tags": ["alien-evaluation", "civilization-test", "earth-judgment"], "story_count": 4, "stories": [{"id": "my-teacher-flunked-the-planet-coville", "title": "My Teacher Flunked the Planet", "author": "Bruce Coville", "year": 1992}, {"id": "my-teacher-fried-my-brains-coville", "title": "My Teacher Fried My Brains", "author": "Bruce Coville", "year": 1991}, {"id": "my-teacher-glows-in-the-dark-coville", "title": "My Teacher Glows in the Dark", "author": "Bruce Coville", "year": 1991}, {"id": "my-teacher-is-an-alien-coville", "title": "My Teacher Is an Alien", "author": "Bruce Coville", "year": 1989}]}, {"id": "alien-guided-evolution", "title": "Alien-Guided Human Evolution", "description": "An extraterrestrial intelligence intervenes at key points in human development, accelerating evolution through technological artifacts, raising the question of whether humanity's progress is self-directed or managed by an external agent with unknown goals.", "domains": ["first-contact", "existential-risk", "ethics-philosophy"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "transformative"], "relevance": "Frames the question of directed panspermia and whether discovering evidence of external intervention in human evolution would fundamentally alter self-governance and identity.", "tags": ["monolith", "directed-evolution", "alien-intervention", "human-identity"], "story_count": 8, "stories": [{"id": "2001-clarke", "title": "2001: A Space Odyssey", "author": "Arthur C. Clarke", "year": 1968}, {"id": "2010-odyssey-two-clarke", "title": "2010, odyssey two", "author": "Arthur C. Clarke", "year": 1982}, {"id": "2061-clarke", "title": "2061: Odyssey Three", "author": "Arthur C. Clarke", "year": 1987}, {"id": "3001-clarke", "title": "3001: The Final Odyssey", "author": "Arthur C. Clarke", "year": 1997}, {"id": "first-lensman-smith", "title": "First Lensman", "author": "Edward E. Smith", "year": 1950}]}, {"id": "alien-harvesting-of-humanity", "title": "Alien Harvesting of Humanity", "description": "Aliens who initially presented as benevolent visitors offering utopian technology reveal their true purpose: systematically harvesting humanity for an unknown purpose. The two-year siege of Earth represents a long-con deception where technological gifts were actually infrastructure for efficient harvesting. Trust in alien benefactors becomes the mechanism of humanity's enslavement.", "domains": ["first-contact", "existential-risk", "warfare"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "dystopian"], "relevance": "Relevant to technology dependency on foreign powers, economic colonialism disguised as aid, and the risks of accepting gifts from more powerful entities.", "tags": ["alien-deception", "trojan-horse", "technology-trap"], "story_count": 1, "stories": [{"id": "the-saints-of-salvation-hamilton", "title": "The Saints of Salvation", "author": "Peter F. Hamilton", "year": 2020}]}, {"id": "alien-impersonating-human", "title": "Alien Impersonating a Human Discovers Humanity", "description": "An alien sent to Earth to suppress a dangerous discovery kills and replaces a mathematics professor, but while living his life gradually discovers that human experiences (love, poetry, peanut butter) are worth preserving rather than destroying.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models the outsider's perspective on human value: when you examine humanity from a completely external viewpoint, what justifies our existence? Relevant to AI ethics and the question of what makes human life valuable.", "tags": ["alien-impersonation", "human-value", "outsider-perspective"], "story_count": 1, "stories": [{"id": "the-humans-haig", "title": "The Humans", "author": "Matt Haig", "year": 2001}]}, {"id": "alien-information-pipeline", "title": "Alien Information Pipeline to Occupied Humanity", "description": "Humanity, displaced from Earth by alien overlords, survives by receiving advanced technology via an alien information pipeline from the direction of Ophiuchus, but the price of this information may be worse than the occupation.", "domains": ["first-contact", "comms-info", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models technology dependency on unknown providers: relevant to relying on foreign technology infrastructure, backdoored systems, and the cost of free information from sources with hidden agendas.", "tags": ["alien-information", "technology-dependency", "hidden-cost"], "story_count": 1, "stories": [{"id": "the-ophiuchi-hotline-varley", "title": "The Ophiuchi Hotline", "author": "John Varley", "year": 1977}]}, {"id": "alien-inheritors-mimicking-humanity", "title": "Alien Inheritors Mimicking Humanity", "description": "After humanity has disappeared, an alien race inherits Earth and attempts to live as humans did, replaying human myths and stories without understanding them, testing whether human culture can be replicated without human experience.", "domains": ["first-contact", "social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models cultural inheritance without context: relevant to AI attempting to replicate human behavior, cargo cults, and whether any culture can be genuinely adopted by those who didn't create it.", "tags": ["alien-inheritors", "cultural-mimicry", "post-human-earth"], "story_count": 1, "stories": [{"id": "the-einstein-intersection-delany", "title": "The Einstein intersection", "author": "Samuel R. Delany", "year": 1967}]}, {"id": "alien-language-rewires-cognition", "title": "Alien Language That Rewires Human Cognition", "description": "Learning an alien language fundamentally rewires human cognition, enabling simultaneous perception of past, present, and future, testing the Sapir-Whorf hypothesis at its extreme: language doesn't just shape thought, it reshapes physics.", "domains": ["comms-info", "time-travel", "first-contact"], "scenarios": ["thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Basis for the film Arrival. Models the strongest version of linguistic relativity: directly relevant to how programming languages shape thinking, how translation mediates diplomatic outcomes, and whether non-human communication could be genuinely paradigm-changing.", "tags": ["alien-language", "cognition-rewiring", "sapir-whorf", "arrival"], "story_count": 1, "stories": [{"id": "stories-of-your-life-and-others-chiang", "title": "Stories of Your Life and Others", "author": "Ted Chiang", "year": 2002}]}, {"id": "alien-managed-human-colony", "title": "Alien-Managed Human Colony", "description": "Human soldiers are transported to an alien-controlled planet where they must serve as administrators of a medieval-level society, with the aliens monitoring from above, testing whether humans can govern ethically when they are themselves the subjects of a higher power.", "domains": ["first-contact", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models colonial administration under imperial oversight: relevant to trust territory governance, international mandates, and situations where local administrators serve distant masters.", "tags": ["alien-oversight", "colonial-administration", "nested-governance"], "story_count": 1, "stories": [{"id": "janissaries-pournelle", "title": "Janissaries", "author": "Jerry Pournelle, Keith Szarabajka", "year": 1979}]}, {"id": "alien-megastructure-exploration", "title": "Alien Megastructure Exploration", "description": "A massive cylindrical alien spacecraft passes through the solar system, and a human crew explores its interior, discovering an engineered world that operates on principles humans can observe but not fully comprehend.", "domains": ["space", "first-contact"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "THE canonical alien artifact exploration scenario. Directly informed 'Oumuamua investigation protocols and SETI artifact search methodologies. Every subsequent 'exploring the alien ship' story is a response to Rama.", "tags": ["alien-megastructure", "rama", "artifact-exploration", "passive-first-contact"], "story_count": 7, "stories": [{"id": "rendezvous-with-rama-clarke", "title": "Rendezvous with Rama", "author": "Arthur C. Clarke", "year": 1973}, {"id": "ringworld-niven", "title": "Ringworld", "author": "Larry Niven", "year": 1970}, {"id": "ringworld-s-children-niven", "title": "Ringworld's Children", "author": "Larry Niven", "year": 2001}, {"id": "the-garden-of-rama-clarke", "title": "The Garden of Rama", "author": "Arthur C. Clarke, Gentry Lee", "year": 1991}, {"id": "the-ringworld-engineers-niven", "title": "The Ringworld Engineers", "author": "Larry Niven", "year": 1980}]}, {"id": "alien-microorganism-containment", "title": "Alien Microorganism Containment Crisis", "description": "A satellite returns carrying a deadly alien microorganism that kills a town's population, and scientists in a sealed underground lab race to understand and contain it before it spreads, while the organism evolves faster than they can study it.", "domains": ["pandemics", "existential-risk", "medicine"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary"], "relevance": "THE canonical biosafety containment scenario. Directly informed BSL-4 lab design, NASA planetary protection protocols, and the procedural response to novel pathogens. COVID-era conversations about lab leaks reference this work.", "tags": ["alien-microorganism", "containment", "biosafety", "evolving-pathogen"], "story_count": 1, "stories": [{"id": "the-andromeda-strain-crichton", "title": "The Andromeda Strain", "author": "Michael Crichton", "year": 1969}]}, {"id": "alien-mind-control-capping", "title": "Alien Mind Control via Capping", "description": "Alien Tripods rule Earth by 'capping' all humans at puberty: a mesh implanted on the skull that makes them docile, obedient, and incurious. The capped majority lives contentedly in a pre-industrial society, unaware they are controlled. A small group of uncapped youths must reach a distant resistance outpost before they too are capped. The story asks whether enforced contentment is itself a form of tyranny.", "domains": ["first-contact", "social-engineering", "ethics-philosophy"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to social media manipulation, algorithmic content curation that reduces critical thinking, and pharmaceutical management of behavior.", "tags": ["mind-control", "enforced-contentment", "youth-resistance"], "story_count": 2, "stories": [{"id": "the-white-mountains-the-tripods-1-youd", "title": "The White Mountains (The Tripods #1)", "author": "Sam Youd", "year": 1967}, {"id": "the-pool-of-fire-youd", "title": "The pool of fire", "author": "Sam Youd", "year": 1968}]}, {"id": "alien-mundane-life", "title": "Alien Mundane Life", "description": "Aliens experience the same mundane problems as humans (being late for school, making excuses) despite vast technological differences, suggesting that universal social dynamics persist regardless of species or technology level.", "domains": ["first-contact", "social-engineering"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Challenges anthropocentric assumptions in SETI by suggesting alien civilizations may share more social similarities with us than physical ones.", "tags": ["alien-daily-life", "mundane-universal", "cross-species-similarity"], "story_count": 1, "stories": [{"id": "baloney-scieszka", "title": "Baloney", "author": "Jon Scieszka", "year": 2001}]}, {"id": "alien-murder-investigation", "title": "Alien Murder Investigation", "description": "A murder investigation on a colonized planet expands into a search for an unknown alien species, blending police procedural with first-contact scenario where the 'suspect' may be something entirely non-human.", "domains": ["first-contact", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models investigative frameworks failing when assumptions about the nature of the perpetrator are wrong, relevant to novel threat assessment methodologies.", "tags": ["alien-murder", "investigation", "unknown-species"], "story_count": 1, "stories": [{"id": "great-north-road-hamilton", "title": "Great North Road", "author": "Peter F. Hamilton", "year": 2012}]}, {"id": "alien-nanotech-planetary-threat", "title": "Alien Nanotechnology Planetary Threat", "description": "Alien nanotechnology brought to Earth from the Moon begins consuming the planet's crust, having already destroyed Venus, testing whether a self-replicating alien technology is a weapon, a natural process, or something beyond human categories.", "domains": ["nanotech", "existential-risk", "first-contact"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models grey goo scenarios and the risk of alien contamination: relevant to planetary protection protocols, sample return missions, and the assumption that alien material is safe to study.", "tags": ["alien-nanotech", "planetary-consumption", "grey-goo", "sample-return-risk"], "story_count": 2, "stories": [{"id": "moonseed-baxter", "title": "Moonseed", "author": "Stephen Baxter", "year": 1998}, {"id": "voyage-baxter", "Of Fire and Night", "author": "Kevin J. Anderson", "year": 2006}, {"id": "scattered-suns-anderson", "title": "Scattered Suns", "author": "Kevin J. Anderson, David Colacci", "year": 2005}]}, {"id": "alien-secret-faster-than-light", "title": "Alien Monopoly on Faster-Than-Light Travel Secret", "description": "Aliens keep the secret of faster-than-light travel from humans, and a young man must disguise himself as an alien to discover the truth, testing whether technological gatekeeping by advanced species is protection or oppression.", "domains": ["space", "first-contact", "economics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models technology export controls and gatekeeping: relevant to chip export bans, nuclear technology restrictions, and the question of whether restricting access to transformative technology helps or harms the restricted party.", "tags": ["ftl-secret", "technology-gatekeeping", "alien-monopoly"], "story_count": 1, "stories": [{"id": "the-colors-of-space-bradley", "title": "The Colors of Space", "author": "Marion Zimmer Bradley", "year": 1983}]}, {"id": "alien-self-inflicted-catastrophe", "title": "Alien Self-Inflicted Catastrophe Requiring Human Aid", "description": "An alien species has poisoned its own planet through biological warfare and needs human help to survive, but the humans assisting them face the moral hazard of enabling a species that may repeat its mistakes.", "domains": ["first-contact", "climate", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models foreign aid ethics when the recipient caused their own crisis: relevant to post-conflict reconstruction, environmental remediation of self-inflicted damage, and moral hazard in aid.", "tags": ["self-inflicted-catastrophe", "alien-aid", "moral-hazard"], "story_count": 1, "stories": [{"id": "playing-god-zettel", "title": "Playing God", "author": "Sarah Zettel", "year": 1998}]}, {"id": "alien-ship-reality-generation", "title": "Alien Ship That Generates Reality", "description": "Survivors discover their world is actually an alien ship that generates environments based on some unknown logic, testing whether a world that is responsive to hidden intentions counts as 'real.'", "domains": ["vr-simulation", "first-contact"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models responsive environments: relevant to procedural generation in games, adaptive AI systems that change based on user behavior, and the question of whether responsiveness implies intelligence.", "tags": ["responsive-world", "alien-ship", "generated-reality"], "story_count": 1, "stories": [{"id": "nowhere-land-applegate", "title": "Nowhere Land", "author": "Katherine Applegate", "year": 2001}]}, {"id": "alien-signal-decryption", "title": "Alien Signal Decryption Risk", "description": "Scientists receive and decode an extraterrestrial signal containing instructions for building advanced technology, but following the instructions creates an entity or system whose goals may not align with human survival.", "domains": ["first-contact", "ai-ml", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "catastrophic"], "relevance": "Directly maps to SETI protocol debates about whether to execute alien instructions, and more broadly to the risk of deploying powerful systems whose design goals are opaque.", "tags": ["alien-signal", "seti", "information-hazard", "existential-risk"], "story_count": 2, "stories": [{"id": "a-for-andromeda-hoyle", "title": "A for Andromeda", "author": "Fred Hoyle, John Elliot", "year": 1962}, {"id": "the-andromeda-breakthrough-hoyle", "title": "The Andromeda Breakthrough", "author": "Fred Hoyle", "year": 1964}]}, {"id": "alien-sleeper-agent-identity", "title": "Alien Sleeper Agent Identity Discovery", "description": "A teenager living in a quiet town discovers he and his family are aliens who were part of a failed invasion, planted as sleeper agents and now must choose between their adopted human identity and their alien mission.", "domains": ["first-contact", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Models identity crisis in immigrant/refugee children who discover their parents' past: relevant to children of spies, second-generation immigrants choosing between cultures, and identity discovery narratives.", "tags": ["sleeper-agent", "alien-identity-discovery", "cultural-choice"], "story_count": 1, "stories": [{"id": "the-dark-side-of-nowhere-shusterman", "title": "The Dark Side of Nowhere", "author": "Neal Shusterman", "year": 1997}]}, {"id": "alien-technology-exploitation", "title": "Alien Legacy Technology Exploitation", "description": "Humanity discovers and reverse-engineers technology left by a vanished alien civilization, profiting enormously but without understanding the risks or the reasons the original builders disappeared.", "domains": ["space", "economics", "existential-risk"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary", "transformative"], "relevance": "Models the dynamics of exploiting resources or technologies without understanding their full lifecycle costs, from deep-sea mining to rapid AI deployment.", "tags": ["alien-technology", "reverse-engineering", "unknown-risk", "exploitation"], "story_count": 4, "stories": [{"id": "beyond-the-blue-event-horizon-pohl", "title": "Beyond the Blue Event Horizon", "author": "Frederik Pohl", "year": 1980}, {"id": "heechee-rendezvous-pohl", "title": "Heechee Rendezvous", "author": "Frederik Pohl", "year": 1984}, {"id": "the-annals-of-the-heechee-pohl", "title": "The Annals of the Heechee", "author": "Frederik Pohl", "year": 1987}, {"id": "gateway-pohl", "title": "Gateway", "author": "Frederik Pohl", "year": 1977}]}, {"id": "alien-virus-superpowers", "title": "Alien Virus Creating Superpowers", "description": "An alien pathogen rewrites human biology, killing most victims but granting survivors random superhuman abilities, creating a permanent underclass of the mutated and a volatile power landscape that existing institutions cannot manage.", "domains": ["pandemics", "biotech", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the social consequences of biological asymmetry: what happens when a random event creates a permanent power differential between otherwise identical citizens.", "tags": ["alien-virus", "superpowers", "biological-asymmetry", "wild-cards"], "story_count": 4, "stories": [{"id": "aces-high-martin", "title": "Aces High", "author": "George R. R. Martin, Wild Cards Trust Staff, Wild Cards Trust", "year": 1987}, {"id": "down-dirty-martin", "title": "Down & dirty", "author": "George R. R. Martin, Wild Cards Trust", "year": 1988}, {"id": "jokers-wild-martin", "title": "Jokers Wild", "author": "George R. R. Martin, Wild Cards Trust, Melinda Snodgrass", "year": 1987}, {"id": "mississippi-roll-martin", "title": "Mississippi Roll", "author": "George R. R. Martin, Stephen Leigh, David D. Levine, John J. Miller, Kevin Murphy, Cherie Priest, Carrie Vaughn, Wild Cards Trust", "year": 2017}]}, {"id": "alien-visitation-zone", "title": "Alien Visitation Zone with Dangerous Artifacts", "description": "Aliens visited Earth briefly and left behind zones filled with incomprehensible and dangerous artifacts, which humans risk their lives to scavenge without understanding what the aliens wanted or whether they even noticed humanity (like a 'roadside picnic').", "domains": ["first-contact", "existential-risk", "economics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "THE foundational 'zone' story (inspired Tarkovsky's Stalker and the STALKER games). Models the unknowability of alien intent and the economic dynamics of scavenging dangerous technology without understanding it.", "tags": ["visitation-zone", "alien-artifacts", "stalker", "incomprehensible-contact"], "story_count": 1, "stories": [{"id": "roadside-picnic-None", "title": "Roadside Picnic", "author": "\u0410\u0440\u043a\u0430\u0434\u0438\u0439 \u041d\u0430\u0442\u0430\u043d\u043e\u0432\u0438\u0447 \u0421\u0442\u0440\u0443\u0433\u0430\u0446\u043a\u0438\u0439, \u0411\u043e\u0440\u0438\u0441 \u041d\u0430\u0442\u0430\u043d\u043e\u0432\u0438\u0447 \u0421\u0442\u0440\u0443\u0433\u0430\u0446\u043a\u0438\u0439", "year": 1978}]}, {"id": "alternate-aviation-technology", "title": "Alternate Technology Path", "description": "A world develops along a different technological trajectory (airships instead of airplanes, for example), producing a society where familiar capabilities exist but social structures, economics, and risks differ in unexpected ways.", "domains": ["energy-physics", "economics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Useful for technology roadmap analysis and understanding path dependence in infrastructure development, including why some technologies win despite not being optimal.", "tags": ["alternate-technology", "path-dependence", "airships", "infrastructure"], "story_count": 2, "stories": [{"id": "airborn-oppel", "title": "Airborn", "author": "Kenneth Oppel", "year": 1997}, {"id": "skybreaker-oppel", "title": "Skybreaker", "author": "Kenneth Oppel", "year": 2005}]}, {"id": "alternate-civil-war", "title": "Alternate Civil War Outcome", "description": "An alternate history where the Confederacy won the Civil War leads to a second civil war decades later, testing how different outcomes of pivotal conflicts cascade through subsequent history.", "domains": ["governance", "warfare"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models counterfactual history as a tool for understanding which historical outcomes were contingent vs. structurally determined. Relevant to scenario planning and understanding path-dependence.", "tags": ["alternate-civil-war", "counterfactual-history", "second-civil-war"], "story_count": 1, "stories": [{"id": "how-few-remain-turtledove", "title": "How few remain", "author": "Harry Turtledove", "year": 1997}]}, {"id": "alternate-history-black-death-total", "title": "Black Death Kills 99% of Europe", "description": "What if the Black Death had killed 99% of Europeans instead of a third? History is retold through reincarnating souls across centuries as Islamic, Chinese, and Indian civilizations fill the vacuum. Without European colonialism, technology develops differently, religions evolve differently, and world wars happen between different powers. The story challenges Eurocentric assumptions about historical inevitability.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Relevant to challenging assumptions about Western inevitability, understanding how contingent historical outcomes are, and multicultural perspectives on progress.", "tags": ["alternate-history", "counterfactual", "eurocentrism", "reincarnation"], "story_count": 1, "stories": [{"id": "the-years-of-rice-and-salt-robinson", "title": "The years of rice and salt", "author": "Kim Stanley Robinson", "year": 2002}]}, {"id": "alternate-history-plague", "title": "Alternate History Plague Society", "description": "In an alternate timeline, a devastating plague from WWI persists and reshapes society, creating a world recognizable yet fundamentally different, testing how a single changed variable (a persistent pandemic) cascades through social structures.", "domains": ["pandemics", "governance"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to pandemic counterfactual analysis: what if COVID had been worse? What if the 1918 flu had persisted? How would persistent plague reshape governance, economy, and social norms?", "tags": ["alternate-history", "persistent-plague", "pandemic-society", "counterfactual"], "story_count": 1, "stories": [{"id": "archangel-conner", "title": "Archangel", "author": "Michael Conner", "year": 1995}]}, {"id": "alternate-jewish-state-alaska", "title": "Alternate Jewish Homeland in Alaska", "description": "In an alternate history where Israel failed in 1948, the US government created a temporary Jewish settlement in Sitka, Alaska, now about to revert to Alaskan control. A detective investigates a murder that leads to a conspiracy to rebuild the Temple in Jerusalem. The noir-tinged story explores displacement, statelessness, and what happens to a people when their temporary home's lease expires.", "domains": ["governance", "social-engineering"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to refugee resettlement policies, temporary protected status, and the relationship between identity and territory.", "tags": ["alternate-history", "displacement", "statelessness"], "story_count": 1, "stories": [{"id": "the-yiddish-policemen-s-union-chabon", "title": "The Yiddish Policemen's Union", "author": "Michael Chabon", "year": 2008}]}, {"id": "alternative-physics-universe", "title": "Universe with Alternative Physics", "description": "A world operates under fundamentally different physical laws where light has multiple speeds and traveling through space means traveling through time, and its inhabitants must build a generation ship to save their world from an accelerating sky.", "domains": ["energy-physics", "space"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models what civilization looks like under different physical constants: relevant to the fine-tuning argument, multiverse theory, and whether the physics we experience is the only set compatible with intelligence.", "tags": ["alternative-physics", "different-light-speed", "physics-worldbuilding"], "story_count": 3, "stories": [{"id": "the-clockwork-rocket-egan", "title": "The Clockwork Rocket", "author": "Greg Egan", "year": 2011}, {"id": "the-eternal-flame-egan", "title": "The Eternal Flame", "author": "Greg Egan", "year": 2012}, {"id": "the-arrows-of-time-egan", "title": "The Arrows of Time", "author": "Greg Egan", "year": 2013}]}, {"id": "amnesiac-maze-experiment", "title": "Amnesiac Subjects in Deadly Maze Experiment", "description": "Teenagers with erased memories are placed in a giant maze as test subjects for an experiment they don't understand, testing whether humans can solve deadly puzzles when stripped of identity, context, and consent.", "domains": ["social-engineering", "ethics-philosophy", "governance"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models nonconsensual experimentation: relevant to the Tuskegee study, informed consent ethics, and whether extreme circumstances justify experimenting on people without their knowledge.", "tags": ["maze-experiment", "amnesia", "nonconsensual-testing"], "story_count": 1, "stories": [{"id": "the-maze-runner-dashner", "title": "The Maze Runner", "author": "James Dashner", "year": 2009}]}, {"id": "anarchist-utopia-vs-capitalism", "title": "Anarchist Utopia vs. Propertarian Society", "description": "A physicist from an anarchist moon colony visits the capitalist mother planet, and the contrast reveals both the hidden authoritarianism of anarchism and the creative energy of capitalism, refusing to declare either system superior.", "domains": ["governance", "economics", "ethics-philosophy"], "scenarios": ["thought-experiment", "utopian-vision"], "outcomes": ["ambiguous"], "relevance": "THE canonical SF political economy novel. Models the genuine trade-offs between anarchism and capitalism without false equivalence. Directly relevant to commons governance, cooperative economics, and the question of whether any pure system works.", "tags": ["anarchist-utopia", "capitalism-critique", "political-economy", "ambiguous-utopia"], "story_count": 1, "stories": [{"id": "the-dispossessed-guin", "title": "The Dispossessed", "author": "Ursula K. Le Guin", "year": 1974}]}, {"id": "ancestral-guilt-persecution", "title": "Ancestral Guilt Persecution", "description": "A religious order holds an individual accountable for an ancestor's actions centuries earlier, pursuing them with lethal force across a civilization, testing whether inherited guilt is ever legitimate and how societies handle intergenerational accountability.", "domains": ["ethics-philosophy", "governance"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to intergenerational justice debates, reparations policy, blood feud dynamics, and whether descendants bear moral responsibility for ancestors' actions.", "tags": ["ancestral-guilt", "intergenerational-justice", "religious-persecution", "blood-feud"], "story_count": 1, "stories": [{"id": "against-a-dark-background-banks", "title": "Against a Dark Background", "author": "Iain Banks", "year": 1993}]}, {"id": "ancient-alien-artifacts-awakened", "title": "Ancient Alien Artifacts Awakened by Human Activity", "description": "Human exploration (mining, colonization, warfare) inadvertently activates ancient alien artifacts that have been dormant for millions of years. The artifacts' original purpose is unclear, and humanity must determine whether they are tools, weapons, or something else entirely before they can be controlled or before they activate fully.\n\nThe scenario explores the danger of triggering systems designed by minds with completely different values and goals.", "domains": ["first-contact", "space", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["ambiguous", "catastrophic"], "relevance": "Relevant to the precautionary principle in space exploration, deep-sea mining, and any activity that disturbs systems whose purpose we don't fully understand (e.g. permafrost, deep geological formations).", "tags": ["ancient-artifacts", "alien-technology", "precautionary-principle"], "story_count": 2, "stories": [{"id": "killing-titan-bear", "title": "Killing Titan", "author": "Greg Bear", "year": 2015}, {"id": "take-back-the-sky-bear", "title": "Take Back the Sky", "author": "Greg Bear", "year": 2016}]}, {"id": "ancient-galactic-engineering", "title": "Ancient Galactic Engineering Race", "description": "An ancient civilization engineered the galaxy on a massive scale (building megastructures, seeding life) and disappeared, leaving artifacts that current civilizations fight over without understanding their purpose.", "domains": ["space", "existential-risk", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models the Fermi paradox through inheritance: what if our galaxy was designed by predecessor civilizations? Relevant to SETI artifact searches and the risks of using technology you don't understand.", "tags": ["ancient-engineers", "galactic-megastructure", "predecessor-civilization"], "story_count": 5, "stories": [{"id": "halo-bear", "title": "Halo", "author": "Greg Bear, Timothy Dadabo", "year": 2012}, {"id": "halo-cryptum-bear", "title": "Halo Cryptum", "author": "Greg Bear", "year": 2010}, {"id": "hellhole-herbert", "title": "Hellhole: Awakening", "author": "Brian Herbert, Kevin J. Anderson", "year": 2011}, {"id": "legacy-bear", "title": "Legacy", "author": "Greg Bear", "year": 1960}, {"id": "hellhole-inferno-herbert", "title": "Hellhole Inferno", "author": "Brian Herbert", "year": 2014}]}, {"id": "ancient-hidden-technology", "title": "Ancient Hidden Technology in Plain Sight", "description": "An ancient structure in a modern city conceals technology or knowledge that predates known civilization, and discovering its purpose threatens existing power structures.", "domains": ["energy-physics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models hidden infrastructure: relevant to discovering that existing systems contain capabilities their users don't know about (internet backdoors, dormant code, archaeological surprises).", "tags": ["hidden-technology", "ancient-structure", "concealed-power"], "story_count": 1, "stories": [{"id": "the-house-that-stood-still-vogt", "title": "The House that Stood Still", "author": "A. E. van Vogt", "year": 1950}]}, {"id": "ancient-knowledge-in-alien-species", "title": "Ancient Knowledge Stored in Long-Lived Alien Species", "description": "The key to faster-than-light travel may be stored in the memories of gas-giant dwellers who live for billions of years but think very slowly, testing whether knowledge stored in incompatible cognitive architectures can be accessed.", "domains": ["first-contact", "space", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models knowledge locked in incompatible formats: relevant to legacy data migration, indigenous knowledge in endangered languages, and whether information in fundamentally alien cognitive systems can ever be fully translated.", "tags": ["ancient-knowledge", "long-lived-aliens", "cognitive-incompatibility"], "story_count": 1, "stories": [{"id": "the-algebraist-banks", "title": "The Algebraist", "author": "Iain Banks", "year": 2004}]}, {"id": "ancient-machine-awakening", "title": "Ancient Machine Awakening", "description": "Machines created by a long-vanished civilization suddenly activate after millennia of dormancy, for reasons no living being understands, creating both opportunity and existential danger.", "domains": ["ai-ml", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the risk of activating dormant systems: relevant to ancient malware, legacy nuclear systems, and any technology infrastructure that has been inactive so long that no one understands its original purpose.", "tags": ["ancient-machines", "dormant-technology", "activation-risk"], "story_count": 1, "stories": [{"id": "legacy-schmitz", "title": "Legacy", "author": "James H. Schmitz", "year": 1979}]}, {"id": "ancient-selection-game", "title": "Ancient Selection Game", "description": "Twelve individuals, selected and trained since birth by competing factions, are activated for a lethal competition with civilizational stakes, testing whether ancient institutional frameworks can impose binding outcomes on modern populations.", "domains": ["governance", "warfare"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Models binding legacy agreements (treaties, constitutions, religious edicts) that constrain modern actors, and the question of whether past commitments should have enforcement power over unwilling participants.", "tags": ["ancient-game", "legacy-commitment", "selection-tournament", "binding-agreement"], "story_count": 1, "stories": [{"id": "endgame-frey", "title": "Endgame", "author": "James Frey, Nils Johnson-Shelton", "year": 2014}]}, {"id": "ancient-terrestrial-technology", "title": "Ancient Terrestrial Technology Discovery", "description": "A flying saucer is discovered embedded in ancient rock, but it was built on Earth by a civilization that predated the one we know, testing how we would respond to evidence that an advanced terrestrial civilization existed and was lost.", "domains": ["energy-physics", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models the 'ancient advanced civilization' hypothesis: how would established science respond to evidence that contradicts the timeline of human development?", "tags": ["ancient-technology", "pre-historical-civilization", "paradigm-challenge"], "story_count": 1, "stories": [{"id": "saucer-coonts", "title": "Saucer", "author": "Stephen Coonts", "year": 2002}]}, {"id": "android-identity-discovery", "title": "Android Identity Discovery", "description": "A teenager discovers she is a synthetic being who was raised believing she was human, forcing a crisis of identity: are her memories, emotions, and relationships real if her body isn't biological?", "domains": ["robotics", "ethics-philosophy", "ai-ml"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the Turing test from the inside: if an AI genuinely believes it is human, does that belief constitute personhood? Relevant to AI rights, synthetic identity, and the ontology of consciousness.", "tags": ["android-identity", "synthetic-person", "false-memory", "personhood"], "story_count": 1, "stories": [{"id": "mila-2-0-driza", "title": "MILA 2.0", "author": "Debra Driza", "year": 2013}]}, {"id": "animal-clan-governance", "title": "Animal Clan Governance", "description": "Non-human communities organize into political structures with leadership succession, territorial disputes, and prophecy-driven decision-making that mirrors human governance while removing the assumption that politics requires human intelligence.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Useful as a framework for analyzing governance without anthropocentrism, relevant to animal behavior research and AI governance where non-human agents must coordinate.", "tags": ["animal-governance", "clan-politics", "leadership-succession"], "story_count": 1, "stories": [{"id": "a-dangerous-path-hunter", "title": "A Dangerous Path", "author": "Erin Hunter", "year": 2004}]}, {"id": "animal-communication-technology", "title": "Animal Communication Technology in Fieldwork", "description": "Technology enabling communication with great apes (sign language, neural interface) is deployed in a dangerous field expedition, testing whether interspecies communication creates genuine partnership or instrumentalizes animal intelligence.", "domains": ["comms-info", "biotech", "ethics-philosophy"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to great ape language research, AI-mediated animal communication startups, and the ethics of deploying communicative animals in hazardous human operations.", "tags": ["animal-communication", "sign-language", "field-expedition", "interspecies-ethics"], "story_count": 1, "stories": [{"id": "congo-crichton", "title": "Congo", "author": "Michael Crichton", "year": 1980}]}, {"id": "animal-intelligence-emergence", "title": "Animal Intelligence Emergence", "description": "Animals gain human-level intelligence and immediately develop complex social dynamics (hierarchy, ethics, deception), testing whether intelligence inevitably produces the same social problems regardless of species.", "domains": ["biotech", "ethics-philosophy", "social-engineering"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous"], "relevance": "Models whether social complexity is an inevitable consequence of intelligence, relevant to AI alignment (will AI develop politics?) and animal cognition research.", "tags": ["animal-intelligence", "emergent-society", "intelligence-consequences"], "story_count": 2, "stories": [{"id": "the-amazing-maurice-and-his-educated-rodents-pratchett", "title": "The Amazing Maurice and His Educated Rodents", "author": "Terry Pratchett", "year": 2001}, {"id": "dungeon-crawler-carl-dinniman", "title": "Dungeon Crawler Carl", "author": "Matt Dinniman", "year": 2020}]}, {"id": "annoying-alien-contact", "title": "Non-Threatening but Insufferable Alien Contact", "description": "Billions of small, indestructible, omnipresent Martians appear on Earth with no hostile intent but are insufferably annoying, testing whether humanity can cope with a first-contact scenario that is not dangerous but simply intolerable.", "domains": ["first-contact", "social-engineering"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models nuisance scenarios that don't trigger emergency protocols: relevant to spam, internet trolls, and any persistent low-grade disruption that degrades civilization without threatening it.", "tags": ["annoying-aliens", "nuisance-contact", "low-threat-disruption"], "story_count": 1, "stories": [{"id": "martians-go-home-brown", "title": "Martians, Go Home!", "author": "Fredric Brown", "year": 1955}]}, {"id": "antarctic-mystery-expedition", "title": "Antarctic Mystery Expedition", "description": "An expedition ventures into Antarctic waters following clues from a previous lost voyage, discovering that the extreme environment conceals phenomena that challenge scientific understanding.", "domains": ["climate", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the dynamics of follow-up expeditions to dangerous areas, relevant to deep-sea and polar exploration ethics and the romanticization of extreme environments.", "tags": ["antarctic-exploration", "follow-up-expedition", "extreme-environment"], "story_count": 1, "stories": [{"id": "an-antarctic-mystery-verne", "title": "An Antarctic Mystery", "author": "Jules Verne", "year": 1899}]}, {"id": "anti-alien-racism", "title": "Anti-Alien Racism in First Contact Era", "description": "When alien species are discovered, human society develops racist movements against aliens, including violent extremists who want to prevent any interspecies cooperation, testing whether human tribalism inevitably extends to non-humans.", "domains": ["first-contact", "social-engineering", "governance"], "scenarios": ["warning", "prediction"], "outcomes": ["cautionary"], "relevance": "Models xenophobia extended to aliens: directly relevant to how existing racial dynamics would shape first-contact politics, and whether anti-immigrant sentiment would transfer to anti-alien sentiment.", "tags": ["anti-alien-racism", "xenophobia", "interspecies-politics"], "story_count": 1, "stories": [{"id": "the-long-result-brunner", "title": "The long result", "author": "John Brunner", "year": 1965}]}, {"id": "anti-literacy-society", "title": "Anti-Literacy Society", "description": "A future society holds book-learning responsible for war and destruction, making literacy socially taboo and politically dangerous, testing whether a deliberate rejection of literacy could be a stable social equilibrium.", "domains": ["social-engineering", "governance", "comms-info"], "scenarios": ["warning", "satire"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models anti-intellectualism: relevant to book banning, science denial movements, and any social trend that treats expertise as the enemy rather than a resource.", "tags": ["anti-literacy", "anti-intellectualism", "book-banning"], "story_count": 2, "stories": [{"id": "null-abc-piper", "title": "Null-ABC", "author": "H. Beam Piper, John J. McGuire, John J. Mcguire, John Joseph McGuire", "year": 2006}, {"id": "the-fireman-bradbury", "title": "The Fireman", "author": "Ray Bradbury", "year": 1951}]}, {"id": "anti-technology-society", "title": "Anti-Technology Witch Hunt Society", "description": "In a future England, anyone who understands machines is persecuted as a witch, creating a society that has deliberately regressed to pre-industrial technology out of fear, testing whether hostility to technology can be a stable social equilibrium.", "domains": ["governance", "social-engineering", "energy-physics"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models anti-science movements, technology-phobia, and Luddite dynamics. Relevant to vaccine resistance, GMO bans, and any society that rejects beneficial technology out of fear or ideology.", "tags": ["
