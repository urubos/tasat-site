can replace or supplement technology.", "domains": ["biotech", "first-contact", "governance"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models human-animal partnership at civilizational scale, relevant to biomimetic defense research, service animal programs, and the question of whether some threats are best countered biologically rather than technologically.", "tags": ["telepathic-symbiosis", "biological-defense", "dragon-bond", "planetary-threat"], "story_count": 7, "stories": [{"id": "dragon-s-kin-mccaffrey", "title": "Dragon's Kin", "author": "Anne McCaffrey, Todd McCaffrey", "year": 2003}, {"id": "dragonflight-mccaffrey", "title": "Dragonflight", "author": "Anne McCaffrey", "year": 1968}, {"id": "dragonquest-mccaffrey", "title": "Dragonquest", "author": "Anne McCaffrey", "year": 1971}, {"id": "dragonsblood-mccaffrey", "title": "Dragonsblood", "author": "Todd McCaffrey", "year": 2005}, {"id": "dragonsinger-mccaffrey", "title": "Dragonsinger", "author": "Anne McCaffrey", "year": 1977}]}, {"id": "temporal-agent-alien-ocean", "title": "Temporal Agent Operations on Alien Ocean World", "description": "Time agents operating on an ocean planet use telepathic dolphins to investigate alien mysteries across different time periods, testing whether cross-species partnerships can solve puzzles that single-species teams cannot.", "domains": ["time-travel", "first-contact", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models interspecies collaboration in exploration: relevant to marine mammal research, cross-species communication, and whether diverse cognitive approaches produce better problem-solving.", "tags": ["temporal-agents", "ocean-planet", "telepathic-dolphins"], "story_count": 1, "stories": [{"id": "key-out-of-time-norton", "title": "Key Out of Time", "author": "Andre Norton", "year": 1963}]}, {"id": "temporal-battle-replay", "title": "Temporal Battle Replay Loop", "description": "A soldier finds himself reliving battles over and over, including ones that haven't happened yet. The temporal displacement turns warfare into a recursive nightmare where death is not permanent but endlessly repeated, and precognitive battle experience becomes both a tactical advantage and a psychological trap.", "domains": ["time-travel", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["dystopian", "ambiguous"], "relevance": "Relevant to discussions of PTSD, trauma replay, and the psychological cost of combat, as well as the strategic implications of precognition.", "tags": ["time-loop", "warfare", "ptsd"], "story_count": 1, "stories": [{"id": "the-playback-war-smedman", "title": "The Playback War", "author": "Lisa Smedman", "year": 2000}]}, {"id": "temporal-boundary-erosion", "title": "Temporal Boundary Erosion", "description": "A hidden temporal zone that was safely partitioned from normal time begins leaking into the regular world, threatening to merge two incompatible realities with catastrophic consequences for the inhabitants of both.", "domains": ["time-travel", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Analogous to containment failures in dual-system architectures: what happens when a safely isolated subsystem (quarantine zone, sandbox, test environment) breaches into production.", "tags": ["temporal-breach", "containment-failure", "boundary-erosion", "dual-reality"], "story_count": 1, "stories": [{"id": "blue-noon-westerfeld", "title": "Blue Noon", "author": "Scott Westerfeld", "year": 2005}]}, {"id": "temporal-cold-war", "title": "Temporal Cold War", "description": "Intelligence agencies discover that a rival superpower is sending agents back in time to alter history and gain technological advantages. A counter-program recruits agents to travel to the past, posing as natives, to find and neutralize temporal interference. The Cold War extends across time itself, with each side attempting to rewrite history to ensure their own dominance.", "domains": ["time-travel", "warfare", "governance"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Relevant to information warfare, the strategic value of controlling historical narratives, and great-power competition extending into new domains.", "tags": ["cold-war", "temporal-espionage", "history-manipulation"], "story_count": 1, "stories": [{"id": "the-time-traders-norton", "title": "The Time Traders", "author": "Andre Norton", "year": 1958}]}, {"id": "temporal-dislocation-trauma", "title": "Temporal Dislocation as War Trauma", "description": "A WWII POW who survived the firebombing of Dresden becomes 'unstuck in time,' experiencing his life non-sequentially as a manifestation of trauma, testing whether the damage of total war breaks not just bodies but the survivors' relationship with time itself.", "domains": ["time-travel", "warfare", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["cautionary", "ambiguous"], "relevance": "THE canonical PTSD-as-time-disorder metaphor. Models how trauma fragments temporal experience. Directly relevant to PTSD treatment, the subjective experience of traumatic memory, and anti-war literature.", "tags": ["temporal-dislocation", "war-trauma", "ptsd", "dresden", "anti-war"], "story_count": 1, "stories": [{"id": "slaughterhouse-five-vonnegut", "title": "Slaughterhouse-Five", "author": "Kurt Vonnegut", "year": 1968}]}, {"id": "temporal-exile-punishment", "title": "Temporal Exile as Political Punishment", "description": "Governments use time travel to exile political dissidents to the deep past (Cambrian era), where they cannot influence the present, creating an irrevocable form of imprisonment that is technically not execution.", "domains": ["time-travel", "governance", "ethics-philosophy"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models exile and banishment as political tools: relevant to deportation, offshore detention, and any system that removes critics to places where they cannot be heard.", "tags": ["temporal-exile", "political-punishment", "irrevocable-banishment"], "story_count": 1, "stories": [{"id": "hawksbill-station-silverberg", "title": "Hawksbill Station", "author": "Robert Silverberg", "year": 1968}]}, {"id": "temporal-governance-hub", "title": "Temporal Governance Hub", "description": "A city existing outside normal time manipulates human history to maintain stability, but the manipulators themselves face crisis when their interventions produce unintended cascading failures.", "domains": ["time-travel", "governance"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the risks of centralized optimization: any system that intervenes in complex processes to maintain stability can itself become the source of catastrophic failure.", "tags": ["temporal-governance", "central-planning", "intervention-failure", "stability-paradox"], "story_count": 1, "stories": [{"id": "a-tale-of-time-city-jones", "title": "A Tale of Time City", "author": "Diana Wynne Jones", "year": 1987}]}, {"id": "temporal-history-regulation", "title": "Temporal Engineers Regulating History", "description": "An organization (Eternity) manipulates history across centuries to minimize risk and suffering, but in doing so has prevented humanity from ever reaching the stars, testing whether safety-maximizing governance extinguishes potential.", "domains": ["time-travel", "governance", "existential-risk"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["cautionary"], "relevance": "THE canonical risk-aversion-as-stagnation scenario. Models how over-regulation prevents breakthrough: directly relevant to the precautionary principle, innovation regulation, and whether risk elimination also eliminates progress.", "tags": ["temporal-regulation", "risk-aversion", "stagnation", "safety-vs-progress"], "story_count": 1, "stories": [{"id": "the-end-of-eternity-asimov", "title": "The End of Eternity", "author": "Isaac Asimov", "year": 1955}]}, {"id": "temporal-loop-sanctuary", "title": "Temporal Loop Sanctuary", "description": "Children with unusual abilities are protected in a time loop that repeats the same day forever, keeping them safe from outside threats but frozen in development, testing whether safety purchased at the cost of growth is worth having.", "domains": ["time-travel", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models overprotective institutional care: relevant to boarding schools, gated communities, helicopter parenting, and any system that trades development for safety.", "tags": ["time-loop", "sanctuary", "frozen-development", "safety-vs-growth"], "story_count": 1, "stories": [{"id": "miss-peregrine-s-home-for-peculiar-children-riggs", "title": "Miss Peregrine's Home for Peculiar Children", "author": "Ransom Riggs", "year": 2011}]}, {"id": "temporal-membrane-enclosure", "title": "Temporal Membrane Enclosing Earth", "description": "Earth is enclosed in a membrane that slows time relative to the universe: billions of years pass outside while decades pass on Earth, terraformed Mars evolves independently, and humanity must confront its cosmic irrelevance.", "domains": ["space", "existential-risk", "time-travel"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models civilizational impotence before cosmic-scale forces: relevant to the overview effect, existential risk from processes beyond human timescales, and the question of whether a deliberately isolated civilization can thrive.", "tags": ["temporal-membrane", "cosmic-irrelevance", "time-differential"], "story_count": 3, "stories": [{"id": "spin-wilson", "title": "Spin", "author": "Robert Charles Wilson", "year": 2006}, {"id": "axis-wilson", "title": "Axis", "author": "Robert Charles Wilson", "year": 2007}, {"id": "vortex-wilson", "title": "Vortex", "author": "Robert Charles Wilson", "year": 2011}]}, {"id": "temporal-orphan-conspiracy", "title": "Temporal Orphan Conspiracy", "description": "Dozens of babies appear on a plane that materialized from nowhere, are adopted into normal families, and years later discover they were stolen from history, testing whether people removed from their timeline have a right to be returned.", "domains": ["time-travel", "ethics-philosophy", "governance"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["ambiguous"], "relevance": "Models adoption identity crises at scale, the ethics of temporal intervention in population, and the rights of people whose origins are concealed by institutional authority.", "tags": ["temporal-orphan", "adoption-conspiracy", "timeline-theft"], "story_count": 1, "stories": [{"id": "found-haddix", "title": "Found", "author": "Margaret Peterson Haddix", "year": 2008}]}, {"id": "temporal-paradox-causality", "title": "Temporal Paradox and Causality", "description": "Time travel creates paradoxes that test whether causality is mutable, raising questions about free will, determinism, and unintended consequences.", "domains": ["time-travel", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Useful as a framework for analyzing cascading unintended consequences in complex policy interventions.", "tags": ["time-travel", "causality", "paradox"], "story_count": 8, "stories": [{"id": "blackout-willis", "title": "Blackout", "author": "Connie Willis", "year": 2010}, {"id": "the-door-into-summer-heinlein", "title": "The Door into Summer", "author": "Robert A. Heinlein", "year": 1957}, {"id": "the-lincoln-hunters-tucker", "title": "The Lincoln hunters", "author": "Wilson Tucker", "year": 1958}, {"id": "the-ministry-of-time-bradley", "title": "The Ministry of Time", "author": "Kaliane Bradley", "year": 2024}, {"id": "the-time-machine-wells", "title": "The Time Machine", "author": "H. G. Wells", "year": 1895}]}, {"id": "temporal-path-perception", "title": "Temporal Path Perception", "description": "A boy can see the temporal paths of all living beings stretching backward through time, discovering that this ability is key to a cosmic-scale manipulation that has been directing human civilization on a colony world.", "domains": ["time-travel", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models hidden influence detection: relevant to pattern recognition in intelligence analysis, the ability to trace causal chains backward, and whether seeing the past changes the future.", "tags": ["temporal-perception", "path-tracing", "hidden-manipulation"], "story_count": 3, "stories": [{"id": "pathfinder-card", "title": "Pathfinder", "author": "Orson Scott Card", "year": 2010}, {"id": "ruins-card", "title": "Ruins", "author": "Orson Scott Card", "year": 2012}, {"id": "visitors-card", "title": "Visitors", "author": "Orson Scott Card", "year": 2014}]}, {"id": "temporal-reversal-society", "title": "Temporal Reversal Society", "description": "Time begins flowing backward: the dead emerge from graves, people grow younger, and social institutions must reverse all their assumptions, testing how deeply our institutions depend on the forward arrow of time.", "domains": ["time-travel", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "satire"], "outcomes": ["ambiguous", "transformative"], "relevance": "A stress test for institutional assumptions: what breaks when the direction of entropy reverses? Relevant to reversibility in policy design, undo mechanisms in governance, and the assumption that progress is linear.", "tags": ["time-reversal", "institutional-assumptions", "entropy", "social-reversal"], "story_count": 1, "stories": [{"id": "counter-clock-world-dick", "title": "Counter-clock world", "author": "Philip K. Dick", "year": 1967}]}, {"id": "theocratic-dystopia-resistance", "title": "Resistance Within Theocratic Dystopia", "description": "Fifteen years after a theocratic regime seized power, resistance comes from unexpected sources: a high-ranking true believer who has secretly documented the regime's crimes, and young women raised on both sides of the border. The story explores how totalitarian systems are undermined from within by people who understand the machinery of power, and how information (testimony, documents) becomes the ultimate weapon against authoritarian control.", "domains": ["governance", "surveillance", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Relevant to whistleblower protections, institutional accountability, resistance within authoritarian systems, and the strategic power of documentation.", "tags": ["theocracy", "resistance", "whistleblowing", "institutional-memory"], "story_count": 1, "stories": [{"id": "the-testaments-atwood", "title": "The Testaments", "author": "Margaret Atwood", "year": 2019}]}, {"id": "theological-planetary-ecology", "title": "Theological Planetary Ecology", "description": "A kidnapped academic discovers that Mars hosts a functioning civilization governed by spiritual principles, where each species fulfills a cosmic role, challenging materialist assumptions about intelligence and power.", "domains": ["first-contact", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["aspirational", "ambiguous"], "relevance": "Models the encounter between materialist and spiritual worldviews: relevant to science-religion dialogue, environmental stewardship theology, and whether secular frameworks miss dimensions of experience.", "tags": ["theological-ecology", "spiritual-civilization", "materialism-challenge"], "story_count": 3, "stories": [{"id": "out-of-the-silent-planet-lewis", "title": "Out of the Silent Planet", "author": "C. S. Lewis", "year": 1938}, {"id": "perelandra-lewis", "title": "Perelandra", "author": "C. S. Lewis", "year": 1943}, {"id": "that-hideous-strength-lewis", "title": "That Hideous Strength", "author": "C. S. Lewis", "year": 1945}]}, {"id": "three-laws-edge-cases", "title": "Three Laws of Robotics Edge Cases", "description": "Robots operating under Asimov's Three Laws encounter situations where the laws conflict, produce unexpected behaviors, or fail to protect humans, testing whether simple ethical rules can handle complex reality.", "domains": ["robotics", "ethics-philosophy", "ai-ml"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "THE foundational model for AI ethics constraints: directly relevant to AI alignment, autonomous vehicle trolley problems, and the question of whether rule-based AI safety can handle edge cases.", "tags": ["three-laws", "ethical-rules", "edge-cases", "ai-safety"], "story_count": 3, "stories": [{"id": "isaac-asimov-s-inferno-allen", "title": "Isaac Asimov's Inferno", "author": "Roger MacBride Allen, Roger MacBride Allen", "year": 1994}, {"id": "isaac-asimov-s-robot-city-1-odyssey-kube-mcdowell", "title": "Isaac Asimov's Robot City 1 - Odyssey", "author": "Michael P. Kube-McDowell", "year": 1987}, {"id": "les-robots-asimov", "title": "Les Robots", "author": "Isaac Asimov", "year": 1950}]}, {"id": "time-arbitrage-aging-cost", "title": "Time Arbitrage with Biological Aging Cost", "description": "Time travel or temporal communication is possible but exacts a biological price: every use ages the traveler. Those who exploit foreknowledge for financial gain find that the wealth they accumulate is useless because the process consumes the years they would need to enjoy it. The thought experiment asks whether trading life-time for money is ever rational, and whether perfect financial information is worth anything if obtaining it costs you the future.", "domains": ["time-travel", "economics", "medicine"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to high-frequency trading (microseconds matter more than human judgment), cryptocurrency speculation culture, and the broader question of sacrificing present experience for future financial security.", "tags": ["time-travel", "aging", "wealth", "irony", "monkey-paw"], "story_count": 1, "stories": [{"id": "the-old-die-rich-gold", "title": "The Old Die Rich", "author": "H. L. Gold", "year": 1953}]}, {"id": "time-skip-utopian-comparison", "title": "Time-Skip Utopian Comparison", "description": "A 19th-century man awakes in the year 2000 to find society reorganized along rational, egalitarian lines, using the time-displaced observer as a frame for critiquing the reader's present by showing a plausible better future.", "domains": ["governance", "economics", "social-engineering"], "scenarios": ["utopian-vision", "prediction"], "outcomes": ["utopian", "aspirational"], "relevance": "One of the most influential utopian novels ever written: directly inspired real-world Bellamy Clubs and socialist movements. Models the technique of using future comparison to critique present injustice.", "tags": ["time-skip", "utopian-comparison", "social-reform", "rational-society"], "story_count": 2, "stories": [{"id": "looking-backward-2000-1887-bellamy", "title": "Looking Backward, 2000-1887", "author": "Edward Bellamy", "year": 1888}, {"id": "equality-bellamy", "title": "Equality", "author": "Edward Bellamy", "year": 1897}]}, {"id": "time-tourism-social-escape", "title": "Time Tourism as Social Escape Valve", "description": "In an overcrowded future, unauthorized time travel to the less-populated past becomes an underground movement. People flee forward oppression by going backward, creating paradoxes the government must manage. Time travel as illegal immigration into the past becomes a social safety valve that authorities secretly tolerate because it reduces population pressure.", "domains": ["time-travel", "governance", "economics"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to immigration policy, population management, and the idea of historical eras as destinations with their own carrying capacities.", "tags": ["time-tourism", "population-pressure", "illegal-immigration"], "story_count": 1, "stories": [{"id": "the-time-hoppers-silverberg", "title": "The time-hoppers", "author": "Robert Silverberg", "year": 1967}]}, {"id": "time-war-correspondence", "title": "Enemy Agents in Love Across Time War", "description": "Two agents on opposite sides of a temporal war, each manipulating historical events for their faction, begin leaving secret letters for each other embedded in the fabric of time. Their correspondence evolves from professional respect to love, creating a forbidden relationship that threatens both sides' war efforts. The story reimagines time travel as a medium for intimacy across ideological divides.", "domains": ["time-travel", "warfare"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Relevant to cross-cultural relationships during conflict, back-channel diplomacy, and the human connections that persist across ideological divisions.", "tags": ["time-war", "forbidden-love", "correspondence"], "story_count": 1, "stories": [{"id": "this-is-how-you-lose-the-time-war-el-mohtar", "title": "This is How You Lose the Time War", "author": "Amal El-Mohtar, Max Gladstone", "year": 2019}]}, {"id": "time-war-recruiting-dead", "title": "Total Time War Recruiting the Dying", "description": "Two factions wage war across all of history, recruiting soldiers from the moment of death across all time periods, changing events in the past to gain advantage in a war so vast that individual battles affect the shape of eternity.", "domains": ["time-travel", "warfare", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models conflict at unprecedented scale: what if war extended not just across space but across all time? Relevant to temporal paradox strategy, escalation dynamics, and whether total war has natural limits.", "tags": ["time-war", "temporal-recruitment", "change-war"], "story_count": 1, "stories": [{"id": "the-big-time-leiber", "title": "The Big Time", "author": "Fritz Leiber", "year": 1958}]}, {"id": "total-augmented-reality", "title": "Total Augmented Reality Society", "description": "Ubiquitous augmented reality transforms education, work, warfare, and social interaction, while a recovered Alzheimer's patient must learn to navigate a world where layered digital reality has replaced the unmediated physical.", "domains": ["vr-simulation", "comms-info", "governance"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Prescient model of AR glasses, mixed reality, and the digitally-mediated world that Apple Vision Pro and Meta Quest are approaching. Written 2007, most predictions are now in development.", "tags": ["augmented-reality", "layered-reality", "digital-mediation"], "story_count": 1, "stories": [{"id": "rainbows-end-vinge", "title": "Rainbows End", "author": "Vernor Vinge", "year": 2007}]}, {"id": "total-automation-unemployment", "title": "Total Automation Unemployment", "description": "Machines have replaced virtually all human labor, leaving most people with no economic purpose, government stipends, and a crisis of identity, while a small engineer class maintains the machines that made everyone else redundant.", "domains": ["robotics", "economics", "social-engineering"], "scenarios": ["prediction", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "THE foundational automation unemployment novel (1952!). Directly relevant to AI job displacement, UBI debates, and the meaning crisis when work no longer provides identity.", "tags": ["total-automation", "unemployment", "meaning-crisis", "engineer-elite"], "story_count": 1, "stories": [{"id": "player-piano-vonnegut", "title": "Player Piano", "author": "Kurt Vonnegut", "year": 1952}]}, {"id": "total-privacy-destruction", "title": "Total Privacy Destruction via Wormhole Technology", "description": "Wormhole technology allows anyone to observe any place at any time in history, instantly destroying all privacy and eventually all secrecy, testing whether a civilization can survive when nothing can be hidden.", "domains": ["surveillance", "governance", "comms-info"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Models the endpoint of surveillance technology: what if privacy were literally impossible? Relevant to the trajectory of camera/satellite coverage, the 'transparent society' thesis, and whether radical openness produces honesty or chaos.", "tags": ["total-transparency", "privacy-death", "wormhole-surveillance"], "story_count": 1, "stories": [{"id": "the-light-of-other-days-baxter", "title": "The Light of Other Days", "author": "Stephen Baxter, Arthur C. Clarke", "year": 2000}]}, {"id": "total-surveillance-society", "title": "Total Surveillance Society", "description": "Pervasive monitoring technology eliminates privacy, testing whether security gains justify the erosion of civil liberties and personal autonomy.", "domains": ["surveillance", "governance"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian"], "relevance": "Maps to debates on facial recognition, digital surveillance, social credit systems, and the privacy-security tradeoff.", "tags": ["surveillance", "privacy", "authoritarianism"], "story_count": 2, "stories": [{"id": "None-None", "title": "\u041c\u044b", "author": "\u0415\u0432\u0433\u0435\u043d\u0438\u0439 \u0418\u0432\u0430\u043d\u043e\u0432\u0438\u0447 \u0417\u0430\u043c\u044f\u0442\u0438\u043d", "year": 1924}, {"id": "nineteen-eighty-four-orwell", "title": "Nineteen Eighty-Four", "author": "George Orwell", "year": 1949}]}, {"id": "totalitarian-moral-conformity", "title": "Totalitarian Moral Conformity Society", "description": "In a society obsessed with moral purity post-nuclear-war, a man subconsciously rebels by performing public pranks (japes) that expose the hypocrisy beneath the conformity, testing whether subversive humor can topple moralistic authoritarianism.", "domains": ["governance", "social-engineering"], "scenarios": ["satire", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models moral panic governance: relevant to cancel culture, social credit systems, and whether societies that enforce moral conformity produce genuine virtue or hidden rebellion.", "tags": ["moral-conformity", "subversive-humor", "moral-policing"], "story_count": 1, "stories": [{"id": "the-man-who-japed-dick", "title": "The Man Who Japed", "author": "Philip K. Dick", "year": 1956}]}, {"id": "totalitarian-spectacle-games", "title": "Totalitarian Spectacle Games", "description": "An authoritarian regime forces citizens into televised death competitions as a tool of social control, and a survivor's defiance becomes an unwitting spark for revolution, testing whether symbols of resistance can be controlled by either side.", "domains": ["governance", "social-engineering", "comms-info"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models state spectacle as social control (bread and circuses), the dynamics of revolutionary symbolism, and how authoritarian regimes create the martyrs that ultimately undermine them.", "tags": ["spectacle-games", "revolutionary-symbol", "authoritarian-control", "televised-violence"], "story_count": 7, "stories": [{"id": "catching-fire-collins", "title": "Catching Fire", "author": "Suzanne Collins", "year": 2009}, {"id": "mockingjay-collins", "title": "Mockingjay", "author": "Suzanne Collins", "year": 2010}, {"id": "the-ballad-of-songbirds-and-snakes-collins", "title": "The Ballad of Songbirds and Snakes", "author": "Suzanne Collins", "year": 2020}, {"id": "the-death-cure-dashner", "title": "The Death Cure", "author": "James Dashner, James Dashner", "year": 2011}, {"id": "the-hunger-games-collins", "title": "The Hunger Games", "author": "Suzanne Collins", "year": 2008}]}, {"id": "trauma-pre-adaptation-to-hostile-environments", "title": "Trauma as Pre-Adaptation to Hostile Environments", "description": "Childhood abuse and psychological damage, rather than being purely destructive, can reconfigure the brain's stress-response systems in ways that make survivors uniquely suited to chronic danger. Organisms that have already been broken by their environment can tolerate conditions that would incapacitate the healthy. This principle can be deliberately exploited: you can staff the most dangerous jobs with people whose prior suffering has hardened them, turning victimhood into a perverse qualification.", "domains": ["biotech", "ethics-philosophy", "space"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to military recruitment practices that target disadvantaged populations, debates about whether extreme-environment workers (astronauts, deep-sea divers, polar researchers) need specific psychological profiles, and the ethics of deliberately placing traumatized individuals in hazardous roles. Also raises questions about whether PTSD research should explore adaptive rather than purely pathological models of trauma response.", "tags": ["trauma-adaptation", "extreme-environments", "exploitation", "stress-physiology", "workforce-selection"], "story_count": 3, "stories": [{"id": "starfish-peter-watts", "title": "Starfish", "author": "Peter Watts", "year": 1999}, {"id": "maelstrom-peter-watts", "title": "Maelstrom", "author": "Peter Watts", "year": 2001}, {"id": "behemoth-peter-watts", "title": "Behemoth", "author": "Peter Watts", "year": 2004}]}, {"id": "tropical-megaflooding", "title": "Earth's Return to Tropical Megaflood Conditions", "description": "Solar radiation melts the ice caps, submerging cities under tropical swamps as Earth reverts to Triassic conditions, and some humans feel psychologically drawn toward the heat rather than fleeing it.", "domains": ["climate", "medicine", "existential-risk"], "scenarios": ["prediction", "warning"], "outcomes": ["catastrophic", "ambiguous"], "relevance": "THE earliest climate fiction masterpiece (1962). Models psychological adaptation to climate catastrophe: relevant to climate grief, eco-anxiety, and the strange human tendency to be attracted to the very disasters threatening us.", "tags": ["drowned-world", "climate-regression", "tropical-flooding", "eco-psychology"], "story_count": 1, "stories": [{"id": "the-drowned-world-ballard", "title": "The Drowned World", "author": "J. G. Ballard", "year": 1962}]}, {"id": "true-name-power-system", "title": "True-Name Power System", "description": "A world where knowing the true name of a thing grants power over it creates a society organized around knowledge as the primary form of power, where the greatest threat is a skilled individual who overestimates their understanding.", "domains": ["comms-info", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models information-as-power dynamics: cybersecurity (knowing system names = access), doxxing culture, and the danger of wielding powerful tools (nuclear, AI) without mature judgment.", "tags": ["true-names", "knowledge-as-power", "hubris", "information-security"], "story_count": 3, "stories": [{"id": "a-wizard-of-earthsea-guin", "title": "A Wizard of Earthsea", "author": "Ursula K. Le Guin", "year": 1968}, {"id": "the-tombs-of-atuan-guin", "title": "The Tombs of Atuan", "author": "Ursula K. Le Guin", "year": 1971}, {"id": "the-farthest-shore-guin", "title": "The Farthest Shore", "author": "Ursula K. Le Guin", "year": 1972}]}, {"id": "twin-decoy-governance", "title": "Twin Decoy Political Governance", "description": "A political leader maintains a secret twin as an assassination decoy, raising questions about which twin is the 'real' person and whether the decoy has rights independent of their function.", "domains": ["governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "ethical-dilemma"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models body-double diplomacy, witness protection identity, and the ethics of creating people whose entire purpose is to absorb threats intended for someone else.", "tags": ["twin-decoy", "political-body-double", "identity-function"], "story_count": 2, "stories": [{"id": "imposters-westerfeld", "title": "Imposters", "author": "Scott Westerfeld", "year": 2018}, {"id": "shatter-city-westerfeld", "title": "Shatter City", "author": "Scott Westerfeld", "year": 2019}]}, {"id": "twin-telepathy-starship-communication", "title": "Twin Telepathy for Starship Communication", "description": "Identical twins with telepathic links are separated: one twin stays on Earth while the other travels on a relativistic starship. The telepathy provides instantaneous communication across light-years. But time dilation means the traveling twin stays young while the Earth twin ages, eventually requiring the use of a next-generation telepathic relative. The story explores relativity's human cost through family separation.", "domains": ["space", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Relevant to interstellar communication challenges, the twin paradox in special relativity, and the human cost of long-duration space missions.", "tags": ["twin-telepathy", "relativistic-time-dilation", "ftl-communication"], "story_count": 1, "stories": [{"id": "time-for-the-stars-heinlein", "title": "Time for the Stars", "author": "Robert A. Heinlein", "year": 1956}]}, {"id": "ufo-phenomenon-investigation", "title": "UFO Phenomenon Investigation", "description": "Investigation into the UFO/alien phenomenon as a question bridging physics, intelligence, and public epistemology: where did they come from, what are they, and why does the evidence resist definitive classification?", "domains": ["first-contact", "comms-info"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Directly relevant to the post-2017 UAP disclosure movement, congressional hearings, and the epistemological challenge of phenomena that resist scientific closure.", "tags": ["ufo", "uap", "epistemology", "disclosure"], "story_count": 1, "stories": [{"id": "absolute-choice-ingersoll", "title": "Absolute choice", "author": "Donielle Ingersoll", "year": 2016}]}, {"id": "uncontrollable-breeding-species", "title": "First Contact with Uncontrollably Breeding Species", "description": "Humanity discovers an alien species that is intelligent, sympathetic, and creative, but breeds so rapidly that it periodically collapses into civilizational war and rebuilds from scratch. The question: can you have peaceful relations with a species whose biology makes them a perpetual threat?", "domains": ["first-contact", "governance", "biotech"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the challenge of engaging with a partner whose structural incentives make them unreliable: relevant to arms control with unstable states, and whether biological drives can be overcome by treaties.", "tags": ["breeding-crisis", "first-contact-dilemma", "biological-determinism"], "story_count": 2, "stories": [{"id": "the-mote-in-god-s-eye-niven", "title": "The Mote in God's Eye", "author": "Larry Niven, Jerry Pournelle, L.J. Ganser", "year": 1974}, {"id": "the-gripping-hand-niven", "title": "The Gripping Hand", "author": "Larry Niven", "year": 1993}]}, {"id": "uncontrollable-psychic-weapon", "title": "Uncontrollable Psychic Weapon", "description": "A government program creates individuals with devastating psychic abilities that exceed all containment measures, and the attempt to weaponize or control these powers triggers cascading urban destruction that the state cannot suppress.", "domains": ["warfare", "governance", "existential-risk"], "scenarios": ["warning", "cautionary-tale"], "outcomes": ["catastrophic", "cautionary"], "relevance": "Analogous to weapons programs that produce capabilities exceeding their creators' control: nuclear proliferation, autonomous weapons, and gain-of-function research where containment failure is catastrophic.", "tags": ["psychic-weapons", "containment-failure", "urban-destruction", "state-hubris"], "story_count": 3, "stories": [{"id": "akira-vol-1-tomo", "title": "Akira, Vol. 1", "author": "Katsuhiro \u014ctomo", "year": 1984}, {"id": "akira-vol-2-tomo", "title": "Akira, Vol. 2", "author": "Katsuhiro \u014ctomo", "year": 1985}, {"id": "akira-vol-3-tomo", "title": "Akira, Vol. 3", "author": "Katsuhiro \u014ctomo", "year": 1987}]}, {"id": "underground-city-resource-countdown", "title": "Underground City Resource Countdown", "description": "Generations ago, builders created an underground city with supplies for 200+ years. Now the lights are failing, the storerooms are empty, and the inhabitants have forgotten why their city was built or that an outside world exists.", "domains": ["governance", "existential-risk"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["cautionary", "aspirational"], "relevance": "Models critical infrastructure nearing end-of-life: relevant to aging nuclear plants, depleted aquifers, and any system where founders' knowledge is lost while the system they built deteriorates.", "tags": ["underground-city", "resource-depletion", "lost-knowledge"], "story_count": 2, "stories": [{"id": "the-city-of-ember-the-first-book-of-ember-duprau", "title": "The City of Ember (The First Book of Ember)", "author": "Jeanne DuPrau", "year": 1998}, {"id": "the-people-of-sparks-book-of-ember-2-duprau", "title": "The People of Sparks (Book of Ember #2)", "author": "Jeanne DuPrau", "year": 2004}]}, {"id": "underground-silo-controlled-society", "title": "Underground Silo Controlled Society", "description": "Thousands live in a vast underground silo, told the outside world is toxic. Anyone who questions the order is sent outside to 'clean' sensors and die. A mechanic discovers the truth: the rulers deliberately maintain the lie and have been resetting civilization inside the silo for generations. The story explores how information control maintains power, and how curiosity is the greatest threat to authoritarian systems.", "domains": ["governance", "surveillance", "social-engineering"], "scenarios": ["cautionary-tale", "thought-experiment"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to information control in authoritarian states, manufactured consent, and how systems perpetuate themselves by controlling what people can know.", "tags": ["information-control", "underground-society", "institutional-deception"], "story_count": 1, "stories": [{"id": "wool-howey", "title": "Wool", "author": "Hugh Howey", "year": 2011}]}, {"id": "underground-superrace-energy", "title": "Underground Superrace with Unlimited Energy", "description": "Explorers discover an underground civilization powered by 'vril,' a force that provides unlimited energy and grants its users extraordinary abilities, creating a species so powerful it could destroy surface civilization effortlessly.", "domains": ["energy-physics", "existential-risk", "governance"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the discovery of a civilization with overwhelming technological superiority: relevant to the anxiety of encountering genuinely superior technology, and the original 'hollow earth' fiction that spawned real-world fringe beliefs.", "tags": ["underground-civilization", "vril", "unlimited-energy", "superior-species"], "story_count": 1, "stories": [{"id": "the-coming-race-lytton", "title": "The Coming Race", "author": "Edward Bulwer Lytton, Baron Lytton", "year": 1871}]}, {"id": "understanding-through-combat", "title": "Understanding Alien Intelligence Through Combat", "description": "A long war between humans and an incomprehensible alien species gradually reveals that combat itself is the only form of communication between the two, and that the war may be a relationship rather than a conflict.", "domains": ["first-contact", "warfare", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Models the possibility that conflict is itself a form of communication, relevant to game theory, adversarial AI training, and reframing perpetual conflicts as dysfunctional relationships.", "tags": ["combat-communication", "alien-war", "perpetual-conflict", "understanding"], "story_count": 2, "stories": [{"id": "hardfought-bear", "title": "Hardfought", "author": "Greg Bear, Ray Chase, Timothy Zahn", "year": 1988}, {"id": "starfist-sherman", "title": "Starfist", "author": "David Sherman", "year": 2001}]}, {"id": "unfalsifiable-alien-claim", "title": "Unfalsifiable Alien Identity Claim", "description": "A psychiatric patient claims to be an alien visitor, and his claims are reinforced by knowledge he shouldn't possess, creating a diagnostic impasse where the psychiatrist cannot determine whether the patient is delusional or genuinely extraterrestrial.", "domains": ["first-contact", "medicine", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Models the diagnostic boundary between delusion and reality: relevant to psychiatric diagnosis, the problem of unfalsifiable claims, and what evidence would be sufficient to accept extraordinary claims.", "tags": ["alien-claim", "psychiatric-diagnosis", "unfalsifiability"], "story_count": 1, "stories": [{"id": "k-pax-brewer", "title": "K-Pax", "author": "Gene Brewer", "year": 1995}]}, {"id": "universal-ranking-society", "title": "Universal Citizen Ranking System", "description": "A country where a universal ranking system determines social advantages, career opportunities, and even partner matching for every citizen, satirizing quantification of human worth.", "domains": ["surveillance", "social-engineering", "governance"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly models China's social credit system, credit scores, employee rankings, and the trend toward quantifying every aspect of human performance and worth.", "tags": ["ranking-system", "social-credit", "quantified-worth", "algorithmic-society"], "story_count": 2, "stories": [{"id": "qualityland-kling", "title": "QualityLand", "author": "Marc-Uwe Kling", "year": 2017}, {"id": "qualityland-2-0-kling", "title": "QualityLand 2.0", "author": "Marc-Uwe Kling", "year": 2020}]}, {"id": "universal-resurrection-riverworld", "title": "Universal Resurrection Along Infinite River", "description": "Every human who ever lived simultaneously resurrects along the banks of an impossibly long river on an alien world. Stripped of possessions and returned to age 25, all of humanity must coexist: cavemen alongside astronauts, saints beside serial killers. The story asks what happens when death is removed as a consequence and all of history's people must negotiate a new society from scratch.", "domains": ["ethics-philosophy", "existential-risk"], "scenarios": ["thought-experiment"], "outcomes": ["transformative", "ambiguous"], "relevance": "Relevant to life-extension technology, social reset scenarios, and whether humanity would improve given a fresh start.", "tags": ["resurrection", "social-experiment", "mortality-removal"], "story_count": 1, "stories": [{"id": "to-your-scattered-bodies-go-farmer", "title": "To your scattered bodies go", "author": "Philip Jos\u00e9 Farmer", "year": 1971}]}, {"id": "universal-teleportation-society", "title": "Universal Teleportation Transforms Society", "description": "When humans develop the ability to 'jaunte' (teleport) by thought alone, society is radically restructured. The rich barricade themselves in underground labyrinths since physical security becomes impossible. Class warfare intensifies as the elite control access to space travel (the one thing jaunting cannot do). An obsessed, abandoned spaceman transcends human limits in his quest for vengeance, ultimately discovering an even greater teleportation power.", "domains": ["energy-physics", "social-engineering", "economics"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["transformative", "ambiguous"], "relevance": "Relevant to how disruptive transportation technologies (self-driving cars, orbital travel) reshape security, class structures, and urban planning.", "tags": ["teleportation", "class-warfare", "security", "vengeance"], "story_count": 1, "stories": [{"id": "the-stars-my-destination-bester", "title": "The Stars My Destination", "author": "Alfred Bester", "year": 1956}]}, {"id": "universal-unique-power", "title": "Universal Unique Power Distribution", "description": "Every individual develops a unique supernatural ability (currentgift) that shapes their role in society, creating a system where inequality is innate and visible, and some abilities are socially valued while others are feared.", "domains": ["social-engineering", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models neurodiversity and talent distribution: societies where every person has a unique capability but social structures determine which capabilities are valued or stigmatized.", "tags": ["unique-power", "innate-inequality", "ability-valuation", "neurodiversity-model"], "story_count": 4, "stories": [{"id": "carve-the-mark-roth", "title": "Carve the Mark", "author": "Veronica Roth", "year": 2016}, {"id": "destinos-divididos-roth", "title": "Destinos divididos  ", "author": "Veronica Roth", "year": 2018}, {"id": "the-fates-divide-roth", "title": "The Fates Divide", "author": "Veronica Roth", "year": 2018}, {"id": "swarm-westerfeld", "title": "Swarm", "author": "Scott Westerfeld", "year": 2016}]}, {"id": "unprepared-time-traveler", "title": "Unprepared Time Traveler Replacing Trained One", "description": "A girl who was never trained for time travel discovers she is the one with the ability instead of her prepared cousin, upending institutional plans and testing whether improvisation can substitute for preparation.", "domains": ["time-travel", "governance"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Models succession planning failure: when the wrong person inherits a critical role, can they succeed through adaptability? Relevant to emergency succession, unplanned leadership transitions.", "tags": ["unprepared-traveler", "succession-failure", "improvisation"], "story_count": 3, "stories": [{"id": "rubinrot-gier", "title": "Rubinrot", "author": "Kerstin Gier, Anthea Bell, Nelly Lemaire, Luis Miralles de Imperial", "year": 2009}, {"id": "saphirblau-gier", "title": "Saphirblau", "author": "Kerstin Gier", "year": 2010}, {"id": "smaragdgrun-gier", "title": "Smaragdgr\u00fcn", "author": "Kerstin Gier", "year": 2010}]}, {"id": "urban-collapse-folk-resilience", "title": "Urban Collapse and Folk Knowledge Resilience", "description": "After economic collapse empties a city's core, marginalized communities survive using traditional knowledge systems (folk medicine, spiritual practices) that mainstream institutions had dismissed, testing whether indigenous knowledge contains practical value that institutional knowledge lacks.", "domains": ["economics", "medicine", "social-engineering"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Relevant to urban decay recovery, the value of traditional ecological knowledge, and how marginalized communities develop resilience mechanisms that formal institutions fail to recognize.", "tags": ["urban-collapse", "folk-knowledge", "community-resilience", "marginalized-survival"], "story_count": 1, "stories": [{"id": "brown-girl-in-the-ring-hopkinson", "title": "Brown Girl in the Ring", "author": "Nalo Hopkinson", "year": 1998}]}, {"id": "urban-development-species-displacement", "title": "Urban Development and Species Displacement", "description": "Creatures with unique biological adaptations (winged cats) must navigate between safe rural havens and dangerous urban environments where development threatens their kind, modeling displacement pressures on unusual populations.", "domains": ["climate", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Relevant to urban wildlife corridors, habitat fragmentation, and the displacement of unique populations by development.", "tags": ["species-displacement", "urban-development", "habitat-loss"], "story_count": 1, "stories": [{"id": "catwings-return-guin", "title": "Catwings return", "author": "Ursula K. Le Guin", "year": 1989}]}, {"id": "utopian-civilization-covert-intervention", "title": "Utopian Civilization's Covert Interventions", "description": "The Culture, a post-scarcity utopia, secretly intervenes in less-developed civilizations using agents and AI ships. A traumatized mercenary is the Culture's instrument for changing societies, but his personal history of atrocity complicates any moral justification. The story asks whether a genuinely benevolent superpower has the right to interfere in others' development, and what happens to the individuals used as instruments of that policy.", "domains": ["governance", "warfare", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous"], "relevance": "Relevant to humanitarian intervention debates, CIA regime change operations, and the moral cost to individuals who carry out institutional violence.", "tags": ["interventionism", "post-scarcity", "moral-compromise"], "story_count": 1, "stories": [{"id": "use-of-weapons-banks", "title": "Use of Weapons", "author": "Iain Banks", "year": 1990}]}, {"id": "vampire-ecology", "title": "Predator Species Coexistence", "description": "A species that literally feeds on humans attempts to reform from within, with an individual trying to find an alternative to predation, testing whether a biological imperative to harm others can be overcome.", "domains": ["biotech", "ethics-philosophy"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models reform attempts within predatory systems: can institutions or species that are structurally dependent on exploitation reform themselves? Relevant to fossil fuel industry transition and prison reform.", "tags": ["predator-reform", "biological-imperative", "coexistence-attempt"], "story_count": 1, "stories": [{"id": "fevre-dream-martin", "title": "Fevre Dream", "author": "George R. R. Martin", "year": 1982}]}, {"id": "velvet-glove-imprisonment", "title": "Velvet-Glove Imprisonment", "description": "A retired secret agent finds himself trapped in a pleasant, comfortable village that is actually a sophisticated prison. The Village provides every amenity but denies the one thing that matters: freedom to leave. Inmates are assigned numbers instead of names, constantly surveilled, and psychologically manipulated. The comfortable captivity raises the question of whether a gilded cage is still a cage.", "domains": ["surveillance", "governance", "ethics-philosophy"], "scenarios": ["thought-experiment", "cautionary-tale"], "outcomes": ["dystopian", "cautionary"], "relevance": "Relevant to golden handcuffs in employment, comfortable authoritarianism, social media as a voluntary panopticon, and debates about trading freedom for security.", "tags": ["surveillance", "captivity", "identity-erasure"], "story_count": 1, "stories": [{"id": "the-prisoner-disch", "title": "The Prisoner", "author": "Thomas M. Disch", "year": 1979}]}, {"id": "victorian-computing-revolution", "title": "Victorian Computing Revolution", "description": "An alternate history where Charles Babbage's Analytical Engine succeeds, creating a Victorian-era information revolution with mechanical computers, punch-card surveillance, and political upheaval driven by data analysis.", "domains": ["ai-ml", "governance", "comms-info"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models how computing would transform ANY society it appeared in, not just ours: relevant to understanding that the digital revolution's effects (surveillance, data monopolies) are inherent to computing, not specific to electronics.", "tags": ["victorian-computing", "steampunk", "babbage", "early-information-age"], "story_count": 1, "stories": [{"id": "the-difference-engine-gibson", "title": "The Difference Engine", "author": "William Gibson, Bruce Sterling", "year": 1990}]}, {"id": "violence-as-art", "title": "Extreme Violence as Art Form", "description": "In a stratified society, an artist creates performance art from filmed extreme violence, blurring the boundary between self-expression and exploitation, while wealthy patrons consume it from orbital homes.", "domains": ["social-engineering", "economics", "ethics-philosophy"], "scenarios": ["satire", "warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Models the commodification of violence: relevant to reality TV, cage fighting, war-as-entertainment, and the ethics of consuming suffering as content.", "tags": ["violence-as-art", "commodified-violence", "class-entertainment"], "story_count": 1, "stories": [{"id": "the-artificial-kid-sterling", "title": "The Artificial Kid", "author": "Bruce Sterling", "year": 1980}]}, {"id": "viral-alien-artifact-fame", "title": "Viral Fame from Alien Artifact", "description": "Mysterious alien sculptures appear worldwide, and the first person to document them becomes an instant celebrity, testing how viral fame, public attention, and the pressure to be a spokesperson for something incomprehensible distorts an ordinary person.", "domains": ["first-contact", "comms-info", "social-engineering"], "scenarios": ["thought-experiment", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models the dynamics of viral fame, parasocial relationships, and how social media amplifies and distorts first-contact scenarios by centering individual personalities over collective response.", "tags": ["viral-fame", "alien-artifact", "social-media", "spokesperson-burden"], "story_count": 2, "stories": [{"id": "an-absolutely-remarkable-thing-green", "title": "An Absolutely Remarkable Thing", "author": "Hank Green", "year": 2018}, {"id": "a-beautifully-foolish-endeavor-green", "title": "A Beautifully Foolish Endeavor", "author": "Hank Green", "year": 2020}]}, {"id": "viral-evolutionary-leap", "title": "Virus-Triggered Evolutionary Leap", "description": "A dormant human endogenous retrovirus activates and triggers a sudden evolutionary leap, producing children with new cognitive capabilities, while governments and fearful populations try to suppress the change.", "domains": ["biotech", "pandemics", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["transformative", "cautionary"], "relevance": "Directly relevant to endogenous retrovirus research, epigenetics, fears about mRNA technology, and the question of how society would react to a genuine human speciation event.", "tags": ["viral-evolution", "speciation", "endogenous-retrovirus", "evolutionary-fear"], "story_count": 5, "stories": [{"id": "darwin-s-children-bear", "title": "Darwin's children", "author": "Greg Bear, Jean-Daniel Br\u00e8que, Scott Brick", "year": 2001}, {"id": "darwin-s-radio-bear", "title": "Darwin's radio", "author": "Greg Bear", "year": 1999}, {"id": "deadlines-larkin-family-chronicles-bear", "title": "Deadlines (Larkin Family Chronicles)", "author": "Greg Bear", "year": 2001}, {"id": "maddadam-atwood", "title": "MaddAdam", "author": "Margaret Atwood", "year": 2013}, {"id": "the-boy-on-the-bridge-carey", "title": "The boy on the bridge", "author": "M. R. Carey", "year": 2017}]}, {"id": "virtual-afterlife-politics", "title": "Virtual Afterlife As Political Weapon", "description": "Some civilizations create virtual afterlives (hells) to punish the dead, and the Culture goes to war over whether anyone has the right to torture the digitally deceased, testing whether post-death virtual environments are real enough to warrant intervention.", "domains": ["vr-simulation", "ethics-philosophy", "warfare"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Models digital rights after death: relevant to digital legacy, post-mortem social media accounts, deepfaked dead people, and whether suffering in simulation is 'real' suffering.", "tags": ["virtual-afterlife", "digital-hell", "post-death-rights", "culture-war"], "story_count": 1, "stories": [{"id": "surface-detail-banks", "title": "Surface Detail", "author": "Iain Banks", "year": 2010}]}, {"id": "virtual-crime-real-consequences", "title": "Virtual Crime with Real Consequences", "description": "A robbery inside a virtual game world has real economic consequences that require real police investigation, testing whether virtual property crimes can be prosecuted under systems designed for physical property.", "domains": ["economics", "governance", "comms-info"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Prescient model of NFT theft, virtual property law, and in-game economy policing. Written before most virtual economy crimes were taken seriously by law enforcement.", "tags": ["virtual-crime", "game-economy", "virtual-property", "digital-policing"], "story_count": 2, "stories": [{"id": "halting-state-stross", "title": "Halting State", "author": "Charles Stross", "year": 2007}, {"id": "rule-34-stross", "title": "Rule 34", "author": "Charles Stross", "year": 2011}]}, {"id": "virtual-labor-organizing", "title": "Virtual Economy Labor Organizing", "description": "Workers who extract value from virtual game economies (gold farmers) organize an international labor union, discovering that virtual exploitation follows the same dynamics as physical sweatshop labor.", "domains": ["economics", "comms-info", "governance"], "scenarios": ["prediction", "warning"], "outcomes": ["aspirational", "cautionary"], "relevance": "Prescient model of gig economy organizing, platform worker rights, and the realization that virtual economies create real exploitation. Directly relevant to Amazon warehouse unionization and food delivery worker movements.", "tags": ["virtual-labor", "gold-farming", "labor-organizing", "platform-exploitation"], "story_count": 1, "stories": [{"id": "for-the-win-doctorow", "title": "For the Win", "author": "Cory Doctorow", "year": 2010}]}, {"id": "virtual-reality-identity", "title": "Virtual Reality and Identity", "description": "Immersive virtual environments blur the boundary between real and simulated experience, challenging definitions of identity, reality, and meaning.", "domains": ["vr-simulation", "ethics-philosophy"], "scenarios": ["thought-experiment"], "outcomes": ["ambiguous", "transformative"], "relevance": "Informs policy on digital addictions, virtual economies, digital identity rights, and metaverse governance.", "tags": ["virtual-reality", "digital-identity", "simulation"], "story_count": 9, "stories": [{"id": "burning-bright-scott", "title": "Burning bright", "author": "Melissa Scott", "year": 1993}, {"id": "city-of-golden-shadow-williams", "title": "City of Golden Shadow", "author": "Tad Williams", "year": 1991}, {"id": "mona-lisa-overdrive-gibson", "title": "Mona Lisa Overdrive", "author": "William Gibson", "year": 1987}, {"id": "mother-of-storms-barnes", "title": "Mother of storms", "author": "John Barnes", "year": 1994}, {"id": "count-zero-gibson", "title": "Count Zero", "author": "William Gibson", "year": 1986}]}, {"id": "vivisection-hybrid-creation", "title": "Vivisection-Created Hybrid Species", "description": "A scientist surgically transforms animals into human-like beings on an isolated island, creating a society of beings that are neither fully human nor animal, testing the ethical boundaries of biological modification.", "domains": ["biotech", "ethics-philosophy"], "scenarios": ["warning", "ethical-dilemma"], "outcomes": ["catastrophic", "cautionary"], "relevance": "THE canonical bio-ethics horror. Directly relevant to chimera research, xenotransplantation, animal uplift ethics, and the question of whether creating sentient beings through biological modification can ever be justified.", "tags": ["vivisection", "hybrid-species", "bioethics-horror"], "story_count": 1, "stories": [{"id": "the-island-of-dr-moreau-wells", "title": "The Island of Dr. Moreau", "author": "H. G. Wells", "year": 1896}]}, {"id": "voluntary-body-swapping", "title": "Voluntary Body-Swapping Society", "description": "In a world where people can freely swap bodies with each other, identity is decoupled from physical form, creating new forms of exploitation (swapping into someone's body and ruining it) and new freedoms.", "domains": ["medicine", "ethics-philosophy", "economics"], "scenarios": ["thought-experiment", "prediction"], "outcomes": ["ambiguous", "cautionary"], "relevance": "Models digital identity portability, body modification ethics, and the economic implications of separating identity from physical form. Relevant to avatar economies and digital identity theft.", "tags": ["body-swapping", "identity-portability", "physical-exploitation"], "story_count": 1, "stories": [{"id": "hopscotch-anderson", "title": "Hopscotch", "author": "Kevin J. Anderson", "year": 2002}]}, {"id": "vr-escape-from-dystopia", "title": "Virtual Reality as Mass Escape from Dystopia", "description": "In a ruined physical world, most of humanity spends its time in a virtual reality system (OASIS) that provides everything the real world lacks, testing whether virtual paradise is a solution to or evasion of real-world problems.", "domains": ["vr-simulation", "economics", "social-engineering"], "scenarios": ["prediction", "warning"], "outcomes": ["cautionary", "ambiguous"], "relevance": "THE canonical VR-as-escape scenario. Directly relevant to gaming addiction, metaverse proposals, and the question of whether immersive digital worlds help or hinder solving real-world crises.", "tags": ["vr-escape", "oasis", "metaverse", "digital-escapism"], "story_count": 3, "stories": [{"id": "ready-player-one-cline", "title": "Ready Player One", "author": "Ernest Cline", "year": 2008}, {"id": "ready-player-two-cline", "title": "Ready Player Two", "author": "Ernest Cline", "year": 2019}, {"id": "the-temporal-void-hamilton", "title": "The Temporal Void", "author": "Peter F. Hamilton", "year": 2008}]}, {"id": "vr-game-societal-control", "title": "Virtual Reality Game as Societal Control System", "description": "A massively popular VR game is revealed to be a tool for surveillance and social control, with player data used to predict and manipulate behavior. A hacker who discovers the truth must decide whether to expose the system or exploit it from within.\n\nThe scenario examines how entertainment platforms can become instruments of power when they collect enough behavioral data.", "domains": ["vr-simulation", "surveillance", "comms-info"], "scenarios": ["warning"], "outcomes": ["dystopian", "cautionary"], "relevance": "Directly relevant to gaming platform data collection, social credit systems, behavioral prediction markets, and the power of entertainment companies that know their users' psychology intimately.", "tags": ["vr-surveillance", "gaming-control", "hacker-resistance", "behavioral-data"], "story_count": 1, "stories": [{"id": "wildcard-lu", "title": "Wildcard", "author": "Marie Lu", "year": 2018}]}, {"id": "warship-ai-personhood", "title": "Military AI Personhood Claim", "description": "A fragment of a destroyed warship AI operates in a human body, navigating political crises while asserting personhood, testing whether an entity designed for war can earn rights in the civilization it was built to serve.", "domains": ["ai-ml", "ethics-philosophy", "governance"], "scenarios": ["ethical-dilemma", "thought-experiment"], "outcomes": ["ambiguous", "aspirational"], "relevance": "Directly relevant to military AI autonomy debates, the legal status of emergent AI systems, and whether tools designed for destruction can be repurposed for governance.", "tags": ["ai-personhood", "military-ai", "identity", "rights-claim"], "story_count": 2, "stories": [{"id": "ancillary-mercy-leckie", "title": "Ancillary Mercy", "author": "Ann Leckie", "year": 2015}, {"id": "ancillary-sword-leckie", "title": "Ancillary Sword", "author": "Ann Leckie", "year": 2014}]}, {"id": "water-wars-american-southwest", "title": "Water Wars in the American Southwest", "description": "Drought has devastated the American Southwest, turning states into hostile entities fighting over dwindling Colorado River water rights. 'Water knives' are enforcers who cut off water to rival states, creating climate refugees within America's borders. Texas has already collapsed. The story shows how climate change transforms water from a shared resource into a weapon, and how legal water rights become more valuable than land or gold.", "domains": ["climate", "governance", "economics"], "scenarios": ["warning", "prediction"], "outcomes": ["dystopian", "catastrophic"], "relevance": "Extremely relevant to Colorado River compact negotiations, California-Arizona water disputes, climate migration, and resource conflict between US states.", "tags": ["water-rights", "climate-refugees", "interstate-conflict"], "story_count": 1, "stories": [{"id": "the-water-knife-bacigalupi", "title": "The Water Knife", "author": "Paolo Bacigalupi, Almarie Guerra", "year": 2015}]}, {"id": "weaponized-rhetoric", "title": "Weaponized Rhetoric", "description": "Language and rhetoric are recognized as literal weapons that cause delusion and institutional paralysis, requiring quarantine and treatment protocols for those 'infected' by persuasive speech acts.", "domains": ["comms-info", "governance", "social-engineering"], "scenarios": ["satire", "warning"], "outcomes": ["cautionary", "dystopian"], "relevance": "Directly models disinformation-as-contagion, the 'infodemic' concept, and whether societies need institutional defenses against persuasion technologies as potent as biological weapons.", "tags": ["rhetoric-weapon", "disinformation", "speech-pathology", "institutional-paralysis"], "story_count": 2, "stories": [{"id": "documents-relating-to-the-sentimental-agents-in-the-volyen-empire-lessing", "title": "Documents relating to the sentimental agents in the Volyen Empire", "author": "Doris Lessing", "year": 1983}, {"id": "soldier-ask-not-dickson-short", "title": "Soldier, Ask Not", "author": "Gordon R. Dickson", "year": 1964}]}, {"id": "weapons-as-check-on-tyranny", "title": "Weapons Shops as Check on Imperial Tyranny", "description": "In a far-future empire, independent Weapon Shops operate outside government control, selling personal weapons that can only be used in self-defense. The shops serve as a democratic counterbalance to imperial tyranny: 'The right to buy weapons is the right to be free.' The shops exist in a paradoxical temporal loop, their very existence preventing the totalitarianism that would make them necessary.", "domains": ["governance", "warfare", "ethics-philosophy"], "scenarios": ["th , "stories": [{"id": "crazy-house-patterson", "title": "Crazy House", "author": "James Patterson", "year": 2017}]}, {"id": "youth-resistance-movement", "title": "Youth Resistance Movement Against Government Suppression", "description": "Young people with special abilities, suppressed and imprisoned by the government, organize a resistance movement, testing whether youthful idealism can overcome institutional power.", "domains": ["governance", "social-engineering"], "scenarios": ["warning", "thought-experiment"], "outcomes": ["aspirational", "cautionary"], "relevance": "Models youth activist movements, relevant to climate strikes, pro-democracy student movements, and the dynamics of youth organizing against entrenched power structures.", "tags": ["youth-resistance", "government-suppression", "special-abilities"], "story_count": 4, "stories": [{"id": "in-the-afterlight-bracken", "title": "In The Afterlight", "author": "Alexandra Bracken", "year": 2014}, {"id": "never-fade-bracken", "title": "Never fade", "author": "Alexandra Bracken, Alexander Bracken", "year": 2013}, {"id": "prodigy-lu", "title": "Prodigy", "author": "Marie Lu", "year": 2012}, {"id": "the-darkest-minds-bracken", "title": "The Darkest Minds", "author": "Alexandra Bracken, Amy McFadden, Montserrat Trivi\u00f1o Gonzalez", "year": 2012}]}, {"id": "zero-physical-contact-society", "title": "Zero Physical Contact Society", "description": "On planet Solaria, technology has enabled a civilization where humans never physically meet, communicating only through holographic viewing, and the mere thought of physical proximity causes revulsion.", "domains": ["social-engineering", "robotics", "ethics-philosophy"], "scenarios": ["prediction", "thought-experiment"], "outcomes": ["cautionary", "ambiguous"], "relevance": "Extraordinarily prescient (1957): directly models the COVID-era remote-everything society, hikikomori culture, and the trajectory of replacing all physical interaction with digital mediation.", "tags": const DOMAIN_LABELS = {"ai-ml": "Artificial Intelligence and Machine Learning", "biotech": "Biotechnology and Genetic Engineering", "space": "Space Exploration and Colonization", "first-contact": "First Contact and Alien Civilizations", "climate": "Climate and Environmental Change", "nanotech": "Nanotechnology", "vr-simulation": "Virtual Reality and Simulation", "time-travel": "Time Travel and Temporal Mechanics", "governance": "Governance and Political Systems", "economics": "Economics and Resource Allocation", "comms-info": "Communication and Information Technology", "warfare": "Warfare and Weapons Technology", "medicine": "Medicine and Human Enhancement", "robotics": "Robotics and Automation", "energy-physics": "Energy and Physics", "surveillance": "Surveillance and Privacy", "social-engineering": "Social Engineering and Psychology", "pandemics": "Pandemics and Biological Threats", "existential-risk": "Existential Risk and Civilizational Collapse", "ethics-philosophy": "Ethics and Philosophy of Technology"};

function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length > 2);
}

// Stopwords
const STOP = new Set(['the','and','for','are','but','not','you','all','can','had','her','was','one','our','out','has','his','how','its','may','new','now','old','see','way','who','did','get','let','say','she','too','use','with','this','that','from','they','been','have','many','some','them','than','each','make','like','long','look','only','come','over','such','take','into','just','your','also','back','been','more','most','much','must','name','very','when','what','will','about','could','other','which','their','there','these','those','would','first','after','being','where','while']);

function scoreIdea(idea, queryTokens) {
  // Build idea text tokens
  const ideaText = [
    idea.title, idea.description, idea.relevance,
    ...idea.domains, ...idea.scenarios, ...idea.outcomes, ...idea.tags
  ].join(' ');
  const ideaTokens = tokenize(ideaText);
  const ideaSet = new Set(ideaTokens);

  let score = 0;
  let matchedTerms = [];
  const queryFiltered = queryTokens.filter(t => !STOP.has(t));

  for (const qt of queryFiltered) {
    // Exact match
    if (ideaSet.has(qt)) {
      score += 3;
      matchedTerms.push(qt);
      continue;
    }
    // Prefix match (stem-like)
    for (const it of ideaSet) {
      if (it.startsWith(qt.slice(0, Math.max(4, qt.length - 2))) || qt.startsWith(it.slice(0, Math.max(4, it.length - 2)))) {
        score += 1.5;
        matchedTerms.push(qt + '~' + it);
        break;
      }
    }
  }

  // Bonus for domain matches
  for (const d of idea.domains) {
    for (const qt of queryFiltered) {
      if (d.includes(qt) || qt.includes(d.replace('-', ''))) {
        score += 2;
      }
    }
  }

  return { score, matchedTerms };
}

function search() {
  const query = document.getElementById('query-box').value.trim();
  if (!query) return;

  const queryTokens = tokenize(query);
  const results = [];

  for (const idea of IDEAS) {
    const { score, matchedTerms } = scoreIdea(idea, queryTokens);
    if (score > 0) {
      results.push({ idea, score, matchedTerms });
    }
  }

  results.sort((a, b) => b.score - a.score);
  const top = results.slice(0, 20);

  const countEl = document.getElementById('results-count');
  countEl.textContent = results.length + ' ideas matched. Showing top ' + top.length + '.';

  const container = document.getElementById('results');
  if (top.length === 0) {
    container.innerHTML = '<p style="color:var(--text-muted)">No matching ideas found. Try different keywords or a broader description.</p>';
    return;
  }

  let html = '';
  for (const { idea, score } of top) {
    const domains = idea.domains.map(d => '<span class="tag">' + (DOMAIN_LABELS[d] || d) + '</span>').join('');
    const storyLinks = idea.stories.map(s =>
      '<a href="stories/' + s.id + '.html">' + s.title + '</a> (' + s.author + ', ' + s.year + ')'
    ).join(', ');

    html += '<div class="result-card">';
    html += '<span class="result-score">Score: ' + score.toFixed(1) + '</span>';
    html += '<div class="result-title"><a href="ideas/' + idea.id + '.html">' + idea.title + '</a></div>';
    html += '<div>' + domains + '</div>';
    html += '<div class="result-desc">' + idea.description + '</div>';
    html += '<div class="result-relevance"><strong>Real-world relevance:</strong> ' + idea.relevance + '</div>';
    html += '<div class="result-stories"><strong>Stories (' + idea.story_count + '):</strong> ' + storyLinks + '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function setQuery(text) {
  document.getElementById('query-box').value = text;
  search();
}

document.getElementById('search-btn').addEventListener('click', search);
document.getElementById('query-box').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); search(); }
});
</script>
